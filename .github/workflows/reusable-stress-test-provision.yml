name: "♻️ 🏗️ Phase 2: Provision"

on:
  workflow_call:
    inputs:
      environment:
        description: "Target Environment"
        required: true
        type: string

      target_type:
        description: "What to test"
        required: false
        default: "host"
        type: string

      branch_tag:
        description: "Feature branch tag (required if target_type=feature-branch)"
        required: false
        type: string

      mode:
        description: "Execution Mode"
        required: false
        default: "standard"
        type: string

      include_third_party:
        description: "Include third-party stacks (MongoDB, Elastic, Cloudflare)"
        required: false
        default: false
        type: boolean

      preserve_host:
        description: "Preserve host network"
        required: false
        default: false
        type: boolean
        
      cloud_provider:
        required: false
        type: string
        default: aws
        
      wif_audience:
        required: false
        type: string
        default: ""
        
      azure_client_id_rev:
        required: false
        type: string
      azure_tenant_id_rev:
        required: false
        type: string
      azure_subscription_id_rev:
        required: false
        type: string
    secrets:
      MONGO_INITDB_ROOT_PASSWORD:
        required: false
      BLAZE_ELASTICSEARCH_USERNAME:
        required: false
      BLAZE_ELASTICSEARCH_PASSWORD:
        required: false
      BLAZE_ELASTICSEARCH_ENDPOINT:
        required: false
      AWS_ROLE_ARN:
        required: false
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        required: false
      GCP_SERVICE_ACCOUNT:
        required: false
      AZURE_CLIENT_ID:
        required: false
      AZURE_TENANT_ID:
        required: false
      AZURE_SUBSCRIPTION_ID:
        required: false
      CLOUDFLARE_API_TOKEN:
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        required: false
      CLOUDFLARE_ZONE_ID:
        required: false
      GH_PAT:
        required: false
      NPM_TOKEN:
        required: false
      INFRACOST_API_KEY:
        required: false
      BLAZE_CONNECTION_STRING:
        required: false
      BLAZE_AUTH_JWT_PRIVATE_KEY:
        required: false
      BLAZE_AUTH_ADMIN_EMAIL:
        required: false
      BLAZE_AUTH_ADMIN_PASSWORD:
        required: false
      BLAZE_FILES_S3_ACCESS_KEY:
        required: false
      BLAZE_FILES_S3_SECRET_ACCESS_KEY:
        required: false
      BLAZE_GRAPHQL_CACHE_SETTINGS:
        required: false
      BLAZE_CLIENT_HEADER:
        required: false
      EC_API_KEY:
        required: false
      MONGODB_ATLAS_PUBLIC_KEY:
        required: false
      MONGODB_ATLAS_PRIVATE_KEY:
        required: false
      MONGODB_ATLAS_ORG_ID:
        required: false
      MONGODB_ATLAS_PROJECT_ID:
        required: false
      ACM_CERTIFICATE_ARN:
        required: false
      BLAZE_SENTRY_AUTH_TOKEN:
        required: false
      BLAZE_SENTRY_DSN:
        required: false
      SLACK_WEBHOOK_URL:
        required: false
      DEPLOY_KEY:
        required: false
permissions:
  id-token: write
  contents: read
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # --------------------------------------------------------------------------------
  # 1. SETUP & CONFIG (Required for each phase orchestrator)
  # --------------------------------------------------------------------------------
  setup:
    name: "Initialize"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      terraform_stack: ${{ steps.calc.outputs.stack }}
      branch_tag: ${{ steps.calc.outputs.tag }}
    steps:
      - id: calc
        run: |
          if [[ "${{ inputs.target_type }}" == "feature-branch" ]]; then
            echo "stack=app" >> $GITHUB_OUTPUT
            echo "tag=${{ inputs.branch_tag }}" >> $GITHUB_OUTPUT
          else
            echo "stack=network" >> $GITHUB_OUTPUT
            echo "tag=" >> $GITHUB_OUTPUT
          fi

  config:
    name: "⚙️ Config"
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      stage_key: ${{ steps.calc.outputs.stage_key }}
      bucket: ${{ steps.calc.outputs.bucket }}
      lock_table: ${{ steps.calc.outputs.lock_table }}
      state_key: ${{ steps.calc.outputs.state_key }}
      tf_dir: ${{ steps.calc.outputs.tf_dir }}
      cluster_name: ${{ steps.calc.outputs.cluster_name }}
      env_val: ${{ steps.calc.outputs.env_val }}
      aws_region: ${{ steps.calc.outputs.aws_region }}
      client_key: ${{ steps.calc.outputs.client_key }}
      project_key: ${{ steps.calc.outputs.project_key }}
      namespace: ${{ steps.calc.outputs.namespace }}
      platform: ${{ steps.calc.outputs.platform }}
      cloud_provider: ${{ steps.calc.outputs.cloud_provider }}
      cloud_region: ${{ steps.calc.outputs.cloud_region }}
      infra_prefix: ${{ steps.calc.outputs.infra_prefix }}
      gcp_project_id: ${{ steps.calc.outputs.gcp_project_id }}
      domain_root: ${{ steps.calc.outputs.domain_root }}
      allowed_infra_users: ${{ steps.calc.outputs.allowed_infra_users }}
      gcp_docker_repo: ${{ steps.calc.outputs.gcp_docker_repo }}
      azure_acr_name: ${{ steps.calc.outputs.azure_acr_name }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.2

      - name: Checkout Actions
        uses: actions/checkout@v6.0.2
        with:
          repository: thisisblaze/blaze-actions
          path: .blaze-actions
          ref: dev

      - name: Calculate Configuration
        id: calc
        uses: ./.blaze-actions/.github/actions/calculate-env-config
        with:
          environment: ${{ inputs.environment }}
          terraform_stack: ${{ needs.setup.outputs.terraform_stack }}
          branch_tag: ${{ needs.setup.outputs.branch_tag }}
          cloud_provider: ${{ inputs.cloud_provider }}

  # --------------------------------------------------------------------------------
  # 4. PROVISION (Rebuild)
  # --------------------------------------------------------------------------------
  provision-network:
    if: always() && inputs.mode != 'destroy-only' && inputs.mode != 'quick-test' && inputs.preserve_host != true && inputs.target_type == 'host'
    needs: [config]
    name: "🏗️ Provision Network"

    uses: thisisblaze/blaze-actions/.github/workflows/01-provision-infra.yml@v1.4.27
    with:
      cloud_provider: ${{ inputs.cloud_provider }}
      environment: ${{ inputs.environment }}
      stack: "network"
      apply: true
      enable_ec2: ${{ inputs.environment == 'dev-mini' }}
      azure_client_id_rev: ${{ inputs.azure_client_id_rev }}
      azure_tenant_id_rev: ${{ inputs.azure_tenant_id_rev }}
      azure_subscription_id_rev: ${{ inputs.azure_subscription_id_rev }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      GH_PAT: ${{ secrets.GH_PAT }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  provision-tunnel:
    if: always() && inputs.environment == 'dev-mini' && inputs.mode != 'destroy-only' && inputs.mode != 'quick-test' && (needs.provision-network.result == 'success' || needs.provision-network.result == 'skipped')
    needs: [config, provision-network]
    name: "🏗️ Provision Tunnel"

    uses: thisisblaze/blaze-actions/.github/workflows/01-provision-infra.yml@v1.4.27
    with:
      cloud_provider: ${{ inputs.cloud_provider }}
      environment: ${{ inputs.environment }}
      stack: "tunnel"
      apply: true
      azure_client_id_rev: ${{ inputs.azure_client_id_rev }}
      azure_tenant_id_rev: ${{ inputs.azure_tenant_id_rev }}
      azure_subscription_id_rev: ${{ inputs.azure_subscription_id_rev }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      GH_PAT: ${{ secrets.GH_PAT }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  provision-app:
    if: always() && inputs.mode != 'destroy-only' && inputs.mode != 'quick-test' && (needs.provision-network.result == 'success' || needs.provision-network.result == 'skipped') && (needs.provision-tunnel.result == 'success' || needs.provision-tunnel.result == 'skipped')
    needs: [config, provision-network, provision-tunnel]
    name: "🏗️ Provision App"

    uses: thisisblaze/blaze-actions/.github/workflows/01-provision-infra.yml@v1.4.27
    with:
      cloud_provider: ${{ inputs.cloud_provider }}
      environment: ${{ inputs.environment }}
      stack: "app"
      apply: true
      enable_tunnel: ${{ inputs.environment == 'dev-mini' }}
      enable_ec2: ${{ contains(inputs.environment, 'prod') }}
      api_launch_type: ${{ contains(inputs.environment, 'prod') && 'EC2' || 'FARGATE' }}
      frontend_launch_type: ${{ contains(inputs.environment, 'prod') && 'EC2' || 'FARGATE' }}
      azure_client_id_rev: ${{ inputs.azure_client_id_rev }}
      azure_tenant_id_rev: ${{ inputs.azure_tenant_id_rev }}
      azure_subscription_id_rev: ${{ inputs.azure_subscription_id_rev }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      GH_PAT: ${{ secrets.GH_PAT }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  provision-third-party-mongodb:
    if: always() && inputs.mode != 'destroy-only' && inputs.mode != 'quick-test' && inputs.include_third_party && inputs.target_type == 'host' && (needs.provision-app.result == 'success' || needs.provision-app.result == 'skipped')
    needs: [config, provision-app]
    name: "🏛️ Provision MongoDB"
    uses: thisisblaze/blaze-actions/.github/workflows/01-provision-infra.yml@v1.4.27
    with:
      cloud_provider: ${{ inputs.cloud_provider }}
      environment: ${{ inputs.environment }}
      stack: "third-party-mongodb"
      apply: true
      azure_client_id_rev: ${{ inputs.azure_client_id_rev }}
      azure_tenant_id_rev: ${{ inputs.azure_tenant_id_rev }}
      azure_subscription_id_rev: ${{ inputs.azure_subscription_id_rev }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      GH_PAT: ${{ secrets.GH_PAT }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  provision-third-party-elastic:
    if: always() && inputs.mode != 'destroy-only' && inputs.mode != 'quick-test' && inputs.include_third_party && inputs.target_type == 'host' && (needs.provision-app.result == 'success' || needs.provision-app.result == 'skipped')
    needs: [config, provision-app]
    name: "🏛️ Provision Elastic"
    uses: thisisblaze/blaze-actions/.github/workflows/01-provision-infra.yml@v1.4.27
    with:
      cloud_provider: ${{ inputs.cloud_provider }}
      environment: ${{ inputs.environment }}
      stack: "third-party-elastic"
      apply: true
      azure_client_id_rev: ${{ inputs.azure_client_id_rev }}
      azure_tenant_id_rev: ${{ inputs.azure_tenant_id_rev }}
      azure_subscription_id_rev: ${{ inputs.azure_subscription_id_rev }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      GH_PAT: ${{ secrets.GH_PAT }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
