name: Pre-Destroy Cleanup

on:
   workflow_call:
      inputs:
         cluster_name:
            required: true
            type: string
         aws_region:
            required: true
            type: string
         stage_filter:
            required: false
            type: string
            description: "Optional stage filter to only cleanup services for a specific stage handle (e.g. 'dev-bz-01'). Matches '-{stage_filter}-' within ECS service names. When set, namespace + task definition cleanup is skipped (shared cluster safety)."
         force_delete:
            required: false
            type: boolean
            default: false
            description: "Force delete services even if tasks are running"
         environment:
            required: false
            type: string
            description: "GitHub Environment"
      secrets:
         AWS_ROLE_ARN:
            required: false

         CLOUDFLARE_API_TOKEN:
            required: false
         CLOUDFLARE_ZONE_ID:
            required: false
         CLOUDFLARE_ACCOUNT_ID:
            required: false
      outputs:
         cleanup_status:
            value: ${{ jobs.cleanup.outputs.status }}
         services_deleted:
            value: ${{ jobs.cleanup.outputs.services }}
         tasks_deleted:
            value: ${{ jobs.cleanup.outputs.tasks_deleted }}

permissions:
   id-token: write
   contents: read

jobs:
   cleanup:
      name: Pre-Destroy Cleanup
      runs-on: ubuntu-latest
      timeout-minutes: 15
      environment: ${{ inputs.environment }}

      outputs:
         status: ${{ steps.cleanup.outputs.status }}
         services: ${{ steps.cleanup.outputs.services }}
         tasks_deleted: ${{ steps.cleanup.outputs.tasks_deleted }}

      steps:
         - name: Setup AWS CLI
           uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
           with:
              role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
              role-session-name: GitHubActions-PreDestroy
              aws-region: ${{ inputs.aws_region || 'eu-west-1' }}

         - name: Parse Context
           id: context
           run: |
              CLUSTER="${{ inputs.cluster_name }}"
              echo "Parsing context from Cluster: $CLUSTER"

              if [[ "$CLUSTER" =~ ([^-]+)-([^-]+)-([^-]+)-([^-]+)-cluster ]]; then
                 NAMESPACE="${BASH_REMATCH[1]}"
                 CLIENT_KEY="${BASH_REMATCH[2]}"
                 PROJECT_KEY="${BASH_REMATCH[3]}"
                 STAGE_KEY="${BASH_REMATCH[4]}"
                 echo "NAMESPACE=$NAMESPACE" >> $GITHUB_ENV
                 echo "CLIENT_KEY=$CLIENT_KEY" >> $GITHUB_ENV
                 echo "PROJECT_KEY=$PROJECT_KEY" >> $GITHUB_ENV
                 echo "STAGE_KEY=$STAGE_KEY" >> $GITHUB_ENV
                 echo "Parsed: Namespace='$NAMESPACE', Client='$CLIENT_KEY', Project='$PROJECT_KEY', Stage='$STAGE_KEY'"
              else
                 echo "⚠️ Could not parse Cluster Name. Keys will be empty."
                 echo "NAMESPACE=" >> $GITHUB_ENV
                 echo "CLIENT_KEY=" >> $GITHUB_ENV
                 echo "PROJECT_KEY=" >> $GITHUB_ENV
                 echo "STAGE_KEY=" >> $GITHUB_ENV
              fi

         - name: Cleanup S3 Buckets
           if: env.CLIENT_KEY != ''
           run: |
              NAMESPACE="${{ env.NAMESPACE }}"
              CLIENT_KEY="${{ env.CLIENT_KEY }}"
              PROJECT_KEY="${{ env.PROJECT_KEY }}"
              STAGE_KEY="${{ env.STAGE_KEY }}"

              CANDIDATES=(
                "${NAMESPACE}-${CLIENT_KEY}-ecs-${PROJECT_KEY}-${STAGE_KEY}-storage-origin"
                "${NAMESPACE}-${CLIENT_KEY}-${PROJECT_KEY}-${STAGE_KEY}-storage-origin"
                "${NAMESPACE}-${CLIENT_KEY}-${PROJECT_KEY}-${STAGE_KEY}-ecs-image-resize"
              )

              for BUCKET_NAME in "${CANDIDATES[@]}"; do
                 echo "Checking bucket: $BUCKET_NAME"
                 if aws s3 ls "s3://$BUCKET_NAME" >/dev/null 2>&1; then
                    echo "   Found bucket. Emptying..."
                    pip install boto3 >/dev/null 2>&1 || true
                    
                    cat <<EOF > empty_bucket.py
              import boto3
              import sys
              bucket_name = sys.argv[1]
              s3 = boto3.resource('s3')
              bucket = s3.Bucket(bucket_name)
              try:
                  bucket.object_versions.delete()
                  print("Deleted contents.")
              except Exception as e:
                  print(f"Error: {e}")
              EOF
                    python3 empty_bucket.py "$BUCKET_NAME"
                    rm empty_bucket.py
                 fi
              done

         - name: Cleanup ACM Certificates
           if: env.PROJECT_KEY != ''
           run: |
              PROJECT_KEY="${{ env.PROJECT_KEY }}"
              REGION="${{ inputs.aws_region }}"

              echo "Searching unused certificates for *${PROJECT_KEY}* in $REGION..."

              JSON_LIST=$(aws acm list-certificates --region "$REGION" --includes keyTypes=RSA_2048 --output json)

              # Filter: Domain matches Project AND InUse is false
              # We use jq to handle the filtering safely
              TARGET_ARNS=$(echo "$JSON_LIST" | jq -r --arg kw "$PROJECT_KEY" '.CertificateSummaryList[] | select(.DomainName | contains($kw)) | select(.InUse == false) | .CertificateArn')

              if [[ -n "$TARGET_ARNS" ]]; then
                 for ARN in $TARGET_ARNS; do
                   echo "   🗑️ Deleting UNUSED cert: $ARN"
                   aws acm delete-certificate --certificate-arn "$ARN" --region "$REGION" || echo "      ⚠️ Failed"
                 done
               fi

         - name: Cleanup CloudWatch Logs
           if: env.CLIENT_KEY != ''
           run: |
              NAMESPACE="${{ env.NAMESPACE }}"
              CLIENT_KEY="${{ env.CLIENT_KEY }}"
              PROJECT_KEY="${{ env.PROJECT_KEY }}"
              STAGE_KEY="${{ env.STAGE_KEY }}"
              REGION="${{ inputs.aws_region }}"

              echo "🧹 CloudWatch Log Cleanup..."

              delete_log_groups() {
                  local PREFIX=$1
                  local REGION_ARG=$2
                  
                  echo "   🔍 Searching for log groups starting with '$PREFIX' in $REGION_ARG..."
                  GROUPS=$(aws logs describe-log-groups --log-group-name-prefix "$PREFIX" --region "$REGION_ARG" --query "logGroups[].logGroupName" --output text)
                  
                  if [[ -z "$GROUPS" || "$GROUPS" == "None" ]]; then
                      echo "      ✅ No logs found."
                      return
                  fi

                  for GROUP in $GROUPS; do
                      echo "      🗑️ Deleting $GROUP..."
                      aws logs delete-log-group --log-group-name "$GROUP" --region "$REGION_ARG" || echo "         ⚠️ Failed to delete"
                  done
              }

              # 1. Main Region Patterns
              PREFIXES=(
                "/ecs/${NAMESPACE}-${PROJECT_KEY}-${STAGE_KEY}"          # Cluster / Feature Branch
                "/ecs/${NAMESPACE}-${CLIENT_KEY}-${PROJECT_KEY}-${STAGE_KEY}" # App / Stateful
                "/aws/lambda/${NAMESPACE}-${CLIENT_KEY}-${PROJECT_KEY}-${STAGE_KEY}-" # App Lambdas
                "/aws/lambda/${NAMESPACE}-${CLIENT_KEY}-${STAGE_KEY}-"   # SES Webhooks
              )

              for PREFIX in "${PREFIXES[@]}"; do
                 delete_log_groups "$PREFIX" "$REGION"
              done

              # 2. Edge Region (us-east-1) Patterns
              # Edge functions often have the region prefix in the log group name when created by Lambda@Edge
              delete_log_groups "/aws/lambda/us-east-1.${NAMESPACE}-" "us-east-1"

         - name: Cleanup Service Discovery
           if: env.PROJECT_KEY != ''
           run: |
              PROJECT_KEY="${{ env.PROJECT_KEY }}"
              STAGE_KEY="${{ env.STAGE_KEY }}"
              REGION="${{ inputs.aws_region }}"

              # Pattern used in core modules: ${project_key}-${stage}.local
              NAMESPACE_NAME="${PROJECT_KEY}-${STAGE_KEY}.local"

              echo "🔎 Searching for Service Discovery Namespace: $NAMESPACE_NAME in $REGION..."

              NAMESPACE_ID=$(aws servicediscovery list-namespaces --region "$REGION" \
                  --query "Namespaces[?Name=='$NAMESPACE_NAME'].Id" --output text)

              if [[ -z "$NAMESPACE_ID" || "$NAMESPACE_ID" == "None" ]]; then
                  echo "✅ Namespace '$NAMESPACE_NAME' not found."
              else
                  echo "🎯 Found Namespace ID: $NAMESPACE_ID"
                  echo "📋 Listing services..."
                  SERVICE_IDS=$(aws servicediscovery list-services --filters "Name=NAMESPACE_ID,Values=$NAMESPACE_ID" --region "$REGION" --query "Services[].Id" --output text)
                  
                  if [[ -n "$SERVICE_IDS" && "$SERVICE_IDS" != "None" ]]; then
                      for SERVICE_ID in $SERVICE_IDS; do
                          echo "   Processing Service: $SERVICE_ID"
                          # Deregister Instances
                          INSTANCE_IDS=$(aws servicediscovery list-instances --service-id "$SERVICE_ID" --region "$REGION" --query "Instances[].Id" --output text)
                          if [[ -n "$INSTANCE_IDS" && "$INSTANCE_IDS" != "None" ]]; then
                              for INSTANCE_ID in $INSTANCE_IDS; do
                                  echo "      🔪 Deregistering instance: $INSTANCE_ID"
                                  aws servicediscovery deregister-instance --service-id "$SERVICE_ID" --instance-id "$INSTANCE_ID" --region "$REGION" || true
                              done
                          fi
                          
                          # Delete Service
                          echo "   🗑️ Deleting Service: $SERVICE_ID"
                          aws servicediscovery delete-service --id "$SERVICE_ID" --region "$REGION" || echo "      ⚠️ Failed to delete service"
                      done
                  else
                      echo "   ℹ️  No services found."
                  fi
                  # We leave the namespace deletion to Terraform usually, but ensuring it's empty is the key.
              fi

         - name: Cleanup Zombie Resources (OAC/IAM)
           if: env.PROJECT_KEY != ''
           run: |
              NAMESPACE="${{ env.NAMESPACE }}"
              CLIENT_KEY="${{ env.CLIENT_KEY }}"
              PROJECT_KEY="${{ env.PROJECT_KEY }}"
              STAGE_KEY="${{ env.STAGE_KEY }}"
              RESOURCE_NAMESPACE="${NAMESPACE}-${CLIENT_KEY}-${PROJECT_KEY}-${STAGE_KEY}"
              REGION="${{ inputs.aws_region }}"

              echo "🧟 Cleanup Zombie Resources for $RESOURCE_NAMESPACE in $REGION"

              # ---------------------------------------------------------
              # 1. CloudFront Origin Access Control (OAC)
              # ---------------------------------------------------------
              OAC_NAME="${RESOURCE_NAMESPACE}-cdn-oac"
              echo "   🔍 Checking OAC: $OAC_NAME"
              OAC_ID=$(aws cloudfront list-origin-access-controls --query "OriginAccessControlList.Items[?Name=='$OAC_NAME'].Id" --output text)

              if [[ -n "$OAC_ID" && "$OAC_ID" != "None" ]]; then
                 echo "      🗑️ Deleting OAC: $OAC_ID"
                 aws cloudfront delete-origin-access-control --id "$OAC_ID" --if-match "$(aws cloudfront get-origin-access-control --id "$OAC_ID" --query 'ETag' --output text)" || echo "      ⚠️ Failed to delete OAC (Check dependencies)"
              else
                 echo "      ✅ OAC not found"
              fi

              # ---------------------------------------------------------
              # 2. IAM Roles
              # ---------------------------------------------------------
              # Expanded list to include Lambda@Edge roles which often stick around
              ROLES=(
                "${RESOURCE_NAMESPACE}-exec-role" 
                "${RESOURCE_NAMESPACE}-codedeploy-role" 
                "${RESOURCE_NAMESPACE}-task-role"
                "${NAMESPACE}-${STAGE_KEY}-lambda-edge-role"
              )

              # Also check for specific standalone policies that might conflict
              POLICIES_TO_DELETE=("${NAMESPACE}-${STAGE_KEY}-lambda-edge-s3-write-transformed")

              # A. DELETE POLICIES FIRST
              for POLICY_NAME in "${POLICIES_TO_DELETE[@]}"; do
                 ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
                 POLICY_ARN="arn:aws:iam::${ACCOUNT_ID}:policy/${POLICY_NAME}"
                 echo "   🔍 Checking Policy: $POLICY_NAME"
                 if aws iam get-policy --policy-arn "$POLICY_ARN" >/dev/null 2>&1; then
                    echo "      🗑️ Deleting Policy: $POLICY_ARN"
                    aws iam delete-policy --policy-arn "$POLICY_ARN" || echo "      ⚠️ Failed (might be attached?)"
                 else
                    echo "      ✅ Policy not found"
                 fi
              done

              # B. DELETE ROLES
              for ROLE in "${ROLES[@]}"; do
                 echo "   🔍 Checking Role: $ROLE"
                 if aws iam get-role --role-name "$ROLE" >/dev/null 2>&1; then
                    echo "      🗑️ Deleting Role: $ROLE"
                    # Detach all policies first
                    POLICIES=$(aws iam list-attached-role-policies --role-name "$ROLE" --query 'AttachedPolicies[*].PolicyArn' --output text)
                    for POLICY in $POLICIES; do
                       echo "         About to detach $POLICY"
                       aws iam detach-role-policy --role-name "$ROLE" --policy-arn "$POLICY"
                    done
                    
                    # Delete inline policies
                    pst=$(aws iam list-role-policies --role-name "$ROLE" --query 'PolicyNames' --output text)
                    for p in $pst; do
                       if [ "$p" != "None" ]; then
                         echo "         Deleting inline policy $p"
                         aws iam delete-role-policy --role-name "$ROLE" --policy-name "$p"
                       fi
                    done

                    # Delete instance profiles
                    PROFILES=$(aws iam list-instance-profiles-for-role --role-name "$ROLE" --query 'InstanceProfiles[*].InstanceProfileName' --output text)
                     for PROFILE in $PROFILES; do
                       if [ "$PROFILE" != "None" ]; then
                         echo "         Removing role from instance profile $PROFILE"
                         aws iam remove-role-from-instance-profile --instance-profile-name "$PROFILE" --role-name "$ROLE"
                       fi
                    done

                    aws iam delete-role --role-name "$ROLE" || echo "      ⚠️ Failed to delete role"
                 else
                    echo "      ✅ Role not found"
                 fi
              done

         - name: Cleanup Zombie Cloudflare Records
           if: env.PROJECT_KEY != ''
           env:
              CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
              CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
           run: |
              if [[ -z "$CF_API_TOKEN" ]]; then
                 echo "Skipping Cloudflare cleanup: CLOUDFLARE_API_TOKEN not provided."
                 exit 0
              fi

              DOMAIN="thisisblaze.uk" # Fallback/Default
              # In a real scenario we might want to pass domain_root as input, but for this specific "validation" record issue:

              echo "🔍 Checking for zombie Cloudflare records..."

              # Patterns to clean
              # 1. Validation records (ACM)
              # 2. Specific host records for the stage being destroyed

              RECORDS=("validation.${DOMAIN}" "${{ env.STAGE_KEY }}-api.${DOMAIN}" "${{ env.STAGE_KEY }}-frontend.${DOMAIN}" "${{ env.STAGE_KEY }}-admin.${DOMAIN}")

              for REC_NAME in "${RECORDS[@]}"; do
                 echo "   Checking $REC_NAME"
                 REC_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records?name=$REC_NAME" \
                   -H "Authorization: Bearer $CF_API_TOKEN" \
                   -H "Content-Type: application/json" | jq -r '.result[0].id // empty')
                   
                 if [[ -n "$REC_ID" ]]; then
                    echo "      🗑️ Deleting $REC_NAME ($REC_ID)"
                    curl -s -X DELETE "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records/$REC_ID" \
                       -H "Authorization: Bearer $CF_API_TOKEN" >/dev/null
                 else
                    echo "      ✅ Not found"
                 fi
              done

         - name: Cleanup Lambda@Edge
           if: env.CLIENT_KEY != ''
           run: |
              NAMESPACE="${{ env.NAMESPACE }}"
              CLIENT_KEY="${{ env.CLIENT_KEY }}"
              PROJECT_KEY="${{ env.PROJECT_KEY }}"
              STAGE_KEY="${{ env.STAGE_KEY }}"

              PREFIX="${NAMESPACE}-${CLIENT_KEY}-${PROJECT_KEY}-${STAGE_KEY}-"
              echo "Searching for functions starting with: $PREFIX"

              FUNCTIONS=$(aws lambda list-functions --region us-east-1 --query "Functions[?starts_with(FunctionName, '$PREFIX')].FunctionName" --output text)

              if [[ -n "$FUNCTIONS" && "$FUNCTIONS" != "None" ]]; then
                 for FUNC_NAME in $FUNCTIONS; do
                    echo "   🔄 Checking function: $FUNC_NAME"
                    if aws lambda delete-function --function-name "$FUNC_NAME" --region us-east-1 2>&1; then
                       echo "   ✅ Deleted $FUNC_NAME"
                    else
                       echo "   ⚠️ Delete failed (likely Replicated). Skipping."
                    fi
                 done
              else
                 echo "   ok: No functions found."
              fi

         - name: Cleanup EC2 Capacity Provider
           if: env.CLIENT_KEY != ''
           run: |
              NAMESPACE="${{ env.NAMESPACE }}"
              CLIENT_KEY="${{ env.CLIENT_KEY }}"
              PROJECT_KEY="${{ env.PROJECT_KEY }}"
              STAGE_KEY="${{ env.STAGE_KEY }}"
              REGION="${{ inputs.aws_region }}"
              CLUSTER="${{ inputs.cluster_name }}"
              RESOURCE_PREFIX="${NAMESPACE}-${CLIENT_KEY}-${PROJECT_KEY}-${STAGE_KEY}"

              echo "🖥️ EC2 Capacity Provider Cleanup for $RESOURCE_PREFIX in $REGION"

              # ---------------------------------------------------------
              # 1. Find and scale down ASG
              # ---------------------------------------------------------
              ASG_NAME="${RESOURCE_PREFIX}-ec2-cp-asg"
              echo "   🔍 Checking ASG: $ASG_NAME"
              ASG_EXISTS=$(aws autoscaling describe-auto-scaling-groups \
                --auto-scaling-group-names "$ASG_NAME" \
                --region "$REGION" \
                --query "AutoScalingGroups[0].AutoScalingGroupName" \
                --output text 2>/dev/null || echo "None")

              if [[ -n "$ASG_EXISTS" && "$ASG_EXISTS" != "None" ]]; then
                 echo "      📉 Scaling ASG to 0..."
                 aws autoscaling update-auto-scaling-group \
                   --auto-scaling-group-name "$ASG_NAME" \
                   --min-size 0 --max-size 0 --desired-capacity 0 \
                   --region "$REGION" || echo "      ⚠️ Failed to scale ASG"

                 # Wait for instances to drain (max 3 minutes)
                 echo "      ⏳ Waiting for instances to drain..."
                 timeout=180
                 elapsed=0
                 while [ $elapsed -lt $timeout ]; do
                    INSTANCE_COUNT=$(aws autoscaling describe-auto-scaling-groups \
                      --auto-scaling-group-names "$ASG_NAME" \
                      --region "$REGION" \
                      --query "AutoScalingGroups[0].Instances | length(@)" \
                      --output text 2>/dev/null || echo "0")
                    if [[ "$INSTANCE_COUNT" == "0" ]]; then
                       echo "      ✅ All instances drained"
                       break
                    fi
                    echo "      ... $INSTANCE_COUNT instances remaining"
                    sleep 15
                    elapsed=$((elapsed+15))
                 done
              else
                 echo "      ✅ ASG not found (no EC2 capacity provider)"
              fi

              # ---------------------------------------------------------
              # 2. Deregister ECS Capacity Provider (if exists)
              # ---------------------------------------------------------
              CP_NAME="${RESOURCE_PREFIX}-ec2-cp"
              echo "   🔍 Checking Capacity Provider: $CP_NAME"
              CP_EXISTS=$(aws ecs describe-capacity-providers \
                --capacity-providers "$CP_NAME" \
                --region "$REGION" \
                --query "capacityProviders[0].name" \
                --output text 2>/dev/null || echo "None")

              if [[ -n "$CP_EXISTS" && "$CP_EXISTS" != "None" && "$CP_EXISTS" != "FARGATE" ]]; then
                 echo "      🔄 Removing capacity provider from cluster strategy..."
                 # Get current providers minus the EC2 one
                 CURRENT_CPS=$(aws ecs describe-clusters \
                   --clusters "$CLUSTER" \
                   --region "$REGION" \
                   --query "clusters[0].capacityProviders" \
                   --output json 2>/dev/null || echo "[]")

                 FILTERED_CPS=$(echo "$CURRENT_CPS" | jq -r --arg cp "$CP_NAME" '[.[] | select(. != $cp)]')

                 if [[ "$FILTERED_CPS" != "[]" ]]; then
                    aws ecs put-cluster-capacity-providers \
                      --cluster "$CLUSTER" \
                      --capacity-providers $(echo "$FILTERED_CPS" | jq -r '.[]') \
                      --default-capacity-provider-strategy capacityProvider=FARGATE,weight=1 \
                      --region "$REGION" || echo "      ⚠️ Failed to update cluster strategy"
                 fi
                 echo "      ✅ Capacity provider removed from cluster"
              else
                 echo "      ✅ Capacity provider not found"
              fi

         - name: Cleanup ECS Services
           id: cleanup
           run: |
              set -e
              CLUSTER="${{ inputs.cluster_name }}"
              STAGE_FILTER="${{ inputs.stage_filter }}"

              echo "🧹 Cleaning up ECS Services in $CLUSTER..."

              if [[ -n "$STAGE_FILTER" ]]; then
                 echo "   🎯 Stage filter enabled: $STAGE_FILTER"
              fi

              SERVICES=$(aws ecs list-services --cluster "$CLUSTER" --query "serviceArns" --output text --region "${{ inputs.aws_region }}" 2>/dev/null || echo "")

              if [[ -z "$SERVICES" || "$SERVICES" == "None" ]]; then
                 echo "✅ No active services found"
                 echo "status=no_services" >> "$GITHUB_OUTPUT"
                 echo "services=" >> "$GITHUB_OUTPUT"
                 exit 0
              fi

              if [[ -n "$STAGE_FILTER" ]]; then
                 SERVICES_FILTERED=$(echo "$SERVICES" | tr '\t' '\n' | grep -F "-${STAGE_FILTER}-" || echo "")
                 if [[ -z "$SERVICES_FILTERED" ]]; then
                   echo "✅ No services matched stage_filter"
                   echo "status=no_services" >> "$GITHUB_OUTPUT"
                   echo "services=" >> "$GITHUB_OUTPUT"
                   exit 0
                 fi
                 SERVICES=$(echo "$SERVICES_FILTERED" | tr '\n' '\t')
              fi

              DELETED_SERVICES=""
              while IFS= read -r SVC_ARN; do
                 [[ -z "$SVC_ARN" ]] && continue
                 SVC_NAME=$(echo "$SVC_ARN" | sed 's|.*/||')
                 echo "🔄 Processing service: $SVC_NAME"
                 
                 aws ecs update-service --cluster "$CLUSTER" --service "$SVC_NAME" --desired-count 0 --region "${{ inputs.aws_region }}" >/dev/null 2>&1 || true
                 
                 # Wait for tasks to stop (Simplified)
                 timeout=300
                 elapsed=0
                 while [ $elapsed -lt $timeout ]; do
                    RUNNING_TASKS=$(aws ecs list-tasks --cluster "$CLUSTER" --service-name "$SVC_NAME" --desired-status RUNNING --region "${{ inputs.aws_region }}" --query "length(taskArns)" --output text 2>/dev/null || echo "0")
                    if [[ "$RUNNING_TASKS" == "0" ]]; then
                       break
                    fi
                    sleep 10
                    elapsed=$((elapsed+10))
                 done

                 # Force Stop if needed
                 if [[ $elapsed -ge $timeout ]]; then
                    RUNNING_TASKS=$(aws ecs list-tasks --cluster "$CLUSTER" --service-name "$SVC_NAME" --region "${{ inputs.aws_region }}" --query "taskArns[]" --output text 2>/dev/null || echo "")
                    if [[ -n "$RUNNING_TASKS" && "$RUNNING_TASKS" != "None" ]]; then
                       for TASK in $RUNNING_TASKS; do
                          aws ecs stop-task --cluster "$CLUSTER" --task "$TASK" --region "${{ inputs.aws_region }}" >/dev/null 2>&1 || true
                       done
                       sleep 30
                    fi
                 fi
                 
                 aws ecs delete-service --cluster "$CLUSTER" --service "$SVC_NAME" --force --region "${{ inputs.aws_region }}" >/dev/null 2>&1 || true
                 echo "   ✅ Deleted $SVC_NAME"
                 DELETED_SERVICES="${DELETED_SERVICES}${SVC_NAME} "
              done <<< "$SERVICES"

              echo "status=success" >> "$GITHUB_OUTPUT"
              echo "services=$DELETED_SERVICES" >> "$GITHUB_OUTPUT"

              # ---------------------------------------------------------
              # 📋 CLEANUP TASK DEFINITIONS (Attempt)
              # ---------------------------------------------------------
              # Only if stage filter is NOT set (shared cluster safety)
              if [[ -z "$STAGE_FILTER" && "$CLUSTER" =~ (.+)-cluster ]]; then
                 BASE_PREFIX="${BASH_REMATCH[1]}"
                 KNOWN_SERVICES=("api" "frontend" "admin" "tunnel" "mongo" "elasticsearch" "kibana")
                 for SVC in "${KNOWN_SERVICES[@]}"; do
                    FAMILY="${BASE_PREFIX}-${SVC}"
                    TASK_DEF_ARNS=$(aws ecs list-task-definitions --family-prefix "$FAMILY" --region "${{ inputs.aws_region }}" --query "taskDefinitionArns[]" --output text 2>/dev/null || echo "")
                    if [[ -n "$TASK_DEF_ARNS" && "$TASK_DEF_ARNS" != "None" ]]; then
                       echo "      Cleaning task defs for $FAMILY..."
                       for ARN in $TASK_DEF_ARNS; do
                          aws ecs delete-task-definitions --task-definitions "$ARN" --region "${{ inputs.aws_region }}" >/dev/null 2>&1 || \
                          aws ecs deregister-task-definition --task-definition "$ARN" --region "${{ inputs.aws_region }}" >/dev/null || true
                       done
                    fi
                 done
              fi

              echo "tasks_deleted=true" >> "$GITHUB_OUTPUT"
