name: "06 - CI (Terraform Tests)"

on:
  pull_request:
    paths:
      - ".github/aws/infra/modules/**"
      - "test/**"
      - ".github/workflows/terraform-tests.yml"
  push:
    branches:
      - dev
      - main
    paths:
      - ".github/aws/infra/modules/**"
      - "test/**"
      - ".github/workflows/terraform-tests.yml"
  workflow_dispatch:
    inputs:
      run_integration:
        description: "Run integration tests that create real AWS resources (costs money)."
        type: boolean
        default: false
  workflow_call:
    secrets:
      MONGO_INITDB_ROOT_PASSWORD:
        required: false
      BLAZE_ELASTICSEARCH_USERNAME:
        required: false
      BLAZE_ELASTICSEARCH_PASSWORD:
        required: false
      BLAZE_ELASTICSEARCH_ENDPOINT:
        required: false
      AWS_ROLE_ARN:
        required: false
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        required: false
      GCP_SERVICE_ACCOUNT:
        required: false
      AZURE_CLIENT_ID:
        required: false
      AZURE_TENANT_ID:
        required: false
      AZURE_SUBSCRIPTION_ID:
        required: false
      CLOUDFLARE_API_TOKEN:
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        required: false
      CLOUDFLARE_ZONE_ID:
        required: false
      GH_PAT:
        required: false
      NPM_TOKEN:
        required: false
      INFRACOST_API_KEY:
        required: false
      BLAZE_CONNECTION_STRING:
        required: false
      BLAZE_AUTH_JWT_PRIVATE_KEY:
        required: false
      BLAZE_AUTH_ADMIN_EMAIL:
        required: false
      BLAZE_AUTH_ADMIN_PASSWORD:
        required: false
      BLAZE_FILES_S3_ACCESS_KEY:
        required: false
      BLAZE_FILES_S3_SECRET_ACCESS_KEY:
        required: false
      BLAZE_GRAPHQL_CACHE_SETTINGS:
        required: false
      BLAZE_CLIENT_HEADER:
        required: false
      EC_API_KEY:
        required: false
      MONGODB_ATLAS_PUBLIC_KEY:
        required: false
      MONGODB_ATLAS_PRIVATE_KEY:
        required: false
      MONGODB_ATLAS_ORG_ID:
        required: false
      MONGODB_ATLAS_PROJECT_ID:
        required: false
      ACM_CERTIFICATE_ARN:
        required: false
      BLAZE_SENTRY_AUTH_TOKEN:
        required: false
      BLAZE_SENTRY_DSN:
        required: false
      SLACK_WEBHOOK_URL:
        required: false
      DEPLOY_KEY:
        required: false
    inputs:
      scan_path:
        description: "Path to scan for Terraform modules/stacks"
        required: false
        type: string
        default: ".github/aws/infra/modules/"
      run_integration:
        description: "Run integration tests"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4 # v3.1.2
        with:
          terraform_version: "1.9.0"

      - name: Terraform Format Check
        run: |
          terraform fmt -check -recursive ${{ inputs.scan_path || '.github/aws/infra/modules/' }}
          echo "✅ Terraform formatting is correct"

      - name: Terraform Validate
        env:
          TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          git config --global url."https://${TOKEN}@github.com".insteadOf "https://github.com"
          SCAN_DIR="${{ inputs.scan_path || '.github/aws/infra/modules/' }}"
          echo "🔍 Validating Terraform modules in $SCAN_DIR..."

          # Find directories containing .tf files
          find "$SCAN_DIR" -type f -name "*.tf" -exec dirname {} \; | sort -u | while read -r module; do
              echo "Validating $module"
              if cd "$module"; then
                 terraform init -backend=false > /dev/null 2>&1
                 terraform validate || exit 1
                 cd - > /dev/null || exit 1
              fi
          done
          echo "✅ All modules validated successfully"

  unit-tests:
    name: Unit Tests (Label Module)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: static-analysis
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4 # v3.1.2
        with:
          terraform_version: "1.9.0"

      - name: Install Dependencies
        working-directory: test
        run: go mod download

      - name: Run Unit Tests
        working-directory: test
        run: |
          echo "🧪 Running unit tests..."
          if ls *_test.go 1> /dev/null 2>&1; then
            go test -v -timeout 10m
            echo "✅ Unit tests passed"
          else
            echo "⚠️ No unit tests found in test/ directory"
          fi

  integration-tests:
    name: Integration Tests (AWS Resources)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: static-analysis
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_integration == 'true'
    environment: DEV
    env:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Setup Blaze
        uses: thisisblaze/blaze-actions/.github/actions/setup-blaze@v1.4.31
        with:
          aws-role-arn: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
          terraform: "true"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Install Dependencies
        working-directory: test
        run: go mod download

      - name: Run Integration Tests
        working-directory: test
        env:
          AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
        run: |
          echo "🧪 Running integration tests (creates AWS resources)..."
          echo "⚠️  Note: These tests create real AWS resources and may incur costs"
          if ls *_test.go 1> /dev/null 2>&1; then
            go test -v -timeout 30m
            echo "✅ Integration tests passed"
          else
            echo "⚠️ No integration tests found in test/ directory"
          fi

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [static-analysis, unit-tests, integration-tests]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          {
            echo "## 🧪 Terraform Test Results"
            echo ""
            echo "| Test Type | Status |"
            echo "|-----------|--------|"
            echo "| Static Analysis | ${{ needs.static-analysis.result == 'success' && '✅ Passed' || '❌ Failed' }} |"
            echo "| Unit Tests | ${{ needs.unit-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |"
            if [[ "${{ needs.integration-tests.result }}" != "skipped" && "${{ needs.integration-tests.result }}" != "" ]]; then
              echo "| Integration Tests | ${{ needs.integration-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |"
            fi
            echo ""
            echo "**Note**: Integration tests only run on pull requests or manual dispatch."
          } >> "$GITHUB_STEP_SUMMARY"
