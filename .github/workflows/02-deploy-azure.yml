name: "02 - Deploy App (Azure)"

on:
  workflow_dispatch:
    inputs:
      cloud_provider:
        description: "Cloud Provider"
        type: choice
        options: ["aws", "gcp", "azure"]
        default: "aws"
      wif_audience:
        description: "WIF Audience (Optional)"
        required: false
        type: string
        default: ""
      environment:
        description: "Environment to deploy to"
        type: choice
        options:
          - DEV
          - DEV-MINI
          - STAGE
          - PROD
          - MULTI-SITE
        required: true
      project:
        description: "Project (App Identity) - e.g. thisisblaze"
        type: string
        required: true
        default: "thisisblaze"
      branch_name:
        description: "Feature Tag (e.g. jira-123). Leave empty for main."
        required: false
        type: string
      target_services:
        description: "Services to Deploy"
        type: choice
        options:
          - "Blaze all"
          - "api"
          - "frontend"
          - "admin"
          - "tunnel"
        default: "Blaze all"
      build_images:
        description: "Build Docker Images?"
        type: boolean
        default: true
      deploy_services:
        description: "Deploy to ECS/Pages?"
        type: boolean
        default: true
      override_image_tag:
        description: "Override Image Tag (if not building)"
        type: string
        default: "latest"
      # --- HYBRID ECS (FEB 2026) ---
      api_launch_type:
        description: "API launch type: FARGATE or EC2"
        type: choice
        options: ["FARGATE", "EC2"]
        default: "FARGATE"
      api_cpu_architecture:
        description: "API CPU arch: X86_64 or ARM64"
        type: choice
        options: ["X86_64", "ARM64"]
        default: "X86_64"

      # Base64 Secrets Bridge (Azure)
      azure_client_id_rev:
        description: "Base64 Azure Client ID"
        required: false
        type: string
      azure_tenant_id_rev:
        description: "Base64 Azure Tenant ID"
        required: false
        type: string
      azure_subscription_id_rev:
        description: "Base64 Azure Subscription ID"
        required: false
        type: string

  # Enable usage by other workflows (Stress Test)
  workflow_call:
    inputs:
      cloud_provider:
        required: false
        type: string
        default: "aws"
      environment:
        required: true
        type: string
      wif_audience:
        required: false
        type: string
        default: ""
      project:
        required: false
        type: string
        default: "thisisblaze"
      branch_name:
        required: false
        type: string
      target_services:
        required: false
        type: string
        default: "Blaze all"
      build_images:
        required: false
        type: boolean
        default: true
      deploy_services:
        required: false
        type: boolean
        default: true
      override_image_tag:
        required: false
        type: string
        default: "latest"
      # --- HYBRID ECS (FEB 2026) ---
      api_launch_type:
        required: false
        type: string
        default: "FARGATE"
      api_cpu_architecture:
        required: false
        type: string
        default: "X86_64"
      frontend_launch_type:
        required: false
        type: string
        default: "FARGATE"
      frontend_cpu_architecture:
        required: false
        type: string
        default: "X86_64"
      skip_stability_wait:
        required: false
        type: string
        default: "false"
        description: "Set to 'true' to skip ECS stabilisation wait (for stress tests)"
      # Base64 Secrets Bridge (Azure)
      azure_client_id_rev:
        required: false
        type: string
      azure_tenant_id_rev:
        required: false
        type: string
      azure_subscription_id_rev:
        required: false
        type: string

    secrets:
      AWS_ROLE_ARN:
        required: false
        description: "AWS Role ARN for deployment"
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        required: false
      GCP_SERVICE_ACCOUNT:
        required: false
      GH_PAT:
        required: false
        description: "GitHub PAT for private modules"
      NPM_TOKEN:
        required: false
        description: "NPM Token"
      CLOUDFLARE_API_TOKEN:
        required: false
      CLOUDFLARE_ZONE_ID:
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        required: false
      MONGODB_ATLAS_PUBLIC_KEY:
        required: false
      MONGODB_ATLAS_PRIVATE_KEY:
        required: false
      MONGODB_ATLAS_PROJECT_ID:
        required: false
      MONGODB_ATLAS_ORG_ID:
        required: false
      BLAZE_SENTRY_AUTH_TOKEN:
        required: false
      BLAZE_SENTRY_DSN:
        required: false
      # ECS Application Runtime Secrets (Explicitly defined for workflow_call)
      MONGO_INITDB_ROOT_PASSWORD:
        required: false
      BLAZE_AUTH_JWT_PRIVATE_KEY:
        required: false
      BLAZE_AUTH_ADMIN_EMAIL:
        required: false
      BLAZE_AUTH_ADMIN_PASSWORD:
        required: false
      BLAZE_CONNECTION_STRING:
        required: false
      BLAZE_ELASTICSEARCH_USERNAME:
        required: false
      BLAZE_ELASTICSEARCH_PASSWORD:
        required: false

      BLAZE_FILES_S3_ACCESS_KEY:
        required: false
      BLAZE_FILES_S3_SECRET_ACCESS_KEY:
        required: false
      BLAZE_GRAPHQL_CACHE_SETTINGS:
        required: false
      BLAZE_CLIENT_HEADER:
        required: false

      # Azure
      AZURE_CLIENT_ID:
        required: false
      AZURE_TENANT_ID:
        required: false
      AZURE_SUBSCRIPTION_ID:
        required: false

#   push:
#     branches:
#       - dev
#     paths-ignore:
#       - "docs/**"
#       - ".github/aws/**"
#       - "**.md"

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-azure-${{ github.event.inputs.environment || 'DEV' }}-${{ 
    github.event.inputs.branch_name || 'host' }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality-check:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with: {node-version: "20"}
      - name: Setup .npmrc
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > .npmrc
      - run: npm install --legacy-peer-deps --ignore-scripts
        env: {NODE_AUTH_TOKEN: "${{ secrets.NPM_TOKEN }}"}
      # - run: npm run lint
      # - run: npm run test:coverage

  configuration:
    name: Configuration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [quality-check]
    environment: ${{ inputs.environment || 'DEV' }}
    if: always() && (needs.quality-check.result == 'success' || 
      needs.quality-check.result == 'skipped')
    outputs:
      env_val: ${{ steps.config.outputs.env_val }}
      stage_key: ${{ steps.config.outputs.stage_key }}
      project_key: ${{ steps.config.outputs.project_key }}
      client_key: ${{ steps.config.outputs.client_key }}
      namespace: ${{ steps.config.outputs.namespace }}
      platform: ${{ steps.config.outputs.platform }}
      aws_region: ${{ steps.config.outputs.aws_region }}
      cloud_region: ${{ steps.config.outputs.cloud_region }}
      gcp_project_id: ${{ steps.config.outputs.gcp_project_id }}
      domain_root: ${{ steps.config.outputs.domain_root }}
      beta: ${{ steps.config.outputs.beta }}
      dfp_network_id: ${{ steps.config.outputs.dfp_network_id }}
      gtm_id: ${{ steps.config.outputs.gtm_id }}
      aws_account_id: ${{ steps.config.outputs.aws_account_id }}
      cluster_name: ${{ steps.config.outputs.cluster_name }}
      config_env: ${{ steps.config.outputs.config_env }}
      gcp_docker_repo: ${{ steps.config.outputs.gcp_docker_repo }}
      azure_acr_name: ${{ steps.config.outputs.azure_acr_name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Debug Inputs
        run: |
          echo "Inputs Debug:"
          echo "deploy_services type: $(echo '${{ inputs.deploy_services }}' | jq -R 'type')"
          echo "deploy_services value: '${{ inputs.deploy_services }}'"
          echo "deploy_services json: ${{ toJSON(inputs.deploy_services) }}"

      - name: Load Region from Config
        id: load-region
        run: |
          CLOUD_PROVIDER=$(jq -r '.common.CLOUD_PROVIDER // "aws"' vars/blaze-env.json)
          AWS_REGION=$(jq -r '.common.AWS_REGION' vars/blaze-env.json)
          GCP_REGION=$(jq -r '.common.GCP_REGION // "europe-west1"' vars/blaze-env.json)
          GCP_PROJECT_ID=$(jq -r '.common.GCP_PROJECT_ID // ""' vars/blaze-env.json)
          ACTIVE_PROVIDER="${{ inputs.cloud_provider }}"

          case "$ACTIVE_PROVIDER" in
            gcp)
              CLOUD_REGION="$GCP_REGION"
              ;;
            azure)
              AZURE_REGION=$(jq -r '.common.AZURE_REGION // "westeurope"' vars/blaze-env.json 2>/dev/null || echo "westeurope")
              CLOUD_REGION="$AZURE_REGION"
              ;;
            *)
              CLOUD_REGION="$AWS_REGION"
              ;;
          esac

          echo "aws_region=$AWS_REGION" >> "$GITHUB_OUTPUT"
          echo "cloud_region=$CLOUD_REGION" >> "$GITHUB_OUTPUT"
          echo "gcp_project_id=$GCP_PROJECT_ID" >> "$GITHUB_OUTPUT"
          echo "☁️ Provider: $ACTIVE_PROVIDER | Region: $CLOUD_REGION"

      - name: Configure AWS Credentials
        if: inputs.cloud_provider == 'aws' || inputs.cloud_provider == '' || 
          inputs.cloud_provider == null
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN || vars.AWS_ROLE_ARN }}
          aws-region: ${{ steps.load-region.outputs.aws_region }}

      - name: Authenticate to GCP
        if: inputs.cloud_provider == 'gcp'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER
            }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          audience: ${{ inputs.wif_audience }}

      - name: Decode Azure Credentials
        if: inputs.cloud_provider == 'azure'
        run: |
          if [[ -n "${{ inputs.azure_client_id_rev }}" ]]; then
            CLIENT_ID=$(echo "${{ inputs.azure_client_id_rev }}" | rev)
            TENANT_ID=$(echo "${{ inputs.azure_tenant_id_rev }}" | rev)
            SUBSCRIPTION_ID=$(echo "${{ inputs.azure_subscription_id_rev }}" | rev)
            {
              echo "AZURE_CLIENT_ID=$CLIENT_ID"
              echo "AZURE_TENANT_ID=$TENANT_ID"
              echo "AZURE_SUBSCRIPTION_ID=$SUBSCRIPTION_ID"
            } >> "$GITHUB_ENV"
            echo "::add-mask::$CLIENT_ID"
            echo "::add-mask::$TENANT_ID"
            echo "::add-mask::$SUBSCRIPTION_ID"
          else
            {
              echo "AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}"
              echo "AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}"
              echo "AZURE_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            } >> "$GITHUB_ENV"
          fi

      - name: Authenticate to Azure
        if: inputs.cloud_provider == 'azure'
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Calculate Configuration
        id: config
        uses: thisisblaze/blaze-actions/.github/actions/calculate-config@dev
        with:
          environment: ${{ inputs.environment || 'DEV' }}
          project: ${{ inputs.project }}
          terraform_stack: "app"
          branch_name: ${{ inputs.branch_name }}
          deploy_infra: "false"
          build_images: ${{ inputs.build_images || 'true' }}
          deploy_services: ${{ inputs.deploy_services || 'true' }}
          event_name: ${{ github.event_name }}
          cloud_provider: ${{ inputs.cloud_provider }}

  pre-flight-check:
    name: 🛡️ Pre-Flight Checks
    needs: [configuration]
    environment: ${{ inputs.environment || 'DEV' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Configure AWS Credentials
        if: inputs.cloud_provider == 'aws' || inputs.cloud_provider == '' || 
          inputs.cloud_provider == null
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN || vars.AWS_ROLE_ARN }}
          aws-region: ${{ needs.configuration.outputs.aws_region }}

      - name: Authenticate to GCP
        if: inputs.cloud_provider == 'gcp'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER
            }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          audience: ${{ inputs.wif_audience }}

      - name: Check AWS Infrastructure
        if: inputs.cloud_provider == 'aws' || inputs.cloud_provider == '' || 
          inputs.cloud_provider == null
        env:
          CLUSTER_NAME: ${{ needs.configuration.outputs.cluster_name }}
          REPO_NAME: ${{ needs.configuration.outputs.namespace }}-${{ 
            needs.configuration.outputs.project_key }}-web/${{ 
            needs.configuration.outputs.project_key }}/api
        run: |
          echo "🔍 Checking Critical AWS Infrastructure..."
          echo "Cluster: $CLUSTER_NAME"
          echo "ECR Repo: $REPO_NAME"
          echo "-------------------------------------"

          # 1. Check ECS Cluster
          echo "Checking ECS Cluster: $CLUSTER_NAME"
          if ! aws ecs describe-clusters --clusters "$CLUSTER_NAME" | grep -q "ACTIVE"; then
             echo "::error::❌ ECS Cluster '$CLUSTER_NAME' NOT FOUND or INACTIVE."
             echo "::error::👉 Action Required: Run '01 - Provision Infrastructure' (Stack: app)."
             exit 1
          else
             echo "✅ ECS Cluster found."
          fi

          # 2. Check ECR Repository
          echo "Checking ECR Repository: $REPO_NAME"
          if ! aws ecr describe-repositories --repository-names "$REPO_NAME" >/dev/null 2>&1; then
             echo "::error::❌ ECR Repository '$REPO_NAME' NOT FOUND."
             echo "::error::👉 Action Required: Run '01 - Provision Infrastructure' (Stack: app)."
             exit 1
          else
             echo "✅ ECR Repository found."
          fi

          echo "-------------------------------------"
          echo "✅ All Systems Go. Proceeding to Build/Deploy."

      - name: Check GCP Infrastructure
        if: inputs.cloud_provider == 'gcp'
        run: |
          echo "🔍 Checking Critical GCP Infrastructure..."
          PROJECT="${{ needs.configuration.outputs.gcp_project_id }}"
          REGION="${{ needs.configuration.outputs.cloud_region }}"
          REPO="${{ needs.configuration.outputs.gcp_docker_repo }}"

          echo "Project: $PROJECT"
          echo "Region: $REGION"
          echo "Artifact Registry Repo: $REPO"

          # Check Artifact Registry
          if gcloud artifacts repositories describe "$REPO" \
            --project="$PROJECT" --location="$REGION" >/dev/null 2>&1; then
            echo "✅ Artifact Registry repository found."
          else
            echo "::warning::Artifact Registry repository '$REPO' not found — will be created on first push."
          fi

          echo "-------------------------------------"
          echo "✅ GCP Pre-Flight Complete."

      - name: Decode Azure Credentials
        if: inputs.cloud_provider == 'azure'
        run: |
          if [[ -n "${{ inputs.azure_client_id_rev }}" ]]; then
            CLIENT_ID=$(echo "${{ inputs.azure_client_id_rev }}" | rev)
            TENANT_ID=$(echo "${{ inputs.azure_tenant_id_rev }}" | rev)
            SUBSCRIPTION_ID=$(echo "${{ inputs.azure_subscription_id_rev }}" | rev)
            {
              echo "AZURE_CLIENT_ID=$CLIENT_ID"
              echo "AZURE_TENANT_ID=$TENANT_ID"
              echo "AZURE_SUBSCRIPTION_ID=$SUBSCRIPTION_ID"
            } >> "$GITHUB_ENV"
            echo "::add-mask::$CLIENT_ID"
            echo "::add-mask::$TENANT_ID"
            echo "::add-mask::$SUBSCRIPTION_ID"
          else
            {
              echo "AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}"
              echo "AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}"
              echo "AZURE_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            } >> "$GITHUB_ENV"
          fi

      - name: Authenticate to Azure (Pre-Flight)
        if: inputs.cloud_provider == 'azure'
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Check Azure Infrastructure
        if: inputs.cloud_provider == 'azure'
        env:
          NAMESPACE: ${{ needs.configuration.outputs.namespace }}
          CLIENT_KEY: ${{ needs.configuration.outputs.client_key }}
          PROJECT_KEY: ${{ needs.configuration.outputs.project_key }}
          STAGE_KEY: ${{ needs.configuration.outputs.stage_key }}
        run: |
          echo "🔍 Checking Critical Azure Infrastructure..."

          RG_NAME="${NAMESPACE}-${CLIENT_KEY}-${PROJECT_KEY}-${STAGE_KEY}-rg"
          CAE_NAME="${NAMESPACE}-${CLIENT_KEY}-${PROJECT_KEY}-${STAGE_KEY}-cae"
          ACR_NAME="${{ needs.configuration.outputs.azure_acr_name }}"

          echo "Resource Group: $RG_NAME"
          echo "Container App Env: $CAE_NAME"
          echo "ACR: $ACR_NAME"
          echo "-------------------------------------"

          # 1. Check Resource Group
          if az group show --name "$RG_NAME" >/dev/null 2>&1; then
            echo "✅ Resource Group found."
          else
            echo "::error::❌ Resource Group '$RG_NAME' NOT FOUND."
            echo "::error::👉 Action Required: Run '01 - Provision Infrastructure' (Stack: network, cloud_provider: azure)."
            exit 1
          fi

          # 2. Check ACR
          if az acr show --name "$ACR_NAME" >/dev/null 2>&1; then
            echo "✅ Azure Container Registry found."
          else
            echo "::error::❌ ACR '$ACR_NAME' NOT FOUND."
            echo "::error::👉 Action Required: Run '01 - Provision Infrastructure' (Stack: network, cloud_provider: azure)."
            exit 1
          fi

          echo "-------------------------------------"
          echo "✅ Azure Pre-Flight Complete."

  # --- BUILD JOBS ---

  build-api:
    name: Build API
    needs: [configuration, pre-flight-check]
    if: ${{ (inputs.build_images == true || inputs.build_images == null) && 
      (inputs.target_services == 'Blaze all' || inputs.target_services == 'api' 
      || inputs.target_services == null) }}
    uses: ./.github/workflows/reusable-docker-build.yml
    with:
      environment: ${{ inputs.environment || 'DEV' }}
      cloud_provider: ${{ inputs.cloud_provider }}
      dockerfile: packages/api/Dockerfile.api
      context: .
      image_name: ${{ inputs.cloud_provider == 'gcp' && 
        format('{0}-docker.pkg.dev/{1}/{2}/api', 
        needs.configuration.outputs.cloud_region, 
        needs.configuration.outputs.gcp_project_id, 
        needs.configuration.outputs.gcp_docker_repo) || inputs.cloud_provider 
        == 'azure' && format('{0}.azurecr.io/{1}-{2}-web/{2}/api', 
        needs.configuration.outputs.azure_acr_name, 
        needs.configuration.outputs.namespace, 
        needs.configuration.outputs.project_key) || 
        format('{0}.dkr.ecr.{1}.amazonaws.com/{2}-{3}-web/{3}/api', 
        needs.configuration.outputs.aws_account_id, 
        needs.configuration.outputs.aws_region, 
        needs.configuration.outputs.namespace, 
        needs.configuration.outputs.project_key) }}
      image_tag: ${{ github.sha }}
      build_args: |
        BLAZE_PROJECT_KEY=${{ needs.configuration.outputs.project_key }}
        BLAZE_PROJECT_NAME=${{ needs.configuration.outputs.project_key }}
      aws_region: ${{ needs.configuration.outputs.aws_region }}
      gcp_project_id: ${{ needs.configuration.outputs.gcp_project_id }}
      gcp_region: ${{ needs.configuration.outputs.cloud_region }}
      azure_registry_server: "${{ needs.configuration.outputs.azure_acr_name }}.azurecr.io"
      wif_audience: ${{ inputs.wif_audience }}
      azure_client_id_rev: ${{ inputs.azure_client_id_rev }}
      azure_tenant_id_rev: ${{ inputs.azure_tenant_id_rev }}
      azure_subscription_id_rev: ${{ inputs.azure_subscription_id_rev }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN || vars.AWS_ROLE_ARN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER
        }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-frontend:
    name: Build Frontend
    needs: [configuration, pre-flight-check]
    if: ${{ (inputs.build_images == true || inputs.build_images == null) && 
      (inputs.target_services == 'Blaze all' || inputs.target_services == 
      'frontend' || inputs.target_services == null) }}
    uses: ./.github/workflows/reusable-docker-build.yml
    with:
      environment: ${{ inputs.environment || 'DEV' }}
      cloud_provider: ${{ inputs.cloud_provider }}
      dockerfile: packages/frontend/Dockerfile.frontend
      context: .
      image_name: ${{ inputs.cloud_provider == 'gcp' && 
        format('{0}-docker.pkg.dev/{1}/{2}/frontend', 
        needs.configuration.outputs.cloud_region, 
        needs.configuration.outputs.gcp_project_id, 
        needs.configuration.outputs.gcp_docker_repo) || inputs.cloud_provider 
        == 'azure' && format('{0}.azurecr.io/{1}-{2}-web/{2}/frontend', 
        needs.configuration.outputs.azure_acr_name, 
        needs.configuration.outputs.namespace, 
        needs.configuration.outputs.project_key) || 
        format('{0}.dkr.ecr.{1}.amazonaws.com/{2}-{3}-web/{3}/frontend', 
        needs.configuration.outputs.aws_account_id, 
        needs.configuration.outputs.aws_region, 
        needs.configuration.outputs.namespace, 
        needs.configuration.outputs.project_key) }}
      image_tag: ${{ github.sha }}
      # platforms: "linux/amd64" # REMOVED: Frontend now supports multi-arch via native runners
      build_args: |
        BLAZE_PROJECT_KEY=${{ needs.configuration.outputs.project_key }}
        BLAZE_PROJECT_NAME=${{ needs.configuration.outputs.project_key }}
        BLAZE_GRAPHQL_URI=${{ inputs.cloud_provider == 'azure' && inputs.environment == 'PROD' && format('https://api-azure.{0}/graphql', needs.configuration.outputs.domain_root) || inputs.cloud_provider == 'azure' && inputs.environment != 'PROD' && format('https://api-azure-{0}.{1}/graphql', needs.configuration.outputs.stage_key, needs.configuration.outputs.domain_root) || inputs.cloud_provider != 'azure' && inputs.environment == 'PROD' && format('https://api.{0}/graphql', needs.configuration.outputs.domain_root) || format('https://api-{0}.{1}/graphql', needs.configuration.outputs.stage_key, needs.configuration.outputs.domain_root) }}
      aws_region: ${{ needs.configuration.outputs.aws_region }}
      gcp_project_id: ${{ needs.configuration.outputs.gcp_project_id }}
      gcp_region: ${{ needs.configuration.outputs.cloud_region }}
      azure_registry_server: "${{ needs.configuration.outputs.azure_acr_name }}.azurecr.io"
      wif_audience: ${{ inputs.wif_audience }}
      azure_client_id_rev: ${{ inputs.azure_client_id_rev }}
      azure_tenant_id_rev: ${{ inputs.azure_tenant_id_rev }}
      azure_subscription_id_rev: ${{ inputs.azure_subscription_id_rev }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN || vars.AWS_ROLE_ARN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER
        }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-admin:
    name: Build Admin (Shared)
    needs: [configuration, pre-flight-check]
    # Run for Host Environments (Prod, Stage, Dev Host)
    if: ${{ (inputs.branch_name == '' || inputs.branch_name == null) && 
      (inputs.build_images == true || inputs.build_images == null || 
      inputs.deploy_services == true || inputs.deploy_services == null) && 
      (inputs.target_services == 'Blaze all' || inputs.target_services == 
      'admin' || inputs.target_services == null) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4.0.2
        with:
          node-version: "20.x"
          registry-url: 'https://registry.npmjs.org/'
      - name: Cache Next.js & NPM
        uses: actions/cache@v5
        with:
          path: |
            ~/.npm
            ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.[jt]s', '**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-
      - name: Install Dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm install --legacy-peer-deps --ignore-scripts
      - run: NODE_AUTH_TOKEN=${{ secrets.NPM_TOKEN }} ./node_modules/.bin/lerna bootstrap --scope blaze-thisisblaze-admin --include-dependencies -- --legacy-peer-deps
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Build Admin
        run: npm run build:admin
        working-directory: packages/admin
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          BLAZE_PROJECT_KEY: ${{ needs.configuration.outputs.project_key }}
          BLAZE_GRAPHQL_URI: ${{ inputs.cloud_provider == 'azure' && 
            (inputs.environment == 'PROD' && 
            format('https://api-azure.{0}/graphql', 
            needs.configuration.outputs.domain_root) || 
            format('https://api-azure-{0}.{1}/graphql', 
            needs.configuration.outputs.stage_key, 
            needs.configuration.outputs.domain_root)) || (inputs.environment == 
            'PROD' && format('https://api.{0}/graphql', 
            needs.configuration.outputs.domain_root) || 
            format('https://api-{0}.{1}/graphql', 
            needs.configuration.outputs.stage_key, 
            needs.configuration.outputs.domain_root)) }}

      - name: Create Cloudflare _redirects
        run: |
          mkdir -p packages/admin/dist
          echo "/* /index.html 200" > packages/admin/dist/_redirects

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: admin-build-assets-${{ inputs.cloud_provider || 'aws' }}-${{ inputs.environment }}
          path: packages/admin/dist
          retention-days: 1

  package-admin-docker:
    name: Package Admin (Docker)
    needs: [configuration, pre-flight-check]
    # Run for Feature Branches ONLY (Dev + Branch Name)
    if: ${{ inputs.environment == 'DEV' && inputs.branch_name != '' && 
      inputs.branch_name != null && (inputs.build_images == true || 
      inputs.build_images == null) && (inputs.target_services == 'Blaze all' || 
      inputs.target_services == 'admin' || inputs.target_services == null) }}
    uses: ./.github/workflows/reusable-docker-build.yml
    with:
      environment: ${{ inputs.environment || 'DEV' }}
      cloud_provider: ${{ inputs.cloud_provider }}
      dockerfile: packages/admin/Dockerfile.admin
      context: .
      image_name: ${{ inputs.cloud_provider == 'gcp' && 
        format('{0}-docker.pkg.dev/{1}/{2}-{3}-web/{3}/admin', 
        needs.configuration.outputs.cloud_region, 
        needs.configuration.outputs.gcp_project_id, 
        needs.configuration.outputs.namespace, 
        needs.configuration.outputs.project_key) || inputs.cloud_provider == 
        'azure' && format('{0}.azurecr.io/{1}-{2}-web/{2}/admin', 
        needs.configuration.outputs.azure_acr_name, 
        needs.configuration.outputs.namespace, 
        needs.configuration.outputs.project_key) || 
        format('{0}.dkr.ecr.{1}.amazonaws.com/{2}-{3}-web/{3}/admin', 
        needs.configuration.outputs.aws_account_id, 
        needs.configuration.outputs.aws_region, 
        needs.configuration.outputs.namespace, 
        needs.configuration.outputs.project_key) }}
      image_tag: ${{ github.sha }}
      platforms: ${{ inputs.frontend_cpu_architecture == 'ARM64' && 
        'linux/arm64' || inputs.frontend_cpu_architecture == 'X86_64' && 
        'linux/amd64' || 'linux/amd64,linux/arm64' }}
      azure_registry_server: "${{ needs.configuration.outputs.azure_acr_name }}.azurecr.io"
      wif_audience: ${{ inputs.wif_audience }}
      azure_client_id_rev: ${{ inputs.azure_client_id_rev }}
      azure_tenant_id_rev: ${{ inputs.azure_tenant_id_rev }}
      azure_subscription_id_rev: ${{ inputs.azure_subscription_id_rev }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN || vars.AWS_ROLE_ARN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER
        }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # --- DEPLOY JOBS ---

  deploy-api-azure:
    name: Deploy API (Container App)
    needs: [configuration, build-api, pre-flight-check]
    if: ${{ inputs.cloud_provider == 'azure' && (inputs.deploy_services == true 
      || inputs.deploy_services == 'true' || inputs.deploy_services == null) && 
      (inputs.target_services == 'Blaze all' || inputs.target_services == 'api' 
      || inputs.target_services == null) }}
    uses: ./.github/workflows/reusable-container-app-deploy.yml
    with:
      service_name: "api"
      environment: ${{ inputs.environment || 'DEV' }}
      stage_key: ${{ needs.configuration.outputs.stage_key }}
      branch_name: ${{ inputs.branch_name }}
      image_tag: ${{ github.sha }}
      project_key: ${{ needs.configuration.outputs.project_key }}
      client_key: ${{ needs.configuration.outputs.client_key }}
      domain_root: ${{ needs.configuration.outputs.domain_root }}
      azure_region: ${{ needs.configuration.outputs.cloud_region }}
      namespace: ${{ needs.configuration.outputs.namespace }}
      # Azure Registry Server (e.g. CACHE_REGISTRY)
      azure_registry_server: "${{ needs.configuration.outputs.azure_acr_name }}.azurecr.io"
      target_port: 3000
      azure_client_id_rev: ${{ inputs.azure_client_id_rev }}
      azure_tenant_id_rev: ${{ inputs.azure_tenant_id_rev }}
      azure_subscription_id_rev: ${{ inputs.azure_subscription_id_rev }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      # App Secrets
      MONGO_INITDB_ROOT_PASSWORD: ${{ secrets.MONGO_INITDB_ROOT_PASSWORD }}
      BLAZE_AUTH_JWT_PRIVATE_KEY: ${{ secrets.BLAZE_AUTH_JWT_PRIVATE_KEY }}
      BLAZE_AUTH_ADMIN_EMAIL: ${{ secrets.BLAZE_AUTH_ADMIN_EMAIL }}
      BLAZE_AUTH_ADMIN_PASSWORD: ${{ secrets.BLAZE_AUTH_ADMIN_PASSWORD }}
      BLAZE_CONNECTION_STRING: ${{ secrets.BLAZE_CONNECTION_STRING }}
      BLAZE_ELASTICSEARCH_USERNAME: ${{ secrets.BLAZE_ELASTICSEARCH_USERNAME }}
      BLAZE_ELASTICSEARCH_PASSWORD: ${{ secrets.BLAZE_ELASTICSEARCH_PASSWORD }}
      BLAZE_FILES_S3_ACCESS_KEY: ${{ secrets.BLAZE_FILES_S3_ACCESS_KEY }}
      BLAZE_FILES_S3_SECRET_ACCESS_KEY: ${{ 
        secrets.BLAZE_FILES_S3_SECRET_ACCESS_KEY }}
      BLAZE_GRAPHQL_CACHE_SETTINGS: ${{ secrets.BLAZE_GRAPHQL_CACHE_SETTINGS }}
      BLAZE_CLIENT_HEADER: ${{ secrets.BLAZE_CLIENT_HEADER }}

  deploy-frontend-azure:
    name: Deploy Frontend (Container App)
    needs: [configuration, build-frontend, pre-flight-check]
    if: ${{ inputs.cloud_provider == 'azure' && (inputs.deploy_services == true 
      || inputs.deploy_services == 'true' || inputs.deploy_services == null) && 
      (inputs.target_services == 'Blaze all' || inputs.target_services == 
      'frontend' || inputs.target_services == null) }}
    uses: ./.github/workflows/reusable-container-app-deploy.yml
    with:
      service_name: "frontend"
      environment: ${{ inputs.environment || 'DEV' }}
      stage_key: ${{ needs.configuration.outputs.stage_key }}
      branch_name: ${{ inputs.branch_name }}
      image_tag: ${{ github.sha }}
      project_key: ${{ needs.configuration.outputs.project_key }}
      client_key: ${{ needs.configuration.outputs.client_key }}
      domain_root: ${{ needs.configuration.outputs.domain_root }}
      azure_region: ${{ needs.configuration.outputs.cloud_region }}
      namespace: ${{ needs.configuration.outputs.namespace }}
      azure_registry_server: "${{ needs.configuration.outputs.azure_acr_name }}.azurecr.io"
      target_port: 3000
      azure_client_id_rev: ${{ inputs.azure_client_id_rev }}
      azure_tenant_id_rev: ${{ inputs.azure_tenant_id_rev }}
      azure_subscription_id_rev: ${{ inputs.azure_subscription_id_rev }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      # App Secrets
      MONGO_INITDB_ROOT_PASSWORD: ${{ secrets.MONGO_INITDB_ROOT_PASSWORD }}
      BLAZE_AUTH_JWT_PRIVATE_KEY: ${{ secrets.BLAZE_AUTH_JWT_PRIVATE_KEY }}
      BLAZE_CONNECTION_STRING: ${{ secrets.BLAZE_CONNECTION_STRING }}
      BLAZE_ELASTICSEARCH_USERNAME: ${{ secrets.BLAZE_ELASTICSEARCH_USERNAME }}
      BLAZE_ELASTICSEARCH_PASSWORD: ${{ secrets.BLAZE_ELASTICSEARCH_PASSWORD }}
      BLAZE_FILES_S3_ACCESS_KEY: ${{ secrets.BLAZE_FILES_S3_ACCESS_KEY }}
      BLAZE_FILES_S3_SECRET_ACCESS_KEY: ${{ 
        secrets.BLAZE_FILES_S3_SECRET_ACCESS_KEY }}
      BLAZE_GRAPHQL_CACHE_SETTINGS: ${{ secrets.BLAZE_GRAPHQL_CACHE_SETTINGS }}
      BLAZE_CLIENT_HEADER: ${{ secrets.BLAZE_CLIENT_HEADER }}
  deploy-admin-azure:
    name: Deploy Admin (Container App)
    needs: [configuration, package-admin-docker, pre-flight-check]
    # Run for Feature Branches ONLY
    if: ${{ inputs.cloud_provider == 'azure' && inputs.environment == 'DEV' && 
      inputs.branch_name != '' && inputs.branch_name != null && 
      (inputs.deploy_services == true || inputs.deploy_services == null) && 
      (inputs.target_services == 'Blaze all' || inputs.target_services == 
      'admin' || inputs.target_services == null) }}
    uses: ./.github/workflows/reusable-container-app-deploy.yml
    with:
      service_name: "admin"
      environment: ${{ inputs.environment || 'DEV' }}
      stage_key: ${{ needs.configuration.outputs.stage_key }}
      branch_name: ${{ inputs.branch_name }}
      image_tag: ${{ github.sha }}
      project_key: ${{ needs.configuration.outputs.project_key }}
      client_key: ${{ needs.configuration.outputs.client_key }}
      domain_root: ${{ needs.configuration.outputs.domain_root }}
      azure_region: ${{ needs.configuration.outputs.cloud_region }}
      namespace: ${{ needs.configuration.outputs.namespace }}
      azure_registry_server: "${{ needs.configuration.outputs.azure_acr_name }}.azurecr.io"
      target_port: 80
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      # App Secrets
      MONGO_INITDB_ROOT_PASSWORD: ${{ secrets.MONGO_INITDB_ROOT_PASSWORD }}
      BLAZE_AUTH_JWT_PRIVATE_KEY: ${{ secrets.BLAZE_AUTH_JWT_PRIVATE_KEY }}
      BLAZE_AUTH_ADMIN_EMAIL: ${{ secrets.BLAZE_AUTH_ADMIN_EMAIL }}
      BLAZE_AUTH_ADMIN_PASSWORD: ${{ secrets.BLAZE_AUTH_ADMIN_PASSWORD }}
      BLAZE_CONNECTION_STRING: ${{ secrets.BLAZE_CONNECTION_STRING }}
      BLAZE_ELASTICSEARCH_USERNAME: ${{ secrets.BLAZE_ELASTICSEARCH_USERNAME }}
      BLAZE_ELASTICSEARCH_PASSWORD: ${{ secrets.BLAZE_ELASTICSEARCH_PASSWORD }}
      BLAZE_FILES_S3_ACCESS_KEY: ${{ secrets.BLAZE_FILES_S3_ACCESS_KEY }}
      BLAZE_FILES_S3_SECRET_ACCESS_KEY: ${{ 
        secrets.BLAZE_FILES_S3_SECRET_ACCESS_KEY }}
      BLAZE_GRAPHQL_CACHE_SETTINGS: ${{ secrets.BLAZE_GRAPHQL_CACHE_SETTINGS }}
      BLAZE_CLIENT_HEADER: ${{ secrets.BLAZE_CLIENT_HEADER }}

  summary:
    name: 📝 Deployment Summary
    needs: [configuration, deploy-api-azure, deploy-frontend-azure, deploy-admin-azure]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Generate Summary
        run: |
          {
            echo "# 🚀 Deployment Summary: ${{ inputs.environment }}"
            echo ""

            echo "## 🌍 Context"
            echo "| Metric | Value |"
            echo "| :--- | :--- |"
            echo "| **Provider** | \`${{ inputs.cloud_provider }}\` |"
            echo "| **Stage** | \`${{ needs.configuration.outputs.stage_key }}\` |"
            echo "| **Region** | \`${{ needs.configuration.outputs.cloud_region || needs.configuration.outputs.aws_region }}\` |"
            echo "| **Branch** | \`${{ inputs.branch_name || 'main' }}\` |"
            echo "| **Project** | \`${{ needs.configuration.outputs.project_key }}\` |"
            echo "| **Client** | \`${{ needs.configuration.outputs.client_key }}\` |"
            echo "| **Domain** | [${{ needs.configuration.outputs.domain_root }}](https://${{ needs.configuration.outputs.domain_root }}) |"

            echo ""
            echo "## 📦 Service Status"
            echo "| Service | Status | Type |"
            echo "| :--- | :--- | :--- |"

            # Helper function for status icon
            get_icon() {
              if [[ "$1" == "success" ]]; then echo "✅"; elif [[ "$1" == "skipped" ]]; then echo "⏭️"; elif [[ "$1" == "cancelled" ]]; then echo "🚫"; else echo "❌"; fi
            }


            # Azure services
            echo "| **API (Azure)** | $(get_icon "${{ needs.deploy-api-azure.result }}") | Container App |"
            echo "| **Frontend (Azure)** | $(get_icon "${{ needs.deploy-frontend-azure.result }}") | Container App |"
            echo "| **Admin (Azure)** | $(get_icon "${{ needs.deploy-admin-azure.result }}") | Container App |"

            echo ""
            echo "## 🔗 Quick Links"
            PROVIDER="${{ inputs.cloud_provider }}"
            REGION="${{ needs.configuration.outputs.cloud_region || needs.configuration.outputs.aws_region }}"
            CLUSTER="${{ needs.configuration.outputs.namespace }}-${{ needs.configuration.outputs.client_key }}-${{ needs.configuration.outputs.project_key }}-${{ needs.configuration.outputs.stage_key }}-cluster"

            if [[ "$PROVIDER" == "gcp" ]]; then
              GCP_PROJECT="${{ needs.configuration.outputs.gcp_project_id }}"
              echo "- [Cloud Run Console](https://console.cloud.google.com/run?project=${GCP_PROJECT})"
              echo "- [Cloud Logging](https://console.cloud.google.com/logs?project=${GCP_PROJECT})"
              echo "- [Artifact Registry](https://console.cloud.google.com/artifacts?project=${GCP_PROJECT})"
            else
              echo "- [AWS ECS Console](https://${REGION}.console.aws.amazon.com/ecs/v2/clusters/${CLUSTER}/services?region=${REGION})"
              echo "- [CloudWatch Logs](https://${REGION}.console.aws.amazon.com/cloudwatch/home?region=${REGION}#logsV2:log-groups)"
              echo "- [Load Balancer](https://${REGION}.console.aws.amazon.com/ec2/home?region=${REGION}#LoadBalancers:)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
