name: Sync to thebyte9 Mirror

on:
    push:
        branches:
            - dev
            - main
        tags:
            - "v*"

jobs:
    sync-mirror:
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - name: Checkout source
              uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
              with:
                  fetch-depth: 0 # Full history for proper sync

            - name: Configure git
              run: |
                  git config --global user.name "GitHub Actions"
                  git config --global user.email "actions@github.com"

            - name: Setup SSH for mirror push
              env:
                  MIRROR_DEPLOY_KEY: ${{ secrets.THEBYTE9_MIRROR_DEPLOY_KEY }}
              run: |
                  mkdir -p ~/.ssh
                  echo "$MIRROR_DEPLOY_KEY" > ~/.ssh/id_rsa
                  chmod 600 ~/.ssh/id_rsa
                  ssh-keyscan github.com >> ~/.ssh/known_hosts

            - name: Add mirror remote
              run: |
                  git remote add mirror git@github.com:thebyte9/blaze-actions.git

            - name: Push to mirror
              run: |
                  # Push branch
                  git push mirror ${{ github.ref_name }} --force

                  # Push tags if this is a tag event
                  if [[ "${{ github.ref }}" == refs/tags/* ]]; then
                    git push mirror --tags --force
                  fi

            - name: Sync summary
              run: |
                  echo "✅ Synced to thebyte9/blaze-actions"
                  echo "   Branch: ${{ github.ref_name }}"
                  echo "   Commit: $(git rev-parse HEAD)"
