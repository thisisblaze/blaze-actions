name: "♻️ 🚀 Phase 3: Deploy"

on:
  workflow_call:
    inputs:
      environment:
        description: "Target Environment"
        required: true
        type: string

      target_type:
        description: "What to test"
        required: false
        default: "host"
        type: string

      branch_tag:
        description: "Feature branch tag (required if target_type=feature-branch)"
        required: false
        type: string

      mode:
        description: "Execution Mode"
        required: false
        default: "standard"
        type: string

      include_third_party:
        description: "Include third-party stacks (MongoDB, Elastic, Cloudflare)"
        required: false
        default: false
        type: boolean

      preserve_host:
        description: "Preserve host network"
        required: false
        default: false
        type: boolean
        
      cloud_provider:
        required: false
        type: string
        default: aws
        
      wif_audience:
        required: false
        type: string
        default: ""
        
      azure_client_id_rev:
        required: false
        type: string
      azure_tenant_id_rev:
        required: false
        type: string
      azure_subscription_id_rev:
        required: false
        type: string
    secrets:
      MONGO_INITDB_ROOT_PASSWORD:
        required: false
      BLAZE_ELASTICSEARCH_USERNAME:
        required: false
      BLAZE_ELASTICSEARCH_PASSWORD:
        required: false
      BLAZE_ELASTICSEARCH_ENDPOINT:
        required: false
      AWS_ROLE_ARN:
        required: false
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        required: false
      GCP_SERVICE_ACCOUNT:
        required: false
      AZURE_CLIENT_ID:
        required: false
      AZURE_TENANT_ID:
        required: false
      AZURE_SUBSCRIPTION_ID:
        required: false
      CLOUDFLARE_API_TOKEN:
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        required: false
      CLOUDFLARE_ZONE_ID:
        required: false
      GH_PAT:
        required: false
      NPM_TOKEN:
        required: false
      INFRACOST_API_KEY:
        required: false
      BLAZE_CONNECTION_STRING:
        required: false
      BLAZE_AUTH_JWT_PRIVATE_KEY:
        required: false
      BLAZE_AUTH_ADMIN_EMAIL:
        required: false
      BLAZE_AUTH_ADMIN_PASSWORD:
        required: false
      BLAZE_FILES_S3_ACCESS_KEY:
        required: false
      BLAZE_FILES_S3_SECRET_ACCESS_KEY:
        required: false
      BLAZE_GRAPHQL_CACHE_SETTINGS:
        required: false
      BLAZE_CLIENT_HEADER:
        required: false
      EC_API_KEY:
        required: false
      MONGODB_ATLAS_PUBLIC_KEY:
        required: false
      MONGODB_ATLAS_PRIVATE_KEY:
        required: false
      MONGODB_ATLAS_ORG_ID:
        required: false
      MONGODB_ATLAS_PROJECT_ID:
        required: false
      ACM_CERTIFICATE_ARN:
        required: false
      BLAZE_SENTRY_AUTH_TOKEN:
        required: false
      BLAZE_SENTRY_DSN:
        required: false
      SLACK_WEBHOOK_URL:
        required: false
      DEPLOY_KEY:
        required: false
permissions:
  id-token: write
  contents: read
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # --------------------------------------------------------------------------------
  # 1. SETUP & CONFIG
  # --------------------------------------------------------------------------------
  setup:
    name: "Initialize"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      terraform_stack: ${{ steps.calc.outputs.stack }}
      branch_tag: ${{ steps.calc.outputs.tag }}
    steps:
      - id: calc
        run: |
          if [[ "${{ inputs.target_type }}" == "feature-branch" ]]; then
            echo "stack=app" >> $GITHUB_OUTPUT
            echo "tag=${{ inputs.branch_tag }}" >> $GITHUB_OUTPUT
          else
            echo "stack=network" >> $GITHUB_OUTPUT
            echo "tag=" >> $GITHUB_OUTPUT
          fi

  config:
    name: "⚙️ Config"
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      stage_key: ${{ steps.calc.outputs.stage_key }}
      bucket: ${{ steps.calc.outputs.bucket }}
      lock_table: ${{ steps.calc.outputs.lock_table }}
      state_key: ${{ steps.calc.outputs.state_key }}
      tf_dir: ${{ steps.calc.outputs.tf_dir }}
      cluster_name: ${{ steps.calc.outputs.cluster_name }}
      env_val: ${{ steps.calc.outputs.env_val }}
      aws_region: ${{ steps.calc.outputs.aws_region }}
      client_key: ${{ steps.calc.outputs.client_key }}
      project_key: ${{ steps.calc.outputs.project_key }}
      namespace: ${{ steps.calc.outputs.namespace }}
      platform: ${{ steps.calc.outputs.platform }}
      cloud_provider: ${{ steps.calc.outputs.cloud_provider }}
      cloud_region: ${{ steps.calc.outputs.cloud_region }}
      infra_prefix: ${{ steps.calc.outputs.infra_prefix }}
      gcp_project_id: ${{ steps.calc.outputs.gcp_project_id }}
      domain_root: ${{ steps.calc.outputs.domain_root }}
      allowed_infra_users: ${{ steps.calc.outputs.allowed_infra_users }}
      gcp_docker_repo: ${{ steps.calc.outputs.gcp_docker_repo }}
      azure_acr_name: ${{ steps.calc.outputs.azure_acr_name }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.2

      - name: Checkout Actions
        uses: actions/checkout@v6.0.2
        with:
          repository: thisisblaze/blaze-actions
          path: .blaze-actions
          ref: dev

      - name: Calculate Configuration
        id: calc
        uses: ./.blaze-actions/.github/actions/calculate-env-config
        with:
          environment: ${{ inputs.environment }}
          terraform_stack: ${{ needs.setup.outputs.terraform_stack }}
          branch_tag: ${{ needs.setup.outputs.branch_tag }}
          cloud_provider: ${{ inputs.cloud_provider }}

  # --------------------------------------------------------------------------------
  # 5. DEPLOY
  # --------------------------------------------------------------------------------
  deploy-app:
    if: always() && inputs.mode != 'destroy-only'
    needs: [config]
    name: "🚀 Deploy App"
    uses: ./.github/workflows/02-deploy-app.yml
    with:
      environment: ${{ inputs.environment }}
      target_services: "Blaze all"
      # Hybrid ECS: Prod uses EC2/ARM64, Dev/Stage use FARGATE/X86_64
      api_launch_type: ${{ contains(inputs.environment, 'prod') && 'EC2' || 'FARGATE' }}
      api_cpu_architecture: ${{ contains(inputs.environment, 'prod') && 'ARM64' || 'X86_64' }}
      frontend_launch_type: ${{ contains(inputs.environment, 'prod') && 'EC2' || 'FARGATE' }}
      # Stress test: skip ECS stabilisation wait — infra uses placeholder images, real images deployed in CI
      skip_stability_wait: "${{ 'true' }}"
      cloud_provider: ${{ inputs.cloud_provider }}
      wif_audience: ${{ inputs.wif_audience }}
      azure_client_id_rev: ${{ inputs.azure_client_id_rev }}
      azure_tenant_id_rev: ${{ inputs.azure_tenant_id_rev }}
      azure_subscription_id_rev: ${{ inputs.azure_subscription_id_rev }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      MONGODB_ATLAS_PUBLIC_KEY: ${{ secrets.MONGODB_ATLAS_PUBLIC_KEY }}
      MONGODB_ATLAS_PRIVATE_KEY: ${{ secrets.MONGODB_ATLAS_PRIVATE_KEY }}
      MONGODB_ATLAS_PROJECT_ID: ${{ secrets.MONGODB_ATLAS_PROJECT_ID }}
      MONGODB_ATLAS_ORG_ID: ${{ secrets.MONGODB_ATLAS_ORG_ID }}
      MONGO_INITDB_ROOT_PASSWORD: ${{ secrets.MONGO_INITDB_ROOT_PASSWORD }}
      BLAZE_AUTH_JWT_PRIVATE_KEY: ${{ secrets.BLAZE_AUTH_JWT_PRIVATE_KEY }}
      BLAZE_AUTH_ADMIN_EMAIL: ${{ secrets.BLAZE_AUTH_ADMIN_EMAIL }}
      BLAZE_AUTH_ADMIN_PASSWORD: ${{ secrets.BLAZE_AUTH_ADMIN_PASSWORD }}
      BLAZE_CONNECTION_STRING: ${{ secrets.BLAZE_CONNECTION_STRING }}
      BLAZE_ELASTICSEARCH_USERNAME: ${{ secrets.BLAZE_ELASTICSEARCH_USERNAME }}
      BLAZE_ELASTICSEARCH_PASSWORD: ${{ secrets.BLAZE_ELASTICSEARCH_PASSWORD }}
      BLAZE_FILES_S3_ACCESS_KEY: ${{ secrets.BLAZE_FILES_S3_ACCESS_KEY }}
      BLAZE_FILES_S3_SECRET_ACCESS_KEY: ${{ secrets.BLAZE_FILES_S3_SECRET_ACCESS_KEY }}
      BLAZE_GRAPHQL_CACHE_SETTINGS: ${{ secrets.BLAZE_GRAPHQL_CACHE_SETTINGS }}
      BLAZE_CLIENT_HEADER: ${{ secrets.BLAZE_CLIENT_HEADER }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
