name: "♻️ Verify Azure"
on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      target_type:
        required: false
        type: string
      branch_tag:
        required: false
        type: string
      aws_region:
        required: false
        type: string
      cluster_name:
        required: false
        type: string
      domain_root:
        required: false
        type: string
      gcp_project_id:
        required: false
        type: string
      cloud_region:
        required: false
        type: string
      stage_key:
        required: false
        type: string
      namespace:
        required: false
        type: string
      client_key:
        required: false
        type: string
      project_key:
        required: false
        type: string
      azure_acr_name:
        required: false
        type: string
    secrets:
      AWS_ROLE_ARN:
        required: false
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        required: false
      GCP_SERVICE_ACCOUNT:
        required: false
      AZURE_CLIENT_ID:
        required: false
      AZURE_TENANT_ID:
        required: false
      AZURE_SUBSCRIPTION_ID:
        required: false
      CLOUDFLARE_API_TOKEN:
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        required: false
      CLOUDFLARE_ZONE_ID:
        required: false
      GH_PAT:
        required: false
      NPM_TOKEN:
        required: false
      INFRACOST_API_KEY:
        required: false
      BLAZE_CONNECTION_STRING:
        required: false
      BLAZE_AUTH_JWT_PRIVATE_KEY:
        required: false
      BLAZE_AUTH_ADMIN_EMAIL:
        required: false
      BLAZE_AUTH_ADMIN_PASSWORD:
        required: false
      BLAZE_FILES_S3_ACCESS_KEY:
        required: false
      BLAZE_FILES_S3_SECRET_ACCESS_KEY:
        required: false
      BLAZE_GRAPHQL_CACHE_SETTINGS:
        required: false
      BLAZE_CLIENT_HEADER:
        required: false
      EC_API_KEY:
        required: false
      MONGODB_ATLAS_PUBLIC_KEY:
        required: false
      MONGODB_ATLAS_PRIVATE_KEY:
        required: false
      MONGODB_ATLAS_ORG_ID:
        required: false
      MONGODB_ATLAS_PROJECT_ID:
        required: false
      ACM_CERTIFICATE_ARN:
        required: false
      BLAZE_SENTRY_AUTH_TOKEN:
        required: false
      BLAZE_SENTRY_DSN:
        required: false
      SLACK_WEBHOOK_URL:
        required: false
      DEPLOY_KEY:
        required: false
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    name: ✅ Verify Infrastructure & App
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Verify Endpoints
        run: |
          echo "🔍 Verifying Azure endpoints..."

          # 1. API Health Check
          API_URL="https://api-azure-${{ inputs.environment }}.${{ inputs.domain_root }}/graphql"
          echo "Checking API: $API_URL"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ API check failed! HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "✅ API healthy (HTTP 200)"

          # 2. Frontend Check
          FRONTEND_URL="https://frontend-azure-${{ inputs.environment }}.${{ inputs.domain_root }}/"
          echo "Checking Frontend: $FRONTEND_URL"
          HTTP_STATUS=$(curl -s -L -o /dev/null -w "%{http_code}" "$FRONTEND_URL")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Frontend check failed! HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "✅ Frontend healthy (HTTP 200)"

  # ── FINAL TEARDOWN (Full-Circle Only) ───────────────────────────────────
