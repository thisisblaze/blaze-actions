name: "♻️ Reusable ECS Deploy"

on:
  workflow_call:
    inputs:
      cloud_provider:
        required: false
        type: string
        default: "aws"
        description: "Cloud provider (aws/gcp/azure). Default: aws"
      service_name:
        required: true
        type: string
      environment:
        required: true
        type: string
      stage_key:
        required: true
        type: string
      config_environment:
        required: false
        type: string
        description: "Environment config key (e.g. DEV, STAGE, PROD)"
      branch_name:
        required: false
        type: string
      image_tag:
        required: true
        type: string
      project_key:
        required: true
        type: string
      client_key:
        required: true
        type: string
      cloud_platform:
        required: true
        type: string
      domain_root:
        required: true
        type: string
      # Infra specifics
      efs_id:
        required: false
        type: string
      api_ap_id:
        required: false
        type: string
      mongo_ap_id:
        required: false
        type: string
      es_ap_id:
        required: false
        type: string
      ns_id:
        required: false
        type: string
      namespace:
        required: false
        type: string
        default: "blaze"
      registry:
        required: true
        type: string
      # Configs
      dfp_network_id:
        required: false
        type: string
      gtm_id:
        required: false
        type: string
      s3_bucket:
        required: false
        type: string
      s3_public_url:
        required: false
        type: string
      aws_region:
        required: true
        type: string
      elasticsearch_endpoint:
        required: false
        type: string
      # --- HYBRID ECS (FEB 2026) ---
      launch_type:
        required: false
        type: string
        default: "FARGATE"
        description: "ECS launch type: FARGATE or EC2"
      cpu_architecture:
        required: false
        type: string
        default: "X86_64"
        description: "CPU architecture: X86_64 or ARM64"
      skip_stability_wait:
        required: false
        type: string
        default: "false"
        description: "Set to 'true' to skip ECS stabilisation wait (stress tests, placeholder images)"

    secrets:
      AWS_ROLE_ARN:
        required: false
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        required: false
      GCP_SERVICE_ACCOUNT:
        required: false
      AZURE_CLIENT_ID:
        required: false
      AZURE_TENANT_ID:
        required: false
      AZURE_SUBSCRIPTION_ID:
        required: false
      CLOUDFLARE_API_TOKEN:
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        required: false
      CLOUDFLARE_ZONE_ID:
        required: false
      GH_PAT:
        required: false
      NPM_TOKEN:
        required: false
      INFRACOST_API_KEY:
        required: false
      BLAZE_CONNECTION_STRING:
        required: false
      BLAZE_AUTH_JWT_PRIVATE_KEY:
        required: false
      BLAZE_AUTH_ADMIN_EMAIL:
        required: false
      BLAZE_AUTH_ADMIN_PASSWORD:
        required: false
      BLAZE_FILES_S3_ACCESS_KEY:
        required: false
      BLAZE_FILES_S3_SECRET_ACCESS_KEY:
        required: false
      BLAZE_GRAPHQL_CACHE_SETTINGS:
        required: false
      BLAZE_CLIENT_HEADER:
        required: false
      EC_API_KEY:
        required: false
      MONGODB_ATLAS_PUBLIC_KEY:
        required: false
      MONGODB_ATLAS_PRIVATE_KEY:
        required: false
      MONGODB_ATLAS_ORG_ID:
        required: false
      MONGODB_ATLAS_PROJECT_ID:
        required: false
      ACM_CERTIFICATE_ARN:
        required: false
      BLAZE_SENTRY_AUTH_TOKEN:
        required: false
      BLAZE_SENTRY_DSN:
        required: false
      SLACK_WEBHOOK_URL:
        required: false
      DEPLOY_KEY:
        required: false
concurrency:
  group: ${{ github.workflow }}-deploy-${{ inputs.service_name }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy ${{ inputs.service_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Use config_environment if provided (uppercase), otherwise fallback.
    # We force uppercase via shell logic usually, but here we bind to the GitHub Environment.
    # GitHub Environments ARE case-sensitive. 'STAGE' != 'stage'.
    # We should default to the uppercase convention if input is mixed.
    environment: ${{ inputs.config_environment || inputs.environment }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Blaze (Credentials)
        uses: thisisblaze/blaze-actions/.github/actions/setup-blaze@dev
        with:
          aws-role-arn: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}
          ecr: "true"
          terraform: "false"

      - name: Deploy Service
        uses: thisisblaze/blaze-actions/.github/actions/deploy-ecs-service@dev
        with:
          service_name: ${{ inputs.service_name }}
          environment: ${{ inputs.environment }}
          stage_key: ${{ inputs.stage_key }}
          branch_name: ${{ inputs.branch_name }}
          image_tag: ${{ inputs.image_tag }}
          project_key: ${{ inputs.project_key }}
          client_key: ${{ inputs.client_key }}
          cloud_platform: ${{ inputs.cloud_platform }}
          domain_root: ${{ inputs.domain_root }}

          # Infra
          efs_id: ${{ inputs.efs_id }}
          api_ap_id: ${{ inputs.api_ap_id }}
          mongo_ap_id: ${{ inputs.mongo_ap_id }}
          es_ap_id: ${{ inputs.es_ap_id }}
          ns_id: ${{ inputs.ns_id }}
          namespace: ${{ inputs.namespace }}
          registry: ${{ inputs.registry }}

          # Secrets
          mongo_password: ${{ secrets.MONGO_INITDB_ROOT_PASSWORD }}
          jwt_private_key: ${{ secrets.BLAZE_AUTH_JWT_PRIVATE_KEY }}
          s3_bucket: ${{ inputs.s3_bucket }}
          admin_email: ${{ secrets.BLAZE_AUTH_ADMIN_EMAIL }}
          admin_password: ${{ secrets.BLAZE_AUTH_ADMIN_PASSWORD }}
          mongodb_uri: ${{ secrets.BLAZE_CONNECTION_STRING }}
          elasticsearch_endpoint: ${{ secrets.BLAZE_ELASTICSEARCH_ENDPOINT || inputs.elasticsearch_endpoint }}

          elasticsearch_username: ${{ secrets.BLAZE_ELASTICSEARCH_USERNAME }}
          elasticsearch_password: ${{ secrets.BLAZE_ELASTICSEARCH_PASSWORD }}

          s3_access_key: ${{ secrets.BLAZE_FILES_S3_ACCESS_KEY }}
          s3_secret_key: ${{ secrets.BLAZE_FILES_S3_SECRET_ACCESS_KEY }}
          s3_public_url: ${{ inputs.s3_public_url }}

          graphql_cache_settings: ${{ secrets.BLAZE_GRAPHQL_CACHE_SETTINGS }}
          blaze_client_header: ${{ secrets.BLAZE_CLIENT_HEADER }}
          dfp_network_id: ${{ inputs.dfp_network_id }}
          gtm_id: ${{ inputs.gtm_id }}
          aws_region: ${{ inputs.aws_region }}
          # Hybrid ECS
          launch_type: ${{ inputs.launch_type }}
          cpu_architecture: ${{ inputs.cpu_architecture }}
          deployment_timeout_minutes: "25"
          skip_stability_wait: ${{ inputs.skip_stability_wait || 'false' }}
