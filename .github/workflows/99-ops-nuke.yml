      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      MONGODB_ATLAS_PUBLIC_KEY: ${{ secrets.MONGODB_ATLAS_PUBLIC_KEY }}
      MONGODB_ATLAS_PRIVATE_KEY: ${{ secrets.MONGODB_ATLAS_PRIVATE_KEY }}
      MONGODB_ATLAS_PROJECT_ID: ${{ secrets.MONGODB_ATLAS_PROJECT_ID }}
      MONGODB_ATLAS_ORG_ID: ${{ secrets.MONGODB_ATLAS_ORG_ID }}
      EC_API_KEY: ${{ secrets.EC_API_KEY }}
      ACM_CERTIFICATE_ARN: ${{ secrets.ACM_CERTIFICATE_ARN }}
    with:
      wif_audience: ${{ vars.WIF_AUDIENCE }}
      cloud_provider: ${{ inputs.cloud_provider }}
      tf_dir: "${{ needs.configuration.outputs.infra_prefix }}/${{ needs.configuration.outputs.stage_key }}-data"
      aws_region: ${{ needs.configuration.outputs.aws_region }}
      environment: ${{ inputs.environment || 'DEV' }}
      bucket: ${{ needs.configuration.outputs.bucket }}
      state_key: "infra/${{ needs.configuration.outputs.project_key }}/${{ needs.configuration.outputs.stage_key }}/data.tfstate"
      lock_table: ${{ needs.configuration.outputs.lock_table }}
      apply: true
      destroy: true
      tf_vars: |
        project_key=${{ needs.configuration.outputs.project_key }}
        client_key=${{ needs.configuration.outputs.client_key }}
        namespace=${{ needs.configuration.outputs.namespace }}
        platform=${{ needs.configuration.outputs.platform }}
        aws_region=${{ needs.configuration.outputs.aws_region }}
        stage=${{ needs.configuration.outputs.stage_key }}

        gcp_project_id=${{ needs.configuration.outputs.gcp_project_id }}
        gcp_region=${{ needs.configuration.outputs.cloud_region }}
        azure_region=${{ needs.configuration.outputs.cloud_region }}
  nuke-destroy-tunnel:
    name: 🚇 Nuke 3/5 - Tunnel
    needs: [configuration, nuke-app-gate]
    if: inputs.action == 'nuke-environment'
    uses: thisisblaze/blaze-actions/.github/workflows/reusable-terraform.yml@v1.4.31
    with:
      wif_audience: ${{ vars.WIF_AUDIENCE }}
      cloud_provider: ${{ inputs.cloud_provider }}
      tf_dir: "${{ needs.configuration.outputs.infra_prefix }}/third-party/cloudflare"
      aws_region: ${{ needs.configuration.outputs.aws_region }}
      environment: ${{ inputs.environment || 'DEV' }}
      bucket: ${{ needs.configuration.outputs.bucket }}
      state_key: "infra/${{ needs.configuration.outputs.project_key }}/third-party/cloudflare.tfstate"
      lock_table: ${{ needs.configuration.outputs.lock_table }}
      apply: true
      destroy: true
      # Tunnel stack needs specific vars?
      tf_vars: |
        project_key=${{ needs.configuration.outputs.project_key }}
        client_key=${{ needs.configuration.outputs.client_key }}
        namespace=${{ needs.configuration.outputs.namespace }}
        domain_root=${{ needs.configuration.outputs.domain_root }}
        stage=${{ needs.configuration.outputs.stage_key }}
        branch_name=${{ inputs.branch_tag }}
        gcp_project_id=${{ needs.configuration.outputs.gcp_project_id }}
        gcp_region=${{ needs.configuration.outputs.cloud_region }}
        azure_region=${{ needs.configuration.outputs.cloud_region }}
      pre_apply_script: |
        echo "🔪 ORPHANING BROKEN CLOUDFLARE STATE..."
        # Schema mismatch (v4 -> v5) or deleted resources prevent destroy.
        # We remove them from state to unblock.
        terraform state rm "module.admin_pages_domain.cloudflare_pages_domain.this" || true
        terraform state rm "module.basic_auth_worker.cloudflare_workers_script.basic_auth" || true
        terraform state rm "module.basic_auth_worker.cloudflare_workers_route.routes" || true
        terraform state rm "module.tunnel.cloudflare_zero_trust_tunnel_cloudflared_config.this" || true
        # Update to match modern provider resource name (cloudflare_dns_record)
        terraform state rm "module.tunnel_dns.cloudflare_dns_record.this" || true
        terraform state rm "module.tunnel_dns.cloudflare_record.this" || true # Keep old for safety
        terraform state rm "module.admin_pages_project.cloudflare_pages_project.this" || true
        echo "✅ Broken state removed."

    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}
      # Azure
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      MONGODB_ATLAS_PUBLIC_KEY: ${{ secrets.MONGODB_ATLAS_PUBLIC_KEY }}
      MONGODB_ATLAS_PRIVATE_KEY: ${{ secrets.MONGODB_ATLAS_PRIVATE_KEY }}
      MONGODB_ATLAS_PROJECT_ID: ${{ secrets.MONGODB_ATLAS_PROJECT_ID }}
      MONGODB_ATLAS_ORG_ID: ${{ secrets.MONGODB_ATLAS_ORG_ID }}
      EC_API_KEY: ${{ secrets.EC_API_KEY }}
      ACM_CERTIFICATE_ARN: ${{ secrets.ACM_CERTIFICATE_ARN }}

