      wif_audience: ${{ vars.WIF_AUDIENCE }}
      cloud_provider: azure
      # The Front Door + Blob resources live inside the network stack (cdn-modules.tf)
      # Destroy them by targeting only the CDN module resources in the network stack
      tf_dir: "${{ needs.configuration.outputs.infra_prefix }}/${{ needs.configuration.outputs.stage_key }}-network"
      aws_region: ${{ needs.configuration.outputs.aws_region }}
      environment: ${{ inputs.environment || 'DEV' }}
      bucket: ${{ needs.configuration.outputs.bucket }}
      state_key: "infra/${{ needs.configuration.outputs.project_key }}/${{ needs.configuration.outputs.stage_key }}/network.tfstate"
      lock_table: ${{ needs.configuration.outputs.lock_table }}
      apply: true
      destroy: false # We partially destroy by disabling CDN, then full network destroy follows
      build_sharp: false # Skip building Sharp binaries to save 2+ mins on this run
      tf_vars: |
        project_key=${{ needs.configuration.outputs.project_key }}
        client_key=${{ needs.configuration.outputs.client_key }}
        namespace=${{ needs.configuration.outputs.namespace }}
        platform=${{ needs.configuration.outputs.platform }}
        aws_region=${{ needs.configuration.outputs.aws_region }}
        domain_root=${{ needs.configuration.outputs.domain_root }}
        stage=${{ needs.configuration.outputs.stage_key }}
        enable_cdn=false
        enable_waf=false
        enable_storage_origin=false
        enable_image_resize=false

        gcp_project_id=${{ needs.configuration.outputs.gcp_project_id }}
        gcp_region=${{ needs.configuration.outputs.cloud_region }}
        azure_region=${{ needs.configuration.outputs.cloud_region }}
  # ── Azure: Network Stack Destroy ──
  nuke-destroy-network-azure:
    name: 🌐 Nuke 5/5 - Network Stack (Azure)
    needs: [configuration, nuke-destroy-cdn-azure]
    if: |
      always() &&
      inputs.action == 'nuke-environment' &&
      inputs.cloud_provider == 'azure' &&
      (needs.nuke-destroy-cdn-azure.result == 'success' || needs.nuke-destroy-cdn-azure.result == 'skipped') &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      needs.configuration.outputs.has_network == 'true'
    uses: thisisblaze/blaze-actions/.github/workflows/reusable-terraform.yml@v1.4.31
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      MONGODB_ATLAS_PUBLIC_KEY: ${{ secrets.MONGODB_ATLAS_PUBLIC_KEY }}
      MONGODB_ATLAS_PRIVATE_KEY: ${{ secrets.MONGODB_ATLAS_PRIVATE_KEY }}
      MONGODB_ATLAS_PROJECT_ID: ${{ secrets.MONGODB_ATLAS_PROJECT_ID }}
      MONGODB_ATLAS_ORG_ID: ${{ secrets.MONGODB_ATLAS_ORG_ID }}
      EC_API_KEY: ${{ secrets.EC_API_KEY }}
      ACM_CERTIFICATE_ARN: ${{ secrets.ACM_CERTIFICATE_ARN }}
    with:
      wif_audience: ${{ vars.WIF_AUDIENCE }}
      cloud_provider: azure
      tf_dir: "${{ needs.configuration.outputs.infra_prefix }}/${{ needs.configuration.outputs.stage_key }}-network"
      aws_region: ${{ needs.configuration.outputs.aws_region }}
      environment: ${{ inputs.environment || 'DEV' }}
      bucket: ${{ needs.configuration.outputs.bucket }}
      state_key: "infra/${{ needs.configuration.outputs.project_key }}/${{ needs.configuration.outputs.stage_key }}/network.tfstate"
      lock_table: ${{ needs.configuration.outputs.lock_table }}
      apply: true
      destroy: true
      tf_vars: |
        project_key=${{ needs.configuration.outputs.project_key }}
        client_key=${{ needs.configuration.outputs.client_key }}
        namespace=${{ needs.configuration.outputs.namespace }}
        platform=${{ needs.configuration.outputs.platform }}
        aws_region=${{ needs.configuration.outputs.aws_region }}
        stage=${{ needs.configuration.outputs.stage_key }}

        gcp_project_id=${{ needs.configuration.outputs.gcp_project_id }}
        gcp_region=${{ needs.configuration.outputs.cloud_region }}
        azure_region=${{ needs.configuration.outputs.cloud_region }}
  nuke-destroy-network:
    name: 💥 Nuke 5/5 - Network Stack (AWS)
    # Wait for Tunnel + Data (AWS) to complete before destroying network
    needs: [configuration, nuke-destroy-tunnel, nuke-destroy-data-aws]
    if: |
      always() &&
      inputs.action == 'nuke-environment' &&
      (inputs.cloud_provider == 'aws' || inputs.cloud_provider == '' || inputs.cloud_provider == null) &&
      (needs.nuke-destroy-tunnel.result == 'success' || needs.nuke-destroy-tunnel.result == 'skipped') &&
      (needs.nuke-destroy-data-aws.result == 'success' || needs.nuke-destroy-data-aws.result == 'skipped') &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      needs.configuration.outputs.has_network == 'true'
    uses: thisisblaze/blaze-actions/.github/workflows/reusable-terraform.yml@v1.4.31
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}
      # Azure
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      MONGODB_ATLAS_PUBLIC_KEY: ${{ secrets.MONGODB_ATLAS_PUBLIC_KEY }}
      MONGODB_ATLAS_PRIVATE_KEY: ${{ secrets.MONGODB_ATLAS_PRIVATE_KEY }}
      MONGODB_ATLAS_PROJECT_ID: ${{ secrets.MONGODB_ATLAS_PROJECT_ID }}
      MONGODB_ATLAS_ORG_ID: ${{ secrets.MONGODB_ATLAS_ORG_ID }}
      EC_API_KEY: ${{ secrets.EC_API_KEY }}
      ACM_CERTIFICATE_ARN: ${{ secrets.ACM_CERTIFICATE_ARN }}
    with:
      wif_audience: ${{ vars.WIF_AUDIENCE }}
      cloud_provider: ${{ inputs.cloud_provider }}
      tf_dir: "${{ needs.configuration.outputs.infra_prefix }}/${{ needs.configuration.outputs.stage_key }}-network"
      aws_region: ${{ needs.configuration.outputs.aws_region }}
      environment: ${{ inputs.environment || 'DEV' }}
      bucket: ${{ needs.configuration.outputs.bucket }}
      state_key: "infra/${{ needs.configuration.outputs.project_key }}/${{ needs.configuration.outputs.stage_key }}/network.tfstate"
      lock_table: ${{ needs.configuration.outputs.lock_table }}
      apply: true
      destroy: true
      tf_vars: |
        project_key=${{ needs.configuration.outputs.project_key }}
        client_key=${{ needs.configuration.outputs.client_key }}
        namespace=${{ needs.configuration.outputs.namespace }}
        platform=${{ needs.configuration.outputs.platform }}
        aws_region=${{ needs.configuration.outputs.aws_region }}
        domain_root=${{ needs.configuration.outputs.domain_root }}
        stage=${{ needs.configuration.outputs.stage_key }}
        gcp_project_id=${{ needs.configuration.outputs.gcp_project_id }}
        gcp_region=${{ needs.configuration.outputs.cloud_region }}
        azure_region=${{ needs.configuration.outputs.cloud_region }}
      pre_apply_script: |-
        # ----- ORPHAN LAMBDA@EDGE -----
        # Lambda@Edge replicas take hours to delete. We must remove it from state to proceed.
        echo "🔪 ORPHANING LAMBDA@EDGE FUNCTIONS FROM STATE..."
        terraform state rm "module.environment_network.module.lambda_edge_image_resize[0].aws_lambda_function.origin_response[0]" 2>/dev/null || true
        terraform state rm "module.environment_network.module.lambda_edge_image_resize[0].aws_lambda_function.viewer_request[0]" 2>/dev/null || true
        terraform state rm "module.environment_network.module.lambda_edge_image_resize[0].random_id.suffix" 2>/dev/null || true
        echo "✅ Lambda@Edge orphaned."

        # ----- EC2 / ASG CLEANUP (GAP-5) -----
        # If EC2 capacity provider exists, scale ASG to 0 and wait for drain.
        # This prevents destroy from hanging on ECS managed termination protection.
        echo "🔍 Checking for EC2 ASGs to clean up..."
        ASG_NAME=$(terraform state list 2>/dev/null | grep 'aws_autoscaling_group' | head -1)
        if [ -n "$ASG_NAME" ]; then
          ASG_ID=$(terraform state show "$ASG_NAME" 2>/dev/null | grep 'name ' | head -1 | awk -F'"' '{print $2}')
          if [ -n "$ASG_ID" ]; then
            echo "🛑 Scaling down ASG: $ASG_ID"
            aws autoscaling update-auto-scaling-group \
              --auto-scaling-group-name "$ASG_ID" \
              --min-size 0 --max-size 0 --desired-capacity 0 || true
            echo "⏳ Waiting 30s for instance drain..."
            sleep 30
          fi
          echo "✅ EC2 ASG cleanup complete."
        else
          echo "ℹ️  No ASG found in state — skipping EC2 cleanup."
        fi

  nuke-cleanup-dns:
    name: 🧹 Nuke Cleanup - DNS
    needs: [configuration, nuke-destroy-network]
    if: inputs.action == 'nuke-environment'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Cleanup Residual DNS Records
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          # Inputs
          STAGE: ${{ needs.configuration.outputs.stage_key }}
          DOMAIN_ROOT: ${{ needs.configuration.outputs.domain_root }}
        run: |
          echo "🧹 Cleaning up residual DNS records for stage: $STAGE"
          echo "   Domain Root: $DOMAIN_ROOT"

          # Define targets
          # Standard convention: {subdomain}-{stage}.{root}
          # Exception: prod usually has no suffix, but this job runs for 'nuke-environment' which implies non-prod or explicit nuke.
          # If stage is 'prod', we might want to be extra careful or use different logic.
          # Assuming STAGE/DEV use suffixes.

          if [ "$STAGE" == "prod" ]; then
             echo "⚠️  PROD Nuke detected. Skipping DNS cleanup for safety (manual verification required)."
             exit 0
          fi

          TARGETS=(
            "api-${STAGE}.${DOMAIN_ROOT}"
            "frontend-${STAGE}.${DOMAIN_ROOT}"
            "cdn-${STAGE}.${DOMAIN_ROOT}"
            "admin-${STAGE}.${DOMAIN_ROOT}"
            "api-direct-${STAGE}.${DOMAIN_ROOT}"
            # Tunnel Stack Targets (fix 400 Bad Request / 409 Conflict)
            "kibana-${STAGE}.${DOMAIN_ROOT}"
            "gibana-${STAGE}.${DOMAIN_ROOT}"
            "grafana-${STAGE}.${DOMAIN_ROOT}"
            "prometheus-${STAGE}.${DOMAIN_ROOT}"
            "alertmanager-${STAGE}.${DOMAIN_ROOT}"
            # Wildcard for stage? "*.${STAGE}.${DOMAIN_ROOT}" doesn't usually exist.
            # But the user reported "*.thisisblaze.uk" (root wildcard) left over.
            # We won't delete root wildcard automatically.
          )

          echo "🎯 Targets:"
          printf '%s\n' "${TARGETS[@]}"

          for RECORD_NAME in "${TARGETS[@]}"; do
            echo "---------------------------------------------------"
            echo "🔍 Checking: $RECORD_NAME"

            # List records matching name
            RESPONSE=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records?name=$RECORD_NAME" \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json")

            # Extract IDs
            IDS=$(echo "$RESPONSE" | jq -r '.result[].id')

            if [[ -z "$IDS" || "$IDS" == "null" ]]; then
              echo "   ✅ No records found."
            else
              for id in $IDS; do
                echo "   🗑️ Deleting record ID: $id"
                DEL_RES=$(curl -s -X DELETE "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records/$id" \
                  -H "Authorization: Bearer $CF_API_TOKEN" \
                  -H "Content-Type: application/json")
                
                SUCCESS=$(echo "$DEL_RES" | jq -r '.success')
                if [ "$SUCCESS" == "true" ]; then
                   echo "      ✅ Deleted."
                else
                   echo "      ❌ Failed to delete."
                   echo "$DEL_RES" | jq -r '.errors'
                fi
              done
            fi
          done

  summary:
    name: 📝 Ops Summary
    needs: [configuration, nuke-stop-services, nuke-pre-cleanup, nuke-stop-services-gcp, nuke-stop-services-azure, nuke-destroy-app, nuke-app-gate, nuke-destroy-pages, nuke-destroy-data-aws, nuke-destroy-tunnel, nuke-destroy-data-gcp, nuke-destroy-cdn-gcp, nuke-destroy-network-gcp, nuke-destroy-data-azure, nuke-destroy-cdn-azure, nuke-destroy-network-azure, nuke-destroy-network, nuke-cleanup-dns]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Generate Summary
        run: |
          echo "# 🛠️ Ops Utility Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Helper function
          get_icon() {
            if [[ "$1" == "success" ]]; then echo "✅"; elif [[ "$1" == "skipped" ]]; then echo "⏭️"; elif [[ "$1" == "cancelled" ]]; then echo "🚫"; else echo "❌"; fi
          }

          echo "## 📋 Action Context" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Action** | \`${{ inputs.action }}\` |" >> $GITHUB_STEP_SUMMARY

          # If configuration ran successfully, we have more info
          if [[ "${{ needs.configuration.result }}" == "success" ]]; then
            echo "| **Environment** | \`${{ inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **Cluster** | \`${{ needs.configuration.outputs.cluster_name }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **Region** | \`${{ needs.configuration.outputs.aws_region }}\` |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🚦 Execution Status" >> $GITHUB_STEP_SUMMARY

          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
