name: "90 🏥 Daily Health Check"

on:
  schedule:
    - cron: "45 8 * * *" # Run at 8:45 AM UTC daily
  workflow_dispatch:
    inputs:
      environment:
        description: "Target Environment"
        type: choice
        options: ["DEV", "STAGE", "PROD"]
        default: "DEV"
        required: true
      cloud_provider:
        description: "Cloud Provider"
        type: choice
        options: ["aws", "gcp", "azure"]
        default: "aws"
        required: true

  workflow_call:
    inputs:
      environment:
        type: string
        default: "DEV"
        required: false
      cloud_provider:
        type: string
        default: "aws"
        required: false
    secrets:
      MONGO_INITDB_ROOT_PASSWORD:
        required: false
      BLAZE_ELASTICSEARCH_USERNAME:
        required: false
      BLAZE_ELASTICSEARCH_PASSWORD:
        required: false
      BLAZE_ELASTICSEARCH_ENDPOINT:
        required: false
      AWS_ROLE_ARN:
        required: false
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        required: false
      GCP_SERVICE_ACCOUNT:
        required: false
      AZURE_CLIENT_ID:
        required: false
      AZURE_TENANT_ID:
        required: false
      AZURE_SUBSCRIPTION_ID:
        required: false
      CLOUDFLARE_API_TOKEN:
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        required: false
      CLOUDFLARE_ZONE_ID:
        required: false
      GH_PAT:
        required: false
      NPM_TOKEN:
        required: false
      INFRACOST_API_KEY:
        required: false
      BLAZE_CONNECTION_STRING:
        required: false
      BLAZE_AUTH_JWT_PRIVATE_KEY:
        required: false
      BLAZE_AUTH_ADMIN_EMAIL:
        required: false
      BLAZE_AUTH_ADMIN_PASSWORD:
        required: false
      BLAZE_FILES_S3_ACCESS_KEY:
        required: false
      BLAZE_FILES_S3_SECRET_ACCESS_KEY:
        required: false
      BLAZE_GRAPHQL_CACHE_SETTINGS:
        required: false
      BLAZE_CLIENT_HEADER:
        required: false
      EC_API_KEY:
        required: false
      MONGODB_ATLAS_PUBLIC_KEY:
        required: false
      MONGODB_ATLAS_PRIVATE_KEY:
        required: false
      MONGODB_ATLAS_ORG_ID:
        required: false
      MONGODB_ATLAS_PROJECT_ID:
        required: false
      ACM_CERTIFICATE_ARN:
        required: false
      BLAZE_SENTRY_AUTH_TOKEN:
        required: false
      BLAZE_SENTRY_DSN:
        required: false
      SLACK_WEBHOOK_URL:
        required: false
      DEPLOY_KEY:
        required: false
permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  health-check-script:
    name: 🩺 System Monitor
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'DEV' }}
    timeout-minutes: 10
    outputs:
      live_summary: ${{ steps.script_run.outputs.live_summary }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.2

      - name: Setup Blaze
        uses: thisisblaze/blaze-actions/.github/actions/setup-blaze@v1.4.18
        with:
          terraform: "true"
          skip-aws-setup: "false" # Needed for Live Checks
          aws-role-arn: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_DEFAULT_REGION || 'eu-west-1' }}

      - name: Configure Git for Private Modules
        env:
          TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            git config --global url."https://${TOKEN}@github.com".insteadOf "https://github.com"
          fi

      # We need Node for the "Code Hygiene" checks (grep .ts files) and maybe npm tests later
      - name: Setup Node.js
        uses: actions/setup-node@b39b52d1213e9600959d8cece19f7e7f8b4aebfd
        with:
          node-version: "20"

      - name: Run System Monitor
        id: script_run
        run: |
          chmod +x scripts/monitor-system.sh
          ./scripts/monitor-system.sh

  # ------------------------------------------------------------------
  # JOB 2: CONFIGURATION (For Matrix)
  # ------------------------------------------------------------------
  configuration:
    name: Configuration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      env_val: ${{ steps.config.outputs.env_val }}
      tf_dir: ${{ steps.config.outputs.tf_dir }}
      bucket: ${{ steps.config.outputs.bucket }}
      state_key: ${{ steps.config.outputs.state_key }}
      lock_table: ${{ steps.config.outputs.lock_table }}
      stage_key: ${{ steps.config.outputs.stage_key }}
      project_key: ${{ steps.config.outputs.project_key }}
      client_key: ${{ steps.config.outputs.client_key }}
      namespace: ${{ steps.config.outputs.namespace }}
      platform: ${{ steps.config.outputs.platform }}
      aws_region: ${{ steps.config.outputs.aws_region }}
      domain_root: ${{ steps.config.outputs.domain_root }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Calculate Configuration
        id: config
        uses: thisisblaze/blaze-actions/.github/actions/calculate-config@v1.4.18
        with:
          environment: "${{ inputs.environment || 'DEV' }}" # Default to DEV for cron
          terraform_stack: "app" # We just need general config
          branch_name: ""
          deploy_infra: "true"
          build_images: "false"
          deploy_services: "false"
          event_name: "workflow_dispatch"

  # ------------------------------------------------------------------
  # JOB 3: DRIFT DETECTION (Prod Network)
  # ------------------------------------------------------------------
  drift-check-network:
    name: 🔍 Drift Check (${{ inputs.environment || 'DEV' }} Network)
    needs: [configuration]
    uses: thisisblaze/blaze-actions/.github/workflows/reusable-terraform.yml@v1.4.18
    with:
      tf_dir: ${{ needs.configuration.outputs.tf_dir }}/../${{ needs.configuration.outputs.stage_key }}-network
      aws_region: ${{ needs.configuration.outputs.aws_region }}
      environment: ${{ inputs.environment || 'DEV' }}
      bucket: ${{ needs.configuration.outputs.bucket }}
      state_key: "infra/${{ needs.configuration.outputs.project_key }}/${{ needs.configuration.outputs.stage_key }}/network.tfstate"
      lock_table: ${{ needs.configuration.outputs.lock_table }}
      terraform_version: "1.14.7"
      apply: false
      detect_drift: true # 👈 Activates Detailed Exitcode
      # Env Vars
      tf_vars: |
        project_key=${{ needs.configuration.outputs.project_key }}
        client_key=${{ needs.configuration.outputs.client_key }}
        namespace=${{ needs.configuration.outputs.namespace }}
        platform=${{ needs.configuration.outputs.platform }}
        aws_region=${{ needs.configuration.outputs.aws_region }}
        domain_root=${{ needs.configuration.outputs.domain_root }}
        stage=${{ needs.configuration.outputs.stage_key }}
        is_beta=false
        nat_strategy="NONE"

    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      GH_PAT: ${{ secrets.GH_PAT }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      MONGODB_ATLAS_PUBLIC_KEY: ${{ secrets.MONGODB_ATLAS_PUBLIC_KEY }}
      MONGODB_ATLAS_PRIVATE_KEY: ${{ secrets.MONGODB_ATLAS_PRIVATE_KEY }}
      MONGODB_ATLAS_PROJECT_ID: ${{ secrets.MONGODB_ATLAS_PROJECT_ID }}
      MONGODB_ATLAS_ORG_ID: ${{ secrets.MONGODB_ATLAS_ORG_ID }}
      EC_API_KEY: ${{ secrets.EC_API_KEY }}
      ACM_CERTIFICATE_ARN: ${{ secrets.ACM_CERTIFICATE_ARN }}

  drift-check-app:
    name: 🔍 Drift Check (${{ inputs.environment || 'DEV' }} App)
    needs: [configuration, drift-check-network] # Sequential better for log reading
    if: always() # Run even if network fails
    uses: thisisblaze/blaze-actions/.github/workflows/reusable-terraform.yml@v1.4.18
    with:
      tf_dir: ${{ needs.configuration.outputs.tf_dir }} # Config already resolves correct App dir and Stage key
      aws_region: ${{ needs.configuration.outputs.aws_region }}
      environment: ${{ inputs.environment || 'DEV' }}
      bucket: ${{ needs.configuration.outputs.bucket }}
      state_key: ${{ needs.configuration.outputs.state_key }} # Config resolves correct state key
      lock_table: ${{ needs.configuration.outputs.lock_table }}
      terraform_version: "1.14.7"
      apply: false
      detect_drift: true
      tf_vars: |
        project_key=${{ needs.configuration.outputs.project_key }}
        client_key=${{ needs.configuration.outputs.client_key }}
        namespace=${{ needs.configuration.outputs.namespace }}
        platform=${{ needs.configuration.outputs.platform }}
        aws_region=${{ needs.configuration.outputs.aws_region }}
        domain_root=${{ needs.configuration.outputs.domain_root }}
        stage=${{ needs.configuration.outputs.stage_key }}
        branch_name=""
        is_beta=false
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      GH_PAT: ${{ secrets.GH_PAT }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      MONGODB_ATLAS_PUBLIC_KEY: ${{ secrets.MONGODB_ATLAS_PUBLIC_KEY }}
      MONGODB_ATLAS_PRIVATE_KEY: ${{ secrets.MONGODB_ATLAS_PRIVATE_KEY }}
      MONGODB_ATLAS_PROJECT_ID: ${{ secrets.MONGODB_ATLAS_PROJECT_ID }}
      MONGODB_ATLAS_ORG_ID: ${{ secrets.MONGODB_ATLAS_ORG_ID }}
      EC_API_KEY: ${{ secrets.EC_API_KEY }}
      ACM_CERTIFICATE_ARN: ${{ secrets.ACM_CERTIFICATE_ARN }}

  # ------------------------------------------------------------------
  # JOB 4: INFRA SECURITY AUDIT (Trivy IAC)
  # ------------------------------------------------------------------
  infra-audit:
    name: 🛡️ Infrastructure Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      vuln_count: ${{ steps.trivy.outputs.vuln_count }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Run Trivy (IAC Mode)
        id: trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: "config"
          scan-ref: "."
          trivy-config: .trivy.yaml
          severity: "CRITICAL,HIGH"
          format: "json"
          output: "trivy-results.json"
          exit-code: "0"

      - name: Parse Trivy Results
        run: |
          ls -la
          # Count Critical/High issues (Fail-safe)
          if [ -f trivy-results.json ]; then
            echo "✅ trivy-results.json found."
            VULN_COUNT=$(jq '[.Results[]?.Misconfigurations[]? | select(.Severity=="CRITICAL" or .Severity=="HIGH")] | length' trivy-results.json || echo "0")
          else
            echo "⚠️ trivy-results.json NOT found."
            VULN_COUNT="0"
          fi
          echo "vuln_count=${VULN_COUNT}" >> $GITHUB_OUTPUT

          # Also Display Table for Logs - scan both AWS and GCP infra dirs
          for dir in .github/aws/infra .github/gcp/infra .github/azure/infra; do
            if [ -d "$dir" ]; then
              echo "🔍 Scanning: $dir"
              trivy config "$dir" --severity CRITICAL,HIGH --format table || true
            fi
          done

  summary:
    name: 📊 Health Report
    needs:
      - health-check-script
      - drift-check-network
      - drift-check-app
      - infra-audit
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Generate Summary
        run: |
          echo "# 🏥 Daily Health Check Report" >> $GITHUB_STEP_SUMMARY
          echo "📅 **Date:** $(date +'%Y-%m-%d')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## 🛡️ Status" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY

          HEALTH="${{ needs.health-check-script.result }}"
          DRIFT_NET="${{ needs.drift-check-network.result }}"
          DRIFT_APP="${{ needs.drift-check-app.result }}"
          AUDIT="${{ needs.infra-audit.result }}"


          # Fetch Details
          NET_SUMMARY="${{ needs.drift-check-network.outputs.plan_summary }}"
          APP_SUMMARY="${{ needs.drift-check-app.outputs.plan_summary }}"
          VULN_COUNT="${{ needs.infra-audit.outputs.vuln_count }}"
          LIVE_METRICS="${{ needs.health-check-script.outputs.live_summary }}"

          # 1. Hygiene Section
          echo "### 🛡️ Code Hygiene" >> $GITHUB_STEP_SUMMARY
          if [[ "$HEALTH" == "success" ]]; then
            echo "- ✅ **Framework Compliance**: Pass" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ **Framework Compliance**: Fail (Check logs)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          # 1.5 Live Metrics (New)
          if [[ -n "$LIVE_METRICS" ]]; then
             echo "### 🩺 Live System Health" >> $GITHUB_STEP_SUMMARY
             echo "$LIVE_METRICS" >> $GITHUB_STEP_SUMMARY
             echo "" >> $GITHUB_STEP_SUMMARY
          fi


          # 2. Infrastructure Drift Section
          echo "### 🏗️ Infrastructure Drift" >> $GITHUB_STEP_SUMMARY
          echo "| Stack | Status | Details |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY

          # Network
          if [[ "$DRIFT_NET" == "success" ]]; then
             echo "| **Network** | ✅ Synced | $NET_SUMMARY |" >> $GITHUB_STEP_SUMMARY
          elif [[ "$DRIFT_NET" == "failure" ]]; then
             echo "| **Network** | ⚠️ **Drift** | $NET_SUMMARY |" >> $GITHUB_STEP_SUMMARY
          else
             echo "| **Network** | ❌ **Error** | Pipeline Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          # App
          if [[ "$DRIFT_APP" == "success" ]]; then
             echo "| **App** | ✅ Synced | $APP_SUMMARY |" >> $GITHUB_STEP_SUMMARY
          elif [[ "$DRIFT_APP" == "failure" ]]; then
             echo "| **App** | ⚠️ **Drift** | $APP_SUMMARY |" >> $GITHUB_STEP_SUMMARY
          else
             echo "| **App** | ❌ **Error** | Pipeline Failed |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          # 3. Security Audit Section
          echo "### 🔒 Security Audit" >> $GITHUB_STEP_SUMMARY
          if [[ "$VULN_COUNT" -eq 0 ]]; then
             echo "- ✅ **Infrastructure**: Secure (0 Critical/High issues)" >> $GITHUB_STEP_SUMMARY
          else
             echo "- ⚠️ **Infrastructure**: **$VULN_COUNT** Critical/High misconfigurations found" >> $GITHUB_STEP_SUMMARY
          fi
