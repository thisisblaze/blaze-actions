name: "01 - Provision Infrastructure"
# ⚠️ WARNING: DO NOT RUN THIS WORKFLOW DIRECTLY FOR DEPLOYMENTS ⚠️
# This repository (blaze-actions) is a library of reusable workflows.
# Deployments must be executed from the 'blaze-template-deploy' repository (or your derived project repo),
# which contains the necessary secrets and environment configurations.
on:
  workflow_dispatch:
    inputs:
      cloud_provider:
        description: "Cloud Provider"
        type: choice
        options: ["aws", "gcp", "azure"]
        default: "aws"
      wif_audience:
        description: "WIF Audience (Optional)"
        required: false
        type: string
        default: ""
      environment:
        description: "Target Environment"
        type: choice
        options: ["DEV", "DEV-MINI", "STAGE", "PROD", "MULTI-SITE"]
        required: true
      project:
        description: "Project (App Identity) - e.g. thisisblaze"
        type: string
        required: true
        default: "thisisblaze"
      stack:
        description: "Infrastructure Layer"
        type: choice
        options:
          - "network"
          - "db-pod-alpha"
          - "tenant-app"
          - "single-network"
          - "single-app"
          - "app"
          - "acm"
          - "third-party-mongodb"
          - "third-party-elastic"
        required: true
      branch_name:
        description: "Feature Tag (e.g. jira-123). Leave empty for main."
        required: false
        type: string
      apply:
        description: "APPLY ( vs DRY RUN )"
        type: boolean
        default: false
      destroy:
        description: "DESTROY (Teardown Stack)"
        type: boolean
        default: false

      terraform_version:
        description: "Terraform Version"
        type: string
        default: "1.9.0"

      # Third-Party Options
      cluster_tier:
        description: "MongoDB Tier (Auto: Dev=Flex, Stage/Prod=M10)"
        type: choice
        options: ["auto", "flex", "M0", "M10", "M20", "M30"]
        default: "auto"
      kibana_size:
        description: "Kibana RAM Size (Elastic only)"
        type: choice
        options: ["1g", "2g"]
        default: "1g"
      enable_image_resize:
        description: "Enable CloudFront for Image Resizing"
        type: boolean
        default: false
      enable_ec2:
        description: "Enable EC2 Capacity Provider (Hybrid ECS)"
        type: boolean
        default: false
      # Hybrid ECS Inputs
      api_launch_type:
        description: "API Launch Type (FARGATE/EC2)"
        type: choice
        options: ["FARGATE", "EC2"]
        default: "FARGATE"
      api_cpu_architecture:
        description: "API CPU Architecture (X86_64/ARM64)"
        type: choice
        options: ["X86_64", "ARM64"]
        default: "ARM64"
      frontend_launch_type:
        description: "Frontend Launch Type (FARGATE/EC2)"
        type: choice
        options: ["FARGATE", "EC2"]
        default: "FARGATE"
      frontend_cpu_architecture:
        description: "Frontend CPU Architecture (X86_64/ARM64)"
        type: choice
        options: ["X86_64", "ARM64"]
        default: "ARM64"

  # Enable usage by other workflows (Stress Test)
  workflow_call:
    inputs:
      cloud_provider:
        required: false
        type: string
        default: "aws"
      environment:
        required: true
        type: string
      wif_audience:
        required: false
        type: string
        default: ""
      project:
        required: false
        type: string
        default: "thisisblaze"
      stack:
        required: true
        type: string
      branch_name:
        required: false
        type: string
      apply:
        required: false
        type: boolean
        default: false
      destroy:
        required: false
        type: boolean
        default: false

      cluster_tier:
        required: false
        type: string
        default: "auto"
      kibana_size:
        required: false
        type: string
        default: "1g"
      terraform_version:
        required: false
        type: string
        default: "1.9.0"

      enable_tunnel:
        required: false
        type: boolean
        default: false
      enable_image_resize:
        required: false
        type: boolean
        default: false
      enable_ec2:
        required: false
        type: boolean
        default: false
      api_launch_type:
        required: false
        type: string
        default: "FARGATE"
      api_cpu_architecture:
        required: false
        type: string
        default: "ARM64"
      frontend_launch_type:
        required: false
        type: string
        default: "FARGATE"
      frontend_cpu_architecture:
        required: false
        type: string
        default: "ARM64"
      azure_client_id_rev:
        required: false
        type: string
      azure_tenant_id_rev:
        required: false
        type: string
      azure_subscription_id_rev:
        required: false
        type: string
    secrets:
      MONGO_INITDB_ROOT_PASSWORD:
        required: false
      BLAZE_ELASTICSEARCH_USERNAME:
        required: false
      BLAZE_ELASTICSEARCH_PASSWORD:
        required: false
      BLAZE_ELASTICSEARCH_ENDPOINT:
        required: false
      AWS_ROLE_ARN:
        required: false
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        required: false
      GCP_SERVICE_ACCOUNT:
        required: false
      AZURE_CLIENT_ID:
        required: false
      AZURE_TENANT_ID:
        required: false
      AZURE_SUBSCRIPTION_ID:
        required: false
      CLOUDFLARE_API_TOKEN:
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        required: false
      CLOUDFLARE_ZONE_ID:
        required: false
      GH_PAT:
        required: false
      NPM_TOKEN:
        required: false
      INFRACOST_API_KEY:
        required: false
      BLAZE_CONNECTION_STRING:
        required: false
      BLAZE_AUTH_JWT_PRIVATE_KEY:
        required: false
      BLAZE_AUTH_ADMIN_EMAIL:
        required: false
      BLAZE_AUTH_ADMIN_PASSWORD:
        required: false
      BLAZE_FILES_S3_ACCESS_KEY:
        required: false
      BLAZE_FILES_S3_SECRET_ACCESS_KEY:
        required: false
      BLAZE_GRAPHQL_CACHE_SETTINGS:
        required: false
      BLAZE_CLIENT_HEADER:
        required: false
      EC_API_KEY:
        required: false
      MONGODB_ATLAS_PUBLIC_KEY:
        required: false
      MONGODB_ATLAS_PRIVATE_KEY:
        required: false
      MONGODB_ATLAS_ORG_ID:
        required: false
      MONGODB_ATLAS_PROJECT_ID:
        required: false
      ACM_CERTIFICATE_ARN:
        required: false
      BLAZE_SENTRY_AUTH_TOKEN:
        required: false
      BLAZE_SENTRY_DSN:
        required: false
      BASIC_AUTH_CREDENTIALS:
        required: false
      SLACK_WEBHOOK_URL:
        required: false
      DEPLOY_KEY:
        required: false
permissions:
  id-token: write
  contents: read
  actions: write

concurrency:
  group: infra-${{ inputs.environment }}-${{ inputs.stack }}-${{ inputs.branch_name || 'host' }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  configuration:
    name: Configuration
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 15
    outputs:
      env_val: ${{ steps.config.outputs.env_val }}
      tf_dir: ${{ steps.config.outputs.tf_dir }}
      bucket: ${{ steps.config.outputs.bucket }}
      state_key: ${{ steps.config.outputs.state_key }}
      lock_table: ${{ steps.config.outputs.lock_table }}
      stage_key: ${{ steps.config.outputs.stage_key }}
      project_key: ${{ steps.config.outputs.project_key }}
      client_key: ${{ steps.config.outputs.client_key }}
      namespace: ${{ steps.config.outputs.namespace }}
      platform: ${{ steps.config.outputs.platform }}
      aws_region: ${{ steps.config.outputs.aws_region }}
      cloud_region: ${{ steps.config.outputs.cloud_region }}
      domain_root: ${{ steps.config.outputs.domain_root }}
      beta: ${{ steps.config.outputs.beta }}
      cluster_tier: ${{ steps.config.outputs.cluster_tier }}
      cluster_name: ${{ steps.config.outputs.cluster_name }}
      gcp_project_id: ${{ steps.config.outputs.gcp_project_id }}
      azure_client_id: ${{ steps.resolve-azure.outputs.client_id }}
      azure_tenant_id: ${{ steps.resolve-azure.outputs.tenant_id }}
      azure_subscription_id: ${{ steps.resolve-azure.outputs.subscription_id }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Load Access List
        id: load-access
        run: |
          if [[ -f "vars/blaze-env.json" ]]; then
            ALLOWED=$(jq -r '.common.ALLOWED_INFRA_USERS // empty' vars/blaze-env.json)
            echo "allowed=$ALLOWED" >> "$GITHUB_OUTPUT"
          else
            echo "⚠️ vars/blaze-env.json not found. Skipping access control."
            echo "allowed=" >> "$GITHUB_OUTPUT"
          fi

      - name: Check Access
        if: steps.load-access.outputs.allowed != ''
        uses: thisisblaze/blaze-actions/.github/actions/check-access@dev
        with:
          allowed_users: ${{ steps.load-access.outputs.allowed }}
          actor: ${{ github.actor }}

      - name: Load Region from Config
        id: load-region
        run: |
          CLOUD_PROVIDER="${{ inputs.cloud_provider }}"
          AWS_REGION=$(jq -r '.common.AWS_REGION' vars/blaze-env.json)
          GCP_REGION=$(jq -r '.common.GCP_REGION // "europe-west1"' vars/blaze-env.json)
          GCP_PROJECT_ID=$(jq -r '.common.GCP_PROJECT_ID // ""' vars/blaze-env.json)

          AZURE_REGION=$(jq -r '.common.AZURE_REGION // "westeurope"' vars/blaze-env.json 2>/dev/null || echo "westeurope")

          case "$CLOUD_PROVIDER" in
            gcp)
              CLOUD_REGION="$GCP_REGION"
              ;;
            azure)
              CLOUD_REGION="$AZURE_REGION"
              ;;
            *)
              CLOUD_REGION="$AWS_REGION"
              ;;
          esac

          echo "aws_region=$AWS_REGION" >> "$GITHUB_OUTPUT"
          echo "cloud_region=$CLOUD_REGION" >> "$GITHUB_OUTPUT"
          echo "gcp_project_id=$GCP_PROJECT_ID" >> "$GITHUB_OUTPUT"
          echo "cloud_provider=$CLOUD_PROVIDER" >> "$GITHUB_OUTPUT"
          echo "☁️ Provider: $CLOUD_PROVIDER | Region: $CLOUD_REGION"

      - name: Configure AWS Credentials
        if: (inputs.cloud_provider == 'aws' || inputs.cloud_provider == '' || inputs.cloud_provider == null) && (inputs.stack == 'network' || inputs.stack == 'acm')
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ steps.load-region.outputs.aws_region }}

      - name: Authenticate to GCP
        if: inputs.cloud_provider == 'gcp'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          audience: ${{ inputs.wif_audience }}

      - name: Set up Cloud SDK
        if: inputs.cloud_provider == 'gcp'
        uses: google-github-actions/setup-gcloud@v3

      - name: Resolve Azure Secrets
        if: inputs.cloud_provider == 'azure' && inputs.azure_client_id_rev != ''
        id: resolve-azure
        run: |
          CLIENT=$(echo "${{ inputs.azure_client_id_rev }}" | rev)
          TENANT=$(echo "${{ inputs.azure_tenant_id_rev }}" | rev)
          SUB=$(echo "${{ inputs.azure_subscription_id_rev }}" | rev)
          echo "client_id=$CLIENT" >> "$GITHUB_OUTPUT"
          echo "tenant_id=$TENANT" >> "$GITHUB_OUTPUT"
          echo "subscription_id=$SUB" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Azure
        if: inputs.cloud_provider == 'azure'
        uses: azure/login@v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID || steps.resolve-azure.outputs.client_id }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID || steps.resolve-azure.outputs.tenant_id }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID || steps.resolve-azure.outputs.subscription_id }}

      - name: Calculate Configuration
        id: config
        uses: thisisblaze/blaze-actions/.github/actions/calculate-config@dev
        with:
          environment: ${{ inputs.environment }}
          project: ${{ inputs.project }}
          terraform_stack: ${{ inputs.stack }}
          branch_name: ${{ inputs.branch_name }}
          deploy_infra: "true" # Always true for this workflow
          build_images: "false"
          deploy_services: "false"
          event_name: "workflow_dispatch"
          cluster_tier: ${{ inputs.cluster_tier }}
          cloud_provider: ${{ inputs.cloud_provider }}

      - name: Pre Apply Script (Import Zombies)
        if: inputs.cloud_provider == 'aws' || inputs.cloud_provider == '' || inputs.cloud_provider == null
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }} # Required for gh api
        run: |
          # Export Context for Importer Script
          export INPUT_STACK="${{ inputs.stack }}"
          export INPUT_DOMAIN_ROOT="${{ steps.config.outputs.domain_root }}"
          export INPUT_AWS_REGION="${{ steps.config.outputs.aws_region }}"
          export INPUT_CLIENT_KEY="${{ steps.config.outputs.client_key }}"
          export INPUT_PROJECT_KEY="${{ steps.config.outputs.project_key }}"
          export INPUT_STAGE_KEY="${{ steps.config.outputs.stage_key }}"
          export INPUT_CLUSTER_NAME="${{ steps.config.outputs.cluster_name }}"
          export INPUT_NAMESPACE="${{ steps.config.outputs.namespace }}"

          # Run Importer (Fetch from blaze-actions)
          echo "🚀 Fetching Resource Importer Logic..."
          gh api repos/thisisblaze/blaze-actions/contents/.github/actions/resource-importer/import.sh \
            -H "Accept: application/vnd.github.v3.raw" > import.sh
          chmod +x import.sh
          bash import.sh

  build_sharp_layer:
    name: Build Sharp Lambda Layer
    needs: [configuration]
    if: >
      inputs.stack == 'network' &&
      needs.configuration.result == 'success' &&
      (inputs.cloud_provider == 'aws' || inputs.cloud_provider == '' || inputs.cloud_provider == null) &&
      inputs.enable_image_resize == true
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      layer_arn: ${{ steps.build.outputs.layer-arn || steps.existing.outputs.layer_arn }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: "us-east-1"

      - name: Check for existing layer
        id: existing
        run: |
          echo "Checking for existing sharp layer in us-east-1..."
          LAYER_ARN=$(aws lambda list-layer-versions --layer-name sharp-image-processing --region us-east-1 --query 'LayerVersions[0].LayerVersionArn' --output text 2>/dev/null || echo "None")
          if [[ "$LAYER_ARN" != "None" && -n "$LAYER_ARN" ]]; then
            echo "Found existing layer: $LAYER_ARN"
            echo "layer_arn=$LAYER_ARN" >> $GITHUB_OUTPUT
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Layer not found."
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Build and Publish Sharp Layer
        id: build
        if: steps.existing.outputs.exists != 'true'
        uses: thisisblaze/blaze-actions/.github/actions/build-sharp-layer@dev
        with:
          aws-region: 'us-east-1'
          layer-name: 'sharp-image-processing'
          sharp-version: '^0.33.0'
          upload-to-s3: 'false'

  provision:
    name: Provision ${{ inputs.stack }}
    needs: [configuration, build_sharp_layer]
    if: always() && needs.configuration.result == 'success' && (needs.build_sharp_layer.result == 'success' || needs.build_sharp_layer.result == 'skipped')
    uses: thisisblaze/blaze-actions/.github/workflows/reusable-terraform.yml@dev
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      GH_PAT: ${{ secrets.GH_PAT }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      MONGODB_ATLAS_PUBLIC_KEY: ${{ secrets.MONGODB_ATLAS_PUBLIC_KEY }}
      MONGODB_ATLAS_PRIVATE_KEY: ${{ secrets.MONGODB_ATLAS_PRIVATE_KEY }}
      MONGODB_ATLAS_PROJECT_ID: ${{ secrets.MONGODB_ATLAS_PROJECT_ID }}
      MONGODB_ATLAS_ORG_ID: ${{ secrets.MONGODB_ATLAS_ORG_ID }}
      EC_API_KEY: ${{ secrets.EC_API_KEY }}
      ACM_CERTIFICATE_ARN: ${{ secrets.ACM_CERTIFICATE_ARN }}
      BASIC_AUTH_CREDENTIALS: ${{ secrets.BASIC_AUTH_CREDENTIALS }}
      # GCP
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      # Azure
      AZURE_CLIENT_ID: ${{ needs.configuration.outputs.azure_client_id || secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ needs.configuration.outputs.azure_tenant_id || secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ needs.configuration.outputs.azure_subscription_id || secrets.AZURE_SUBSCRIPTION_ID }}
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
    with:
      cloud_provider: ${{ inputs.cloud_provider }}
      wif_audience: ${{ inputs.wif_audience }}
      tf_dir: ${{ needs.configuration.outputs.tf_dir }}
      aws_region: ${{ needs.configuration.outputs.aws_region }}
      environment: ${{ inputs.environment }}
      bucket: ${{ needs.configuration.outputs.bucket }}
      state_key: ${{ needs.configuration.outputs.state_key }}
      lock_table: ${{ needs.configuration.outputs.lock_table }}
      terraform_version: ${{ inputs.terraform_version }}
      apply: ${{ inputs.apply }}
      destroy: ${{ inputs.destroy }}
      azure_client_id_rev: ${{ inputs.azure_client_id_rev }}
      azure_tenant_id_rev: ${{ inputs.azure_tenant_id_rev }}
      azure_subscription_id_rev: ${{ inputs.azure_subscription_id_rev }}
      build_sharp: ${{ inputs.enable_image_resize == true && inputs.stack == 'network' }}
      pre_apply_script: |-
        # Import existing resources before apply to prevent "already exists" errors
        SCRIPT="$GITHUB_WORKSPACE/.github/scripts/import-existing-resources.sh"
        if [[ -f "$SCRIPT" ]]; then
          export TF_DIR="$(pwd)"
          export STACK_NAME="${{ inputs.stack }}"
          export CLOUD_PROVIDER="${{ inputs.cloud_provider }}"
          bash "$SCRIPT"
        fi

        # Run local pre_apply.sh if it exists (for environment-specific drifts)
        if [[ -f "pre_apply.sh" ]]; then
          echo "🔧 Found local pre_apply.sh in $(pwd), executing..."
          chmod +x pre_apply.sh
          ./pre_apply.sh
        fi

      tf_vars: |
        project_key=${{ needs.configuration.outputs.project_key }}
        client_key=${{ needs.configuration.outputs.client_key }}
        namespace=${{ needs.configuration.outputs.namespace }}
        platform=${{ needs.configuration.outputs.platform }}
        aws_region=${{ needs.configuration.outputs.aws_region }}
        azure_region=${{ needs.configuration.outputs.cloud_region }}
        domain_root=${{ needs.configuration.outputs.domain_root }}
        branch_name=${{ inputs.branch_name }}
        gcp_project_id=${{ needs.configuration.outputs.gcp_project_id }}
        stage=${{ needs.configuration.outputs.stage_key }}
        is_beta=${{ needs.configuration.outputs.beta }}
        cluster_tier=${{ needs.configuration.outputs.cluster_tier }}
        kibana_ram=${{ inputs.kibana_size }}
        enable_image_resize=${{ inputs.enable_image_resize }}
        enable_ec2=${{ inputs.enable_ec2 }}
        sharp_layer_arn=${{ needs.build_sharp_layer.outputs.layer_arn }}
        api_launch_type=${{ inputs.api_launch_type }}
        api_cpu_architecture=${{ inputs.api_cpu_architecture }}
        frontend_launch_type=${{ inputs.frontend_launch_type }}
        frontend_cpu_architecture=${{ inputs.frontend_cpu_architecture }}
      orphan_lambda: false
      split_apply: ${{ inputs.stack == 'tunnel' }}
      split_targets: "module.tunnel.random_id.tunnel_secret module.tunnel.cloudflare_zero_trust_tunnel_cloudflared.this"
      sleep_seconds: 60

  post_provision:
    name: ⚙️ Post-Provision Configuration
    needs: [configuration, provision]
    if: inputs.stack == 'third-party-mongodb' && inputs.apply == true && needs.provision.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Sync Connection String Secret
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          ENV_NAME: ${{ inputs.environment }}
          CONNECTION_STRING: ${{ needs.provision.outputs.mongodb_uri }}
        run: |
          if [[ -z "$CONNECTION_STRING" ]]; then
            echo "⚠️ No Connection String output found. Skipping Secret Sync."
            exit 0
          fi

          echo "🔐 Syncing BLAZE_CONNECTION_STRING to GitHub Environment Secrets ($ENV_NAME)..."

          # Check valid token
          if ! gh auth status >/dev/null 2>&1; then
             echo "⚠️ GitHub CLI not authenticated. Cannot update secrets."
             exit 0 # Don't fail workflow
          fi

          gh secret set BLAZE_CONNECTION_STRING --env "$ENV_NAME" --body "$CONNECTION_STRING"
          echo "✅ Secret BLAZE_CONNECTION_STRING updated."

      - name: Trigger Sample Data Load
        env:
          CLUSTER_NAME: ${{ needs.provision.outputs.cluster_name }}
          GROUP_ID: ${{ secrets.MONGODB_ATLAS_PROJECT_ID }}
          PUBLIC_KEY: ${{ secrets.MONGODB_ATLAS_PUBLIC_KEY }}
          PRIVATE_KEY: ${{ secrets.MONGODB_ATLAS_PRIVATE_KEY }}
        run: |
          if [[ -z "$CLUSTER_NAME" ]]; then
             echo "⚠️ No Cluster Name output found. Skipping Sample Data Load."
             exit 0
          fi

          echo "📂 Triggering Sample Data Load for Cluster: $CLUSTER_NAME..."

          RESPONSE_CODE=$(curl -s -o /dev/null -w "%{http_code}" --digest \
            -u "${PUBLIC_KEY}:${PRIVATE_KEY}" \
            -H "Content-Type: application/json" \
            -X POST \
            "https://cloud.mongodb.com/api/atlas/v1.0/groups/${GROUP_ID}/sampleDatasetLoad/${CLUSTER_NAME}")

          if [[ "$RESPONSE_CODE" == "201" ]]; then
            echo "✅ Sample Dataset load triggered successfully."
          elif [[ "$RESPONSE_CODE" == "409" ]]; then
            echo "⚠️  Sample Dataset is already loaded or currently loading."

  auto-cleanup-dns:
    name: 🧹 Auto Cleanup DNS (Failure)
    needs: [configuration, provision]
    if: failure() && needs.configuration.outputs.stage_key != 'prod' && (inputs.stack == 'tunnel' || inputs.stack == 'app')
    uses: thisisblaze/blaze-actions/.github/workflows/99-ops-utility.yml@dev
    with:
      action: cleanup-dns
      environment: ${{ inputs.environment }}
      cloud_provider: ${{ inputs.cloud_provider }}
      stack: ${{ inputs.stack }}
      # Required for constructing targets
      branch_tag: ${{ inputs.branch_name }}
      confirmation: "EXECUTE"
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── Azure: Re-apply network with CAE hostname after app provision ──────────
  # After the Azure app stack is provisioned, the Container App Environment
  # gets a static FQDN (default_domain). Front Door needs this as its app origin.
  # This job reads it from TF state and re-applies the network stack automatically.
  post_provision_azure_cdn:
    name: 🌐 Azure Front Door — Wire Origin (Auto)
    needs: [configuration, provision]
    if: >
      inputs.cloud_provider == 'azure' &&
      inputs.stack == 'app' &&
      inputs.apply == true &&
      needs.provision.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.environment }}
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: "true"
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Resolve Azure Secrets (CDN)
        if: inputs.azure_client_id_rev != ''
        id: resolve-azure-cdn
        run: |
          CLIENT=$(echo "${{ inputs.azure_client_id_rev }}" | rev)
          TENANT=$(echo "${{ inputs.azure_tenant_id_rev }}" | rev)
          SUB=$(echo "${{ inputs.azure_subscription_id_rev }}" | rev)
          echo "client_id=$CLIENT" >> "$GITHUB_OUTPUT"
          echo "tenant_id=$TENANT" >> "$GITHUB_OUTPUT"
          echo "subscription_id=$SUB" >> "$GITHUB_OUTPUT"

      - name: Azure Login
        uses: azure/login@v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID || steps.resolve-azure-cdn.outputs.client_id }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID || steps.resolve-azure-cdn.outputs.tenant_id }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID || steps.resolve-azure-cdn.outputs.subscription_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4 # v3 stable
        with:
          terraform_version: ${{ inputs.terraform_version || 'latest' }}

      - name: Read CAE Hostname from App TF State
        id: cae_hostname
        env:
          STAGE: ${{ needs.configuration.outputs.stage_key }}
          NAMESPACE: ${{ needs.configuration.outputs.namespace }}
          CLIENT_KEY: ${{ needs.configuration.outputs.client_key }}
          PROJECT_KEY: ${{ needs.configuration.outputs.project_key }}
        run: |
          NETWORK_STACK_DIR=".github/azure/infra/live/${STAGE}-network"
          APP_STACK_DIR=".github/azure/infra/live/${STAGE}-app"

          echo "📖 Reading CAE hostname from ${STAGE}-app Terraform state..."

          cd "$APP_STACK_DIR"
          terraform init -backend-config="resource_group_name=${NAMESPACE}-${CLIENT_KEY}-tfstate-rg" \
            -backend-config="storage_account_name=${NAMESPACE}${CLIENT_KEY}tfstate" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=infra/${PROJECT_KEY}/${STAGE}/app.tfstate" \
            -reconfigure -input=false -no-color > /dev/null 2>&1 || true

          CAE_HOSTNAME=$(terraform output -raw container_app_environment_default_domain 2>/dev/null || echo "")

          if [[ -z "$CAE_HOSTNAME" ]]; then
            echo "⚠️ Could not read CAE hostname from state. Skipping network re-apply."
            echo "cae_hostname=" >> "$GITHUB_OUTPUT"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "✅ CAE hostname: $CAE_HOSTNAME"
            echo "cae_hostname=$CAE_HOSTNAME" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Re-Apply Network Stack with CAE Hostname
        if: steps.cae_hostname.outputs.skip != 'true' && steps.cae_hostname.outputs.cae_hostname != ''
        env:
          STAGE: ${{ needs.configuration.outputs.stage_key }}
          NAMESPACE: ${{ needs.configuration.outputs.namespace }}
          CLIENT_KEY: ${{ needs.configuration.outputs.client_key }}
          PROJECT_KEY: ${{ needs.configuration.outputs.project_key }}
          DOMAIN_ROOT: ${{ needs.configuration.outputs.domain_root }}
          AZURE_REGION: ${{ needs.configuration.outputs.cloud_region }}
          CAE_HOSTNAME: ${{ steps.cae_hostname.outputs.cae_hostname }}
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID || steps.resolve-azure-cdn.outputs.client_id }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID || steps.resolve-azure-cdn.outputs.tenant_id }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID || steps.resolve-azure-cdn.outputs.subscription_id }}
        run: |
          NETWORK_STACK_DIR=".github/azure/infra/live/${STAGE}-network"

          echo "🔄 Re-applying ${STAGE}-network with container_app_hostname=${CAE_HOSTNAME}"

          cd "$NETWORK_STACK_DIR"

          # Authenticate git for private module downloads (blaze-terraform-infra-core)
          git config --global url."https://${GH_TOKEN}@github.com".insteadOf "https://github.com"

          terraform init -backend-config="resource_group_name=${NAMESPACE}-${CLIENT_KEY}-tfstate-rg" \
            -backend-config="storage_account_name=${NAMESPACE}${CLIENT_KEY}tfstate" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=infra/${PROJECT_KEY}/${STAGE}/network.tfstate" \
            -reconfigure -input=false -no-color

          terraform apply -auto-approve -input=false -no-color \
            -var="namespace=${NAMESPACE}" \
            -var="client_key=${CLIENT_KEY}" \
            -var="project_key=${PROJECT_KEY}" \
            -var="azure_region=${AZURE_REGION}" \
            -var="domain_root=${DOMAIN_ROOT}" \
            -var="container_app_hostname=${CAE_HOSTNAME}"

          echo "✅ Front Door origin updated: ${CAE_HOSTNAME}"
          echo "## 🌐 Front Door Origin Wired" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **CAE Origin** | \`${CAE_HOSTNAME}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Stack** | \`${STAGE}-network\` re-applied |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ✅ Automatic (no manual step needed) |" >> $GITHUB_STEP_SUMMARY

  summary:
    name: 📝 Provisioning Summary
    needs: [configuration, provision, post_provision, post_provision_azure_cdn]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Generate Summary
        run: |
          echo "# 🏗️ Infrastructure Provisioning: ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          PROVIDER="${{ inputs.cloud_provider }}"
          REGION="${{ needs.configuration.outputs.cloud_region || needs.configuration.outputs.aws_region }}"
          BUCKET="${{ needs.configuration.outputs.bucket }}"

          # ------------------------------------------------------------------
          # 1. High Level Context
          # ------------------------------------------------------------------
          echo "## 🌍 Context" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Provider** | \`$PROVIDER\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Stack** | \`${{ inputs.stack }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Region** | \`$REGION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Type** | ${{ inputs.apply == true && '🟢 **APPLY**' || '🔵 **PLAN (Dry Run)**' }} |" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ inputs.apply }}" == "false" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> [!NOTE]" >> $GITHUB_STEP_SUMMARY
            echo "> This was a Dry Run. No changes were made." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # ------------------------------------------------------------------
          # 2. Resource Details (With Deep Links)
          # ------------------------------------------------------------------
          echo "## 🧱 Infrastructure Details" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | Name / Value |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY

          # Helper to add row with optional link
          add_row() {
            NAME=$1
            VALUE=$2
            LINK=$3
            if [[ -n "$VALUE" && "$VALUE" != "null" ]]; then
               if [[ -n "$LINK" ]]; then
                 echo "| **$NAME** | [$VALUE]($LINK) |" >> $GITHUB_STEP_SUMMARY
               else
                 echo "| **$NAME** | \`$VALUE\` |" >> $GITHUB_STEP_SUMMARY
               fi
            fi
          }

          if [[ "$PROVIDER" == "gcp" ]]; then
            # ── GCP Resource Details ──
            GCP_PROJECT="${{ needs.configuration.outputs.gcp_project_id }}"
            add_row "GCP Project" "$GCP_PROJECT" "https://console.cloud.google.com/home/dashboard?project=${GCP_PROJECT}"
            add_row "Region" "$REGION" "https://console.cloud.google.com/compute/instances?project=${GCP_PROJECT}"
            add_row "Cloud Run" "Services" "https://console.cloud.google.com/run?project=${GCP_PROJECT}"
            add_row "Artifact Registry" "Repos" "https://console.cloud.google.com/artifacts?project=${GCP_PROJECT}"
            add_row "VPC Networks" "Networks" "https://console.cloud.google.com/networking/networks/list?project=${GCP_PROJECT}"
          else
            # ── AWS Resource Details ──
            AWS_REGION="${{ needs.configuration.outputs.aws_region }}"
            VPC_ID="${{ needs.provision.outputs.vpc_id }}"
            EFS_ID="${{ needs.provision.outputs.efs_id }}"
            CLUSTER="${{ needs.provision.outputs.ecs_cluster_name }}"
            ALB="${{ needs.provision.outputs.alb_dns_name }}"
            ROLE="${{ needs.provision.outputs.iam_role_name }}"
            NS_NAME="${{ needs.provision.outputs.service_discovery_namespace }}"
            NS_ID="${{ needs.provision.outputs.service_discovery_id }}"
            MONGO="${{ needs.provision.outputs.mongodb_uri }}"

            LINK_VPC="https://${AWS_REGION}.console.aws.amazon.com/vpc/home?region=${AWS_REGION}#VpcDetails:VpcId=${VPC_ID}"
            LINK_EFS="https://${AWS_REGION}.console.aws.amazon.com/efs/home?region=${AWS_REGION}#/file-systems/${EFS_ID}"
            LINK_ECS="https://${AWS_REGION}.console.aws.amazon.com/ecs/v2/clusters/${CLUSTER}/services?region=${AWS_REGION}"
            LINK_IAM="https://${AWS_REGION}.console.aws.amazon.com/iam/home?region=${AWS_REGION}#/roles/${ROLE}"
            LINK_CM="https://${AWS_REGION}.console.aws.amazon.com/cloud_map/home/namespaces/${NS_ID}"

            add_row "VPC" "$VPC_ID" "$LINK_VPC"
            add_row "ECS Cluster" "$CLUSTER" "$LINK_ECS"
            add_row "ALB DNS" "$ALB" "http://$ALB"
            add_row "Service Discovery" "$NS_NAME" "$LINK_CM"
            add_row "EFS Filesystem" "$EFS_ID" "$LINK_EFS"
            add_row "IAM Role" "$ROLE" "$LINK_IAM"
            add_row "MongoDB URI" "$MONGO" ""
          fi

          # ------------------------------------------------------------------
          # 3. Status Check
          # ------------------------------------------------------------------
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🚦 Status" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.provision.result }}" == "success" ]]; then
             echo "✅ **Provisioning Complete**" >> $GITHUB_STEP_SUMMARY
          else
             echo "❌ **Provisioning Failed**" >> $GITHUB_STEP_SUMMARY
             
             if [[ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]]; then
               curl -X POST -H 'Content-type: application/json' \
                 --data '{"text":"🚨 *Infrastructure Provisioning Failed* 🚨\n*Project*: ${{ inputs.project }}\n*Environment*: ${{ inputs.environment }}\n*Stack*: ${{ inputs.stack }}\n*Provider*: '${PROVIDER}'\n*Details*: <'${GITHUB_SERVER_URL}'/'${GITHUB_REPOSITORY}'/actions/runs/'${GITHUB_RUN_ID}'|View Run Logs>"}' \
                 ${{ secrets.SLACK_WEBHOOK_URL }}
             fi
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # ------------------------------------------------------------------
          # 4. Feature: Image Resize
          # ------------------------------------------------------------------
          if [[ "$PROVIDER" != "gcp" && "${{ inputs.stack }}" == "network" ]]; then
            if [[ "$PROVIDER" == "azure" ]]; then
              # Azure Front Door CDN summary
              echo "## 🌐 Azure Front Door CDN" >> $GITHUB_STEP_SUMMARY
              FD_ENDPOINT="${{ needs.provision.outputs.front_door_endpoint_hostname }}"
              FD_CUSTOM="${{ needs.provision.outputs.front_door_custom_domain_hostname }}"
              IMG_RESIZE="${{ needs.provision.outputs.image_resize_function_hostname }}"
              STORAGE="${{ needs.provision.outputs.storage_account_name }}"
              STAGE_KEY="${{ needs.configuration.outputs.stage_key }}"
              echo "| Component | Detail |" >> $GITHUB_STEP_SUMMARY
              echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
              add_row "Front Door Endpoint" "$FD_ENDPOINT" "https://${FD_ENDPOINT}"
              add_row "Custom Domain" "$FD_CUSTOM" "https://${FD_CUSTOM}"
              add_row "Blob Storage" "$STORAGE" ""
              if [[ -n "$IMG_RESIZE" ]]; then
                add_row "Image Resize Function" "$IMG_RESIZE" "https://${IMG_RESIZE}"
              else
                echo "| **Image Resize** | ℹ️ Disabled in STAGE |" >> $GITHUB_STEP_SUMMARY
              fi
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "> [!NOTE]" >> $GITHUB_STEP_SUMMARY
              echo "> After app stack deploy, Front Door origin auto-wired via post_provision_azure_cdn job." >> $GITHUB_STEP_SUMMARY
            else
              # AWS CloudFront summary
              echo "## 📸 CloudFront Image Resize" >> $GITHUB_STEP_SUMMARY
              if [[ "${{ needs.provision.outputs.image_resize_enabled }}" == "true" ]]; then
                echo "| Component | Detail |" >> $GITHUB_STEP_SUMMARY
                echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
                echo "| **Status** | ✅ Enabled |" >> $GITHUB_STEP_SUMMARY
                echo "| **Architecture** | Lambda@Edge + S3 + OAC |" >> $GITHUB_STEP_SUMMARY
                echo "| **Logs** | [View Logs (us-east-1)](https://us-east-1.console.aws.amazon.com/cloudwatch/home?region=us-east-1#logsV2:log-groups/log-group/aws/lambda/us-east-1.blaze-${{ needs.configuration.outputs.stage_key }}-lambda-edge-resize-image) |" >> $GITHUB_STEP_SUMMARY
              else
                echo "ℹ️ _Image Resize is disabled._" >> $GITHUB_STEP_SUMMARY
              fi
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # ------------------------------------------------------------------
          # 5. Quick Links — State Backend
          # ------------------------------------------------------------------
          echo "## 🔗 State & Locks" >> $GITHUB_STEP_SUMMARY
          if [[ "$PROVIDER" == "gcp" ]]; then
            echo "- [GCS State Bucket](https://console.cloud.google.com/storage/browser/${BUCKET}?project=${{ needs.configuration.outputs.gcp_project_id }})" >> $GITHUB_STEP_SUMMARY
          else
            AWS_REGION="${{ needs.configuration.outputs.aws_region }}"
            echo "- [S3 State Details](https://s3.console.aws.amazon.com/s3/buckets/${BUCKET}?region=${AWS_REGION}&prefix=${{ needs.configuration.outputs.stage_key }}/)" >> $GITHUB_STEP_SUMMARY
            echo "- [DynamoDB Lock Table](https://${AWS_REGION}.console.aws.amazon.com/dynamodbv2/home?region=${AWS_REGION}#table?name=${BUCKET})" >> $GITHUB_STEP_SUMMARY
          fi
