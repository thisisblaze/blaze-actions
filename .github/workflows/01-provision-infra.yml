name: "01 - Provision Infrastructure"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target Environment"
        type: choice
        options: ["DEV", "STAGE", "PROD"]
        required: true
      project:
        description: "Project (App Identity) - e.g. thisisblaze"
        type: string
        required: true
        default: "thisisblaze"
      stack:
        description: "Infrastructure Layer"
        type: choice
        options:
          - "network"
          - "acm"
          - "tunnel"
          - "app"
          - "third-party-mongodb"
          - "third-party-elastic"
        required: true
      branch_name:
        description: "Feature Tag (e.g. jira-123). Leave empty for main."
        required: false
        type: string
      apply:
        description: "APPLY ( vs DRY RUN )"
        type: boolean
        default: false

      terraform_version:
        description: "Terraform Version"
        type: string
        default: "1.9.0"

      # Third-Party Options
      cluster_tier:
        description: "MongoDB Tier (flex, M10, M20, M30)"
        type: choice
        options: ["flex", "M10", "M20", "M30"]
        default: "M10"
      kibana_size:
        description: "Kibana RAM Size (Elastic only)"
        type: choice
        options: ["1g", "2g"]
        default: "1g"
      is_paused:
        description: "Pause MongoDB Cluster? (MongoDB only)"
        type: boolean
        default: false
      enable_image_resize:
        description: "Enable CloudFront for Image Resizing"
        type: boolean
        default: false

  # Enable usage by other workflows (Stress Test)
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      project:
        required: false
        type: string
        default: "thisisblaze"
      stack:
        required: true
        type: string
      branch_name:
        required: false
        type: string
      apply:
        required: false
        type: boolean
        default: false

      cluster_tier:
        required: false
        type: string
        default: "auto"
      kibana_size:
        required: false
        type: string
        default: "1g"
      is_paused:
        required: false
        type: boolean
        default: false
      terraform_version:
        required: false
        type: string
        default: "1.9.0"

      enable_tunnel:
        required: false
        type: boolean
        default: false
      enable_image_resize:
        required: false
        type: boolean
        default: false
    secrets:
      AWS_ROLE_ARN:
        required: false
        description: "AWS IAM Role ARN for OIDC authentication"
      GH_PAT:
        required: false
        description: "Personal Access Token for Cross-Repo Access"
      CLOUDFLARE_API_TOKEN:
        required: false
        description: "Cloudflare API Token"
      CLOUDFLARE_ZONE_ID:
        required: false
        description: "Cloudflare Zone ID"
      CLOUDFLARE_ACCOUNT_ID:
        required: false
        description: "Cloudflare Account ID"
      MONGODB_ATLAS_PUBLIC_KEY:
        required: false
        description: "MongoDB Atlas Public Key"
      MONGODB_ATLAS_PRIVATE_KEY:
        required: false
        description: "MongoDB Atlas Private Key"
      MONGODB_ATLAS_PROJECT_ID:
        required: false
        description: "MongoDB Atlas Project ID"
      MONGODB_ATLAS_ORG_ID:
        required: false
        description: "MongoDB Atlas Organization ID"
      EC_API_KEY:
        required: false
        description: "Elastic Cloud API Key"
      ACM_CERTIFICATE_ARN:
        required: false
        description: "ACM Certificate ARN (for CloudFront/ALB)"

permissions:
  id-token: write
  contents: read

concurrency:
  group: infra-${{ inputs.environment }}-${{ inputs.stack }}-${{ inputs.branch_name || 'host' }}
  cancel-in-progress: false

jobs:
  configuration:
    name: Configuration
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 15
    outputs:
      env_val: ${{ steps.config.outputs.env_val }}
      tf_dir: ${{ steps.config.outputs.tf_dir }}
      bucket: ${{ steps.config.outputs.bucket }}
      state_key: ${{ steps.config.outputs.state_key }}
      lock_table: ${{ steps.config.outputs.lock_table }}
      stage_key: ${{ steps.config.outputs.stage_key }}
      project_key: ${{ steps.config.outputs.project_key }}
      client_key: ${{ steps.config.outputs.client_key }}
      namespace: ${{ steps.config.outputs.namespace }}
      platform: ${{ steps.config.outputs.platform }}
      aws_region: ${{ steps.config.outputs.aws_region }}
      domain_root: ${{ steps.config.outputs.domain_root }}
      beta: ${{ steps.config.outputs.beta }}
      cluster_tier: ${{ steps.config.outputs.cluster_tier }}
      cluster_name: ${{ steps.config.outputs.cluster_name }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_DEFAULT_REGION || 'eu-west-1' }} # Dynamic with fallback

      - name: Calculate Configuration
        id: config
        uses: thisisblaze/blaze-actions/.github/actions/calculate-config@dev
        with:
          environment: ${{ inputs.environment }}
          project: ${{ inputs.project }}
          terraform_stack: ${{ inputs.stack }}
          branch_name: ${{ inputs.branch_name }}
          deploy_infra: "true" # Always true for this workflow
          build_images: "false"
          deploy_services: "false"
          event_name: "workflow_dispatch"
          cluster_tier: ${{ inputs.cluster_tier }}

      - name: Pre Apply Script (Import Zombies)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }} # Required for gh api
        run: |
          # Export Context for Importer Script
          export INPUT_STACK="${{ inputs.stack }}"
          export INPUT_DOMAIN_ROOT="${{ needs.configuration.outputs.domain_root }}"
          export INPUT_AWS_REGION="${{ needs.configuration.outputs.aws_region }}"
          export INPUT_CLIENT_KEY="${{ needs.configuration.outputs.client_key }}"
          export INPUT_PROJECT_KEY="${{ needs.configuration.outputs.project_key }}"
          export INPUT_STAGE_KEY="${{ needs.configuration.outputs.stage_key }}"
          export INPUT_CLUSTER_NAME="${{ needs.configuration.outputs.cluster_name }}"
          export INPUT_NAMESPACE="${{ needs.configuration.outputs.namespace }}"

          # Run Importer (Fetch from blaze-actions)
          echo "🚀 Fetching Resource Importer Logic..."
          gh api repos/thisisblaze/blaze-actions/contents/.github/actions/resource-importer/import.sh \
            -H "Accept: application/vnd.github.v3.raw" > import.sh
          chmod +x import.sh
          bash import.sh

  provision:
    name: Provision ${{ inputs.stack }}
    needs: [configuration]
    if: needs.configuration.result == 'success'
    uses: ./.github/workflows/reusable-terraform.yml
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      GH_PAT: ${{ secrets.GH_PAT }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      MONGODB_ATLAS_PUBLIC_KEY: ${{ secrets.MONGODB_ATLAS_PUBLIC_KEY }}
      MONGODB_ATLAS_PRIVATE_KEY: ${{ secrets.MONGODB_ATLAS_PRIVATE_KEY }}
      MONGODB_ATLAS_PROJECT_ID: ${{ secrets.MONGODB_ATLAS_PROJECT_ID }}
      MONGODB_ATLAS_ORG_ID: ${{ secrets.MONGODB_ATLAS_ORG_ID }}
      EC_API_KEY: ${{ secrets.EC_API_KEY }}
      ACM_CERTIFICATE_ARN: ${{ secrets.ACM_CERTIFICATE_ARN }}
    with:
      tf_dir: ${{ needs.configuration.outputs.tf_dir }}
      aws_region: ${{ needs.configuration.outputs.aws_region }}
      environment: ${{ inputs.environment }}
      bucket: ${{ needs.configuration.outputs.bucket }}
      state_key: ${{ needs.configuration.outputs.state_key }}
      lock_table: ${{ needs.configuration.outputs.lock_table }}
      terraform_version: ${{ inputs.terraform_version }}
      apply: ${{ inputs.apply }}
      destroy: false
      pre_apply_script: "if [[ -f import-existing-resources.sh ]]; then chmod +x import-existing-resources.sh && ./import-existing-resources.sh; fi"
      tf_vars: |
        project_key=${{ needs.configuration.outputs.project_key }}
        client_key=${{ needs.configuration.outputs.client_key }}
        namespace=${{ needs.configuration.outputs.namespace }}
        platform=${{ needs.configuration.outputs.platform }}
        aws_region=${{ needs.configuration.outputs.aws_region }}
        domain_root=${{ needs.configuration.outputs.domain_root }}
        branch_name=${{ inputs.branch_name }}
        stage=${{ needs.configuration.outputs.stage_key }}
        is_beta=${{ needs.configuration.outputs.beta }}
        cluster_tier=${{ needs.configuration.outputs.cluster_tier }}
        kibana_ram=${{ inputs.kibana_size }}
        is_paused=${{ inputs.is_paused }}
        enable_image_resize=${{ inputs.enable_image_resize }}
      orphan_lambda: false

  post_provision:
    name: ⚙️ Post-Provision Configuration
    needs: [configuration, provision]
    if: inputs.stack == 'third-party-mongodb' && inputs.apply == true && needs.provision.result == 'success'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Sync Connection String Secret
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          ENV_NAME: ${{ inputs.environment }}
          CONNECTION_STRING: ${{ needs.provision.outputs.mongodb_uri }}
        run: |
          if [[ -z "$CONNECTION_STRING" ]]; then
            echo "⚠️ No Connection String output found. Skipping Secret Sync."
            exit 0
          fi

          echo "🔐 Syncing BLAZE_CONNECTION_STRING to GitHub Environment Secrets ($ENV_NAME)..."

          # Check valid token
          if ! gh auth status >/dev/null 2>&1; then
             echo "⚠️ GitHub CLI not authenticated. Cannot update secrets."
             exit 0 # Don't fail workflow
          fi

          gh secret set BLAZE_CONNECTION_STRING --env "$ENV_NAME" --body "$CONNECTION_STRING"
          echo "✅ Secret BLAZE_CONNECTION_STRING updated."

      - name: Trigger Sample Data Load
        env:
          CLUSTER_NAME: ${{ needs.provision.outputs.cluster_name }}
          GROUP_ID: ${{ secrets.MONGODB_ATLAS_PROJECT_ID }}
          PUBLIC_KEY: ${{ secrets.MONGODB_ATLAS_PUBLIC_KEY }}
          PRIVATE_KEY: ${{ secrets.MONGODB_ATLAS_PRIVATE_KEY }}
        run: |
          if [[ -z "$CLUSTER_NAME" ]]; then
             echo "⚠️ No Cluster Name output found. Skipping Sample Data Load."
             exit 0
          fi

          echo "📂 Triggering Sample Data Load for Cluster: $CLUSTER_NAME..."

          RESPONSE_CODE=$(curl -s -o /dev/null -w "%{http_code}" --digest \
            -u "${PUBLIC_KEY}:${PRIVATE_KEY}" \
            -H "Content-Type: application/json" \
            -X POST \
            "https://cloud.mongodb.com/api/atlas/v1.0/groups/${GROUP_ID}/sampleDatasetLoad/${CLUSTER_NAME}")

          if [[ "$RESPONSE_CODE" == "201" ]]; then
            echo "✅ Sample Dataset load triggered successfully."
          elif [[ "$RESPONSE_CODE" == "409" ]]; then
            echo "⚠️  Sample Dataset is already loaded or currently loading."
          else
            echo "❌ Failed to trigger Sample Dataset load (HTTP $RESPONSE_CODE)."
            # Optional step, do not fail workflow
          fi

  summary:
    name: 📝 Provisioning Summary
    needs: [configuration, provision, post_provision]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate Summary
        run: |
          echo "# 🏗️ Infrastructure Provisioning: ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## 🌍 Impact Analysis" >> $GITHUB_STEP_SUMMARY
          echo "| Context | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Stack** | \`${{ inputs.stack }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Apply?** | \`${{ inputs.apply }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Stage** | \`${{ needs.configuration.outputs.stage_key }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Region** | \`${{ needs.configuration.outputs.aws_region }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **TfState Key** | \`${{ needs.configuration.outputs.state_key }}\` |" >> $GITHUB_STEP_SUMMARY


          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🧱 Infrastructure Details" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | Name / Value |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY

          # Helper function to add row if value exists
          add_row() {
            NAME=$1
            VALUE=$2
            if [[ -n "$VALUE" && "$VALUE" != "null" ]]; then
               echo "| **$NAME** | \`$VALUE\` |" >> $GITHUB_STEP_SUMMARY
            fi
          }

          add_row "ALB DNS" "${{ needs.provision.outputs.alb_dns_name }}"
          add_row "ECS Cluster" "${{ needs.provision.outputs.ecs_cluster_name }}"
          add_row "IAM Role" "${{ needs.provision.outputs.iam_role_name }}"
          add_row "Service Discovery" "${{ needs.provision.outputs.service_discovery_namespace }}"
          add_row "Log Group" "${{ needs.provision.outputs.log_group_name }}"
          add_row "MongoDB URI" "${{ needs.provision.outputs.mongodb_uri }}"

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🚦 Status" >> $GITHUB_STEP_SUMMARY

          RES="${{ needs.provision.result }}"
          IS_APPLY="${{ inputs.apply }}"

          if [[ "$RES" == "success" ]]; then
            if [[ "$IS_APPLY" == "true" ]]; then
              echo "✅ **Provisioning Successful**" >> $GITHUB_STEP_SUMMARY
            else
              echo "✅ **Plan Successful (Dry Run)**" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "> [!IMPORTANT]" >> $GITHUB_STEP_SUMMARY
              echo "> Terraform Apply was NOT run. Changes were NOT applied. To apply these changes, re-run the workflow with **Run Terraform Apply?** checked." >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "❌ **Provisioning Failed**" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # Add CloudFront Image Resize details for network stack
          # Add CloudFront Image Resize details for network stack
          if [[ "${{ inputs.stack }}" == "network" ]]; then
            echo "## 📸 CloudFront Image Resize" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Component | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
            
            if [[ "${{ inputs.enable_image_resize }}" == "true" ]]; then
              echo "| **Status** | ✅ Enabled |" >> $GITHUB_STEP_SUMMARY
              echo "| **Architecture** | Lambda@Edge (Origin Response) + OAC |" >> $GITHUB_STEP_SUMMARY
              echo "| **Functions** | • \`viewer-request\` (URL Normalizer)<br>• \`origin-response\` (Image Processor) |" >> $GITHUB_STEP_SUMMARY
              echo "| **Logs** | \`/aws/lambda/us-east-1.blaze-${{ needs.configuration.outputs.stage_key }}-lambda-edge-resize-image\` |" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "> **Usage**: Access resized images via CloudFront CDN:" >> $GITHUB_STEP_SUMMARY
              echo "> \`https://cdn-${{ needs.configuration.outputs.stage_key }}.yourdomain.com/convert/path/to/image.jpg?w=400\`" >> $GITHUB_STEP_SUMMARY
              echo "> - Width only: \`?w=800\`" >> $GITHUB_STEP_SUMMARY
              echo "> - Width x Height: \`?w=800&h=600\`" >> $GITHUB_STEP_SUMMARY
            else
              echo "| **Status** | ⚪ Disabled |" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          echo "## 🔗 Quick Links" >> $GITHUB_STEP_SUMMARY
          REGION="${{ needs.configuration.outputs.aws_region }}"
          BUCKET="${{ needs.configuration.outputs.bucket }}"

          echo "- [S3 State Bucket](https://s3.console.aws.amazon.com/s3/buckets/${BUCKET}?region=${REGION})" >> $GITHUB_STEP_SUMMARY
          echo "- [DynamoDB Lock Table](https://${REGION}.console.aws.amazon.com/dynamodbv2/home?region=${REGION}#table?name=${BUCKET})" >> $GITHUB_STEP_SUMMARY
