name: "Reusable Azure Container App Deploy"

on:
    workflow_call:
        inputs:
            service_name:
                required: true
                type: string
                description: "Service to deploy (e.g., api, frontend)"
            environment:
                required: true
                type: string
            stage_key:
                required: true
                type: string
            branch_name:
                required: false
                type: string
            image_tag:
                required: true
                type: string
            project_key:
                required: true
                type: string
            client_key:
                required: true
                type: string
            domain_root:
                required: true
                type: string
            azure_region:
                required: true
                type: string
            namespace:
                required: false
                type: string
                default: "blaze"
            # Azure Container Registry input
            azure_registry_server:
                required: true
                type: string
                description: "ACR Login Server (e.g., blaze.azurecr.io)"
            # Container App resources
            cpu:
                required: false
                type: string
                default: "1.0"
            memory:
                required: false
                type: string
                default: "2.0Gi"
            min_replicas:
                required: false
                type: number
                default: 1
            max_replicas:
                required: false
                type: number
                default: 10
            target_port:
                required: false
                type: number
                default: 3000

            # Base64 Secrets Bridge
            azure_client_id_rev:
                required: false
                type: string
            azure_tenant_id_rev:
                required: false
                type: string
            azure_subscription_id_rev:
                required: false
                type: string

        secrets:
            AZURE_CLIENT_ID:
                required: false
            AZURE_TENANT_ID:
                required: false
            AZURE_SUBSCRIPTION_ID:
                required: false
            # App Secrets
            MONGO_INITDB_ROOT_PASSWORD:
                required: false
            BLAZE_AUTH_JWT_PRIVATE_KEY:
                required: false
            BLAZE_AUTH_ADMIN_EMAIL:
                required: false
            BLAZE_AUTH_ADMIN_PASSWORD:
                required: false
            BLAZE_CONNECTION_STRING:
                required: false
            BLAZE_ELASTICSEARCH_USERNAME:
                required: false
            BLAZE_ELASTICSEARCH_PASSWORD:
                required: false
            BLAZE_FILES_S3_ACCESS_KEY:
                required: false
            BLAZE_FILES_S3_SECRET_ACCESS_KEY:
                required: false
            BLAZE_GRAPHQL_CACHE_SETTINGS:
                required: false
            BLAZE_CLIENT_HEADER:
                required: false

permissions:
  id-token: write
  contents: read

jobs:
    deploy:
        name: Deploy ${{ inputs.service_name }} (Container App)
        runs-on: ubuntu-latest
        timeout-minutes: 15
        environment: ${{ inputs.environment }}
        steps:
            - name: Checkout Code
              uses: actions/checkout@v6

            - name: Decode Azure Credentials
              run: |
                if [[ -n "${{ inputs.azure_client_id_rev }}" ]]; then
                  CLIENT_ID=$(echo "${{ inputs.azure_client_id_rev }}" | rev)
                  TENANT_ID=$(echo "${{ inputs.azure_tenant_id_rev }}" | rev)
                  SUBSCRIPTION_ID=$(echo "${{ inputs.azure_subscription_id_rev }}" | rev)
                  echo "DECODED_AZURE_CLIENT_ID=$CLIENT_ID" >> "$GITHUB_ENV"
                  echo "DECODED_AZURE_TENANT_ID=$TENANT_ID" >> "$GITHUB_ENV"
                  echo "DECODED_AZURE_SUBSCRIPTION_ID=$SUBSCRIPTION_ID" >> "$GITHUB_ENV"
                  echo "::add-mask::$CLIENT_ID"
                  echo "::add-mask::$TENANT_ID"
                  echo "::add-mask::$SUBSCRIPTION_ID"
                else
                  echo "DECODED_AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}" >> "$GITHUB_ENV"
                  echo "DECODED_AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> "$GITHUB_ENV"
                  echo "DECODED_AZURE_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> "$GITHUB_ENV"
                fi

            - name: Authenticate to Azure
              uses: azure/login@v2
              with:
                  client-id: ${{ env.DECODED_AZURE_CLIENT_ID }}
                  tenant-id: ${{ env.DECODED_AZURE_TENANT_ID }}
                  subscription-id: ${{ env.DECODED_AZURE_SUBSCRIPTION_ID }}

            - name: Compute Resource Names
              id: names
              run: |
                  # Naming Convention: {namespace}-{client}-{project}-{stage}-{service}
                  # Matches Terraform output
                  BASE_NAME="${{ inputs.namespace }}-${{ inputs.client_key }}-${{ inputs.project_key }}-${{ inputs.stage_key }}"

                  RESOURCE_GROUP="${BASE_NAME}-rg"
                  CONTAINER_APP="${{ inputs.namespace }}-${{ inputs.client_key }}-${{ inputs.stage_key }}-${{ inputs.service_name }}"

                  # Handle feature branches if needed (though typically we deploy to dev/stage/prod stacks)
                  if [[ -n "${{ inputs.branch_name }}" ]]; then
                    echo "⚠️ Feature branch deployment to Azure Container Apps is sharing the 'dev' stack resources."
                  fi

                  echo "resource_group=$RESOURCE_GROUP" >> "$GITHUB_OUTPUT"
                  echo "container_app=$CONTAINER_APP" >> "$GITHUB_OUTPUT"
                  echo "📝 Target: RG=$RESOURCE_GROUP | App=$CONTAINER_APP"

            - name: Get ACR Token
              id: acr
              run: |
                  ACR_NAME=$(echo "${{ inputs.azure_registry_server }}" | cut -d'.' -f1)
                  TOKEN=$(az acr login --name $ACR_NAME --expose-token --output tsv --query accessToken)
                  echo "::add-mask::$TOKEN"
                  echo "password=$TOKEN" >> "$GITHUB_OUTPUT"

            - name: Deploy Revision
              uses: azure/container-apps-deploy-action@v2
              with:
                  imageToDeploy: ${{ inputs.azure_registry_server }}/${{ inputs.namespace }}-${{ inputs.project_key }}-web/${{ inputs.project_key }}/${{ inputs.service_name }}:${{ inputs.image_tag }}
                  resourceGroup: ${{ steps.names.outputs.resource_group }}
                  containerAppName: ${{ steps.names.outputs.container_app }}
                  targetPort: ${{ inputs.target_port }}
                  registryUrl: ${{ inputs.azure_registry_server }}
                  registryUsername: 00000000-0000-0000-0000-000000000000
                  registryPassword: ${{ steps.acr.outputs.password }}

                  # Environment Variables
                  environmentVariables: |
                      NODE_ENV=production
                      PORT=${{ inputs.target_port }}
                      BLAZE_PROJECT_KEY=${{ inputs.project_key }}
                      BLAZE_STAGE=${{ inputs.stage_key }}
                      BLAZE_DOMAIN_ROOT=${{ inputs.domain_root }}
                      MONGO_INITDB_ROOT_PASSWORD=${{ secrets.MONGO_INITDB_ROOT_PASSWORD }}
                      BLAZE_AUTH_JWT_PRIVATE_KEY=${{ secrets.BLAZE_AUTH_JWT_PRIVATE_KEY }}
                      BLAZE_AUTH_ADMIN_EMAIL=${{ secrets.BLAZE_AUTH_ADMIN_EMAIL }}
                      BLAZE_AUTH_ADMIN_PASSWORD=${{ secrets.BLAZE_AUTH_ADMIN_PASSWORD }}
                      BLAZE_CONNECTION_STRING=${{ secrets.BLAZE_CONNECTION_STRING }}
                      BLAZE_ELASTICSEARCH_USERNAME=${{ secrets.BLAZE_ELASTICSEARCH_USERNAME }}
                      BLAZE_ELASTICSEARCH_PASSWORD=${{ secrets.BLAZE_ELASTICSEARCH_PASSWORD }}
                      BLAZE_FILES_S3_ACCESS_KEY=${{ secrets.BLAZE_FILES_S3_ACCESS_KEY }}
                      BLAZE_FILES_S3_SECRET_ACCESS_KEY=${{ secrets.BLAZE_FILES_S3_SECRET_ACCESS_KEY }}
                      BLAZE_GRAPHQL_CACHE_SETTINGS=${{ secrets.BLAZE_GRAPHQL_CACHE_SETTINGS }}
                      BLAZE_CLIENT_HEADER=${{ secrets.BLAZE_CLIENT_HEADER }}

            - name: "📋 Deploy Summary"
              run: |
                  echo "### ✅ Azure Container App Deploy: ${{ inputs.service_name }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **App**: \`${{ steps.names.outputs.container_app }}\`" >> $GITHUB_STEP_SUMMARY
                  echo "- **Tag**: \`${{ inputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
                  echo "- **RG**: \`${{ steps.names.outputs.resource_group }}\`" >> $GITHUB_STEP_SUMMARY
