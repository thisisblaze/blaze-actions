name: "Stress Test (Azure) Reusable"

on:
  workflow_dispatch:
    inputs:
      environment:
        required: true
        type: choice
        options: ["DEV", "STAGE", "PROD"]
        description: "Target environment (dev/stage/prod)"
      mode:
        required: true
        type: choice
        options: ["standard", "full-circle", "quick-test", "destroy-only"]
        description: "Execution mode"
      preserve_host:
        required: false
        type: boolean
        default: false
      include_third_party:
        required: false
        type: boolean
        default: false
      branch_name:
        required: false
        type: string
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "Target environment (dev/stage/prod)"
      mode:
        required: true
        type: string
        description: "Execution mode (standard, full-circle, quick-test, destroy-only)"
      preserve_host:
        required: false
        type: boolean
        default: false
        description: "Do not touch the host infrastructure, only the app/feature branch"
      include_third_party:
        required: false
        type: boolean
        default: false
        description: "Include third-party resources (MongoDB)"
      branch_name:
        required: false
        type: string
        description: "Feature tag for isolated branch testing"
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      GH_PAT:
        required: false
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ZONE_ID:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true
      MONGODB_ATLAS_PUBLIC_KEY:
        required: false
      MONGODB_ATLAS_PRIVATE_KEY:
        required: false
      MONGODB_ATLAS_PROJECT_ID:
        required: false
      MONGODB_ATLAS_ORG_ID:
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  setup:
    name: ⚙️ Target Selection
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: ${{ inputs.environment }}
    outputs:
      stack_prefix: ${{ steps.determine.outputs.stack_prefix }}
      target_tag: ${{ steps.determine.outputs.target_tag }}
      is_feature: ${{ steps.determine.outputs.is_feature }}
      feature_branch: ${{ steps.determine.outputs.feature_branch }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Determine Stack Prefix & Tag
        id: determine
        run: |
          IS_FEATURE="false"
          if [[ -n "${{ inputs.branch_name }}" ]]; then
            IS_FEATURE="true"
            STACK_PREFIX="${{ inputs.branch_name }}-"
            TARGET_TAG="[${{ inputs.branch_name }}]"
          else
            STACK_PREFIX=""
            TARGET_TAG="[HOST]"
          fi

          echo "stack_prefix=$STACK_PREFIX" >> "$GITHUB_OUTPUT"
          echo "target_tag=$TARGET_TAG" >> "$GITHUB_OUTPUT"
          echo "is_feature=$IS_FEATURE" >> "$GITHUB_OUTPUT"
          echo "feature_branch=${{ inputs.branch_name }}" >> "$GITHUB_OUTPUT"

          echo "## 🎯 Target Resolution" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | \`${{ inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
