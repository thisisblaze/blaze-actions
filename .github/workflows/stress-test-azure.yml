name: "Stress Test (Azure) Reusable"

on:
  workflow_dispatch:
    inputs:
      environment:
        required: true
        type: choice
        options: ["dev", "stage", "prod"]
        description: "Target environment (dev/stage/prod)"
      mode:
        required: true
        type: choice
        options: ["standard", "full-circle", "quick-test", "destroy-only"]
        description: "Execution mode"
      preserve_host:
        required: false
        type: boolean
        default: false
      include_third_party:
        required: false
        type: boolean
        default: false
      branch_name:
        required: false
        type: string
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "Target environment (dev/stage/prod)"
      mode:
        required: true
        type: string
        description: "Execution mode (standard, full-circle, quick-test, destroy-only)"
      preserve_host:
        required: false
        type: boolean
        default: false
        description: "Do not touch the host infrastructure, only the app/feature branch"
      include_third_party:
        required: false
        type: boolean
        default: false
        description: "Include third-party resources (MongoDB)"
      branch_name:
        required: false
        type: string
        description: "Feature tag for isolated branch testing"
      # Azure Auth Pass-through (Base64 encoded to bypass output masking)
      azure_client_id_rev:
        required: false
        type: string
      azure_tenant_id_rev:
        required: false
        type: string
      azure_subscription_id_rev:
        required: false
        type: string
    secrets:
      GH_PAT:
        required: false
      CLOUDFLARE_API_TOKEN:
        required: false
      CLOUDFLARE_ZONE_ID:
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        required: false
      MONGODB_ATLAS_PUBLIC_KEY:
        required: false
      MONGODB_ATLAS_PRIVATE_KEY:
        required: false
      MONGODB_ATLAS_PROJECT_ID:
        required: false
      MONGODB_ATLAS_ORG_ID:
        required: false
      # Azure Fallback Secrets
      AZURE_CLIENT_ID:
        required: false
      AZURE_TENANT_ID:
        required: false
      AZURE_SUBSCRIPTION_ID:
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  setup:
    name: ⚙️ Target Selection
    runs-on: ubuntu-latest
    outputs:
      target_tag: ${{ steps.branch.outputs.tag }}
      stack_prefix: ${{ steps.branch.outputs.prefix }}
      run_timestamp: ${{ steps.branch.outputs.timestamp }}
      env_upper: ${{ steps.branch.outputs.env_upper }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Determine Stack Prefix & Tag
        id: branch
        run: |
          TS=$(date +%s)
          echo "timestamp=$TS" >> "$GITHUB_OUTPUT"

          # Uppercase environment name (blaze-actions environments use DEV/STAGE/PROD)
          ENV_UPPER=$(echo "${{ inputs.environment }}" | tr '[:lower:]' '[:upper:]')
          echo "env_upper=$ENV_UPPER" >> "$GITHUB_OUTPUT"

          if [[ -n "${{ inputs.branch_name }}" ]]; then
            # Feature branch mode
            CLEAN_BRANCH=$(echo "${{ inputs.branch_name }}" | sed 's/[^a-zA-Z0-9]//g' | tr '[:upper:]' '[:lower:]' | cut -c1-10)
            echo "tag=$CLEAN_BRANCH" >> "$GITHUB_OUTPUT"
            echo "prefix=feat-$CLEAN_BRANCH" >> "$GITHUB_OUTPUT"
            echo "IS_FEATURE=true" >> "$GITHUB_ENV"
          else
            # Host mode
            echo "tag=host" >> "$GITHUB_OUTPUT"
            echo "prefix=host" >> "$GITHUB_OUTPUT"
            echo "IS_FEATURE=false" >> "$GITHUB_ENV"
          fi

          TARGET_TAG=$( [[ -n "${{ inputs.branch_name }}" ]] && echo "${{ inputs.branch_name }}" || echo "host" )
          echo "TARGET_TAG=$TARGET_TAG" >> "$GITHUB_ENV"

      - name: Execution Header
        run: |
          echo "### 🚀 Azure Stress Test: ${{ env.TARGET_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | \`${{ inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Provider** | \`azure\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Mode** | \`${{ inputs.mode }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Is Feature Branch** | \`$IS_FEATURE\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch Name** | \`${{ inputs.branch_name || '(none)' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Target Identity** | \`$TARGET_TAG\` |" >> $GITHUB_STEP_SUMMARY

  config:
    name: ⚙️ Config
    needs: [setup]
    uses: thisisblaze/blaze-actions/.github/workflows/reusable-calculate-config.yml@dev
    with:
      environment: ${{ inputs.environment }}
      cloud_provider: "azure"

  # ── SAFETY ─────────────────────────────────────────────────────────────
  prod-safety-check:
    name: 🛡️ Prod Safety Gate
    needs: [setup]
    if: inputs.environment == 'prod'
    runs-on: ubuntu-latest
    environment: PROD
    timeout-minutes: 30
    steps:
      - run: |
          echo "✅ Production Execution Authorized by Environment Gate"

  # ── PRE-FLIGHT (Azure State Inspection) ──────────────────────────────────
  check-state:
    name: 🔍 Pre-Flight Check (Azure)
    needs: [setup, config, prod-safety-check]
    if: always() && needs.setup.result == 'success' && (inputs.environment != 'prod' || needs.prod-safety-check.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ needs.setup.outputs.env_upper }}
    outputs:
      app_exists: ${{ steps.state_check.outputs.app_exists }}
      data_exists: ${{ steps.state_check.outputs.data_exists }}
      network_exists: ${{ steps.state_check.outputs.network_exists }}
      mongodb_exists: ${{ steps.state_check.outputs.mongodb_exists }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Decode Azure Credentials
        id: decode
        run: |
          if [[ -n "${{ inputs.azure_client_id_rev }}" ]]; then
            # Values were reversed by caller to bypass GitHub secret masking of job outputs
            CLIENT_ID=$(echo "${{ inputs.azure_client_id_rev }}" | rev)
            TENANT_ID=$(echo "${{ inputs.azure_tenant_id_rev }}" | rev)
            SUBSCRIPTION_ID=$(echo "${{ inputs.azure_subscription_id_rev }}" | rev)
            echo "AZURE_CLIENT_ID=$CLIENT_ID" >> "$GITHUB_ENV"
            echo "AZURE_TENANT_ID=$TENANT_ID" >> "$GITHUB_ENV"
            echo "AZURE_SUBSCRIPTION_ID=$SUBSCRIPTION_ID" >> "$GITHUB_ENV"
            echo "::add-mask::$CLIENT_ID"
            echo "::add-mask::$TENANT_ID"
            echo "::add-mask::$SUBSCRIPTION_ID"
          else
            echo "AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}" >> "$GITHUB_ENV"
            echo "AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> "$GITHUB_ENV"
            echo "AZURE_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> "$GITHUB_ENV"
          fi

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Check Terraform State files in Blob Storage
        id: state_check
        env:
          STORAGE_ACCOUNT: "${{ needs.config.outputs.namespace }}${{ needs.config.outputs.client_key }}tfstate"
          CONTAINER: "tfstate"
          PROJECT_KEY: "${{ needs.config.outputs.project_key }}"
          STAGE: "${{ needs.config.outputs.stage_key }}"
          ARM_CLIENT_ID: ${{ env.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ env.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ env.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          echo "🔍 Checking Azure Blob Storage for State Files..."

          # Function to check if a blob exists
          check_blob() {
            local KEY=$1
            local OUT_VAR=$2
            
            # Using az storage blob exists (auth via OIDC already handled by azure/login)
            EXISTS=$(az storage blob exists \
              --account-name "$STORAGE_ACCOUNT" \
              --container-name "$CONTAINER" \
              --name "$KEY" \
              --auth-mode login \
              --query exists -o tsv 2>/dev/null || echo "false")
              
            echo "$OUT_VAR=$EXISTS" >> "$GITHUB_OUTPUT"
            if [ "$EXISTS" == "true" ]; then
              echo "✅ Found state file: $KEY"
            else
              echo "❌ Not found: $KEY"
            fi
          }

          # Base key prefix
          PREFIX="infra/${PROJECT_KEY}/${STAGE}"

          echo "--- Checking Infrastructure Stacks ---"
          check_blob "${PREFIX}/app.tfstate" "app_exists"
          check_blob "${PREFIX}/data.tfstate" "data_exists"
          check_blob "${PREFIX}/network.tfstate" "network_exists"
          check_blob "${PREFIX}/third-party-mongodb.tfstate" "mongodb_exists"

  # ── INITIAL TEARDOWN (Full-Circle or Destroy-Only) ─────────────────────
  destroy-app:
    name: 💥 Destroy App ${{ needs.setup.outputs.target_tag }}
    needs: [setup, config, check-state]
    if: inputs.mode != 'quick-test' && inputs.preserve_host != true && needs.check-state.outputs.app_exists == 'true'
    uses: thisisblaze/blaze-actions/.github/workflows/reusable-terraform-operations.yml@dev
    with:
      action: "destroy"
      tf_dir: "infra/${{ needs.config.outputs.project_key }}/${{ needs.config.outputs.stage_key }}/app"
      bucket: ${{ needs.config.outputs.bucket }}
      state_key: "infra/${{ needs.config.outputs.project_key }}/${{ needs.config.outputs.stage_key }}/app.tfstate"
      stage_key: ${{ needs.config.outputs.stage_key }}
      aws_region: ${{ needs.config.outputs.aws_region }}
      client_key: ${{ needs.config.outputs.client_key }}
      project_key: ${{ needs.config.outputs.project_key }}
      namespace: ${{ needs.config.outputs.namespace }}
      cloud_platform: "azure"
      domain_root: ${{ needs.config.outputs.domain_root }}
      environment: ${{ inputs.environment }}
      azure_client_id_rev: ${{ inputs.azure_client_id_rev }}
      azure_tenant_id_rev: ${{ inputs.azure_tenant_id_rev }}
      azure_subscription_id_rev: ${{ inputs.azure_subscription_id_rev }}
    secrets: inherit

  destroy-data:
    name: 💥 Destroy Data ${{ needs.setup.outputs.target_tag }}
    needs: [setup, config, check-state, destroy-app]
    if: always() && inputs.mode != 'quick-test' && inputs.preserve_host != true && needs.check-state.outputs.data_exists == 'true' && (needs.destroy-app.result == 'success' || needs.destroy-app.result == 'skipped')
    uses: thisisblaze/blaze-actions/.github/workflows/reusable-terraform-operations.yml@dev
    with:
      action: "destroy"
      tf_dir: "infra/${{ needs.config.outputs.project_key }}/${{ needs.config.outputs.stage_key }}/data"
      bucket: ${{ needs.config.outputs.bucket }}
      state_key: "infra/${{ needs.config.outputs.project_key }}/${{ needs.config.outputs.stage_key }}/data.tfstate"
      stage_key: ${{ needs.config.outputs.stage_key }}
      aws_region: ${{ needs.config.outputs.aws_region }}
      client_key: ${{ needs.config.outputs.client_key }}
      project_key: ${{ needs.config.outputs.project_key }}
      namespace: ${{ needs.config.outputs.namespace }}
      cloud_platform: "azure"
      domain_root: ${{ needs.config.outputs.domain_root }}
      environment: ${{ inputs.environment }}
      azure_client_id_rev: ${{ inputs.azure_client_id_rev }}
      azure_tenant_id_rev: ${{ inputs.azure_tenant_id_rev }}
      azure_subscription_id_rev: ${{ inputs.azure_subscription_id_rev }}
    secrets: inherit

  destroy-mongodb:
    name: 💥 Destroy MongoDB
    needs: [setup, config, check-state, destroy-data]
    if: always() && inputs.mode != 'quick-test' && inputs.include_third_party == true && needs.check-state.outputs.mongodb_exists == 'true' && (needs.destroy-data.result == 'success' || needs.destroy-data.result == 'skipped')
    uses: thisisblaze/blaze-actions/.github/workflows/reusable-terraform-operations.yml@dev
    with:
      action: "destroy"
      tf_dir: "infra/${{ needs.config.outputs.project_key }}/${{ needs.config.outputs.stage_key }}/third-party-mongodb"
      bucket: ${{ needs.config.outputs.bucket }}
      state_key: "infra/${{ needs.config.outputs.project_key }}/${{ needs.config.outputs.stage_key }}/third-party-mongodb.tfstate"
      stage_key: ${{ needs.config.outputs.stage_key }}
      aws_region: ${{ needs.config.outputs.aws_region }}
      client_key: ${{ needs.config.outputs.client_key }}
      project_key: ${{ needs.config.outputs.project_key }}
      namespace: ${{ needs.config.outputs.namespace }}
      cloud_platform: "azure"
      domain_root: ${{ needs.config.outputs.domain_root }}
      environment: ${{ inputs.environment }}
      azure_client_id_rev: ${{ inputs.azure_client_id_rev }}
      azure_tenant_id_rev: ${{ inputs.azure_tenant_id_rev }}
      azure_subscription_id_rev: ${{ inputs.azure_subscription_id_rev }}
    secrets: inherit

  destroy-network:
    name: 💥 Destroy Network ${{ needs.setup.outputs.target_tag }}
    needs: [setup, config, check-state, destroy-mongodb, destroy-data]
    if: always() && inputs.mode != 'quick-test' && inputs.preserve_host != true && needs.check-state.outputs.network_exists == 'true' && (needs.destroy-mongodb.result == 'success' || needs.destroy-mongodb.result == 'skipped' || needs.destroy-data.result == 'success' || needs.destroy-data.result == 'skipped')
    uses: thisisblaze/blaze-actions/.github/workflows/reusable-terraform-operations.yml@dev
    with:
      action: "destroy"
      tf_dir: "infra/${{ needs.config.outputs.project_key }}/${{ needs.config.outputs.stage_key }}/network"
      bucket: ${{ needs.config.outputs.bucket }}
      state_key: "infra/${{ needs.config.outputs.project_key }}/${{ needs.config.outputs.stage_key }}/network.tfstate"
      stage_key: ${{ needs.config.outputs.stage_key }}
      aws_region: ${{ needs.config.outputs.aws_region }}
      client_key: ${{ needs.config.outputs.client_key }}
      project_key: ${{ needs.config.outputs.project_key }}
      namespace: ${{ needs.config.outputs.namespace }}
      cloud_platform: "azure"
      domain_root: ${{ needs.config.outputs.domain_root }}
      environment: ${{ inputs.environment }}
      azure_client_id_rev: ${{ inputs.azure_client_id_rev }}
      azure_tenant_id_rev: ${{ inputs.azure_tenant_id_rev }}
      azure_subscription_id_rev: ${{ inputs.azure_subscription_id_rev }}
    secrets: inherit

  # ── PROVISIONING ────────────────────────────────────────────────────────
  provision-network:
    name: 🌐 Prov Network ${{ needs.setup.outputs.target_tag }}
    needs: [setup, config, check-state, destroy-network]
    if: always() && needs.setup.result == 'success' && inputs.mode != 'destroy-only' && (needs.destroy-network.result == 'success' || needs.destroy-network.result == 'skipped')
    uses: thisisblaze/blaze-actions/.github/workflows/reusable-terraform-operations.yml@dev
    with:
      action: "apply"
      tf_dir: "infra/${{ needs.config.outputs.project_key }}/${{ needs.config.outputs.stage_key }}/network"
      bucket: ${{ needs.config.outputs.bucket }}
      state_key: "infra/${{ needs.config.outputs.project_key }}/${{ needs.config.outputs.stage_key }}/network.tfstate"
      stage_key: ${{ needs.config.outputs.stage_key }}
      aws_region: ${{ needs.config.outputs.aws_region }}
      client_key: ${{ needs.config.outputs.client_key }}
      project_key: ${{ needs.config.outputs.project_key }}
      namespace: ${{ needs.config.outputs.namespace }}
      cloud_platform: "azure"
      domain_root: ${{ needs.config.outputs.domain_root }}
      environment: ${{ inputs.environment }}
      azure_client_id_rev: ${{ inputs.azure_client_id_rev }}
      azure_tenant_id_rev: ${{ inputs.azure_tenant_id_rev }}
      azure_subscription_id_rev: ${{ inputs.azure_subscription_id_rev }}
    secrets: inherit

  provision-data:
    name: 💾 Prov Data ${{ needs.setup.outputs.target_tag }}
    needs: [setup, config, provision-network]
    if: needs.provision-network.result == 'success'
    uses: thisisblaze/blaze-actions/.github/workflows/reusable-terraform-operations.yml@dev
    with:
      action: "apply"
      tf_dir: "infra/${{ needs.config.outputs.project_key }}/${{ needs.config.outputs.stage_key }}/data"
      bucket: ${{ needs.config.outputs.bucket }}
      state_key: "infra/${{ needs.config.outputs.project_key }}/${{ needs.config.outputs.stage_key }}/data.tfstate"
      stage_key: ${{ needs.config.outputs.stage_key }}
      aws_region: ${{ needs.config.outputs.aws_region }}
      client_key: ${{ needs.config.outputs.client_key }}
      project_key: ${{ needs.config.outputs.project_key }}
      namespace: ${{ needs.config.outputs.namespace }}
      cloud_platform: "azure"
      domain_root: ${{ needs.config.outputs.domain_root }}
      environment: ${{ inputs.environment }}
      azure_client_id_rev: ${{ inputs.azure_client_id_rev }}
      azure_tenant_id_rev: ${{ inputs.azure_tenant_id_rev }}
      azure_subscription_id_rev: ${{ inputs.azure_subscription_id_rev }}
    secrets: inherit

  provision-app:
    name: 🏗️ Prov App ${{ needs.setup.outputs.target_tag }}
    needs: [setup, config, provision-data]
    if: needs.provision-data.result == 'success'
    uses: thisisblaze/blaze-actions/.github/workflows/reusable-terraform-operations.yml@dev
    with:
      action: "apply"
      tf_dir: "infra/${{ needs.config.outputs.project_key }}/${{ needs.config.outputs.stage_key }}/app"
      bucket: ${{ needs.config.outputs.bucket }}
      state_key: "infra/${{ needs.config.outputs.project_key }}/${{ needs.config.outputs.stage_key }}/app.tfstate"
      stage_key: ${{ needs.config.outputs.stage_key }}
      aws_region: ${{ needs.config.outputs.aws_region }}
      client_key: ${{ needs.config.outputs.client_key }}
      project_key: ${{ needs.config.outputs.project_key }}
      namespace: ${{ needs.config.outputs.namespace }}
      cloud_platform: "azure"
      domain_root: ${{ needs.config.outputs.domain_root }}
      environment: ${{ inputs.environment }}
      azure_client_id_rev: ${{ inputs.azure_client_id_rev }}
      azure_tenant_id_rev: ${{ inputs.azure_tenant_id_rev }}
      azure_subscription_id_rev: ${{ inputs.azure_subscription_id_rev }}
    secrets: inherit

  # ── DEPLOYMENT ──────────────────────────────────────────────────────────
  deploy-frontend:
    name: 🚢 Deploy Frontend ${{ needs.setup.outputs.target_tag }}
    needs: [setup, config, provision-app]
    if: needs.provision-app.result == 'success'
    uses: thisisblaze/blaze-actions/.github/workflows/02-deploy-app.yml@dev
    with:
      environment: ${{ inputs.environment }}
      branch_name: ${{ needs.setup.outputs.target_tag }}
      cloud_provider: "azure"
      azure_client_id_rev: ${{ inputs.azure_client_id_rev }}
      azure_tenant_id_rev: ${{ inputs.azure_tenant_id_rev }}
      azure_subscription_id_rev: ${{ inputs.azure_subscription_id_rev }}
    secrets: inherit

  # ── VERIFICATION ────────────────────────────────────────────────────────
  verify:
    name: ✅ Verify Infrastructure & App
    needs: [setup, config, deploy-frontend]
    if: needs.deploy-frontend.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Verify Endpoints
        run: |
          echo "🔍 Verifying Azure endpoints..."
          # Verification logic here

  # ── FINAL TEARDOWN (Full-Circle Only) ───────────────────────────────────
  final-destroy-app:
    name: ♻️ Final Destroy App ${{ needs.setup.outputs.target_tag }}
    needs: [setup, config, verify]
    if: always() && inputs.mode == 'full-circle' && (needs.verify.result == 'success' || needs.verify.result == 'skipped') && inputs.preserve_host != true
    uses: thisisblaze/blaze-actions/.github/workflows/reusable-terraform-operations.yml@dev
    with:
      action: "destroy"
      tf_dir: "infra/${{ needs.config.outputs.project_key }}/${{ needs.config.outputs.stage_key }}/app"
      bucket: ${{ needs.config.outputs.bucket }}
      state_key: "infra/${{ needs.config.outputs.project_key }}/${{ needs.config.outputs.stage_key }}/app.tfstate"
      stage_key: ${{ needs.config.outputs.stage_key }}
      aws_region: ${{ needs.config.outputs.aws_region }}
      client_key: ${{ needs.config.outputs.client_key }}
      project_key: ${{ needs.config.outputs.project_key }}
      namespace: ${{ needs.config.outputs.namespace }}
      cloud_platform: "azure"
      domain_root: ${{ needs.config.outputs.domain_root }}
      environment: ${{ inputs.environment }}
      azure_client_id_rev: ${{ inputs.azure_client_id_rev }}
      azure_tenant_id_rev: ${{ inputs.azure_tenant_id_rev }}
      azure_subscription_id_rev: ${{ inputs.azure_subscription_id_rev }}
    secrets: inherit

  final-destroy-data:
    name: ♻️ Final Destroy Data ${{ needs.setup.outputs.target_tag }}
    needs: [setup, config, final-destroy-app]
    if: always() && inputs.mode == 'full-circle' && needs.final-destroy-app.result == 'success' && inputs.preserve_host != true
    uses: thisisblaze/blaze-actions/.github/workflows/reusable-terraform-operations.yml@dev
    with:
      action: "destroy"
      tf_dir: "infra/${{ needs.config.outputs.project_key }}/${{ needs.config.outputs.stage_key }}/data"
      bucket: ${{ needs.config.outputs.bucket }}
      state_key: "infra/${{ needs.config.outputs.project_key }}/${{ needs.config.outputs.stage_key }}/data.tfstate"
      stage_key: ${{ needs.config.outputs.stage_key }}
      aws_region: ${{ needs.config.outputs.aws_region }}
      client_key: ${{ needs.config.outputs.client_key }}
      project_key: ${{ needs.config.outputs.project_key }}
      namespace: ${{ needs.config.outputs.namespace }}
      cloud_platform: "azure"
      domain_root: ${{ needs.config.outputs.domain_root }}
      environment: ${{ inputs.environment }}
      azure_client_id_rev: ${{ inputs.azure_client_id_rev }}
      azure_tenant_id_rev: ${{ inputs.azure_tenant_id_rev }}
      azure_subscription_id_rev: ${{ inputs.azure_subscription_id_rev }}
    secrets: inherit

  final-destroy-network:
    name: ♻️ Final Destroy Network ${{ needs.setup.outputs.target_tag }}
    needs: [setup, config, final-destroy-data]
    if: always() && inputs.mode == 'full-circle' && needs.final-destroy-data.result == 'success' && inputs.preserve_host != true
    uses: thisisblaze/blaze-actions/.github/workflows/reusable-terraform-operations.yml@dev
    with:
      action: "destroy"
      tf_dir: "infra/${{ needs.config.outputs.project_key }}/${{ needs.config.outputs.stage_key }}/network"
      bucket: ${{ needs.config.outputs.bucket }}
      state_key: "infra/${{ needs.config.outputs.project_key }}/${{ needs.config.outputs.stage_key }}/network.tfstate"
      stage_key: ${{ needs.config.outputs.stage_key }}
      aws_region: ${{ needs.config.outputs.aws_region }}
      client_key: ${{ needs.config.outputs.client_key }}
      project_key: ${{ needs.config.outputs.project_key }}
      namespace: ${{ needs.config.outputs.namespace }}
      cloud_platform: "azure"
      domain_root: ${{ needs.config.outputs.domain_root }}
      environment: ${{ inputs.environment }}
      azure_client_id_rev: ${{ inputs.azure_client_id_rev }}
      azure_tenant_id_rev: ${{ inputs.azure_tenant_id_rev }}
      azure_subscription_id_rev: ${{ inputs.azure_subscription_id_rev }}
    secrets: inherit

  final-destroy-mongodb:
    name: ♻️ Final Destroy MongoDB
    needs: [setup, config, final-destroy-network]
    if: always() && inputs.mode == 'full-circle' && needs.final-destroy-network.result == 'success' && inputs.preserve_host != true && inputs.include_third_party == true
    uses: thisisblaze/blaze-actions/.github/workflows/reusable-terraform-operations.yml@dev
    with:
      action: "destroy"
      tf_dir: "infra/${{ needs.config.outputs.project_key }}/${{ needs.config.outputs.stage_key }}/third-party-mongodb"
      bucket: ${{ needs.config.outputs.bucket }}
      state_key: "infra/${{ needs.config.outputs.project_key }}/${{ needs.config.outputs.stage_key }}/third-party-mongodb.tfstate"
      stage_key: ${{ needs.config.outputs.stage_key }}
      aws_region: ${{ needs.config.outputs.aws_region }}
      client_key: ${{ needs.config.outputs.client_key }}
      project_key: ${{ needs.config.outputs.project_key }}
      namespace: ${{ needs.config.outputs.namespace }}
      cloud_platform: "azure"
      domain_root: ${{ needs.config.outputs.domain_root }}
      environment: ${{ inputs.environment }}
      azure_client_id_rev: ${{ inputs.azure_client_id_rev }}
      azure_tenant_id_rev: ${{ inputs.azure_tenant_id_rev }}
      azure_subscription_id_rev: ${{ inputs.azure_subscription_id_rev }}
    secrets: inherit

  # ── REPORTING ────────────────────────────────────────────────────────
  stress-test-report:
    name: 📊 Generate Report
    needs:
      [
        setup,
        check-state,
        provision-network,
        provision-data,
        provision-app,
        deploy-frontend,
        verify,
        final-destroy-app,
        final-destroy-network,
      ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report Summary
        run: |
          echo "# 📊 Azure Stress Test Execution Report" >> $GITHUB_STEP_SUMMARY
          echo "## Mode: \`${{ inputs.mode }}\` | Env: \`${{ inputs.environment }}\`" >> $GITHUB_STEP_SUMMARY

          # Simple reporting via step summary
          echo "Test complete. See individual job statuses for results." >> $GITHUB_STEP_SUMMARY
