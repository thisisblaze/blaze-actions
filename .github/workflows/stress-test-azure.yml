name: "Stress Test (Azure) Reusable"

on:
  workflow_dispatch:
    inputs:
      environment:
        required: true
        type: choice
        options: ["dev", "stage", "prod"]
        description: "Target environment (dev/stage/prod)"
      mode:
        required: true
        type: choice
        options: ["standard", "full-circle", "quick-test", "destroy-only"]
        description: "Execution mode"
      preserve_host:
        required: false
        type: boolean
        default: false
      include_third_party:
        required: false
        type: boolean
        default: false
      branch_name:
        required: false
        type: string
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "Target environment (dev/stage/prod)"
      mode:
        required: true
        type: string
        description: "Execution mode (standard, full-circle, quick-test, destroy-only)"
      preserve_host:
        required: false
        type: boolean
        default: false
        description: "Do not touch the host infrastructure, only the app/feature branch"
      include_third_party:
        required: false
        type: boolean
        default: false
        description: "Include third-party resources (MongoDB)"
      branch_name:
        required: false
        type: string
        description: "Feature tag for isolated branch testing"
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      GH_PAT:
        required: false
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ZONE_ID:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true
      MONGODB_ATLAS_PUBLIC_KEY:
        required: false
      MONGODB_ATLAS_PRIVATE_KEY:
        required: false
      MONGODB_ATLAS_PROJECT_ID:
        required: false
      MONGODB_ATLAS_ORG_ID:
        required: false

permissions:
  id-token: write
  contents: read

# Ensure only one test runs at a time per environment/branch
concurrency:
  group: stress-test-azure-${{ inputs.environment }}-${{ inputs.branch_name || 'host' }}
  cancel-in-progress: false

jobs:
  setup:
    name: ⚙️ Target Selection
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: ${{ inputs.environment }}
    outputs:
      stack_prefix: ${{ steps.determine.outputs.stack_prefix }}
      target_tag: ${{ steps.determine.outputs.target_tag }}
      is_feature: ${{ steps.determine.outputs.is_feature }}
      feature_branch: ${{ steps.determine.outputs.feature_branch }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Determine Stack Prefix & Tag
        id: determine
        run: |
          IS_FEATURE="false"
          if [[ -n "${{ inputs.branch_name }}" ]]; then
            IS_FEATURE="true"
            STACK_PREFIX="${{ inputs.branch_name }}-"
            TARGET_TAG="[${{ inputs.branch_name }}]"
          else
            STACK_PREFIX=""
            TARGET_TAG="[HOST]"
          fi

          echo "stack_prefix=$STACK_PREFIX" >> "$GITHUB_OUTPUT"
          echo "target_tag=$TARGET_TAG" >> "$GITHUB_OUTPUT"
          echo "is_feature=$IS_FEATURE" >> "$GITHUB_OUTPUT"
          echo "feature_branch=${{ inputs.branch_name }}" >> "$GITHUB_OUTPUT"

          echo "## 🎯 Target Resolution" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | \`${{ inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Provider** | \`azure\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Mode** | \`${{ inputs.mode }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Is Feature Branch** | \`$IS_FEATURE\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch Name** | \`${{ inputs.branch_name || '(none)' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Target Identity** | \`$TARGET_TAG\` |" >> $GITHUB_STEP_SUMMARY

  config:
    name: ⚙️ Config
    needs: [setup]
    uses: ./.github/workflows/reusable-calculate-config.yml
    with:
      environment: ${{ inputs.environment }}
      cloud_provider: "azure"

  # ── SAFETY ─────────────────────────────────────────────────────────────
  prod-safety-check:
    name: 🛡️ Prod Safety Gate
    needs: [setup]
    if: inputs.environment == 'prod'
    runs-on: ubuntu-latest
    environment: prod-azure
    timeout-minutes: 30
    steps:
      - run: |
          echo "✅ Production Execution Authorized by Environment Gate"

  # ── PRE-FLIGHT (Azure State Inspection) ──────────────────────────────────
  check-state:
    name: 🔍 Pre-Flight Check (Azure)
    needs: [setup, config, prod-safety-check]
    if: always() && needs.setup.result == 'success' && (inputs.environment != 'prod' || needs.prod-safety-check.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}
    outputs:
      app_exists: ${{ steps.state_check.outputs.app_exists }}
      data_exists: ${{ steps.state_check.outputs.data_exists }}
      network_exists: ${{ steps.state_check.outputs.network_exists }}
      mongodb_exists: ${{ steps.state_check.outputs.mongodb_exists }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Check Terraform State files in Blob Storage
        id: state_check
        env:
          STORAGE_ACCOUNT: "${{ needs.config.outputs.namespace }}${{ needs.config.outputs.client_key }}tfstate"
          CONTAINER: "tfstate"
          PROJECT_KEY: "${{ needs.config.outputs.project_key }}"
          STAGE: "${{ needs.config.outputs.stage_key }}"
        run: |
          echo "🔍 Checking Azure Blob Storage for State Files..."

          # Function to check if a blob exists
          check_blob() {
            local KEY=$1
            local OUT_VAR=$2
            
            # Using az storage blob exists (auth via OIDC already handled by azure/login)
            EXISTS=$(az storage blob exists \
              --account-name "$STORAGE_ACCOUNT" \
              --container-name "$CONTAINER" \
              --name "$KEY" \
              --auth-mode login \
              --query exists -o tsv 2>/dev/null || echo "false")
              
            echo "$OUT_VAR=$EXISTS" >> "$GITHUB_OUTPUT"
            if [ "$EXISTS" == "true" ]; then
              echo "✅ Found state file: $KEY"
            else
              echo "❌ Not found: $KEY"
            fi
          }

          # Base key prefix
          PREFIX="infra/${PROJECT_KEY}/${STAGE}"

          echo "--- Checking Infrastructure Stacks ---"
          check_blob "${PREFIX}/app.tfstate" "app_exists"
          check_blob "${PREFIX}/data.tfstate" "data_exists"
          check_blob "${PREFIX}/network.tfstate" "network_exists"
          check_blob "${PREFIX}/third-party-mongodb.tfstate" "mongodb_exists"

  # ── INITIAL TEARDOWN (Full-Circle or Destroy-Only) ─────────────────────
  destroy-app:
    name: 💥 Destroy App ${{ needs.setup.outputs.target_tag }}
    needs: [setup, check-state]
#     if: inputs.mode != 'quick-test' && inputs.preserve_host != true && needs.check-state.outputs.app_exists == 'true'
    uses: ./.github/workflows/01-provision-infra.yml
#     with:
#       cloud_provider: "azure"
#       environment: ${{ inputs.environment }}
#       stack: "app"
#       destroy: true
#       apply: true
#       branch_name: ${{ inputs.branch_name }}
    secrets: inherit

