name: "Stress Test (Azure) Reusable"
description: "End-to-end full-circle lifecycle testing for Azure infrastructure and applications."

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "Target environment (dev/stage/prod)"
      mode:
        required: true
        type: string
        description: "Execution mode (standard, full-circle, quick-test, destroy-only)"
      preserve_host:
        required: false
        type: boolean
        default: false
        description: "Do not touch the host infrastructure, only the app/feature branch"
      include_third_party:
        required: false
        type: boolean
        default: false
        description: "Include third-party resources (MongoDB)"
      branch_name:
        required: false
        type: string
        description: "Feature tag for isolated branch testing"
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      GH_PAT:
        required: false
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ZONE_ID:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true
      MONGODB_ATLAS_PUBLIC_KEY:
        required: false
      MONGODB_ATLAS_PRIVATE_KEY:
        required: false
      MONGODB_ATLAS_PROJECT_ID:
        required: false
      MONGODB_ATLAS_ORG_ID:
        required: false

permissions:
  id-token: write
  contents: read

# Ensure only one test runs at a time per environment/branch
concurrency:
  group: stress-test-azure-${{ inputs.environment }}-${{ inputs.branch_name || 'host' }}
  cancel-in-progress: false

jobs:
  setup:
    name: ⚙️ Target Selection
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: ${{ inputs.environment }}
    outputs:
      stack_prefix: ${{ steps.determine.outputs.stack_prefix }}
      target_tag: ${{ steps.determine.outputs.target_tag }}
      is_feature: ${{ steps.determine.outputs.is_feature }}
      feature_branch: ${{ steps.determine.outputs.feature_branch }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Determine Stack Prefix & Tag
        id: determine
        run: |
          IS_FEATURE="false"
          if [[ -n "${{ inputs.branch_name }}" ]]; then
            IS_FEATURE="true"
            STACK_PREFIX="${{ inputs.branch_name }}-"
            TARGET_TAG="[${{ inputs.branch_name }}]"
          else
            STACK_PREFIX=""
            TARGET_TAG="[HOST]"
          fi

          echo "stack_prefix=$STACK_PREFIX" >> "$GITHUB_OUTPUT"
          echo "target_tag=$TARGET_TAG" >> "$GITHUB_OUTPUT"
          echo "is_feature=$IS_FEATURE" >> "$GITHUB_OUTPUT"
          echo "feature_branch=${{ inputs.branch_name }}" >> "$GITHUB_OUTPUT"

          echo "## 🎯 Target Resolution" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | \`${{ inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Provider** | \`azure\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Mode** | \`${{ inputs.mode }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Is Feature Branch** | \`$IS_FEATURE\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch Name** | \`${{ inputs.branch_name || '(none)' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Target Identity** | \`$TARGET_TAG\` |" >> $GITHUB_STEP_SUMMARY

  # ── SAFETY ─────────────────────────────────────────────────────────────
  prod-safety-check:
    name: 🛡️ Prod Safety Gate
    needs: [setup]
    if: inputs.environment == 'prod'
    runs-on: ubuntu-latest
    environment: prod-azure
    timeout-minutes: 30
    steps:
      - run: |
          echo "✅ Production Execution Authorized by Environment Gate"

  # ── PRE-FLIGHT (Azure State Inspection) ──────────────────────────────────
  check-state:
    name: 🔍 Pre-Flight Check (Azure)
    needs: [setup, prod-safety-check]
    if: always() && needs.setup.result == 'success' && (inputs.environment != 'prod' || needs.prod-safety-check.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}
    outputs:
      app_exists: ${{ steps.state_check.outputs.app_exists }}
      data_exists: ${{ steps.state_check.outputs.data_exists }}
      network_exists: ${{ steps.state_check.outputs.network_exists }}
      mongodb_exists: ${{ steps.state_check.outputs.mongodb_exists }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Calculate Config
        id: config
        uses: thisisblaze/blaze-actions/.github/actions/calculate-config@dev
        with:
          environment: ${{ inputs.environment }}
          project: "thisisblaze"
          cloud_provider: "azure"

      - name: Check Terraform State files in Blob Storage
        id: state_check
        env:
          STORAGE_ACCOUNT: "${{ steps.config.outputs.namespace }}${{ steps.config.outputs.client_key }}tfstate"
          CONTAINER: "tfstate"
          PROJECT_KEY: "${{ steps.config.outputs.project_key }}"
          STAGE: "${{ steps.config.outputs.stage_key }}"
        run: |
          echo "🔍 Checking Azure Blob Storage for State Files..."

          # Function to check if a blob exists
          check_blob() {
            local KEY=$1
            local OUT_VAR=$2
            
            # Using az storage blob exists (auth via OIDC already handled by azure/login)
            EXISTS=$(az storage blob exists \
              --account-name "$STORAGE_ACCOUNT" \
              --container-name "$CONTAINER" \
              --name "$KEY" \
              --auth-mode login \
              --query exists -o tsv 2>/dev/null || echo "false")
              
            echo "$OUT_VAR=$EXISTS" >> "$GITHUB_OUTPUT"
            if [ "$EXISTS" == "true" ]; then
              echo "✅ Found state file: $KEY"
            else
              echo "❌ Not found: $KEY"
            fi
          }

          # Base key prefix
          PREFIX="infra/${PROJECT_KEY}/${STAGE}"

          echo "--- Checking Infrastructure Stacks ---"
          check_blob "${PREFIX}/app.tfstate" "app_exists"
          check_blob "${PREFIX}/data.tfstate" "data_exists"
          check_blob "${PREFIX}/network.tfstate" "network_exists"
          check_blob "${PREFIX}/third-party-mongodb.tfstate" "mongodb_exists"

  # ── INITIAL TEARDOWN (Full-Circle or Destroy-Only) ─────────────────────
  destroy-app:
    name: 💥 Destroy App ${{ needs.setup.outputs.target_tag }}
    needs: [setup, check-state]
    if: inputs.mode != 'quick-test' && inputs.preserve_host != true && needs.check-state.outputs.app_exists == 'true'
    uses: thisisblaze/blaze-actions/.github/workflows/01-provision-infra.yml@dev
    with:
      cloud_provider: "azure"
      environment: ${{ inputs.environment }}
      stack: "app"
      destroy: true
      apply: true
      branch_name: ${{ inputs.branch_name }}
    secrets: inherit

  destroy-data:
    name: 💥 Destroy Data ${{ needs.setup.outputs.target_tag }}
    needs: [setup, check-state, destroy-app]
    if: >
      always() && inputs.mode != 'quick-test' && inputs.preserve_host != true &&
      needs.check-state.outputs.data_exists == 'true' &&
      (needs.destroy-app.result == 'success' || needs.destroy-app.result == 'skipped')
    uses: thisisblaze/blaze-actions/.github/workflows/01-provision-infra.yml@dev
    with:
      cloud_provider: "azure"
      environment: ${{ inputs.environment }}
      stack: "data"
      destroy: true
      apply: true
    secrets: inherit

  destroy-network:
    name: 💥 Destroy Network ${{ needs.setup.outputs.target_tag }}
    needs: [setup, check-state, destroy-data]
    if: >
      always() && inputs.mode != 'quick-test' && inputs.preserve_host != true &&
      needs.check-state.outputs.network_exists == 'true' &&
      (needs.destroy-data.result == 'success' || needs.destroy-data.result == 'skipped')
    uses: thisisblaze/blaze-actions/.github/workflows/01-provision-infra.yml@dev
    with:
      cloud_provider: "azure"
      environment: ${{ inputs.environment }}
      stack: "network"
      destroy: true
      apply: true
    secrets: inherit

  destroy-mongodb:
    name: 💥 Destroy MongoDB
    needs: [setup, check-state]
    if: inputs.mode != 'quick-test' && inputs.preserve_host != true && inputs.include_third_party == true && needs.check-state.outputs.mongodb_exists == 'true'
    uses: thisisblaze/blaze-actions/.github/workflows/01-provision-infra.yml@dev
    with:
      cloud_provider: "azure"
      environment: ${{ inputs.environment }}
      stack: "third-party-mongodb"
      destroy: true
      apply: true
    secrets: inherit

  # ── PROVISION FRESH (Standard, Full-Circle, Quick-Test) ───────────────
  provision-mongodb:
    name: 🏗️ Prov MongoDB
    needs: [setup, destroy-mongodb]
    if: >
      always() && inputs.mode != 'destroy-only' && inputs.preserve_host != true && inputs.include_third_party == true &&
      (needs.destroy-mongodb.result == 'success' || needs.destroy-mongodb.result == 'skipped')
    uses: thisisblaze/blaze-actions/.github/workflows/01-provision-infra.yml@dev
    with:
      cloud_provider: "azure"
      environment: ${{ inputs.environment }}
      stack: "third-party-mongodb"
      apply: true
    secrets: inherit

  provision-network:
    name: 🏗️ Prov Network ${{ needs.setup.outputs.target_tag }}
    needs: [setup, destroy-network, provision-mongodb]
    if: >
      always() && inputs.mode != 'destroy-only' && inputs.preserve_host != true &&
      (needs.destroy-network.result == 'success' || needs.destroy-network.result == 'skipped')
    uses: thisisblaze/blaze-actions/.github/workflows/01-provision-infra.yml@dev
    with:
      cloud_provider: "azure"
      environment: ${{ inputs.environment }}
      stack: "network"
      apply: true
    secrets: inherit

  provision-data:
    name: 🏗️ Prov Data ${{ needs.setup.outputs.target_tag }}
    needs: [setup, provision-network]
    if: always() && needs.provision-network.result == 'success' && inputs.mode != 'destroy-only' && inputs.preserve_host != true
    uses: thisisblaze/blaze-actions/.github/workflows/01-provision-infra.yml@dev
    with:
      cloud_provider: "azure"
      environment: ${{ inputs.environment }}
      stack: "data"
      apply: true
    secrets: inherit

  provision-app:
    name: 🏗️ Prov App ${{ needs.setup.outputs.target_tag }}
    needs: [setup, provision-data]
    if: always() && (needs.provision-data.result == 'success' || needs.provision-data.result == 'skipped') && inputs.mode != 'destroy-only'
    uses: thisisblaze/blaze-actions/.github/workflows/01-provision-infra.yml@dev
    with:
      cloud_provider: "azure"
      environment: ${{ inputs.environment }}
      stack: "app"
      apply: true
      branch_name: ${{ inputs.branch_name }}
    secrets: inherit

  # ── BUILD & DEPLOY ───────────────────────────────────────────────────
  # Assuming the build step for the image is either handled elsewhere or
  # we deploy existing images (like GCP stress test does via app.tf defaults).
  # We will just run reusable-container-app-deploy.yml for api and web.

  deploy-api:
    name: 🚢 Deploy API ${{ needs.setup.outputs.target_tag }}
    needs: [setup, provision-app]
    if: always() && needs.provision-app.result == 'success' && inputs.mode != 'destroy-only'
    uses: thisisblaze/blaze-actions/.github/workflows/reusable-container-app-deploy.yml@dev
    with:
      service_name: "api"
      image_tag: "latest"
      environment: ${{ inputs.environment }}
      namespace: "blz" # Need to pass via env/vars technically, hardcoded for now or rely on fallback in reusable
      project_key: "blaze"
      target_port: 8080
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy-frontend:
    name: 🚢 Deploy Frontend ${{ needs.setup.outputs.target_tag }}
    needs: [setup, deploy-api]
    if: always() && needs.deploy-api.result == 'success' && inputs.mode != 'destroy-only'
    uses: thisisblaze/blaze-actions/.github/workflows/reusable-container-app-deploy.yml@dev
    with:
      service_name: "web"
      image_tag: "latest"
      environment: ${{ inputs.environment }}
      namespace: "blz"
      project_key: "blaze"
      target_port: 80
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # ── VERIFY (Azure CDN & App) ─────────────────────────────────────────
  verify:
    name: ✅ Verify Infrastructure & App
    needs: [setup, deploy-frontend]
    if: always() && needs.deploy-frontend.result == 'success' && inputs.mode != 'destroy-only'
    uses: thisisblaze/blaze-actions/.github/workflows/99-verify-azure.yml@dev
    with:
      environment: ${{ inputs.environment }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # ── FINAL TEARDOWN (Full-Circle Mode Only) ───────────────────────────
  final-destroy-app:
    name: ♻️ Final Destroy App ${{ needs.setup.outputs.target_tag }}
    needs: [setup, verify]
    if: always() && inputs.mode == 'full-circle' && needs.verify.result == 'success'
    uses: thisisblaze/blaze-actions/.github/workflows/01-provision-infra.yml@dev
    with:
      cloud_provider: "azure"
      environment: ${{ inputs.environment }}
      stack: "app"
      destroy: true
      apply: true
      branch_name: ${{ inputs.branch_name }}
    secrets: inherit

  final-destroy-data:
    name: ♻️ Final Destroy Data ${{ needs.setup.outputs.target_tag }}
    needs: [setup, final-destroy-app]
    if: always() && inputs.mode == 'full-circle' && needs.final-destroy-app.result == 'success' && inputs.preserve_host != true
    uses: thisisblaze/blaze-actions/.github/workflows/01-provision-infra.yml@dev
    with:
      cloud_provider: "azure"
      environment: ${{ inputs.environment }}
      stack: "data"
      destroy: true
      apply: true
    secrets: inherit

  final-destroy-network:
    name: ♻️ Final Destroy Network ${{ needs.setup.outputs.target_tag }}
    needs: [setup, final-destroy-data]
    if: always() && inputs.mode == 'full-circle' && needs.final-destroy-data.result == 'success' && inputs.preserve_host != true
    uses: thisisblaze/blaze-actions/.github/workflows/01-provision-infra.yml@dev
    with:
      cloud_provider: "azure"
      environment: ${{ inputs.environment }}
      stack: "network"
      destroy: true
      apply: true
    secrets: inherit

  final-destroy-mongodb:
    name: ♻️ Final Destroy MongoDB
    needs: [setup, final-destroy-network]
    if: always() && inputs.mode == 'full-circle' && needs.final-destroy-network.result == 'success' && inputs.preserve_host != true && inputs.include_third_party == true
    uses: thisisblaze/blaze-actions/.github/workflows/01-provision-infra.yml@dev
    with:
      cloud_provider: "azure"
      environment: ${{ inputs.environment }}
      stack: "third-party-mongodb"
      destroy: true
      apply: true
    secrets: inherit

  # ── REPORTING ────────────────────────────────────────────────────────
  stress-test-report:
    name: 📊 Generate Report
    needs:
      [
        setup,
        check-state,
        provision-network,
        provision-data,
        provision-app,
        deploy-frontend,
        verify,
        final-destroy-app,
        final-destroy-network,
      ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report Summary
        run: |
          echo "# 📊 Azure Stress Test Execution Report" >> $GITHUB_STEP_SUMMARY
          echo "## Mode: \`${{ inputs.mode }}\` | Env: \`${{ inputs.environment }}\`" >> $GITHUB_STEP_SUMMARY

          # Simple reporting via step summary
          echo "Test complete. See individual job statuses for results." >> $GITHUB_STEP_SUMMARY
