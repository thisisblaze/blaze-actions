name: "Stress Test (Azure) Reusable"

on:
  workflow_dispatch:
    inputs:
      environment:
        required: true
        type: choice
        options: ["dev", "stage", "prod"]
        description: "Target environment (dev/stage/prod)"
      target_type:
        description: "What to test"
        required: true
        default: "host"
        type: choice
        options: ["host", "feature-branch"]
      mode:
        required: true
        type: choice
        options: ["standard", "full-circle", "quick-test", "destroy-only"]
        description: "Execution mode"
      preserve_host:
        required: false
        type: boolean
        default: false
      include_third_party:
        required: false
        type: boolean
        default: false
      branch_tag:
        description: "Feature branch tag (required if target_type=feature-branch)"
        required: false
        type: string
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "Target environment (dev/stage/prod)"
      target_type:
        description: "What to test"
        required: false
        default: "host"
        type: string
      mode:
        required: true
        type: string
        description: "Execution mode (standard, full-circle, quick-test, destroy-only)"
      preserve_host:
        required: false
        type: boolean
        default: false
        description: "Do not touch the host infrastructure, only the app/feature branch"
      include_third_party:
        required: false
        type: boolean
        default: false
        description: "Include third-party resources (MongoDB)"
      branch_tag:
        required: false
        type: string
        description: "Feature branch tag (required if target_type=feature-branch)"
      # Azure Auth Pass-through (Base64 encoded to bypass output masking)
      azure_client_id_rev:
        required: false
        type: string
      azure_tenant_id_rev:
        required: false
        type: string
      azure_subscription_id_rev:
        required: false
        type: string
    secrets:
      AWS_ROLE_ARN:
        required: true
      GH_PAT:
        required: false
      NPM_TOKEN:
        required: false
      CLOUDFLARE_API_TOKEN:
        required: false
      CLOUDFLARE_ZONE_ID:
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        required: false
      MONGODB_ATLAS_PUBLIC_KEY:
        required: false
      MONGODB_ATLAS_PRIVATE_KEY:
        required: false
      MONGODB_ATLAS_PROJECT_ID:
        required: false
      MONGODB_ATLAS_ORG_ID:
        required: false
      MONGO_INITDB_ROOT_PASSWORD:
        required: false
      BLAZE_AUTH_JWT_PRIVATE_KEY:
        required: false
      BLAZE_AUTH_ADMIN_EMAIL:
        required: false
      BLAZE_AUTH_ADMIN_PASSWORD:
        required: false
      BLAZE_CONNECTION_STRING:
        required: false
      BLAZE_ELASTICSEARCH_USERNAME:
        required: false
      BLAZE_ELASTICSEARCH_PASSWORD:
        required: false
      BLAZE_FILES_S3_ACCESS_KEY:
        required: false
      BLAZE_FILES_S3_SECRET_ACCESS_KEY:
        required: false
      BLAZE_GRAPHQL_CACHE_SETTINGS:
        required: false
      BLAZE_CLIENT_HEADER:
        required: false
      DEPLOY_KEY:
        required: false
      BLAZE_SENTRY_AUTH_TOKEN:
        required: false
      BLAZE_SENTRY_DSN:
        required: false
      # Azure Fallback Secrets
      AZURE_CLIENT_ID:
        required: false
      AZURE_TENANT_ID:
        required: false
      AZURE_SUBSCRIPTION_ID:
        required: false

permissions:
  id-token: write
  contents: read
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------------
  # PHASE 1: TEARDOWN
  # --------------------------------------------------------------------------------
  phase-1-teardown:
    name: 🌪️ Teardown (Azure)
    uses: ./.github/workflows/reusable-stress-test-teardown.yml
    with:
      environment: ${{ inputs.environment }}
      target_type: ${{ inputs.target_type || 'host' }}
      branch_tag: ${{ inputs.branch_tag }}
      mode: ${{ inputs.mode }}
      include_third_party: ${{ inputs.include_third_party }}
      preserve_host: ${{ inputs.preserve_host }}
      cloud_provider: azure
      azure_client_id_rev: ${{ inputs.azure_client_id_rev }}
      azure_tenant_id_rev: ${{ inputs.azure_tenant_id_rev }}
      azure_subscription_id_rev: ${{ inputs.azure_subscription_id_rev }}
    secrets: inherit

  # --------------------------------------------------------------------------------
  # PHASE 2: PROVISION
  # --------------------------------------------------------------------------------
  phase-2-provision:
    name: 🏗️ Provision (Azure)
    needs: [phase-1-teardown]
    uses: ./.github/workflows/reusable-stress-test-provision.yml
    with:
      environment: ${{ inputs.environment }}
      target_type: ${{ inputs.target_type || 'host' }}
      branch_tag: ${{ inputs.branch_tag }}
      mode: ${{ inputs.mode }}
      include_third_party: ${{ inputs.include_third_party }}
      preserve_host: ${{ inputs.preserve_host }}
      cloud_provider: azure
      azure_client_id_rev: ${{ inputs.azure_client_id_rev }}
      azure_tenant_id_rev: ${{ inputs.azure_tenant_id_rev }}
      azure_subscription_id_rev: ${{ inputs.azure_subscription_id_rev }}
    secrets: inherit

  # --------------------------------------------------------------------------------
  # PHASE 3: DEPLOY
  # --------------------------------------------------------------------------------
  phase-3-deploy:
    name: 🚀 Deploy (Azure)
    needs: [phase-2-provision]
    uses: ./.github/workflows/reusable-stress-test-deploy.yml
    with:
      environment: ${{ inputs.environment }}
      target_type: ${{ inputs.target_type || 'host' }}
      branch_tag: ${{ inputs.branch_tag }}
      mode: ${{ inputs.mode }}
      include_third_party: ${{ inputs.include_third_party }}
      preserve_host: ${{ inputs.preserve_host }}
      cloud_provider: azure
      azure_client_id_rev: ${{ inputs.azure_client_id_rev }}
      azure_tenant_id_rev: ${{ inputs.azure_tenant_id_rev }}
      azure_subscription_id_rev: ${{ inputs.azure_subscription_id_rev }}
    secrets: inherit

  # --------------------------------------------------------------------------------
  # PHASE 4: VERIFY
  # --------------------------------------------------------------------------------
  phase-4-verify:
    name: ✅ Verify (Azure)
    needs: [phase-3-deploy]
    uses: ./.github/workflows/reusable-stress-test-verify.yml
    with:
      environment: ${{ inputs.environment }}
      target_type: ${{ inputs.target_type || 'host' }}
      branch_tag: ${{ inputs.branch_tag }}
      mode: ${{ inputs.mode }}
      include_third_party: ${{ inputs.include_third_party }}
      preserve_host: ${{ inputs.preserve_host }}
      cloud_provider: azure
      azure_client_id_rev: ${{ inputs.azure_client_id_rev }}
      azure_tenant_id_rev: ${{ inputs.azure_tenant_id_rev }}
      azure_subscription_id_rev: ${{ inputs.azure_subscription_id_rev }}
    secrets: inherit
