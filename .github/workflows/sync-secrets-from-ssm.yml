name: "99 - Ops (Sync SSM Secrets)"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target Environment"
        type: choice
        options: ["DEV", "STAGE", "PROD"]
        required: true
      services:
        description: "Services to sync"
        type: choice
        options:
          - "all"
          - "mongodb"
          - "elastic"
        default: "all"
      sync_github:
        description: "Sync to GitHub Secrets?"
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  configuration:
    name: Configuration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      stage_key: ${{ steps.config.outputs.stage_key }}
      project_key: ${{ steps.config.outputs.project_key }}
      client_key: ${{ steps.config.outputs.client_key }}
      platform: ${{ steps.config.outputs.platform }}
      aws_region: ${{ steps.config.outputs.aws_region }}
      namespace: ${{ steps.config.outputs.namespace }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Load AWS Region from Config
        id: load-region
        run: |
          AWS_REGION=$(jq -r '.common.AWS_REGION' vars/blaze-env.json)
          if [[ -z "$AWS_REGION" ]]; then
            echo "❌ ERROR: AWS_REGION not set in vars/blaze-env.json"
            exit 1
          fi
          echo "aws_region=$AWS_REGION" >> "$GITHUB_OUTPUT"
          echo "✅ Using AWS Region: $AWS_REGION (from vars/blaze-env.json)"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ steps.load-region.outputs.aws_region }}

      - name: Calculate Configuration
        id: config
        uses: thisisblaze/blaze-actions/.github/actions/calculate-config@v1.4.9
        with:
          environment: ${{ inputs.environment }}
          terraform_stack: "app"
          branch_name: ""
          deploy_infra: "false"
          build_images: "false"
          deploy_services: "false"
          event_name: "workflow_dispatch"

  sync-mongodb:
    name: Sync MongoDB Credentials
    needs: [configuration]
    if: ${{ inputs.services == 'all' || inputs.services == 'mongodb' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ needs.configuration.outputs.aws_region }}

      - name: Fetch MongoDB Credentials from SSM
        id: mongodb
        run: |
          STAGE="${{ needs.configuration.outputs.stage_key }}"
          CLIENT="${{ needs.configuration.outputs.client_key }}"
          PLATFORM="${{ needs.configuration.outputs.platform }}"
          NAMESPACE="${{ needs.configuration.outputs.namespace }}"
          PREFIX="/${NAMESPACE}/${CLIENT}/${PLATFORM}/${STAGE}/mongodb"

          # Fetch all MongoDB parameters
          MONGODB_URI=$(aws ssm get-parameter --name "${PREFIX}/uri" --with-decryption --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          MONGODB_USERNAME=$(aws ssm get-parameter --name "${PREFIX}/username" --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          MONGODB_PASSWORD=$(aws ssm get-parameter --name "${PREFIX}/password" --with-decryption --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          MONGODB_ADMIN_USERNAME=$(aws ssm get-parameter --name "${PREFIX}/admin-username" --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          MONGODB_ADMIN_PASSWORD=$(aws ssm get-parameter --name "${PREFIX}/admin-password" --with-decryption --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          MONGODB_HOST=$(aws ssm get-parameter --name "${PREFIX}/host" --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          MONGODB_DATABASE=$(aws ssm get-parameter --name "${PREFIX}/database" --query 'Parameter.Value' --output text 2>/dev/null || echo "")

          # Mask sensitive values
          echo "::add-mask::$MONGODB_URI"
          echo "::add-mask::$MONGODB_PASSWORD"
          echo "::add-mask::$MONGODB_ADMIN_PASSWORD"

          # Export to outputs
          # Export to outputs
          {
            echo "uri=$MONGODB_URI"
            echo "username=$MONGODB_USERNAME"
            echo "password=$MONGODB_PASSWORD"
            echo "admin_username=$MONGODB_ADMIN_USERNAME"
            echo "admin_password=$MONGODB_ADMIN_PASSWORD"
            echo "host=$MONGODB_HOST"
            echo "database=$MONGODB_DATABASE"
          } >> "$GITHUB_OUTPUT"

          # Check if parameters exist
          if [ -z "$MONGODB_URI" ]; then
            echo "⚠️  MongoDB parameters not found in SSM. Have you run 'terraform apply' for third-party-mongodb?"
            exit 1
          fi

          echo "✅ Successfully fetched MongoDB credentials from SSM"

      - name: Sync to GitHub Secrets
        if: ${{ inputs.sync_github }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STAGE_UPPER=$(echo "${{ needs.configuration.outputs.stage_key }}" | tr '[:lower:]' '[:upper:]')

          # Update GitHub Secrets
          gh secret set "MONGODB_URI_${STAGE_UPPER}" --body "${{ steps.mongodb.outputs.uri }}"
          gh secret set "MONGODB_USERNAME_${STAGE_UPPER}" --body "${{ steps.mongodb.outputs.username }}"
          gh secret set "MONGODB_PASSWORD_${STAGE_UPPER}" --body "${{ steps.mongodb.outputs.password }}"
          gh secret set "MONGODB_ADMIN_USERNAME_${STAGE_UPPER}" --body "${{ steps.mongodb.outputs.admin_username }}"
          gh secret set "MONGODB_ADMIN_PASSWORD_${STAGE_UPPER}" --body "${{ steps.mongodb.outputs.admin_password }}"
          gh secret set "MONGODB_HOST_${STAGE_UPPER}" --body "${{ steps.mongodb.outputs.host }}"
          gh secret set "MONGODB_DATABASE_${STAGE_UPPER}" --body "${{ steps.mongodb.outputs.database }}"

          echo "✅ MongoDB credentials synced to GitHub Secrets"

  sync-elastic:
    name: Sync Elastic Credentials
    needs: [configuration]
    if: ${{ inputs.services == 'all' || inputs.services == 'elastic' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ needs.configuration.outputs.aws_region }}

      - name: Fetch Elastic Credentials from SSM
        id: elastic
        run: |
          STAGE="${{ needs.configuration.outputs.stage_key }}"
          CLIENT="${{ needs.configuration.outputs.client_key }}"
          PLATFORM="${{ needs.configuration.outputs.platform }}"
          NAMESPACE="${{ needs.configuration.outputs.namespace }}"
          PREFIX="/${NAMESPACE}/${CLIENT}/${PLATFORM}/${STAGE}/elastic"

          # Fetch all Elastic parameters
          ELASTIC_ENDPOINT=$(aws ssm get-parameter --name "${PREFIX}/endpoint" --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          ELASTIC_USERNAME=$(aws ssm get-parameter --name "${PREFIX}/username" --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          ELASTIC_PASSWORD=$(aws ssm get-parameter --name "${PREFIX}/password" --with-decryption --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          ELASTIC_APP_USERNAME=$(aws ssm get-parameter --name "${PREFIX}/app-username" --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          ELASTIC_APP_PASSWORD=$(aws ssm get-parameter --name "${PREFIX}/app-password" --with-decryption --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          KIBANA_ENDPOINT=$(aws ssm get-parameter --name "${PREFIX}/kibana-endpoint" --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          CLOUD_ID=$(aws ssm get-parameter --name "${PREFIX}/cloud-id" --query 'Parameter.Value' --output text 2>/dev/null || echo "")

          # Mask sensitive values
          echo "::add-mask::$ELASTIC_PASSWORD"
          echo "::add-mask::$ELASTIC_APP_PASSWORD"

          # Export to outputs
          # Export to outputs
          {
            echo "endpoint=$ELASTIC_ENDPOINT"
            echo "username=$ELASTIC_USERNAME"
            echo "password=$ELASTIC_PASSWORD"
            echo "app_username=$ELASTIC_APP_USERNAME"
            echo "app_password=$ELASTIC_APP_PASSWORD"
            echo "kibana_endpoint=$KIBANA_ENDPOINT"
            echo "cloud_id=$CLOUD_ID"
          } >> "$GITHUB_OUTPUT"

          # Check if parameters exist
          if [ -z "$ELASTIC_ENDPOINT" ]; then
            echo "⚠️  Elastic parameters not found in SSM. Have you run 'terraform apply' for third-party-elastic?"
            exit 1
          fi

          echo "✅ Successfully fetched Elastic credentials from SSM"

      - name: Sync to GitHub Secrets
        if: ${{ inputs.sync_github }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STAGE_UPPER=$(echo "${{ needs.configuration.outputs.stage_key }}" | tr '[:lower:]' '[:upper:]')

          # Update GitHub Secrets
          gh secret set "ELASTIC_ENDPOINT_${STAGE_UPPER}" --body "${{ steps.elastic.outputs.endpoint }}"
          gh secret set "ELASTIC_USERNAME_${STAGE_UPPER}" --body "${{ steps.elastic.outputs.username }}"
          gh secret set "ELASTIC_PASSWORD_${STAGE_UPPER}" --body "${{ steps.elastic.outputs.password }}"
          gh secret set "ELASTIC_APP_USERNAME_${STAGE_UPPER}" --body "${{ steps.elastic.outputs.app_username }}"
          gh secret set "ELASTIC_APP_PASSWORD_${STAGE_UPPER}" --body "${{ steps.elastic.outputs.app_password }}"
          gh secret set "KIBANA_ENDPOINT_${STAGE_UPPER}" --body "${{ steps.elastic.outputs.kibana_endpoint }}"
          gh secret set "ELASTIC_CLOUD_ID_${STAGE_UPPER}" --body "${{ steps.elastic.outputs.cloud_id }}"

          echo "✅ Elastic credentials synced to GitHub Secrets"

  summary:
    name: Summary
    needs: [configuration, sync-mongodb, sync-elastic]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Report Status
        run: |
          echo "## 🔐 Secrets Sync Summary"
          echo ""
          echo "**Environment**: ${{ inputs.environment }} (${{ needs.configuration.outputs.stage_key }})"
          echo "**Services**: ${{ inputs.services }}"
          echo ""
          echo "### Results:"
          echo "- MongoDB: ${{ needs.sync-mongodb.result }}"
          echo "- Elastic: ${{ needs.sync-elastic.result }}"
          echo ""
          if [ "${{ needs.sync-mongodb.result }}" == "success" ] || [ "${{ needs.sync-elastic.result }}" == "success" ]; then
            echo "✅ Secrets successfully synced!"
          else
            echo "⚠️  Some syncs failed. Check logs above."
          fi
