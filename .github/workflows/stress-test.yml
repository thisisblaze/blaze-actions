name: "🧪 Stress Test"

# ============================================================================
# STRESS TEST WORKFLOW - EXECUTION MODES
# ============================================================================
#
# This workflow provides comprehensive infrastructure lifecycle testing with
# multiple execution modes to suit different use cases.
#
# ────────────────────────────────────────────────────────────────────────────
# MODE: standard (Default)
# ────────────────────────────────────────────────────────────────────────────
#   Flow: Destroy → Provision → Deploy → Verify → KEEP
#   Use:  Manual testing, debugging, infrastructure inspection
#   Time: ~30-35 minutes
#   Notes:
#     - Infrastructure remains deployed after completion
#     - Best for manual testing and debugging
#     - Allows inspection of deployed resources
#
# ────────────────────────────────────────────────────────────────────────────
# MODE: full-circle
# ────────────────────────────────────────────────────────────────────────────
#   Flow: Destroy → Provision → Deploy → Verify → DESTROY
#   Use:  Automated validation, CI/CD gates, true stress testing
#   Time: ~35-40 minutes
#   Notes:
#     - Complete lifecycle validation
#     - Only destroys if verification succeeds (safety feature)
#     - Ideal for automated testing and cost optimization
#
# ────────────────────────────────────────────────────────────────────────────
# MODE: quick-test
# ────────────────────────────────────────────────────────────────────────────
#   Flow: Deploy → Verify (uses existing infrastructure)
#   Use:  Fast validation after manual infrastructure changes
#   Time: ~8-10 minutes
#   Notes:
#     - Skips destroy and provision phases
#     - Requires infrastructure to already exist
#     - Perfect for rapid iteration during development
#
# ────────────────────────────────────────────────────────────────────────────
# MODE: destroy-only
# ────────────────────────────────────────────────────────────────────────────
#   Flow: DESTROY
#   Use:  Manual cleanup, cost control
#   Time: ~6-8 minutes
#   Notes:
#     - Removes all infrastructure
#     - Use for cleanup when no longer needed
#     - Destroys in proper dependency order
#
# ────────────────────────────────────────────────────────────────────────────
# FEATURE: preserve_host
# ────────────────────────────────────────────────────────────────────────────
#   Purpose: Test feature branches without destroying host network
#   Usage:   Set preserve_host=true when target_type=feature-branch
#   Effect:  Skips network destroy/provision, only touches app/tunnel
#   Benefit: Faster feature branch testing (~15-20 min vs ~30-35 min)
#
# ============================================================================

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target Environment"
        required: true
        default: "DEV"
        type: choice
        options: ["DEV", "DEV-MINI", "STAGE", "PROD", "MULTI-SITE"]

      target_type:
        description: "What to test"
        required: true
        default: "host"
        type: choice
        options: ["host", "feature-branch"]

      branch_tag:
        description: "Feature branch tag (required if target_type=feature-branch)"
        required: false
        type: string

      mode:
        description: "Execution Mode (see workflow documentation for details)"
        required: true
        default: "standard"
        type: choice
        options:
          - "standard" # Full cycle, keep infrastructure (~30-35 min)
          - "full-circle" # Full cycle + auto cleanup (~35-40 min)
          - "quick-test" # Test existing infra only (~8-10 min)
          - "destroy-only" # Cleanup only (~6-8 min)

      include_third_party:
        description: "Include third-party stacks (MongoDB, Elastic, Cloudflare)"
        required: false
        default: false
        type: boolean

      preserve_host:
        description: "Preserve host network (skip network destroy/provision for feature
          branch testing)"
        required: false
        default: false
        type: boolean

  # Enable calling from other repositories
  workflow_call:
    inputs:
      environment:
        description: "Target Environment"
        required: true
        type: string

      target_type:
        description: "What to test"
        required: false
        default: "host"
        type: string

      branch_tag:
        description: "Feature branch tag (required if target_type=feature-branch)"
        required: false
        type: string

      mode:
        description: "Execution Mode"
        required: false
        default: "standard"
        type: string

      include_third_party:
        description: "Include third-party stacks (MongoDB, Elastic, Cloudflare)"
        required: false
        default: false
        type: boolean

      preserve_host:
        description: "Preserve host network"
        required: false
        default: false
        type: boolean
    secrets:
      AWS_ROLE_ARN:
        required: true
      GH_PAT:
        required: false
      NPM_TOKEN:
        required: false
      CLOUDFLARE_API_TOKEN:
        required: false
      CLOUDFLARE_ZONE_ID:
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        required: false
      MONGODB_ATLAS_PUBLIC_KEY:
        required: false
      MONGODB_ATLAS_PRIVATE_KEY:
        required: false
      MONGODB_ATLAS_PROJECT_ID:
        required: false
      MONGODB_ATLAS_ORG_ID:
        required: false
      BLAZE_SENTRY_AUTH_TOKEN:
        required: false
      BLAZE_SENTRY_DSN:
        required: false
      # ECS Application Runtime Secrets
      MONGO_INITDB_ROOT_PASSWORD:
        required: false
      BLAZE_AUTH_JWT_PRIVATE_KEY:
        required: false
      BLAZE_AUTH_ADMIN_EMAIL:
        required: false
      BLAZE_AUTH_ADMIN_PASSWORD:
        required: false
      BLAZE_CONNECTION_STRING:
        required: false
      BLAZE_ELASTICSEARCH_USERNAME:
        required: false
      BLAZE_ELASTICSEARCH_PASSWORD:
        required: false
      BLAZE_FILES_S3_ACCESS_KEY:
        required: false
      BLAZE_FILES_S3_SECRET_ACCESS_KEY:
        required: false
      BLAZE_GRAPHQL_CACHE_SETTINGS:
        required: false
      BLAZE_CLIENT_HEADER:
        required: false

permissions:
  id-token: write
  contents: read
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------------
  # PHASE 1: TEARDOWN
  # --------------------------------------------------------------------------------
  phase-1-teardown:
    name: 🌪️ Teardown (AWS)
    uses: ./.github/workflows/reusable-stress-test-teardown.yml
    with:
      environment: ${{ inputs.environment }}
      target_type: ${{ inputs.target_type }}
      branch_tag: ${{ inputs.branch_tag }}
      mode: ${{ inputs.mode }}
      include_third_party: ${{ inputs.include_third_party }}
      preserve_host: ${{ inputs.preserve_host }}
      cloud_provider: aws
    secrets: inherit

  # --------------------------------------------------------------------------------
  # PHASE 2: PROVISION
  # --------------------------------------------------------------------------------
  phase-2-provision:
    name: 🏗️ Provision (AWS)
    needs: [phase-1-teardown]
    uses: ./.github/workflows/reusable-stress-test-provision.yml
    with:
      environment: ${{ inputs.environment }}
      target_type: ${{ inputs.target_type }}
      branch_tag: ${{ inputs.branch_tag }}
      mode: ${{ inputs.mode }}
      include_third_party: ${{ inputs.include_third_party }}
      preserve_host: ${{ inputs.preserve_host }}
      cloud_provider: aws
    secrets: inherit

  # --------------------------------------------------------------------------------
  # PHASE 3: DEPLOY
  # --------------------------------------------------------------------------------
  phase-3-deploy:
    name: 🚀 Deploy (AWS)
    needs: [phase-2-provision]
    uses: ./.github/workflows/reusable-stress-test-deploy.yml
    with:
      environment: ${{ inputs.environment }}
      target_type: ${{ inputs.target_type }}
      branch_tag: ${{ inputs.branch_tag }}
      mode: ${{ inputs.mode }}
      include_third_party: ${{ inputs.include_third_party }}
      preserve_host: ${{ inputs.preserve_host }}
      cloud_provider: aws
    secrets: inherit

  # --------------------------------------------------------------------------------
  # PHASE 4: VERIFY
  # --------------------------------------------------------------------------------
  phase-4-verify:
    name: ✅ Verify (AWS)
    needs: [phase-3-deploy]
    uses: ./.github/workflows/reusable-stress-test-verify.yml
    with:
      environment: ${{ inputs.environment }}
      target_type: ${{ inputs.target_type }}
      branch_tag: ${{ inputs.branch_tag }}
      mode: ${{ inputs.mode }}
      include_third_party: ${{ inputs.include_third_party }}
      preserve_host: ${{ inputs.preserve_host }}
      cloud_provider: aws
    secrets: inherit
