name: "Reusable Terraform"

on:
  workflow_call:
    inputs:
      tf_dir:
        description: "Directory containing Terraform configuration"
        required: true
        type: string
      aws_region:
        description: "AWS Region"
        required: true
        type: string
      environment:
        description: "GitHub Environment (for secrets)"
        required: false
        type: string
      bucket:
        description: "S3 Bucket for State"
        required: true
        type: string
      state_key:
        description: "S3 Key for State"
        required: true
        type: string
      lock_table:
        description: "DynamoDB Table for Locking"
        required: false
        type: string
      terraform_version:
        description: "Terraform Version"
        required: false
        type: string
        default: "1.9.0"
      apply:
        description: "Whether to run terraform apply"
        required: false
        type: boolean
        default: false
      tf_vars:
        description: "Map of Terraform variables (passed as environment variables)"
        required: false
        type: string
      pre_apply_script:
        description: "Bash script to run after Init but before Plan/Apply (e.g. imports)"
        required: false
        type: string
      destroy:
        description: "Whether to generate a destroy plan"
        required: false
        type: boolean
        default: false
      detect_drift:
        description: "Fail if changes are detected (detailed-exitcode)"
        required: false
        type: boolean
        default: false

    secrets:
      AWS_ROLE_ARN:
        required: false
      GH_PAT:
        required: false
      CLOUDFLARE_API_TOKEN:
        required: false
      CLOUDFLARE_ZONE_ID:
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        required: false
      MONGODB_ATLAS_PUBLIC_KEY:
        required: false
      MONGODB_ATLAS_PRIVATE_KEY:
        required: false
      MONGODB_ATLAS_PROJECT_ID:
        required: false
      MONGODB_ATLAS_ORG_ID:
        required: false
      EC_API_KEY:
        required: false
      ACM_CERTIFICATE_ARN:
        required: false

    outputs:
      mongodb_uri:
        description: "MongoDB Connection String"
        value: ${{ jobs.terraform.outputs.mongodb_uri }}
      cluster_name:
        description: "MongoDB Cluster Name"
        value: ${{ jobs.terraform.outputs.cluster_name }}

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      mongodb_uri: ${{ steps.tf_outputs.outputs.mongodb_uri }}
      cluster_name: ${{ steps.tf_outputs.outputs.cluster_name }}
      plan_summary: ${{ steps.plan.outputs.summary }}
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: ${{ inputs.tf_dir }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Build Sharp for Linux (Lambda Runtime) - Critical for Lambda@Edge
      # Lambda runs on Linux, not macOS - must use linux-x64 binaries
      # Only runs for STAGE/PROD where image resize is enabled
      - name: Build Sharp for Lambda@Edge (Linux x64)
        if: contains(fromJSON('["STAGE", "PROD"]'), inputs.environment)
        run: |
          LAMBDA_DIR="modules/aws/lambda/edge-functions/functions/resize-image"

          if [[ -d "$LAMBDA_DIR" ]]; then
            cd "$LAMBDA_DIR"
            
            echo "🧹 Removing existing node_modules (likely macOS binaries)..."
            rm -rf node_modules package-lock.json
            
            echo "🔨 Building Sharp for Amazon Linux 2 (Lambda runtime)..."
            docker run --rm \
              -v $(pwd):/build \
              -w /build \
              public.ecr.aws/lambda/nodejs:18 \
              npm install --platform=linux --arch=x64 --production
            
            echo "✅ Sharp built for Linux x64"
            
            # Verify correct architecture
            if ls node_modules/@img/sharp-linux-x64 2>/dev/null; then
              echo "✅ Correct binaries: sharp-linux-x64"
            else
              echo "❌ WARNING: Linux binaries not found!"
              ls node_modules/@img/ || echo "No @img directory"
            fi
          else
            echo "ℹ️ No Lambda function directory found - skipping Sharp build"
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.23
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Debug Secret Presence
        run: |
          if [ -n "${{ secrets.GH_PAT }}" ]; then
            echo "✅ GH_PAT is DETECTED."
          else
            echo "⚠️ GH_PAT is NOT DETECTED. Falling back to GITHUB_TOKEN."
          fi

          if [ -n "${{ secrets.EC_API_KEY }}" ]; then
             echo "✅ EC_API_KEY is DETECTED."
          else
             echo "❌ EC_API_KEY is NOT DETECTED (Empty)."
          fi

      - name: Configure Git for Private Modules
        env:
          TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          git config --global url."https://${TOKEN}@github.com".insteadOf "https://github.com"

      - name: Terraform Init
        id: init
        run: |
          set +e
          BUCKET="${{ inputs.bucket }}"
          STATE_KEY="${{ inputs.state_key }}"
          LOCK_TABLE="${{ inputs.lock_table }}"
          TABLE_NAME="${LOCK_TABLE:-${BUCKET}}"
          REGION="${{ inputs.aws_region }}"

          echo "🌐 Initializing Terraform Backend..."
          echo "   Bucket: $BUCKET"
          echo "   Key:    $STATE_KEY"
          echo "   Table:  $TABLE_NAME"

          terraform init \
            -upgrade \
            -backend-config="bucket=${BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="dynamodb_table=${TABLE_NAME}" \
            -backend-config="region=${REGION}" 2>&1 | tee /tmp/init_output.log
            
          INIT_EXIT_CODE=${PIPESTATUS[0]}

          if [[ $INIT_EXIT_CODE -ne 0 ]]; then
            if grep -qi "checksum" /tmp/init_output.log || grep -qi "does not have the expected content" /tmp/init_output.log; then


               echo "⚠️ Checksum mismatch / Stale Lock detected. Attempting recovery..."
               LOCK_ID="${BUCKET}/${STATE_KEY}"
               

               echo "🔎 DEBUG: Dumping ALL Items in Lock Table to find true key..."
               aws dynamodb scan --table-name "${TABLE_NAME}" --region "${REGION}"
               
               echo "🗑️ DEBUG: Attempting to delete expected LockID: ${LOCK_ID}"
               
               # Delete Lock from DynamoDB
               aws dynamodb delete-item \
                 --table-name "${TABLE_NAME}" \
                 --key "{\"LockID\": {\"S\": \"${LOCK_ID}\"}}" \
                 --region "${REGION}"

               # Delete Lock MD5 (Digest) from DynamoDB
               echo "🗑️ DEBUG: Attempting to delete expected LockID (MD5): ${LOCK_ID}-md5"
               aws dynamodb delete-item \
                 --table-name "${TABLE_NAME}" \
                 --key "{\"LockID\": {\"S\": \"${LOCK_ID}-md5\"}}" \
                 --region "${REGION}"

               # Attempt to delete without bucket prefix as fallback
               echo "🗑️ DEBUG: Attempting to delete fallback LockID: ${STATE_KEY}"
               aws dynamodb delete-item \
                 --table-name "${TABLE_NAME}" \
                 --key "{\"LockID\": {\"S\": \"${STATE_KEY}\"}}" \
                 --region "${REGION}"

               aws dynamodb delete-item \
                 --table-name "${TABLE_NAME}" \
                 --key "{\"LockID\": {\"S\": \"${STATE_KEY}-md5\"}}" \
                 --region "${REGION}"

               # Delete .tflock from S3
               aws s3 rm "s3://${BUCKET}/${STATE_KEY}.tflock" --region "${REGION}" || true
               
               echo "🔄 Retrying Init..."
               terraform init \
                -upgrade \
                -backend-config="bucket=${BUCKET}" \
                -backend-config="key=${STATE_KEY}" \
                -backend-config="dynamodb_table=${TABLE_NAME}" \
                -backend-config="region=${REGION}" \

               
               exit "$?"
            else
               echo "❌ Terraform Init Failed"
               exit "$INIT_EXIT_CODE"
            fi
          fi

      - name: Check & Release Stale Locks
        run: |
          # Fixed lock check logic - properly parse Info JSON blob
          BUCKET="${{ inputs.bucket }}"
          STATE_KEY="${{ inputs.state_key }}"
          TABLE_NAME="${{ inputs.lock_table }}"
          TABLE_NAME="${TABLE_NAME:-$BUCKET}"
          LOCK_ID="${BUCKET}/${STATE_KEY}"
          REGION="${{ inputs.aws_region }}"

          echo "🔍 Checking for stale locks..."
          LOCK_DATA=$(aws dynamodb get-item --table-name "$TABLE_NAME" --key "{\"LockID\": {\"S\": \"${LOCK_ID}\"}}" --region "$REGION" 2>/dev/null)

          if echo "$LOCK_DATA" | grep -q "Item"; then
             echo "📋 Lock found, checking age..."
             
             # CRITICAL FIX: Extract Info JSON blob (Created is inside this)
             INFO=$(echo "$LOCK_DATA" | jq -r '.Item.Info.S // empty')
             
             if [[ -n "$INFO" ]]; then
                # Parse Created timestamp from Info JSON
                CREATED=$(echo "$INFO" | jq -r '.Created // empty')
                
                if [[ -n "$CREATED" ]]; then
                   echo "   Created: $CREATED"
                   
                   # Parse timestamp (strip nanoseconds)
                   CLEAN_TS=$(echo "$CREATED" | awk '{print $1, $2}')
                   LOCK_EPOCH=$(date -d "$CLEAN_TS" +%s 2>/dev/null || echo "")
                   
                   if [[ -n "$LOCK_EPOCH" ]]; then
                      NOW_EPOCH=$(date +%s)
                      AGE_SEC=$((NOW_EPOCH - LOCK_EPOCH))
                      AGE_MIN=$((AGE_SEC / 60))
                      AGE_HOURS=$((AGE_MIN / 60))
                      
                      echo "   Age: ${AGE_HOURS}h ${AGE_MIN}m (${AGE_SEC}s)"
                      
                      # Release if older than 15 minutes
                      if [[ $AGE_MIN -gt 15 ]]; then
                         echo "🔓 Releasing stale lock (Age: ${AGE_HOURS}h ${AGE_MIN}m)..."
                         aws dynamodb delete-item --table-name "$TABLE_NAME" --key "{\"LockID\": {\"S\": \"${LOCK_ID}\"}}" --region "$REGION"
                         echo "✅ Stale lock released successfully"
                      else
                         echo "⏳ Lock is recent (${AGE_MIN}m old), keeping it"
                      fi
                   else
                      echo "⚠️ Could not parse timestamp"
                   fi
                else
                   echo "⚠️ No Created field in lock Info"
                fi
             else
                echo "⚠️ Lock has no Info field"
             fi
          else
             echo "✅ No existing lock found"
          fi

      - name: Load TF Vars
        if: ${{ inputs.tf_vars != '' }}
        run: |
          # Write input vars to a .auto.tfvars file or export to ENV
          # Exporting to ENV is safest for dynamic keys
          echo "${{ inputs.tf_vars }}" > _github_vars.env
          while read -r line; do
            if [[ -n "$line" && ! "$line" =~ ^# ]]; then
               # Check if line contains =
               if [[ "$line" == *"="* ]]; then
                 KEY=$(echo "$line" | cut -d'=' -f1 | tr -d ' ')
                 VAL=$(echo "$line" | cut -d'=' -f2-)
                 echo "TF_VAR_${KEY}=${VAL}" >> "$GITHUB_ENV"
               fi
            fi
          done < _github_vars.env

      - name: Run VPC Integrity Check
        working-directory: ${{ inputs.tf_dir }}
        env:
          AWS_REGION: ${{ inputs.aws_region }}
          CLIENT_KEY: ${{ env.TF_VAR_client_key }}
          PROJECT_KEY: ${{ env.TF_VAR_project_key }}
          STAGE: ${{ env.TF_VAR_stage }}
        run: |
          if [[ -f "check-vpc-integrity.sh" ]]; then
            echo "🔍 Found VPC Integrity Check script. Executing..."
            chmod +x check-vpc-integrity.sh
            ./check-vpc-integrity.sh
          fi

      - name: Run Pre-Apply Script
        if: ${{ inputs.pre_apply_script != '' }}
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_acm_certificate_arn: ${{ secrets.ACM_CERTIFICATE_ARN }}
          MONGODB_ATLAS_PUBLIC_KEY: ${{ secrets.MONGODB_ATLAS_PUBLIC_KEY }}
          MONGODB_ATLAS_PRIVATE_KEY: ${{ secrets.MONGODB_ATLAS_PRIVATE_KEY }}
          MONGODB_ATLAS_PROJECT_ID: ${{ secrets.MONGODB_ATLAS_PROJECT_ID }}
          EC_API_KEY: ${{ secrets.EC_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          echo "📜 Running Pre-Apply Script..."
          ${{ inputs.pre_apply_script }}

      - name: Terraform Plan
        id: plan
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_acm_certificate_arn: ${{ secrets.ACM_CERTIFICATE_ARN }}
          TF_VAR_atlas_public_key: ${{ secrets.MONGODB_ATLAS_PUBLIC_KEY }}
          TF_VAR_atlas_private_key: ${{ secrets.MONGODB_ATLAS_PRIVATE_KEY }}
          TF_VAR_atlas_project_id: ${{ secrets.MONGODB_ATLAS_PROJECT_ID }}
          TF_VAR_atlas_org_id: ${{ secrets.MONGODB_ATLAS_ORG_ID }}
          TF_VAR_ec_api_key: ${{ secrets.EC_API_KEY }}
        run: |
          DESTROY_FLAG=""
          if [[ "${{ inputs.destroy }}" == "true" ]]; then
            DESTROY_FLAG="-destroy"
          fi

          DETAILED_EXITCODE=""
          if [[ "${{ inputs.detect_drift }}" == "true" ]]; then
             DETAILED_EXITCODE="-detailed-exitcode"
          fi

          set +e
          terraform plan $DESTROY_FLAG $DETAILED_EXITCODE -out=tfplan -input=false | tee plan.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          # Extract Plan Summary
          PLAN_SUMMARY="No changes"
          if grep -q "Plan:" plan.log; then
             PLAN_SUMMARY=$(grep "Plan:" plan.log | tail -n 1)
          elif grep -q "No changes" plan.log; then
             PLAN_SUMMARY="No changes"
          fi
          echo "summary=$PLAN_SUMMARY" >> $GITHUB_OUTPUT

          # Handle Drift Detection
          if [[ "${{ inputs.detect_drift }}" == "true" ]]; then
             if [[ $EXIT_CODE -eq 2 ]]; then
                echo "::error::⚠️ Drift Detected! Infrastructure differs from Code."
                exit 1
             elif [[ $EXIT_CODE -eq 0 ]]; then
                echo "✅ No Drift Detected."
             else
                echo "❌ Terraform Plan Failed (Exit Code: $EXIT_CODE)"
                exit $EXIT_CODE
             fi
          else
             # Standard Behavior: Exit code 0 (no changes) or 2 (changes) are both success
             if [[ $EXIT_CODE -eq 0 || $EXIT_CODE -eq 2 ]]; then
                if [[ $EXIT_CODE -eq 2 ]]; then
                   echo "✅ Terraform Plan Successful - Changes Detected"
                else
                   echo "✅ Terraform Plan Successful - No Changes"
                fi
             else
                echo "❌ Terraform Plan Failed (Exit Code: $EXIT_CODE)"
                exit $EXIT_CODE
             fi
          fi

      # Smart Pre-Destroy Hook for MongoDB
      # Automatically disables termination protection before cluster destruction
      - name: Run Pre-Destroy Hook
        if: ${{ inputs.destroy == true && inputs.apply == true }}
        working-directory: ${{ inputs.tf_dir }}
        env:
          # MongoDB Atlas credentials - use direct env var names
          MONGODB_ATLAS_PROJECT_ID: ${{ secrets.MONGODB_ATLAS_PROJECT_ID }}
          MONGODB_ATLAS_PUBLIC_KEY: ${{ secrets.MONGODB_ATLAS_PUBLIC_KEY }}
          MONGODB_ATLAS_PRIVATE_KEY: ${{ secrets.MONGODB_ATLAS_PRIVATE_KEY }}
          # TF variables for cluster name calculation (passed from parent)
          TF_VARS: ${{ inputs.tf_vars }}
        run: |
          # Check if pre-destroy.sh exists in current directory
          if [ -f "pre-destroy.sh" ]; then
            echo "🔧 Found pre-destroy.sh - executing smart pre-destroy hooks..."
            
            # Parse tf_vars and export as environment variables
            if [ -n "$TF_VARS" ]; then
              echo "📝 Parsing TF variables..."
              while IFS='=' read -r key value; do
                # Skip empty lines
                [ -z "$key" ] && continue
                # Export as TF_VAR_ prefixed
                eval "export TF_VAR_${key}='${value}'"
                echo "   Exported: TF_VAR_${key}"
              done <<< "$TF_VARS"
            fi
            
            chmod +x pre-destroy.sh
            ./pre-destroy.sh
          else
            echo "ℹ️  No pre-destroy.sh found - skipping pre-destroy hooks"
          fi

      - name: Terraform Apply
        if: ${{ inputs.apply == true }}
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_acm_certificate_arn: ${{ secrets.ACM_CERTIFICATE_ARN }}
          TF_VAR_atlas_public_key: ${{ secrets.MONGODB_ATLAS_PUBLIC_KEY }}
          TF_VAR_atlas_private_key: ${{ secrets.MONGODB_ATLAS_PRIVATE_KEY }}
          TF_VAR_atlas_project_id: ${{ secrets.MONGODB_ATLAS_PROJECT_ID }}
          TF_VAR_atlas_org_id: ${{ secrets.MONGODB_ATLAS_ORG_ID }}
          TF_VAR_ec_api_key: ${{ secrets.EC_API_KEY }}
        run: |
          terraform apply -auto-approve -input=false tfplan

      - name: Export Terraform Outputs
        id: tf_outputs
        if: ${{ inputs.apply == true }}
        run: |
          echo "📤 Exporting Terraform Outputs..."
          terraform output -json > tf_outputs.json

          # MongoDB URI
          MONGO_URI=$(jq -r '.mongodb_uri.value // empty' tf_outputs.json)
          if [[ -n "$MONGO_URI" ]]; then
             echo "::add-mask::$MONGO_URI"
             echo "mongodb_uri=$MONGO_URI" >> $GITHUB_OUTPUT
          fi

          # Cluster Name
          CLUSTER_NAME=$(jq -r '.cluster_name.value // empty' tf_outputs.json)
          if [[ -n "$CLUSTER_NAME" ]]; then
             echo "cluster_name=$CLUSTER_NAME" >> $GITHUB_OUTPUT
          fi
