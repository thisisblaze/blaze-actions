name: "♻️ Reusable Terraform"

on:
  workflow_call:
    inputs:
      cloud_provider:
        description: "Cloud provider (aws/gcp/azure). Default: aws"
        required: false
        type: string
        default: "aws"
      tf_dir:
        description: "Directory containing Terraform configuration"
        required: true
        type: string
      aws_region:
        description: "AWS Region"
        required: true
        type: string
      environment:
        description: "GitHub Environment (for secrets)"
        required: false
        type: string
      bucket:
        description: "S3 Bucket for State"
        required: true
        type: string
      state_key:
        description: "S3 Key for State"
        required: true
        type: string
      lock_table:
        description: "DynamoDB Table for Locking"
        required: false
        type: string
      terraform_version:
        description: "Terraform Version"
        required: false
        type: string
        default: "1.9.0"
      apply:
        description: "Whether to run terraform apply"
        required: false
        type: boolean
        default: false
      tf_vars:
        description: "Map of Terraform variables (passed as environment variables)"
        required: false
        type: string
      pre_apply_script:
        description: "Bash script to run after Init but before Plan/Apply (e.g. imports)"
        required: false
        type: string
      destroy:
        description: "Whether to generate a destroy plan"
        required: false
        type: boolean
        default: false
      detect_drift:
        description: "Fail if changes are detected (detailed-exitcode)"
        required: false
        type: boolean
        default: false
      orphan_lambda:
        description: "Skip Lambda@Edge destruction by removing from state (prevents 1h hang)"
        required: false
        type: boolean
        default: false
      split_apply:
        description: "Enable Split Apply (Targeted Apply -> Sleep -> Full Apply)"
        required: false
        type: boolean
        default: false
      split_targets:
        description: "Space-separated list of targets for the first apply step"
        required: false
        type: string
      sleep_seconds:
        description: "Seconds to sleep between split apply steps"
        required: false
        type: number
        default: 60
      wif_audience:
        description: "WIF Audience (Optional)"
        required: false
        type: string
        default: ""
      # Azure reversed credentials (to bypass GitHub secret masking on outputs)
      azure_client_id_rev:
        required: false
        type: string
      azure_tenant_id_rev:
        required: false
        type: string
      azure_subscription_id_rev:
        required: false
        type: string

    secrets:
      AWS_ROLE_ARN:
        required: false
      GH_PAT:
        required: false
      CLOUDFLARE_API_TOKEN:
        required: false
      CLOUDFLARE_ZONE_ID:
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        required: false
      MONGODB_ATLAS_PUBLIC_KEY:
        required: false
      MONGODB_ATLAS_PRIVATE_KEY:
        required: false
      MONGODB_ATLAS_PROJECT_ID:
        required: false
      MONGODB_ATLAS_ORG_ID:
        required: false
      EC_API_KEY:
        required: false
      ACM_CERTIFICATE_ARN:
        required: false
      # GCP Authentication (Workload Identity Federation)
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        required: false
      GCP_SERVICE_ACCOUNT:
        required: false
      # Azure
      AZURE_CLIENT_ID:
        required: false
      AZURE_TENANT_ID:
        required: false
      AZURE_SUBSCRIPTION_ID:
        required: false
      DEPLOY_KEY:
        required: false
        description: "SSH Deploy Key for private Terraform modules"

    outputs:
      mongodb_uri:
        description: "MongoDB Connection String"
        value: ${{ jobs.terraform.outputs.mongodb_uri }}
      cluster_name:
        description: "MongoDB Cluster Name"
        value: ${{ jobs.terraform.outputs.cluster_name }}
      alb_dns_name:
        description: "Load Balancer DNS Name"
        value: ${{ jobs.terraform.outputs.alb_dns_name }}
      ecs_cluster_name:
        description: "ECS Cluster Name"
        value: ${{ jobs.terraform.outputs.ecs_cluster_name }}
      iam_role_name:
        description: "IAM Execution Role Name"
        value: ${{ jobs.terraform.outputs.iam_role_name }}
      service_discovery_namespace:
        description: "Service Discovery Namespace"
        value: ${{ jobs.terraform.outputs.service_discovery_namespace }}
      log_group_name:
        description: "CloudWatch Log Group Name"
        value: ${{ jobs.terraform.outputs.log_group_name }}
      image_resize_enabled:
        description: "Image Resize Status"
        value: ${{ jobs.terraform.outputs.image_resize_enabled }}
      plan_summary:
        description: "Plan Summary"
        value: ${{ jobs.terraform.outputs.plan_summary }}
      vpc_id:
        description: "VPC ID"
        value: ${{ jobs.terraform.outputs.vpc_id }}
      efs_id:
        description: "EFS ID"
        value: ${{ jobs.terraform.outputs.efs_id }}

concurrency:
  group: tf-util-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      id-token: write # Required for OIDC (Azure, GCP, AWS)
      contents: read
    outputs:
      mongodb_uri: ${{ steps.tf_outputs.outputs.mongodb_uri }}
      cluster_name: ${{ steps.tf_outputs.outputs.cluster_name }}
      plan_summary: ${{ steps.plan.outputs.summary }}
      alb_dns_name: ${{ steps.tf_outputs.outputs.alb_dns_name }}
      ecs_cluster_name: ${{ steps.tf_outputs.outputs.ecs_cluster_name }}
      iam_role_name: ${{ steps.tf_outputs.outputs.iam_role_name }}
      service_discovery_namespace: ${{ steps.tf_outputs.outputs.service_discovery_namespace }}
      log_group_name: ${{ steps.tf_outputs.outputs.log_group_name }}
      vpc_id: ${{ steps.tf_outputs.outputs.vpc_id }}
      efs_id: ${{ steps.tf_outputs.outputs.efs_id }}
      service_discovery_id: ${{ steps.tf_outputs.outputs.service_discovery_id }}
      image_resize_enabled: ${{ steps.tf_outputs.outputs.image_resize_enabled }}
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: ${{ inputs.tf_dir }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0.1.24.0.0
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: Configure AWS Credentials
        if: inputs.cloud_provider == 'aws' || inputs.cloud_provider == ''
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Authenticate to Google Cloud
        if: inputs.cloud_provider == 'gcp'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER || '' }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT || '' }}
          audience: ${{ inputs.wif_audience }}

      - name: Decode Azure Credentials
        if: inputs.cloud_provider == 'azure'
        id: decode-azure
        run: |
          CLIENT=$(echo "${{ inputs.azure_client_id_rev }}" | rev)
          TENANT=$(echo "${{ inputs.azure_tenant_id_rev }}" | rev)
          SUB=$(echo "${{ inputs.azure_subscription_id_rev }}" | rev)
          echo "client_id=$CLIENT" >> "$GITHUB_OUTPUT"
          echo "tenant_id=$TENANT" >> "$GITHUB_OUTPUT"
          echo "subscription_id=$SUB" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Azure
        if: inputs.cloud_provider == 'azure'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID || steps.decode-azure.outputs.client_id }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID || steps.decode-azure.outputs.tenant_id }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID || steps.decode-azure.outputs.subscription_id }}

      - name: Debug Secret Presence
        run: |
          if [ -n "${{ secrets.GH_PAT }}" ]; then
            echo "✅ GH_PAT is DETECTED."
          else
            echo "⚠️ GH_PAT is NOT DETECTED. Falling back to GITHUB_TOKEN."
          fi

          if [ -n "${{ secrets.EC_API_KEY }}" ]; then
             echo "✅ EC_API_KEY is DETECTED."
          else
             echo "❌ EC_API_KEY is NOT DETECTED (Empty)."
          fi

      - name: Configure Git for Private Modules
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          if [ -n "${GH_PAT}" ]; then
            echo "✅ Configuring Git with GH_PAT..."
            git config --global url."https://${GH_PAT}@github.com/".insteadOf "https://github.com/"
          elif [ -n "${DEPLOY_KEY}" ]; then
            echo "✅ Configuring Git with SSH Deploy Key..."
            mkdir -p ~/.ssh
            echo "${DEPLOY_KEY}" > ~/.ssh/id_rsa
            chmod 600 ~/.ssh/id_rsa
            ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
            git config --global url."git@github.com:".insteadOf "https://github.com/"
          else
            echo "⚠️ No GH_PAT or DEPLOY_KEY found. Using GITHUB_TOKEN (cross-repo private modules may fail)."
            git config --global url."https://x-access-token:${{ github.token }}@github.com/".insteadOf "https://github.com/"
          fi

      - name: Terraform Init
        id: init
        env:
          # Azure OIDC: azurerm provider cannot use CLI auth for SPs — must use ARM_ env vars
          ARM_USE_OIDC: ${{ inputs.cloud_provider == 'azure' && 'true' || 'false' }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID || steps.decode-azure.outputs.client_id }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID || steps.decode-azure.outputs.tenant_id }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID || steps.decode-azure.outputs.subscription_id }}
        run: |
          set +e
          BUCKET="${{ inputs.bucket }}"
          STATE_KEY="${{ inputs.state_key }}"
          LOCK_TABLE="${{ inputs.lock_table }}"
          TABLE_NAME="${LOCK_TABLE:-${BUCKET}}"
          REGION="${{ inputs.aws_region }}"
          CLOUD_PROVIDER="${{ inputs.cloud_provider }}"
          CLOUD_PROVIDER="${CLOUD_PROVIDER:-aws}"

          echo "🌐 Initializing Terraform Backend (Provider: $CLOUD_PROVIDER)..."

          # ── MULTI-CLOUD: Route backend init by cloud_provider ──
          case "$CLOUD_PROVIDER" in
            gcp)
              echo "☁️  GCP Backend: GCS bucket=$BUCKET, prefix=$STATE_KEY"
              terraform init \
                -upgrade \
                -backend-config="bucket=${BUCKET}" \
                -backend-config="prefix=${STATE_KEY}"
              exit $?
              ;;
            azure)
              echo "☁️  Azure Backend: Initializing..."
              
              # Extract Azure specific config from inputs or assume standard vars
              # We need resource_group_name, storage_account_name, container_name, key
              # These are passed via -backend-config in the init command
              
              # Logic: The 'bucket' input is mapped to 'container_name' for Azure
              #       The 'state_key' input is mapped to 'key'
              #       We need STORAGE_ACCOUNT and RESOURCE_GROUP passed via Env or extrapolated
              
              # Using the standard naming convention if explicit vars not provided:
              # RG = rg-terraform-state
              # SA = stterraformstate{client_key} -> This is tricky without client_key input.
              # SOLUTION: We expect the caller to pass these as backend-config args OR we use a standard approach.
              
              # Better approach for this workflow:
              # We will assume the 'bucket' input contains the Storage Account Name AND Container in format: "sa_name/container_name"
              # OR better yet, we just update the caller to pass everything.
              
              # For now, let's use the provided inputs and rely on the fact that for proper Azure init, 
              # we might need to rely on the partial configuration in the .tf file (backend "azurerm" {})
              # and pass the rest here.
              
              # We will require the user to pass 'storage_account_name' and 'resource_group_name' via tf_vars or logic? 
              # actually, 'bucket' input = container_name
              # 'state_key' input = key
              # 'lock_table' input = resource_group_name (Re-purposing input for Azure to avoid breaking API)
              
              # Re-mapping inputs for Azure:
              # bucket -> container_name
              # lock_table -> resource_group_name
              # We are missing storage_account_name. We will assume it is passed via env AZURE_STORAGE_ACCOUNT or similar.
              
              # ACTUALLY, simpler:
              # We'll expect the caller (01-provision-infra) to set these ENV vars or we fail.
              # But 01-provision-infra calls this reusable workflow.
              
              # Let's check inputs.bucket usage.
              # In Azure, we need: resource_group_name, storage_account_name, container_name, key.
              
              # We will parse `bucket` input as `resource_group_name/storage_account_name/container_name` for Azure.
              # This is a breaking change for the input format but only for Azure provider.
              
              IFS='/' read -r RES_GROUP STOR_ACC CONTAINER <<< "${BUCKET}"
              
              if [[ -z "$RES_GROUP" || -z "$STOR_ACC" || -z "$CONTAINER" ]]; then
                 echo "❌ Error: For Azure, 'bucket' input must be format: 'resource_group/storage_account/container'"
                 exit 1
              fi
              
              echo "   Resource Group: $RES_GROUP"
              echo "   Storage Acc:    $STOR_ACC"
              echo "   Container:      $CONTAINER"
              echo "   Key:            $STATE_KEY"
              
              terraform init \
                -upgrade \
                -backend-config="resource_group_name=${RES_GROUP}" \
                -backend-config="storage_account_name=${STOR_ACC}" \
                -backend-config="container_name=${CONTAINER}" \
                -backend-config="key=${STATE_KEY}"
                
              exit $?
              ;;
            *)
              # AWS S3 Backend (existing logic)
              echo "   Bucket: $BUCKET"
              echo "   Key:    $STATE_KEY"
              echo "   Table:  $TABLE_NAME"
              ;;
          esac

          terraform init \
            -upgrade \
            -backend-config="bucket=${BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="dynamodb_table=${TABLE_NAME}" \
            -backend-config="region=${REGION}" 2>&1 | tee /tmp/init_output.log
            
          INIT_EXIT_CODE=${PIPESTATUS[0]}

          if [[ $INIT_EXIT_CODE -ne 0 ]]; then
            if grep -qi "checksum" /tmp/init_output.log || grep -qi "does not have the expected content" /tmp/init_output.log; then


               echo "⚠️ Checksum mismatch / Stale Lock detected. Attempting recovery..."
               LOCK_ID="${BUCKET}/${STATE_KEY}"
               

               echo "🔎 DEBUG: Dumping ALL Items in Lock Table to find true key..."
               aws dynamodb scan --table-name "${TABLE_NAME}" --region "${REGION}"
               
               echo "🗑️ DEBUG: Attempting to delete expected LockID: ${LOCK_ID}"
               
               # Delete Lock from DynamoDB
               aws dynamodb delete-item \
                 --table-name "${TABLE_NAME}" \
                 --key "{\"LockID\": {\"S\": \"${LOCK_ID}\"}}" \
                 --region "${REGION}"

               # Delete Lock MD5 (Digest) from DynamoDB
               echo "🗑️ DEBUG: Attempting to delete expected LockID (MD5): ${LOCK_ID}-md5"
               aws dynamodb delete-item \
                 --table-name "${TABLE_NAME}" \
                 --key "{\"LockID\": {\"S\": \"${LOCK_ID}-md5\"}}" \
                 --region "${REGION}"

               # Attempt to delete without bucket prefix as fallback
               echo "🗑️ DEBUG: Attempting to delete fallback LockID: ${STATE_KEY}"
               aws dynamodb delete-item \
                 --table-name "${TABLE_NAME}" \
                 --key "{\"LockID\": {\"S\": \"${STATE_KEY}\"}}" \
                 --region "${REGION}"

               aws dynamodb delete-item \
                 --table-name "${TABLE_NAME}" \
                 --key "{\"LockID\": {\"S\": \"${STATE_KEY}-md5\"}}" \
                 --region "${REGION}"

               # Delete .tflock from S3
               aws s3 rm "s3://${BUCKET}/${STATE_KEY}.tflock" --region "${REGION}" || true
               
               echo "🔄 Retrying Init..."
               terraform init \
                -upgrade \
                -backend-config="bucket=${BUCKET}" \
                -backend-config="key=${STATE_KEY}" \
                -backend-config="dynamodb_table=${TABLE_NAME}" \
                -backend-config="region=${REGION}"
               
               exit "$?"
            else
               echo "❌ Terraform Init Failed"
               exit "$INIT_EXIT_CODE"
            fi
          fi

      # Build Sharp for Linux (Lambda Runtime) - Critical for Lambda@Edge
      # Lambda runs on Linux, not macOS - must use linux-x64 binaries
      # Run AFTER init to catch both local modules AND remote modules (in .terraform)
      - name: Build Sharp for Lambda@Edge (Linux x64)
        working-directory: ${{ inputs.tf_dir }}
        run: |
          set -x
          echo "🔍 Searching for 'resize-image' Lambda directory (Local or Remote)..."

          # Optimized find: prune node_modules and .git, look for functions/resize-image
          FOUND_DIRS=$(find . -name "node_modules" -prune -o -name ".git" -prune -o -type d -path "*/functions/resize-image" -print)

          if [[ -z "$FOUND_DIRS" ]]; then
            echo "ℹ️ No 'resize-image' function directory found - skipping Sharp build."
          else
            for LAMBDA_DIR in $FOUND_DIRS; do
              echo "🚀 Found Lambda Directory: $LAMBDA_DIR"
              
              # Resolve absolute path for Docker volume mount
              ABS_LAMBDA_DIR="$(cd "$LAMBDA_DIR" && pwd)"
              
              if [[ ! -f "$ABS_LAMBDA_DIR/package.json" ]]; then
                 echo "⚠️ No package.json in $ABS_LAMBDA_DIR - skipping."
                 continue
              fi

              echo "   Dir: $ABS_LAMBDA_DIR"
              
              echo "🧹 Removing existing node_modules..."
              rm -rf "$ABS_LAMBDA_DIR/node_modules" "$ABS_LAMBDA_DIR/package-lock.json"
              
              echo "🔨 Building Sharp with node:20 (Standard CI Image)..."
              docker run --rm \
                -v "$ABS_LAMBDA_DIR":/build \
                -w /build \
                node:20 \
                npm install --platform=linux --arch=x64 --production --verbose
              
              echo "✅ Sharp built for Linux x64"
              
              # Verify correct architecture
              if ls "$ABS_LAMBDA_DIR/node_modules/@img/sharp-linux-x64" 2>/dev/null; then
                echo "✅ Correct binaries: sharp-linux-x64"
              else
                echo "❌ WARNING: Linux binaries not found in $ABS_LAMBDA_DIR!"
              fi
            done
          fi

      - name: Check & Release Stale Locks
        if: inputs.cloud_provider == 'aws' || inputs.cloud_provider == ''
        run: |
          # Fixed lock check logic - properly parse Info JSON blob
          BUCKET="${{ inputs.bucket }}"
          STATE_KEY="${{ inputs.state_key }}"
          TABLE_NAME="${{ inputs.lock_table }}"
          TABLE_NAME="${TABLE_NAME:-$BUCKET}"
          LOCK_ID="${BUCKET}/${STATE_KEY}"
          REGION="${{ inputs.aws_region }}"

          echo "🔍 Checking for stale locks..."
          LOCK_DATA=$(aws dynamodb get-item --table-name "$TABLE_NAME" --key "{\"LockID\": {\"S\": \"${LOCK_ID}\"}}" --region "$REGION" 2>/dev/null || true)

          if echo "$LOCK_DATA" | grep -q "Item"; then
             echo "📋 Lock found, checking age..."
             
             # CRITICAL FIX: Extract Info JSON blob (Created is inside this)
             INFO=$(echo "$LOCK_DATA" | jq -r '.Item.Info.S // empty')
             
             if [[ -n "$INFO" ]]; then
                # Parse Created timestamp from Info JSON
                CREATED=$(echo "$INFO" | jq -r '.Created // empty')
                
                if [[ -n "$CREATED" ]]; then
                   echo "   Created: $CREATED"
                   
                   # Parse timestamp (strip nanoseconds)
                   CLEAN_TS=$(echo "$CREATED" | awk '{print $1, $2}')
                   LOCK_EPOCH=$(date -d "$CLEAN_TS" +%s 2>/dev/null || echo "")
                   
                   if [[ -n "$LOCK_EPOCH" ]]; then
                      NOW_EPOCH=$(date +%s)
                      AGE_SEC=$((NOW_EPOCH - LOCK_EPOCH))
                      AGE_MIN=$((AGE_SEC / 60))
                      AGE_HOURS=$((AGE_MIN / 60))
                      
                      echo "   Age: ${AGE_HOURS}h ${AGE_MIN}m (${AGE_SEC}s)"
                      
                      # Release if older than 15 minutes
                      if [[ $AGE_MIN -gt 15 ]]; then
                         echo "🔓 Releasing stale lock (Age: ${AGE_HOURS}h ${AGE_MIN}m)..."
                         aws dynamodb delete-item --table-name "$TABLE_NAME" --key "{\"LockID\": {\"S\": \"${LOCK_ID}\"}}" --region "$REGION"
                         echo "✅ Stale lock released successfully"
                      else
                         echo "⏳ Lock is recent (${AGE_MIN}m old), keeping it"
                      fi
                   else
                      echo "⚠️ Could not parse timestamp"
                   fi
                else
                   echo "⚠️ No Created field in lock Info"
                fi
             else
                echo "⚠️ Lock has no Info field"
             fi
          else
             echo "✅ No existing lock found"
          fi

      - name: Load TF Vars
        if: ${{ inputs.tf_vars != '' }}
        run: |
          # Write input vars to a .auto.tfvars file or export to ENV
          # Exporting to ENV is safest for dynamic keys
          echo "${{ inputs.tf_vars }}" > _github_vars.env
          while read -r line; do
            if [[ -n "$line" && ! "$line" =~ ^# ]]; then
               # Check if line contains =
               if [[ "$line" == *"="* ]]; then
                 KEY=$(echo "$line" | cut -d'=' -f1 | tr -d ' ')
                 VAL=$(echo "$line" | cut -d'=' -f2-)
                 echo "TF_VAR_${KEY}=${VAL}" >> "$GITHUB_ENV"
               fi
            fi
          done < _github_vars.env

      - name: Run VPC Integrity Check
        working-directory: ${{ inputs.tf_dir }}
        env:
          AWS_REGION: ${{ inputs.aws_region }}
          CLIENT_KEY: ${{ env.TF_VAR_client_key }}
          PROJECT_KEY: ${{ env.TF_VAR_project_key }}
          STAGE: ${{ env.TF_VAR_stage }}
        run: |
          if [[ -f "check-vpc-integrity.sh" ]]; then
            echo "🔍 Found VPC Integrity Check script. Executing..."
            chmod +x check-vpc-integrity.sh
            ./check-vpc-integrity.sh
          fi

      - name: Run Pre-Apply Script
        if: ${{ inputs.pre_apply_script != '' }}
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_acm_certificate_arn: ${{ secrets.ACM_CERTIFICATE_ARN }}
          MONGODB_ATLAS_PUBLIC_KEY: ${{ secrets.MONGODB_ATLAS_PUBLIC_KEY }}
          MONGODB_ATLAS_PRIVATE_KEY: ${{ secrets.MONGODB_ATLAS_PRIVATE_KEY }}
          MONGODB_ATLAS_PROJECT_ID: ${{ secrets.MONGODB_ATLAS_PROJECT_ID }}
          EC_API_KEY: ${{ secrets.EC_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          # Azure OIDC credentials — needed for azurerm provider init during terraform import
          ARM_USE_OIDC: ${{ inputs.cloud_provider == 'azure' && 'true' || 'false' }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID || steps.decode-azure.outputs.client_id }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID || steps.decode-azure.outputs.tenant_id }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID || steps.decode-azure.outputs.subscription_id }}
        run: |
          echo "📜 Running Pre-Apply Script..."
          ${{ inputs.pre_apply_script }}

      - name: Orphan Lambda Resources (Prevent Hang)
        if: ${{ inputs.orphan_lambda == true }}
        working-directory: ${{ inputs.tf_dir }}
        run: |
          echo "🧹 Orphaning Lambda@Edge resources to prevent destroy hang..."

          # 1. Current Image Resize Lambda (Module)
          terraform state rm 'module.environment_network.module.lambda_edge_image_resize[0]' || echo "resize-image module not in state"

          # 2. Vestigial/Phantom Normalize Lambda (Legacy Module)
          terraform state rm 'module.environment_network.module.lambda_edge_normalize[0]' || echo "normalize module not in state"

          # 3. Specific Function Resource targeting (Safety Net)
          terraform state rm 'module.environment_network.module.lambda_edge_image_resize[0].aws_lambda_function.origin_response[0]' || echo "origin_response function already gone"

          # 4. Remove time_sleep dependencies
          terraform state rm 'module.environment_network.module.lambda_edge_image_resize[0].time_sleep.wait_for_edge_propagation[0]' || echo "time_sleep not in state"

          echo "✅ Lambda resources removed from state"

      - name: Terraform Plan
        id: plan
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_acm_certificate_arn: ${{ secrets.ACM_CERTIFICATE_ARN }}
          TF_VAR_atlas_public_key: ${{ secrets.MONGODB_ATLAS_PUBLIC_KEY }}
          TF_VAR_atlas_private_key: ${{ secrets.MONGODB_ATLAS_PRIVATE_KEY }}
          TF_VAR_atlas_project_id: ${{ secrets.MONGODB_ATLAS_PROJECT_ID }}
          TF_VAR_atlas_org_id: ${{ secrets.MONGODB_ATLAS_ORG_ID }}
          TF_VAR_ec_api_key: ${{ secrets.EC_API_KEY }}
          # Azure OIDC
          ARM_USE_OIDC: ${{ inputs.cloud_provider == 'azure' && 'true' || 'false' }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID || steps.decode-azure.outputs.client_id }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID || steps.decode-azure.outputs.tenant_id }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID || steps.decode-azure.outputs.subscription_id }}
        run: |
          DESTROY_FLAG=""
          if [[ "${{ inputs.destroy }}" == "true" ]]; then
            DESTROY_FLAG="-destroy"
          fi

          DETAILED_EXITCODE=""
          if [[ "${{ inputs.detect_drift }}" == "true" ]]; then
             DETAILED_EXITCODE="-detailed-exitcode"
          fi

          set +e
          terraform plan $DESTROY_FLAG $DETAILED_EXITCODE -out=tfplan -input=false | tee plan.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          # Extract Plan Summary
          PLAN_SUMMARY="No changes"
          if grep -q "Plan:" plan.log; then
             PLAN_SUMMARY=$(grep "Plan:" plan.log | tail -n 1)
          elif grep -q "No changes" plan.log; then
             PLAN_SUMMARY="No changes"
          fi
          echo "summary=$PLAN_SUMMARY" >> $GITHUB_OUTPUT

          # Handle Drift Detection
          if [[ "${{ inputs.detect_drift }}" == "true" ]]; then
             if [[ $EXIT_CODE -eq 2 ]]; then
                echo "::error::⚠️ Drift Detected! Infrastructure differs from Code."
                exit 1
             elif [[ $EXIT_CODE -eq 0 ]]; then
                echo "✅ No Drift Detected."
             else
                echo "❌ Terraform Plan Failed (Exit Code: $EXIT_CODE)"
                exit $EXIT_CODE
             fi
          else
             # Standard Behavior: Exit code 0 (no changes) or 2 (changes) are both success
             if [[ $EXIT_CODE -eq 0 || $EXIT_CODE -eq 2 ]]; then
                if [[ $EXIT_CODE -eq 2 ]]; then
                   echo "✅ Terraform Plan Successful - Changes Detected"
                else
                   echo "✅ Terraform Plan Successful - No Changes"
                fi
             else
                echo "❌ Terraform Plan Failed (Exit Code: $EXIT_CODE)"
                exit $EXIT_CODE
             fi
          fi

      # Smart Pre-Destroy Hook for MongoDB
      # Automatically disables termination protection before cluster destruction
      - name: Run Pre-Destroy Hook
        if: ${{ inputs.destroy == true && inputs.apply == true }}
        working-directory: ${{ inputs.tf_dir }}
        env:
          # MongoDB Atlas credentials - use direct env var names
          MONGODB_ATLAS_PROJECT_ID: ${{ secrets.MONGODB_ATLAS_PROJECT_ID }}
          MONGODB_ATLAS_PUBLIC_KEY: ${{ secrets.MONGODB_ATLAS_PUBLIC_KEY }}
          MONGODB_ATLAS_PRIVATE_KEY: ${{ secrets.MONGODB_ATLAS_PRIVATE_KEY }}
          # TF variables for cluster name calculation (passed from parent)
          TF_VARS: ${{ inputs.tf_vars }}
        run: |
          # Check if pre-destroy.sh exists in current directory
          if [ -f "pre-destroy.sh" ]; then
            echo "🔧 Found pre-destroy.sh - executing smart pre-destroy hooks..."
            
            # Parse tf_vars and export as environment variables
            if [ -n "$TF_VARS" ]; then
              echo "📝 Parsing TF variables..."
              while IFS='=' read -r key value; do
                # Skip empty lines
                [ -z "$key" ] && continue
                # Export as TF_VAR_ prefixed
                eval "export TF_VAR_${key}='${value}'"
                echo "   Exported: TF_VAR_${key}"
              done <<< "$TF_VARS"
            fi
            
            chmod +x pre-destroy.sh
            ./pre-destroy.sh
          else
            echo "ℹ️  No pre-destroy.sh found - skipping pre-destroy hooks"
          fi

      - name: Terraform Apply
        if: ${{ inputs.apply == true }}
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_acm_certificate_arn: ${{ secrets.ACM_CERTIFICATE_ARN }}
          TF_VAR_atlas_public_key: ${{ secrets.MONGODB_ATLAS_PUBLIC_KEY }}
          TF_VAR_atlas_private_key: ${{ secrets.MONGODB_ATLAS_PRIVATE_KEY }}
          TF_VAR_atlas_project_id: ${{ secrets.MONGODB_ATLAS_PROJECT_ID }}
          TF_VAR_atlas_org_id: ${{ secrets.MONGODB_ATLAS_ORG_ID }}
          TF_VAR_ec_api_key: ${{ secrets.EC_API_KEY }}
          # Azure OIDC
          ARM_USE_OIDC: ${{ inputs.cloud_provider == 'azure' && 'true' || 'false' }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID || steps.decode-azure.outputs.client_id }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID || steps.decode-azure.outputs.tenant_id }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID || steps.decode-azure.outputs.subscription_id }}
        run: |
          if [[ "${{ inputs.split_apply }}" == "true" && "${{ inputs.destroy }}" != "true" ]]; then
             echo "🛡️ Split Apply Enabled - Phase 1: Targeted Apply"
             TARGETS="${{ inputs.split_targets }}"
             
             if [[ -z "$TARGETS" ]]; then
                echo "❌ Error: split_targets must be provided when split_apply is true"
                exit 1
             fi
             
             # Construct -target flags
             TARGET_FLAGS=""
             for target in $TARGETS; do
               TARGET_FLAGS="$TARGET_FLAGS -target=$target"
             done
             
             echo "   Targets: $TARGET_FLAGS"
             terraform apply -auto-approve -input=false $TARGET_FLAGS
             
             echo "zzz Sleeping for ${{ inputs.sleep_seconds }} seconds to allow API propagation..."
             sleep ${{ inputs.sleep_seconds }}
             
             echo "🛡️ Split Apply - Phase 2: Full Apply"
             terraform apply -auto-approve -input=false
          else
             # Standard Apply using saved plan
             terraform apply -auto-approve -input=false tfplan
          fi

      - name: Export Terraform Outputs
        id: tf_outputs
        if: ${{ inputs.apply == true }}
        env:
          # Azure OIDC: terraform output needs azurerm provider auth too
          ARM_USE_OIDC: ${{ inputs.cloud_provider == 'azure' && 'true' || 'false' }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID || steps.decode-azure.outputs.client_id }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID || steps.decode-azure.outputs.tenant_id }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID || steps.decode-azure.outputs.subscription_id }}
        run: |
          echo "📤 Exporting Terraform Outputs..."
          terraform output -json > tf_outputs.json

          # MongoDB URI
          MONGO_URI=$(jq -r '.mongodb_uri.value // empty' tf_outputs.json)
          if [[ -n "$MONGO_URI" ]]; then
             echo "::add-mask::$MONGO_URI"
             echo "mongodb_uri=$MONGO_URI" >> $GITHUB_OUTPUT
          fi

          # Cluster Name (and alias to ecs_cluster_name for consistency)
          CLUSTER_NAME=$(jq -r '.cluster_name.value // empty' tf_outputs.json)
          if [[ -n "$CLUSTER_NAME" ]]; then
             echo "cluster_name=$CLUSTER_NAME" >> $GITHUB_OUTPUT
             echo "ecs_cluster_name=$CLUSTER_NAME" >> $GITHUB_OUTPUT
          fi

          # Generic Output Extractor
          extract_output() {
            KEY=$1
            JSON_KEY=$2
            VAL=$(jq -r ".$JSON_KEY.value // empty" tf_outputs.json)
            if [[ -n "$VAL" ]]; then
               echo "::add-mask::$VAL" # Mask sensitive values if any, safe for others
               echo "$KEY=$VAL" >> $GITHUB_OUTPUT
            fi
          }

          # Extract Additional Infra Details
          extract_output "alb_dns_name" "alb_dns_name"
          extract_output "ecs_cluster_name" "ecs_cluster_name"
          extract_output "iam_role_name" "execution_role_name" # TF output is execution_role_name
          extract_output "service_discovery_namespace" "service_discovery_namespace"
          extract_output "log_group_name" "log_group_name"
          extract_output "image_resize_enabled" "image_resize_enabled"
