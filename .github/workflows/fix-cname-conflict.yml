name: Fix CNAME Conflict
on:
  workflow_dispatch:
    inputs:
      dist_id:
        description: "Distribution ID to strip aliases from"
        required: true
        default: "E2KSWPPSJPSSQW"

permissions:
  id-token: write
  contents: read

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: stage
    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Load AWS Region from Config
        id: load-config
        run: |
          AWS_REGION=$(jq -r '.common.AWS_REGION' vars/blaze-env.json)
          if [[ -z "$AWS_REGION" ]]; then
            echo "❌ ERROR: AWS_REGION not set in vars/blaze-env.json"
            exit 1
          fi
          echo "aws_region=$AWS_REGION" >> "$GITHUB_OUTPUT"
          echo "✅ Using AWS Region: $AWS_REGION (from vars/blaze-env.json)"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4.3.1
        with:
          aws-region: ${{ steps.load-config.outputs.aws_region }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Strip Aliases
        run: |
          DIST_ID="${{ inputs.dist_id }}"
          echo "Getting config for $DIST_ID..."
          aws cloudfront get-distribution-config --id $DIST_ID > dist-config.json

          ETAG=$(cat dist-config.json | jq -r '.ETag')
          echo "Current ETag: $ETAG"

          # Modify config to empty aliases
          # Note: We extract .DistributionConfig, modify it, and save it for input
          cat dist-config.json | jq '.DistributionConfig | .Aliases = {Quantity: 0, Items: []}' > final-config.json

          echo "Updating distribution to strip aliases..."
          aws cloudfront update-distribution \
            --id $DIST_ID \
            --distribution-config file://final-config.json \
            --if-match $ETAG
