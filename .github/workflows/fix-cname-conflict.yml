name: "99 - Ops (Fix CNAME Conflict)"
on:
  workflow_dispatch:
    inputs:
      dist_id:
        description: "Distribution ID to strip aliases from"
        required: true
        default: "EXAMPLE_ZONE_ID"
  workflow_call:
    secrets:
      AWS_ROLE_ARN:
        required: false
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        required: false
      GCP_SERVICE_ACCOUNT:
        required: false
      AZURE_CLIENT_ID:
        required: false
      AZURE_TENANT_ID:
        required: false
      AZURE_SUBSCRIPTION_ID:
        required: false
      CLOUDFLARE_API_TOKEN:
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        required: false
      CLOUDFLARE_ZONE_ID:
        required: false
      GH_PAT:
        required: false
      NPM_TOKEN:
        required: false
      INFRACOST_API_KEY:
        required: false
      BLAZE_CONNECTION_STRING:
        required: false
      BLAZE_AUTH_JWT_PRIVATE_KEY:
        required: false
      BLAZE_AUTH_ADMIN_EMAIL:
        required: false
      BLAZE_AUTH_ADMIN_PASSWORD:
        required: false
      BLAZE_FILES_S3_ACCESS_KEY:
        required: false
      BLAZE_FILES_S3_SECRET_ACCESS_KEY:
        required: false
      BLAZE_GRAPHQL_CACHE_SETTINGS:
        required: false
      BLAZE_CLIENT_HEADER:
        required: false
      EC_API_KEY:
        required: false
      MONGODB_ATLAS_PUBLIC_KEY:
        required: false
      MONGODB_ATLAS_PRIVATE_KEY:
        required: false
      MONGODB_ATLAS_ORG_ID:
        required: false
      MONGODB_ATLAS_PROJECT_ID:
        required: false
      ACM_CERTIFICATE_ARN:
        required: false
      BLAZE_SENTRY_AUTH_TOKEN:
        required: false
      BLAZE_SENTRY_DSN:
        required: false
    inputs:
      dist_id:
        description: "Distribution ID (or Domain Name) to strip aliases from"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: stage
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Load AWS Region from Config
        id: load-config
        run: |
          AWS_REGION=$(jq -r '.common.AWS_REGION' vars/blaze-env.json)
          if [[ -z "$AWS_REGION" ]]; then
            echo "❌ ERROR: AWS_REGION not set in vars/blaze-env.json"
            exit 1
          fi
          echo "aws_region=$AWS_REGION" >> "$GITHUB_OUTPUT"
          echo "✅ Using AWS Region: $AWS_REGION (from vars/blaze-env.json)"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ steps.load-config.outputs.aws_region }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Strip Aliases
        run: |
          DIST_ID="${{ inputs.dist_id }}"
          # If input looks like a domain (contains .), try to find ID
          if [[ "$DIST_ID" == *"."* ]]; then
            echo "Input '$DIST_ID' looks like a domain. Searching for Distribution ID..."
            # Remove trailing dot if present
            SEARCH_DOMAIN=${DIST_ID%.}
            FOUND_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?DomainName=='$SEARCH_DOMAIN'].Id" --output text)
            
            if [[ -z "$FOUND_ID" || "$FOUND_ID" == "None" ]]; then
              echo "❌ ERROR: Could not find distribution for domain $SEARCH_DOMAIN"
              exit 1
            fi
            echo "✅ Found Distribution ID: $FOUND_ID"
            DIST_ID=$FOUND_ID
          fi

          echo "Getting config for $DIST_ID..."
          aws cloudfront get-distribution-config --id $DIST_ID > dist-config.json

          ETAG=$(cat dist-config.json | jq -r '.ETag')
          echo "Current ETag: $ETAG"

          # Modify config to empty aliases
          # Note: We extract .DistributionConfig, modify it, and save it for input
          cat dist-config.json | jq '.DistributionConfig | .Aliases = {Quantity: 0, Items: []}' > final-config.json

          echo "Updating distribution to strip aliases..."
          aws cloudfront update-distribution \
            --id $DIST_ID \
            --distribution-config file://final-config.json \
            --if-match $ETAG
