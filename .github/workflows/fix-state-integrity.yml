name: "99 - Ops (Fix State Integrity)"
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment (DEV/STAGE/PROD)"
        required: true
        default: "DEV"
        type: choice
        options:
          - DEV
          - STAGE
          - PROD
      dynamodb_table:
        description: "DynamoDB Lock Table Name"
        required: true
        default: "example-dev-blaze-tfstate-lock"
      state_key_path:
        description: "S3 Key to Clean (e.g., infra/.../cloudflare.tfstate)"
        required: true
        default: "infra/example-project/third-party/cloudflare.tfstate"

permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  delete-lock-entry:
    name: 🗑️ Delete Lock Entry
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Load Access List
        id: load-access
        run: |
          if [[ -f "vars/blaze-env.json" ]]; then
            ALLOWED=$(jq -r '.common.ALLOWED_INFRA_USERS // empty' vars/blaze-env.json)
            echo "allowed=$ALLOWED" >> "$GITHUB_OUTPUT"
          else
            echo "⚠️ vars/blaze-env.json not found. Skipping access control."
            echo "allowed=" >> "$GITHUB_OUTPUT"
          fi

      - name: Check Access
        if: steps.load-access.outputs.allowed != ''
        uses: thisisblaze/blaze-actions/.github/actions/check-access@v1.4.9
        with:
          allowed_users: ${{ steps.load-access.outputs.allowed }}
          actor: ${{ github.actor }}

      - name: Load AWS Region from Config
        id: load-config
        run: |
          AWS_REGION=$(jq -r '.common.AWS_REGION' vars/blaze-env.json)
          if [[ -z "$AWS_REGION" ]]; then
            echo "❌ ERROR: AWS_REGION not set in vars/blaze-env.json"
            exit 1
          fi
          echo "AWS_REGION=$AWS_REGION" >> "$GITHUB_ENV"
          echo "✅ Using AWS Region: $AWS_REGION (from vars/blaze-env.json)"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Search and Destroy Lock Entries
        run: |
          TABLE="${{ inputs.dynamodb_table }}"
          KEY_PART="${{ inputs.state_key_path }}"

          echo "🔍 Scanning table '$TABLE' for items with LockID containing '$KEY_PART'..."

          # Scan for matching items
          # We use a filter expression to find any LockID that contains the state key path
          ITEMS=$(aws dynamodb scan \
            --table-name "$TABLE" \
            --filter-expression "contains(LockID, :k)" \
            --expression-attribute-values "{\":k\":{\"S\":\"$KEY_PART\"}}" \
            --projection-expression "LockID" \
            --region "$AWS_REGION" \
            --output json)

          echo "📋 Found Items:"
          echo "$ITEMS" | jq .

          # Extract LockIDs
          LOCK_IDS=$(echo "$ITEMS" | jq -r '.Items[].LockID.S')

          if [[ -z "$LOCK_IDS" ]]; then
             echo "✅ No matching lock entries found. Nothing to delete."
             exit 0
          fi

          # Loop and Delete
          for LOCK_ID in $LOCK_IDS; do
             echo "---------------------------------------------------"
             echo "🗑️ Deleting Item with LockID: $LOCK_ID"
             
             aws dynamodb delete-item \
               --table-name "$TABLE" \
               --key "{\"LockID\": {\"S\": \"$LOCK_ID\"}}" \
               --region "$AWS_REGION"
               
             echo "✅ Deleted."
          done

          echo "---------------------------------------------------"
          echo "✨ Cleanup Complete."
