name: "02 - Deploy App"

on:
  workflow_dispatch:
    inputs:
      cloud_provider:
        description: "Cloud Provider"
        type: choice
        options: ["aws", "gcp", "azure"]
        default: "aws"
      wif_audience:
        description: "WIF Audience (Optional)"
        required: false
        type: string
        default: ""
      environment:
        description: "Environment to deploy to"
        type: choice
        options:
          - DEV
          - DEV-MINI
          - STAGE
          - PROD
          - MULTI-SITE
        required: true
      project:
        description: "Project (App Identity) - e.g. thisisblaze"
        type: string
        required: true
        default: "thisisblaze"
      branch_name:
        description: "Feature Tag (e.g. jira-123). Leave empty for main."
        required: false
        type: string
      target_services:
        description: "Services to Deploy"
        type: choice
        options:
          - "Blaze all"
          - "api"
          - "frontend"
          - "admin"
          - "tunnel"
        default: "Blaze all"
      build_images:
        description: "Build Docker Images?"
        type: boolean
        default: true
      deploy_services:
        description: "Deploy to ECS/Pages?"
        type: boolean
        default: true
      override_image_tag:
        description: "Override Image Tag (if not building)"
        type: string
        default: "latest"
      # --- HYBRID ECS (FEB 2026) ---
      api_launch_type:
        description: "API launch type: FARGATE or EC2"
        type: choice
        options: ["FARGATE", "EC2"]
        default: "FARGATE"
      api_cpu_architecture:
        description: "API CPU arch: X86_64 or ARM64"
        type: choice
        options: ["X86_64", "ARM64"]
        default: "X86_64"

      # Base64 Secrets Bridge (Azure)
      azure_client_id_rev:
        description: "Base64 Azure Client ID"
        required: false
        type: string
      azure_tenant_id_rev:
        description: "Base64 Azure Tenant ID"
        required: false
        type: string
      azure_subscription_id_rev:
        description: "Base64 Azure Subscription ID"
        required: false
        type: string

  # Enable usage by other workflows (Stress Test)
  workflow_call:
    inputs:
      cloud_provider:
        required: false
        type: string
        default: "aws"
      environment:
        required: true
        type: string
      wif_audience:
        required: false
        type: string
        default: ""
      project:
        required: false
        type: string
        default: "thisisblaze"
      branch_name:
        required: false
        type: string
      target_services:
        required: false
        type: string
        default: "Blaze all"
      build_images:
        required: false
        type: boolean
        default: true
      deploy_services:
        required: false
        type: boolean
        default: true
      override_image_tag:
        required: false
        type: string
        default: "latest"
      # --- HYBRID ECS (FEB 2026) ---
      api_launch_type:
        required: false
        type: string
        default: "FARGATE"
      api_cpu_architecture:
        required: false
        type: string
        default: "X86_64"
      frontend_launch_type:
        required: false
        type: string
        default: "FARGATE"
      frontend_cpu_architecture:
        required: false
        type: string
        default: "X86_64"
      skip_stability_wait:
        required: false
        type: string
        default: "false"
        description: "Set to 'true' to skip ECS stabilisation wait (for stress tests)"
      # Base64 Secrets Bridge (Azure)
      azure_client_id_rev:
        required: false
        type: string
      azure_tenant_id_rev:
        required: false
        type: string
      azure_subscription_id_rev:
        required: false
        type: string

    secrets:
      AWS_ROLE_ARN:
        required: false
        description: "AWS Role ARN for deployment"
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        required: false
      GCP_SERVICE_ACCOUNT:
        required: false
      GH_PAT:
        required: false
        description: "GitHub PAT for private modules"
      NPM_TOKEN:
        required: false
        description: "NPM Token"
      CLOUDFLARE_API_TOKEN:
        required: false
      CLOUDFLARE_ZONE_ID:
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        required: false
      MONGODB_ATLAS_PUBLIC_KEY:
        required: false
      MONGODB_ATLAS_PRIVATE_KEY:
        required: false
      MONGODB_ATLAS_PROJECT_ID:
        required: false
      MONGODB_ATLAS_ORG_ID:
        required: false
      BLAZE_SENTRY_AUTH_TOKEN:
        required: false
      BLAZE_SENTRY_DSN:
        required: false
      # ECS Application Runtime Secrets (Explicitly defined for workflow_call)
      MONGO_INITDB_ROOT_PASSWORD:
        required: false
      BLAZE_AUTH_JWT_PRIVATE_KEY:
        required: false
      BLAZE_AUTH_ADMIN_EMAIL:
        required: false
      BLAZE_AUTH_ADMIN_PASSWORD:
        required: false
      BLAZE_CONNECTION_STRING:
        required: false
      BLAZE_ELASTICSEARCH_USERNAME:
        required: false
      BLAZE_ELASTICSEARCH_PASSWORD:
        required: false
      BLAZE_ELASTICSEARCH_ENDPOINT:
        required: false

      BLAZE_FILES_S3_ACCESS_KEY:
        required: false
      BLAZE_FILES_S3_SECRET_KEY:
        required: false
      # Azure
      AZURE_CLIENT_ID:
        required: false
      AZURE_TENANT_ID:
        required: false
      AZURE_SUBSCRIPTION_ID:
        required: false
      BLAZE_GRAPHQL_CACHE_SETTINGS:
        required: false
      BLAZE_CLIENT_HEADER:
        required: false



#   push:
#     branches:
#       - dev
#     paths-ignore:
#       - "docs/**"
#       - ".github/aws/**"
#       - "**.md"

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'DEV' }}-${{ github.event.inputs.branch_name || 'host' }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dispatch-aws:
    if: inputs.cloud_provider == 'aws' || inputs.cloud_provider == '' || inputs.cloud_provider == null
    uses: ./.github/workflows/02-deploy-aws.yml
    with:
      cloud_provider: ${{ inputs.cloud_provider }}
      environment: ${{ inputs.environment }}
      wif_audience: ${{ inputs.wif_audience }}
      project: ${{ inputs.project }}
      branch_name: ${{ inputs.branch_name }}
      target_services: ${{ inputs.target_services }}
      build_images: ${{ inputs.build_images }}
      deploy_services: ${{ inputs.deploy_services }}
      override_image_tag: ${{ inputs.override_image_tag }}
      api_launch_type: ${{ inputs.api_launch_type }}
      api_cpu_architecture: ${{ inputs.api_cpu_architecture }}
      frontend_launch_type: ${{ inputs.frontend_launch_type }}
      frontend_cpu_architecture: ${{ inputs.frontend_cpu_architecture }}
      skip_stability_wait: ${{ inputs.skip_stability_wait }}
      azure_client_id_rev: ${{ inputs.azure_client_id_rev }}
      azure_tenant_id_rev: ${{ inputs.azure_tenant_id_rev }}
      azure_subscription_id_rev: ${{ inputs.azure_subscription_id_rev }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      GH_PAT: ${{ secrets.GH_PAT }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      MONGODB_ATLAS_PUBLIC_KEY: ${{ secrets.MONGODB_ATLAS_PUBLIC_KEY }}
      MONGODB_ATLAS_PRIVATE_KEY: ${{ secrets.MONGODB_ATLAS_PRIVATE_KEY }}
      MONGODB_ATLAS_PROJECT_ID: ${{ secrets.MONGODB_ATLAS_PROJECT_ID }}
      MONGODB_ATLAS_ORG_ID: ${{ secrets.MONGODB_ATLAS_ORG_ID }}
      BLAZE_SENTRY_AUTH_TOKEN: ${{ secrets.BLAZE_SENTRY_AUTH_TOKEN }}
      BLAZE_SENTRY_DSN: ${{ secrets.BLAZE_SENTRY_DSN }}
      MONGO_INITDB_ROOT_PASSWORD: ${{ secrets.MONGO_INITDB_ROOT_PASSWORD }}
      BLAZE_AUTH_JWT_PRIVATE_KEY: ${{ secrets.BLAZE_AUTH_JWT_PRIVATE_KEY }}
      BLAZE_AUTH_ADMIN_EMAIL: ${{ secrets.BLAZE_AUTH_ADMIN_EMAIL }}
      BLAZE_AUTH_ADMIN_PASSWORD: ${{ secrets.BLAZE_AUTH_ADMIN_PASSWORD }}
      BLAZE_CONNECTION_STRING: ${{ secrets.BLAZE_CONNECTION_STRING }}
      BLAZE_ELASTICSEARCH_USERNAME: ${{ secrets.BLAZE_ELASTICSEARCH_USERNAME }}
      BLAZE_ELASTICSEARCH_PASSWORD: ${{ secrets.BLAZE_ELASTICSEARCH_PASSWORD }}
      BLAZE_ELASTICSEARCH_ENDPOINT: ${{ secrets.BLAZE_ELASTICSEARCH_ENDPOINT }}
      BLAZE_FILES_S3_ACCESS_KEY: ${{ secrets.BLAZE_FILES_S3_ACCESS_KEY }}
      BLAZE_FILES_S3_SECRET_ACCESS_KEY: ${{ secrets.BLAZE_FILES_S3_SECRET_ACCESS_KEY }}
      BLAZE_GRAPHQL_CACHE_SETTINGS: ${{ secrets.BLAZE_GRAPHQL_CACHE_SETTINGS }}
      BLAZE_CLIENT_HEADER: ${{ secrets.BLAZE_CLIENT_HEADER }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
