name: "🔍 Validate Workflows"

on:
    pull_request:
        paths:
            - ".github/workflows/**"
            - ".github/actions/**"
    push:
        branches:
            - main
            - dev
        paths:
            - ".github/workflows/**"
            - ".github/actions/**"

permissions:
    contents: read
    pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    yaml-syntax:
        name: "📝 YAML Syntax Check"
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Install yamllint
              run: pip install yamllint

            - name: Lint YAML Files
              run: |
                  yamllint -d "{extends: default, rules: {line-length: {max: 200}, comments: {min-spaces-from-content: 1}}}" .github/workflows/ || true
                  echo "✅ YAML syntax check completed"

    timeout-check:
        name: "⏱️ Timeout Protection Check"
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Check Timeout Protection
              run: |
                  echo "Checking for jobs without timeout-minutes..."

                  WORKFLOWS=$(find .github/workflows -name "*.yml")
                  MISSING_TIMEOUTS=0

                  for workflow in $WORKFLOWS; do
                    # Extract job names and check for timeout-minutes
                    JOBS=$(grep "^  [a-zA-Z0-9_-]*:" "$workflow" | sed 's/:$//' | awk '{print $1}')
                    
                    for job in $JOBS; do
                      if ! grep -A 5 "^  $job:" "$workflow" | grep -q "timeout-minutes:"; then
                        echo "::warning::Job '$job' in $workflow missing timeout-minutes"
                        MISSING_TIMEOUTS=$((MISSING_TIMEOUTS + 1))
                      fi
                    done
                  done

                  if [ $MISSING_TIMEOUTS -gt 5 ]; then
                    echo "::warning::Found $MISSING_TIMEOUTS jobs without timeout protection (threshold: 5)"
                  else
                    echo "✅ Timeout protection check passed"
                  fi

    summary:
        name: "📊 Validation Summary"
        runs-on: ubuntu-latest
        needs: [yaml-syntax, timeout-check]
        if: always()
        timeout-minutes: 5
        steps:
            - name: Check Results
              run: |
                  echo "YAML Syntax: ${{ needs.yaml-syntax.result }}"
                  echo "Timeout Check: ${{ needs.timeout-check.result }}"
                  echo "✅ Validation checks completed"
