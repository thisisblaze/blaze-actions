name: "99 - Ops (Debug Serverless Lock)"

on:
    workflow_dispatch:
        inputs:
            environment:
                description: "Target Environment"
                type: choice
                options: ["DEV", "STAGE", "PROD"]
                required: true
            stack:
                description: "Terraform Stack"
                type: choice
                options:
                    - "network"
                    - "acm"
                    - "tunnel"
                    - "app"
                    - "third-party-mongodb"
                    - "third-party-elastic"
                required: true
            branch_tag:
                description: "Feature Tag (if applicable)"
                required: false
                type: string

    workflow_call:
        inputs:
            environment:
                type: string
                required: true
            stack:
                type: string
                required: true
            branch_tag:
                type: string
                required: false
        secrets:
          MONGO_INITDB_ROOT_PASSWORD:
            required: false
          BLAZE_ELASTICSEARCH_USERNAME:
            required: false
          BLAZE_ELASTICSEARCH_PASSWORD:
            required: false
          BLAZE_ELASTICSEARCH_ENDPOINT:
            required: false
          AWS_ROLE_ARN:
            required: false
          GCP_WORKLOAD_IDENTITY_PROVIDER:
            required: false
          GCP_SERVICE_ACCOUNT:
            required: false
          AZURE_CLIENT_ID:
            required: false
          AZURE_TENANT_ID:
            required: false
          AZURE_SUBSCRIPTION_ID:
            required: false
          CLOUDFLARE_API_TOKEN:
            required: false
          CLOUDFLARE_ACCOUNT_ID:
            required: false
          CLOUDFLARE_ZONE_ID:
            required: false
          GH_PAT:
            required: false
          NPM_TOKEN:
            required: false
          INFRACOST_API_KEY:
            required: false
          BLAZE_CONNECTION_STRING:
            required: false
          BLAZE_AUTH_JWT_PRIVATE_KEY:
            required: false
          BLAZE_AUTH_ADMIN_EMAIL:
            required: false
          BLAZE_AUTH_ADMIN_PASSWORD:
            required: false
          BLAZE_FILES_S3_ACCESS_KEY:
            required: false
          BLAZE_FILES_S3_SECRET_ACCESS_KEY:
            required: false
          BLAZE_GRAPHQL_CACHE_SETTINGS:
            required: false
          BLAZE_CLIENT_HEADER:
            required: false
          EC_API_KEY:
            required: false
          MONGODB_ATLAS_PUBLIC_KEY:
            required: false
          MONGODB_ATLAS_PRIVATE_KEY:
            required: false
          MONGODB_ATLAS_ORG_ID:
            required: false
          MONGODB_ATLAS_PROJECT_ID:
            required: false
          ACM_CERTIFICATE_ARN:
            required: false
          BLAZE_SENTRY_AUTH_TOKEN:
            required: false
          BLAZE_SENTRY_DSN:
            required: false
          SLACK_WEBHOOK_URL:
            required: false
          DEPLOY_KEY:
            required: false
permissions:
    id-token: write
    contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    configuration:
        name: Configuration
        runs-on: ubuntu-latest
        environment: ${{ inputs.environment }}
        timeout-minutes: 5
        outputs:
            bucket: ${{ steps.config.outputs.bucket }}
            state_key: ${{ steps.config.outputs.state_key }}
            lock_table: ${{ steps.config.outputs.lock_table }}
            aws_region: ${{ steps.config.outputs.aws_region }}
        steps:
            - uses: actions/checkout@v6.0.2

            - name: Calculate Configuration
              id: config
              uses: thisisblaze/blaze-actions/.github/actions/calculate-config@v1.4.14
              with:
                  environment: ${{ inputs.environment }}
                  terraform_stack: ${{ inputs.stack }}
                  branch_name: ${{ inputs.branch_tag }}
                  deploy_infra: "true"
                  build_images: "false"
                  deploy_services: "false"
                  event_name: "workflow_dispatch"

    debug-lock:
        name: 🔍 Debug Lock Table
        needs: [configuration]
        runs-on: ubuntu-latest
        environment: ${{ inputs.environment }}
        timeout-minutes: 10
        steps:
            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v6
              with:
                  role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
                  aws-region: ${{ needs.configuration.outputs.aws_region }}

            - name: Debug Lock Table
              run: |
                  BUCKET="${{ needs.configuration.outputs.bucket }}"
                  KEY="${{ needs.configuration.outputs.state_key }}"
                  TABLE="${{ needs.configuration.outputs.lock_table }}"
                  REGION="${{ needs.configuration.outputs.aws_region }}"

                  # Fallback for table if not specified
                  if [[ -z "$TABLE" ]]; then
                    TABLE="$BUCKET"
                  fi

                  LOCK_ID="${BUCKET}/${KEY}"

                  echo "🔍 Debugging lock table for Terraform state..."
                  echo "   Bucket: $BUCKET"
                  echo "   Key: $KEY"
                  echo "   Lock ID: $LOCK_ID"
                  echo "   Table: $TABLE"
                  echo ""

                  # Check if lock exists
                  echo "📋 Checking for lock in DynamoDB table..."
                  LOCK_DATA=$(aws dynamodb get-item \
                    --table-name "$TABLE" \
                    --region "$REGION" \
                    --key "{\"LockID\": {\"S\": \"$LOCK_ID\"}}" 2>&1 || true)

                  if echo "$LOCK_DATA" | grep -q "Item"; then
                    echo "🔒 LOCK FOUND:"
                    echo "$LOCK_DATA" | jq '.Item' || echo "$LOCK_DATA"
                  else
                    echo "✅ No lock found for this state"
                  fi

                  echo ""
                  echo "📋 Listing all locks in table..."
                  aws dynamodb scan \
                    --table-name "$TABLE" \
                    --region "$REGION" \
                    --max-items 10 | jq '.Items[] | {LockID: .LockID.S, Info: .Info.S}' || true
