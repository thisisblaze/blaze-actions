name: "♻️ Reusable Docker Build (Multi-Arch)"

on:
  workflow_call:
    inputs:
      cloud_provider:
        description: "Cloud provider (aws/gcp/azure). Default: aws"
        required: false
        type: string
        default: "aws"
      dockerfile:
        description: "Path to Dockerfile"
        required: true
        type: string
      context:
        description: "Build context"
        required: false
        type: string
        default: "."
      image_name:
        description: "Full image name (e.g., ECR URI, Artifact Registry URI, or ACR URI)"
        required: true
        type: string
      display_name:
        description: "Display name for the jobs (e.g., API, Frontend, Admin)"
        required: false
        type: string
        default: "Image"
      image_tag:
        description: "Primary image tag (e.g., commit SHA or semver)"
        required: true
        type: string
      platforms:
        description: "Comma-separated platforms to build (default: linux/amd64,linux/arm64)"
        required: false
        type: string
        default: "linux/amd64,linux/arm64"
      build_args:
        description: "List of build args (multiline)"
        required: false
        type: string
      aws_region:
        description: "AWS Region"
        required: false
        type: string
        default: ""
      gcp_project_id:
        description: "GCP Project ID (for Artifact Registry)"
        required: false
        type: string
        default: ""
      gcp_region:
        description: "GCP Region (for Artifact Registry)"
        required: false
        type: string
        default: "europe-west1"
      azure_registry_server:
        description: "Azure Container Registry Login Server (e.g., blaze.azurecr.io)"
        required: false
        type: string
        default: ""
      wif_audience:
        description: "WIF Audience (Optional)"
        required: false
        type: string
        default: ""
      environment:
        description: "Environment Context (e.g. DEV, STAGE, PROD)"
        required: false
        type: string
        default: ""

      # Base64 Secrets Bridge (Azure)
      azure_client_id_rev:
        required: false
        type: string
      azure_tenant_id_rev:
        required: false
        type: string
      azure_subscription_id_rev:
        required: false
        type: string

    secrets:
      AWS_ROLE_ARN:
        required: false
      NPM_TOKEN:
        required: false
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        required: false
      GCP_SERVICE_ACCOUNT:
        required: false
      AZURE_CLIENT_ID:
        required: false
      AZURE_TENANT_ID:
        required: false
      AZURE_SUBSCRIPTION_ID:
        required: false

    outputs:
      digest-amd64:
        description: "Digest of the amd64 image"
        value: ${{ jobs.build-amd64.outputs.digest }}
      digest-arm64:
        description: "Digest of the arm64 image"
        value: ${{ jobs.build-arm64.outputs.digest }}
      manifest-tag:
        description: "Multi-arch manifest tag"
        value: ${{ inputs.image_tag }}

permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-docker-build-${{ inputs.image_name }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────
  # BUILD AMD64 (x86_64)
  # ─────────────────────────────────────────────
  build-amd64:
    name: "Build ${{ inputs.display_name }} (amd64)"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    if: contains(inputs.platforms, 'linux/amd64')
    timeout-minutes: 15
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    env:
      NPM_TOKEN_VAL: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        if: inputs.cloud_provider == 'aws' || inputs.cloud_provider == ''
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Login to Amazon ECR
        if: inputs.cloud_provider == 'aws' || inputs.cloud_provider == ''
        uses: aws-actions/amazon-ecr-login@v2

      # ── GCP: Workload Identity Federation + Artifact Registry ──
      - name: Authenticate to GCP
        if: inputs.cloud_provider == 'gcp'
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          audience: ${{ inputs.wif_audience }}

      - name: Login to GCP Artifact Registry
        if: inputs.cloud_provider == 'gcp'
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.gcp_region }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      # ── Azure: OIDC + ACR ──
      - name: Decode Azure Credentials
        if: inputs.cloud_provider == 'azure'
        run: |
          if [[ -n "${{ inputs.azure_client_id_rev }}" ]]; then
            CLIENT_ID=$(echo "${{ inputs.azure_client_id_rev }}" | rev)
            TENANT_ID=$(echo "${{ inputs.azure_tenant_id_rev }}" | rev)
            SUBSCRIPTION_ID=$(echo "${{ inputs.azure_subscription_id_rev }}" | rev)
            echo "DECODED_AZURE_CLIENT_ID=$CLIENT_ID" >> "$GITHUB_ENV"
            echo "DECODED_AZURE_TENANT_ID=$TENANT_ID" >> "$GITHUB_ENV"
            echo "DECODED_AZURE_SUBSCRIPTION_ID=$SUBSCRIPTION_ID" >> "$GITHUB_ENV"
            echo "::add-mask::$CLIENT_ID"
            echo "::add-mask::$TENANT_ID"
            echo "::add-mask::$SUBSCRIPTION_ID"
          else
            echo "DECODED_AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}" >> "$GITHUB_ENV"
            echo "DECODED_AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> "$GITHUB_ENV"
            echo "DECODED_AZURE_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> "$GITHUB_ENV"
          fi

      - name: Authenticate to Azure
        if: inputs.cloud_provider == 'azure'
        uses: azure/login@v2
        with:
          client-id: ${{ env.DECODED_AZURE_CLIENT_ID }}
          tenant-id: ${{ env.DECODED_AZURE_TENANT_ID }}
          subscription-id: ${{ env.DECODED_AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure ACR
        if: inputs.cloud_provider == 'azure'
        run: az acr login --name $(echo "${{ inputs.azure_registry_server }}" | cut -d'.' -f1)

      - name: Setup .npmrc
        run: |
          echo "@blaze-cms:registry=https://registry.npmjs.org/" > ${{ runner.temp }}/.npmrc
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" >> ${{ runner.temp }}/.npmrc
          echo "always-auth=true" >> ${{ runner.temp }}/.npmrc

      - name: 🚑 Troubleshoot NPM Token
        run: |
          echo "🔍 Verifying NPM Token Access..."
          if [[ -z "${{ secrets.NPM_TOKEN }}" ]]; then
            echo "❌ ERROR: NPM_TOKEN secret is empty or missing!"
            exit 1
          fi
          
          # Test access to the private scope
          if ! npm --userconfig ${{ runner.temp }}/.npmrc view @blaze-cms/core-logger versions > /dev/null 2>&1; then
            echo "❌ ERROR: The NPM_TOKEN is invalid, expired, or lacks access to private @blaze-cms packages."
            echo "   This usually happens if the token was revoked or created without read access."
            echo "   => Please generate a new NPM Classic Token and update the NPM_TOKEN repository secret."
            exit 1
          fi
          echo "✅ NPM Token is valid and has read access to private packages."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and Push (amd64)
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ inputs.image_name }}:${{ inputs.image_tag }}-amd64
            ${{ inputs.image_name }}:latest-amd64
          build-args: |
            ${{ inputs.build_args }}
            NODE_AUTH_TOKEN=${{ secrets.NPM_TOKEN }}
          secret-files: |
            npmrc=${{ runner.temp }}/.npmrc
          labels: |
            org.opencontainers.image.architecture=amd64
            org.opencontainers.image.compute-mode=x86
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64

      - name: "📋 Build Summary (amd64)"
        run: |
          echo "### ✅ amd64 Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: \`${{ inputs.image_tag }}-amd64\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Digest**: \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # BUILD ARM64 (Graviton)
  # ─────────────────────────────────────────────
  build-arm64:
    name: "Build ${{ inputs.display_name }} (arm64)"
    runs-on: ubuntu-24.04-arm # Native ARM64 runner — 13x faster than QEMU
    environment: ${{ inputs.environment }}
    if: contains(inputs.platforms, 'linux/arm64')
    timeout-minutes: 15
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    env:
      NPM_TOKEN_VAL: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        if: inputs.cloud_provider == 'aws' || inputs.cloud_provider == ''
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Login to Amazon ECR
        if: inputs.cloud_provider == 'aws' || inputs.cloud_provider == ''
        uses: aws-actions/amazon-ecr-login@v2

      # ── GCP: Workload Identity Federation + Artifact Registry ──
      - name: Authenticate to GCP
        if: inputs.cloud_provider == 'gcp'
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          audience: ${{ inputs.wif_audience }}

      - name: Login to GCP Artifact Registry
        if: inputs.cloud_provider == 'gcp'
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.gcp_region }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      # ── Azure ──
      - name: Decode Azure Credentials
        if: inputs.cloud_provider == 'azure'
        run: |
          if [[ -n "${{ inputs.azure_client_id_rev }}" ]]; then
            CLIENT_ID=$(echo "${{ inputs.azure_client_id_rev }}" | rev)
            TENANT_ID=$(echo "${{ inputs.azure_tenant_id_rev }}" | rev)
            SUBSCRIPTION_ID=$(echo "${{ inputs.azure_subscription_id_rev }}" | rev)
            echo "DECODED_AZURE_CLIENT_ID=$CLIENT_ID" >> "$GITHUB_ENV"
            echo "DECODED_AZURE_TENANT_ID=$TENANT_ID" >> "$GITHUB_ENV"
            echo "DECODED_AZURE_SUBSCRIPTION_ID=$SUBSCRIPTION_ID" >> "$GITHUB_ENV"
            echo "::add-mask::$CLIENT_ID"
            echo "::add-mask::$TENANT_ID"
            echo "::add-mask::$SUBSCRIPTION_ID"
          else
            echo "DECODED_AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}" >> "$GITHUB_ENV"
            echo "DECODED_AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> "$GITHUB_ENV"
            echo "DECODED_AZURE_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> "$GITHUB_ENV"
          fi

      - name: Authenticate to Azure
        if: inputs.cloud_provider == 'azure'
        uses: azure/login@v2
        with:
          client-id: ${{ env.DECODED_AZURE_CLIENT_ID }}
          tenant-id: ${{ env.DECODED_AZURE_TENANT_ID }}
          subscription-id: ${{ env.DECODED_AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure ACR
        if: inputs.cloud_provider == 'azure'
        run: az acr login --name $(echo "${{ inputs.azure_registry_server }}" | cut -d'.' -f1)

      - name: Setup .npmrc
        run: |
          echo "@blaze-cms:registry=https://registry.npmjs.org/" > ${{ runner.temp }}/.npmrc
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" >> ${{ runner.temp }}/.npmrc
          echo "always-auth=true" >> ${{ runner.temp }}/.npmrc

      - name: 🚑 Troubleshoot NPM Token
        run: |
          echo "🔍 Verifying NPM Token Access..."
          if [[ -z "${{ secrets.NPM_TOKEN }}" ]]; then
            echo "❌ ERROR: NPM_TOKEN secret is empty or missing!"
            exit 1
          fi
          
          # Test access to the private scope
          if ! npm --userconfig ${{ runner.temp }}/.npmrc view @blaze-cms/core-logger versions > /dev/null 2>&1; then
            echo "❌ ERROR: The NPM_TOKEN is invalid, expired, or lacks access to private @blaze-cms packages."
            echo "   This usually happens if the token was revoked or created without read access."
            echo "   => Please generate a new NPM Classic Token and update the NPM_TOKEN repository secret."
            exit 1
          fi
          echo "✅ NPM Token is valid and has read access to private packages."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and Push (arm64)
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: linux/arm64
          push: true
          tags: |
            ${{ inputs.image_name }}:${{ inputs.image_tag }}-arm64
            ${{ inputs.image_name }}:latest-arm64
          build-args: |
            ${{ inputs.build_args }}
            NODE_AUTH_TOKEN=${{ secrets.NPM_TOKEN }}
          secret-files: |
            npmrc=${{ runner.temp }}/.npmrc
          labels: |
            org.opencontainers.image.architecture=arm64
            org.opencontainers.image.compute-mode=arm
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64

      - name: "📋 Build Summary (arm64)"
        run: |
          echo "### ✅ arm64 Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: \`${{ inputs.image_tag }}-arm64\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Digest**: \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # CREATE MULTI-ARCH MANIFEST
  # ─────────────────────────────────────────────
  create-manifest:
    name: "Create Multi-Arch Manifest (${{ inputs.display_name }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs: [build-amd64, build-arm64]
    if: |
      always() &&
      (needs.build-amd64.result == 'success' || needs.build-amd64.result == 'skipped') &&
      (needs.build-arm64.result == 'success' || needs.build-arm64.result == 'skipped') &&
      (needs.build-amd64.result == 'success' || needs.build-arm64.result == 'success')
    timeout-minutes: 5
    steps:
      - name: Configure AWS Credentials
        if: inputs.cloud_provider == 'aws' || inputs.cloud_provider == ''
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Login to Amazon ECR
        if: inputs.cloud_provider == 'aws' || inputs.cloud_provider == ''
        uses: aws-actions/amazon-ecr-login@v2

      # ── GCP: Workload Identity Federation + Artifact Registry ──
      - name: Authenticate to GCP
        if: inputs.cloud_provider == 'gcp'
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          audience: ${{ inputs.wif_audience }}

      - name: Login to GCP Artifact Registry
        if: inputs.cloud_provider == 'gcp'
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.gcp_region }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      # ── Azure: OIDC + ACR ──
      - name: Decode Azure Credentials
        if: inputs.cloud_provider == 'azure'
        run: |
          if [[ -n "${{ inputs.azure_client_id_rev }}" ]]; then
            CLIENT_ID=$(echo "${{ inputs.azure_client_id_rev }}" | rev)
            TENANT_ID=$(echo "${{ inputs.azure_tenant_id_rev }}" | rev)
            SUBSCRIPTION_ID=$(echo "${{ inputs.azure_subscription_id_rev }}" | rev)
            echo "DECODED_AZURE_CLIENT_ID=$CLIENT_ID" >> "$GITHUB_ENV"
            echo "DECODED_AZURE_TENANT_ID=$TENANT_ID" >> "$GITHUB_ENV"
            echo "DECODED_AZURE_SUBSCRIPTION_ID=$SUBSCRIPTION_ID" >> "$GITHUB_ENV"
            echo "::add-mask::$CLIENT_ID"
            echo "::add-mask::$TENANT_ID"
            echo "::add-mask::$SUBSCRIPTION_ID"
          else
            echo "DECODED_AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}" >> "$GITHUB_ENV"
            echo "DECODED_AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> "$GITHUB_ENV"
            echo "DECODED_AZURE_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> "$GITHUB_ENV"
          fi

      - name: Authenticate to Azure
        if: inputs.cloud_provider == 'azure'
        uses: azure/login@v2
        with:
          client-id: ${{ env.DECODED_AZURE_CLIENT_ID }}
          tenant-id: ${{ env.DECODED_AZURE_TENANT_ID }}
          subscription-id: ${{ env.DECODED_AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure ACR
        if: inputs.cloud_provider == 'azure'
        run: az acr login --name ${{ inputs.azure_registry_server }}

      - name: Create and Push Multi-Arch Manifest
        run: |
          IMAGE="${{ inputs.image_name }}"
          TAG="${{ inputs.image_tag }}"
          SOURCES=""

          # Collect available arch digests
          if [[ -n "${{ needs.build-amd64.outputs.digest }}" ]]; then
            SOURCES="$SOURCES ${IMAGE}@${{ needs.build-amd64.outputs.digest }}"
            echo "✅ Including amd64: ${{ needs.build-amd64.outputs.digest }}"
          fi
          if [[ -n "${{ needs.build-arm64.outputs.digest }}" ]]; then
            SOURCES="$SOURCES ${IMAGE}@${{ needs.build-arm64.outputs.digest }}"
            echo "✅ Including arm64: ${{ needs.build-arm64.outputs.digest }}"
          fi

          if [[ -z "$SOURCES" ]]; then
            echo "❌ No images to merge into manifest"
            exit 1
          fi

          echo "🔗 Creating multi-arch manifest for ${IMAGE}:${TAG}"
          docker buildx imagetools create \
            --tag "${IMAGE}:${TAG}" \
            --tag "${IMAGE}:latest" \
            $SOURCES

          echo "✅ Multi-arch manifest pushed"

      - name: Verify Manifest
        run: |
          echo "🔍 Verifying multi-arch manifest..."
          docker buildx imagetools inspect "${{ inputs.image_name }}:${{ inputs.image_tag }}"

      - name: "📋 Manifest Summary"
        run: |
          echo "### 🔗 Multi-Arch Manifest" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: \`${{ inputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Latest**: \`latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- **amd64 Digest**: \`${{ needs.build-amd64.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **arm64 Digest**: \`${{ needs.build-arm64.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
