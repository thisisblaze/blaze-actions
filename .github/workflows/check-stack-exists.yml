name: Check Stack Exists

on:
  workflow_call:
    inputs:
      bucket:
        description: "S3 bucket containing Terraform state"
        required: true
        type: string
      state_key:
        description: "S3 key for the state file"
        required: true
        type: string
      aws_region:
        description: "AWS region"
        required: true
        type: string
    outputs:
      exists:
        description: "true if state file exists and has resources"
        value: ${{ jobs.check.outputs.exists }}

permissions:
  id-token: write
  contents: read

jobs:
  check:
    name: Check State
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      exists: ${{ steps.check.outputs.exists }}

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Check State File
        id: check
        run: |
          # Check if state file exists in S3
          if aws s3api head-object \
            --bucket "${{ inputs.bucket }}" \
            --key "${{ inputs.state_key }}" 2>/dev/null; then
            
            echo "📦 State file found: s3://${{ inputs.bucket }}/${{ inputs.state_key }}"
            
            # Download and check if it has resources
            aws s3 cp "s3://${{ inputs.bucket }}/${{ inputs.state_key }}" state.tfstate
            
            # Count resources (jq check if .resources array is not empty)
            RESOURCE_COUNT=$(jq '.resources | length' state.tfstate)
            
            if [ "$RESOURCE_COUNT" -gt 0 ]; then
              echo "exists=true" >> $GITHUB_OUTPUT
              echo "✅ State exists with $RESOURCE_COUNT resources"
            else
              echo "exists=false" >> $GITHUB_OUTPUT
              echo "⚠️ State file exists but has no resources"
            fi
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "ℹ️ State file does not exist - stack was never created"
          fi
