name: Check Stack Exists

on:
  workflow_call:
    inputs:
      cloud_provider:
        description: "Cloud provider (aws or gcp)"
        required: false
        type: string
        default: "aws"
      bucket:
        description: "S3/GCS bucket containing Terraform state"
        required: true
        type: string
      state_key:
        description: "Key for the state file"
        required: true
        type: string
      aws_region:
        description: "AWS region (used for AWS only)"
        required: false
        type: string
      environment:
        description: "GitHub environment for secrets"
        required: false
        type: string
      wif_audience:
        description: "WIF Audience (Optional)"
        required: false
        type: string
        default: ""
    outputs:
      exists:
        description: "true if state file exists and has resources"
        value: ${{ jobs.check.outputs.exists }}
    secrets:
      AWS_ROLE_ARN:
        required: false
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        required: false
      GCP_SERVICE_ACCOUNT:
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  check:
    name: Check State
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: ${{ inputs.environment }}
    outputs:
      exists: ${{ steps.check.outputs.exists }}

    steps:
      - name: Configure AWS Credentials
        if: inputs.cloud_provider != 'gcp'
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Authenticate to GCP
        if: inputs.cloud_provider == 'gcp'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          audience: ${{ inputs.wif_audience }}

      - name: Check State File (AWS S3)
        if: inputs.cloud_provider != 'gcp'
        id: check-aws
        run: |
          if aws s3api head-object \
            --bucket "${{ inputs.bucket }}" \
            --key "${{ inputs.state_key }}" 2>/dev/null; then
            echo "📦 State file found: s3://${{ inputs.bucket }}/${{ inputs.state_key }}"
            aws s3 cp "s3://${{ inputs.bucket }}/${{ inputs.state_key }}" state.tfstate
            RESOURCE_COUNT=$(jq '.resources | length' state.tfstate)
            if [ "$RESOURCE_COUNT" -gt 0 ]; then
              echo "exists=true" >> $GITHUB_OUTPUT
              echo "✅ State exists with $RESOURCE_COUNT resources"
            else
              echo "exists=false" >> $GITHUB_OUTPUT
              echo "⚠️ State file exists but has no resources"
            fi
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "ℹ️ State file does not exist - stack was never created"
          fi

      - name: Check State File (GCP GCS)
        if: inputs.cloud_provider == 'gcp'
        id: check-gcp
        run: |
          if gcloud storage cat "gs://${{ inputs.bucket }}/${{ inputs.state_key }}" > state.tfstate 2>/dev/null; then
            echo "📦 State file found: gs://${{ inputs.bucket }}/${{ inputs.state_key }}"
            RESOURCE_COUNT=$(jq '.resources | length' state.tfstate)
            if [ "$RESOURCE_COUNT" -gt 0 ]; then
              echo "exists=true" >> $GITHUB_OUTPUT
              echo "✅ State exists with $RESOURCE_COUNT resources"
            else
              echo "exists=false" >> $GITHUB_OUTPUT
              echo "⚠️ State file exists but has no resources"
            fi
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "ℹ️ State file does not exist - stack was never created"
          fi

      - name: Set Output
        id: check
        run: |
          # Merge outputs from whichever provider ran
          AWS_EXISTS="${{ steps.check-aws.outputs.exists }}"
          GCP_EXISTS="${{ steps.check-gcp.outputs.exists }}"
          if [[ "$AWS_EXISTS" == "true" || "$GCP_EXISTS" == "true" ]]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
