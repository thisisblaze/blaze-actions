name: Calculate Configuration

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      terraform_stack:
        required: false
        type: string
        description: "Stack type: network, app, third-party-cloudflare, third-party-mongodb, third-party-elastic, feature-branch"
      branch_tag:
        required: false
        type: string
        description: "Feature branch tag (for feature-branch stacks)"
    outputs:
      stage_key:
        value: ${{ jobs.calculate.outputs.stage_key }}
      bucket:
        value: ${{ jobs.calculate.outputs.bucket }}
      lock_table:
        value: ${{ jobs.calculate.outputs.lock_table }}
      state_key:
        value: ${{ jobs.calculate.outputs.state_key }}
      tf_dir:
        value: ${{ jobs.calculate.outputs.tf_dir }}
      cluster_name:
        value: ${{ jobs.calculate.outputs.cluster_name }}
      env_val:
        value: ${{ jobs.calculate.outputs.env_val }}
      aws_region:
        value: ${{ jobs.calculate.outputs.aws_region }}
      client_key:
        value: ${{ jobs.calculate.outputs.client_key }}
      project_key:
        value: ${{ jobs.calculate.outputs.project_key }}
      namespace:
        value: ${{ jobs.calculate.outputs.namespace }}
      platform:
        value: ${{ jobs.calculate.outputs.platform }}
      domain_root:
        value: ${{ jobs.calculate.outputs.domain_root }}
      allowed_infra_users:
        value: ${{ jobs.calculate.outputs.allowed_infra_users }}

jobs:
  calculate:
    name: Calculate Config
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment: ${{ inputs.environment }}
    outputs:
      stage_key: ${{ steps.config.outputs.stage_key }}
      bucket: ${{ steps.config.outputs.bucket }}
      lock_table: ${{ steps.config.outputs.lock_table }}
      state_key: ${{ steps.config.outputs.state_key }}
      tf_dir: ${{ steps.config.outputs.tf_dir }}
      cluster_name: ${{ steps.config.outputs.cluster_name }}
      env_val: ${{ steps.config.outputs.env_val }}
      aws_region: ${{ steps.config.outputs.aws_region }}
      client_key: ${{ steps.config.outputs.client_key }}
      project_key: ${{ steps.config.outputs.project_key }}
      namespace: ${{ steps.config.outputs.namespace }}
      platform: ${{ steps.config.outputs.platform }}
      domain_root: ${{ steps.config.outputs.domain_root }}
      allowed_infra_users: ${{ steps.config.outputs.allowed_infra_users }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Load Repo Config
        id: load-config
        run: |
          # Load CLIENT config (vars/blaze-env.json)
          CLIENT_CONFIG="vars/blaze-env.json"
          if ! test -f "$CLIENT_CONFIG"; then
            echo "❌ ERROR: Client config file $CLIENT_CONFIG not found!"
            exit 1
          fi

          # Load PROJECT config (vars/thisisblaze/blaze-env.json)
          PROJECT_CONFIG="vars/thisisblaze/blaze-env.json"
          if ! test -f "$PROJECT_CONFIG"; then
            echo "❌ ERROR: Project config file $PROJECT_CONFIG not found!"
            exit 1
          fi

          ENV_INPUT="${{ inputs.environment }}"
          # Normalize to lowercase (DEV -> dev)
          ENV_KEY=$(echo "$ENV_INPUT" | tr '[:upper:]' '[:lower:]')

          echo "📥 Loading Config for [$ENV_KEY]..."
          echo "  - Client config: $CLIENT_CONFIG"
          echo "  - Project config: $PROJECT_CONFIG"

          # 1. Export Common Vars from CLIENT config
          for key in $(jq -r '.common | keys[]' $CLIENT_CONFIG); do
             val=$(jq -r ".common.$key" $CLIENT_CONFIG)
             echo "$key=$val" >> "$GITHUB_ENV"
          done

          # 2. Export Common Vars from PROJECT config (overrides client if duplicate)
          for key in $(jq -r '.common | keys[]' $PROJECT_CONFIG); do
             val=$(jq -r ".common.$key" $PROJECT_CONFIG)
             echo "$key=$val" >> "$GITHUB_ENV"
          done

          # 3. Export Environment Specific Vars from PROJECT config (dev/stage/prod)
          if jq -e ".$ENV_KEY" $PROJECT_CONFIG > /dev/null 2>&1; then
              for key in $(jq -r ".$ENV_KEY | keys[]" $PROJECT_CONFIG); do
                 val=$(jq -r ".$ENV_KEY.$key" $PROJECT_CONFIG)
                 echo "$key=$val" >> "$GITHUB_ENV"
              done
          fi

      - name: Calculate Configuration
        id: config
        run: |
          # Normalize environment to lowercase
          ENV_VAL="${{ inputs.environment }}"
          STAGE_KEY=$(echo "$ENV_VAL" | tr '[:upper:]' '[:lower:]')
          BRANCH_TAG="${{ inputs.branch_tag }}"

          # For feature branches, include branch_tag in stage_key
          # This ensures separate services/resources for each feature branch
          if [[ -n "$BRANCH_TAG" ]]; then
            STAGE_KEY="${STAGE_KEY}-${BRANCH_TAG}"
            echo "🌿 Feature Branch Mode: stage_key=$STAGE_KEY"
          fi

          # Calculate bucket name
          # Note: CLOUD_PLATFORM and other vars are now loaded from scripts/env-config.json
          PLATFORM="${CLOUD_PLATFORM:-ecs}"
          NAMESPACE="${NAMESPACE:-blaze}"

          # Ensure vars are available
          if [[ -z "$CLIENT_KEY" ]] || [[ -z "$PROJECT_KEY" ]]; then
             echo "❌ ERROR: CLIENT_KEY or PROJECT_KEY missing from loaded config."
             exit 1
          fi

          BUCKET="${CLIENT_KEY}-${STAGE_KEY}-blaze-tfstate"
          LOCK_TABLE="${BUCKET}-lock"

          # Determine Terraform directory and state key based on stack type
          STACK="${{ inputs.terraform_stack }}"
          BRANCH_TAG="${{ inputs.branch_tag }}"

          TF_DIR=""
          STATE_KEY=""
          CLUSTER_NAME=""

          case "$STACK" in
            "third-party-cloudflare")
              TF_DIR=".github/aws/infra/live/third-party/cloudflare"
              STATE_KEY="infra/${PROJECT_KEY}/third-party/cloudflare.tfstate"
              ;;
            "third-party-mongodb")
              TF_DIR=".github/aws/infra/live/third-party/mongodb"
              STATE_KEY="infra/${PROJECT_KEY}/third-party/mongodb-${STAGE_KEY}.tfstate"
              ;;
            "third-party-elastic")
              TF_DIR=".github/aws/infra/live/third-party/elastic"
              STATE_KEY="infra/${PROJECT_KEY}/third-party/elastic-${STAGE_KEY}.tfstate"
              ;;
            "network")
              # SAFETY: Prevent targeting 'network' with a specific branch tag
              # Feature branches share the Host Network. Targeting 'network' with a tag
              # would resolve to the Host Network State (dev/network.tfstate), creating a risk
              # of accidental destruction or state corruption of the shared environment.
              if [[ -n "$BRANCH_TAG" ]]; then
                  echo "❌ SAFETY BLOCK: You cannot run the 'network' stack for a Feature Branch."
                  echo "   Feature Branches share the Host Network infrastructure."
                  echo "   Action: Run 'app' stack instead (which includes the Tunnel)."
                  echo "   If you intended to modify the Host Network, clear the 'Branch Name' input."
                  exit 1
              fi


              if [[ "$STAGE_KEY" == "prod" || "$STAGE_KEY" == "stage" ]]; then
                TF_DIR=".github/aws/infra/live/${STAGE_KEY}-network"
                STATE_KEY="infra/${PROJECT_KEY}/${STAGE_KEY}/network.tfstate"
              else
                # Dev now uses split stack (like stage/prod)
                TF_DIR=".github/aws/infra/live/dev-network"
                STATE_KEY="infra/${PROJECT_KEY}/dev/network.tfstate"
              fi
              ;;
            "app" | "application-layer")
              if [[ "$STAGE_KEY" == "prod" || "$STAGE_KEY" == "stage" ]]; then
                TF_DIR=".github/aws/infra/live/${STAGE_KEY}-app"
                STATE_KEY="infra/${PROJECT_KEY}/${STAGE_KEY}/app.tfstate"
              else
                # Dev now uses split stack (like stage/prod)
                TF_DIR=".github/aws/infra/live/dev-app"
                if [[ -n "$BRANCH_TAG" ]]; then
                  # Feature branches have their own app state
                  STATE_KEY="infra/${PROJECT_KEY}/features/${BRANCH_TAG}.tfstate"
                else
                  # Host app state
                  STATE_KEY="infra/${PROJECT_KEY}/dev/app.tfstate"
                fi
              fi
              ;;
            "feature-branch")
              # Feature branches use dev-app directory but separate state
              TF_DIR=".github/aws/infra/live/dev-app"
              if [[ -z "$BRANCH_TAG" ]]; then
                  echo "❌ ERROR: Branch Tag is REQUIRED when targeting 'feature-branch' stack."
                  echo "   To target the Host Environment, use 'host-environment' or 'application-layer'."
                  exit 1
              fi
              
              STATE_KEY="infra/${PROJECT_KEY}/features/${BRANCH_TAG}.tfstate"
              CLUSTER_NAME="blaze-${CLIENT_KEY}-${PROJECT_KEY}-dev-${BRANCH_TAG}-cluster"
              ;;
            "host-environment")
              if [[ "$STAGE_KEY" == "prod" || "$STAGE_KEY" == "stage" ]]; then
                 # For split stacks, 'Host' implies the Network layer (VPC/Cluster)
                 TF_DIR=".github/aws/infra/live/${STAGE_KEY}-network"
                 STATE_KEY="infra/${PROJECT_KEY}/${STAGE_KEY}/network.tfstate"
              else
                 # Dev now uses split stack - 'Host' means network layer
                 TF_DIR=".github/aws/infra/live/dev-network"
                 STATE_KEY="infra/${PROJECT_KEY}/dev/network.tfstate"
              fi
              ;;
            "third-party"*)
              # Catch-all for other third-party stacks if added
              echo "❌ ERROR: Unknown third-party stack: $STACK"
              exit 1
              ;;
            *)
              # Default: assume dev network (split stack)
              if [[ "$STAGE_KEY" == "prod" || "$STAGE_KEY" == "stage" ]]; then
                TF_DIR=".github/aws/infra/live/${STAGE_KEY}-network"
                STATE_KEY="infra/${PROJECT_KEY}/${STAGE_KEY}/network.tfstate"
              else
                # Dev now uses split stack
                TF_DIR=".github/aws/infra/live/dev-network"
                STATE_KEY="infra/${PROJECT_KEY}/dev/network.tfstate"
              fi
              ;;
          esac

          # Calculate cluster name if not set
          if [[ -z "$CLUSTER_NAME" ]]; then
            if [[ "$STAGE_KEY" == "prod" || "$STAGE_KEY" == "stage" ]]; then
              CLUSTER_NAME="blaze-${CLIENT_KEY}-${PROJECT_KEY}-${STAGE_KEY}-cluster"
            else
              if [[ -n "$BRANCH_TAG" ]]; then
                 CLUSTER_NAME="blaze-${CLIENT_KEY}-${PROJECT_KEY}-${STAGE_KEY}-${BRANCH_TAG}-cluster"
              else
                 # DEV HOST (Standard 3.0 Naming)
                 CLUSTER_NAME="blaze-${CLIENT_KEY}-${PROJECT_KEY}-${STAGE_KEY}-cluster"
              fi
            fi
          fi

          echo "stage_key=$STAGE_KEY" >> "$GITHUB_OUTPUT"
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "lock_table=$LOCK_TABLE" >> "$GITHUB_OUTPUT"
          echo "state_key=$STATE_KEY" >> "$GITHUB_OUTPUT"
          echo "tf_dir=$TF_DIR" >> "$GITHUB_OUTPUT"
          echo "cluster_name=$CLUSTER_NAME" >> "$GITHUB_OUTPUT"
          echo "env_val=$ENV_VAL" >> "$GITHUB_OUTPUT"

          # Validate AWS_REGION is set (from config file now)
          if [[ -z "$AWS_REGION" ]]; then
            echo "❌ ERROR: AWS_REGION is not set in env-config.json"
            exit 1
          fi

          echo "aws_region=$AWS_REGION" >> "$GITHUB_OUTPUT"
          echo "client_key=$CLIENT_KEY" >> "$GITHUB_OUTPUT"
          echo "project_key=$PROJECT_KEY" >> "$GITHUB_OUTPUT"
          echo "namespace=$NAMESPACE" >> "$GITHUB_OUTPUT"
          echo "platform=$PLATFORM" >> "$GITHUB_OUTPUT"
          echo "domain_root=$DOMAIN_ROOT" >> "$GITHUB_OUTPUT"
          echo "allowed_infra_users=$ALLOWED_INFRA_USERS" >> "$GITHUB_OUTPUT"

          echo "client_key=$CLIENT_KEY" >> "$GITHUB_OUTPUT"
          echo "project_key=$PROJECT_KEY" >> "$GITHUB_OUTPUT"
          echo "namespace=$NAMESPACE" >> "$GITHUB_OUTPUT"
          echo "platform=$PLATFORM" >> "$GITHUB_OUTPUT"
