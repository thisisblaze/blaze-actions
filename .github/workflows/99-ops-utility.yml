name: "99 - Ops Utility"

on:
  workflow_dispatch:
    inputs:
      cloud_provider:
        description: "Cloud Provider"
        type: choice
        options: ["aws", "gcp", "azure"]
        default: "aws"
      action:
        description: "🛠️ Select Action"
        type: choice
        options:
          - "manage-environment"
          - "destroy-resources"
          - "cleanup-orphaned-lambdas"
          - "cleanup-orphaned-buckets"
          - "nuke-environment"
          - "destroy-cloudflare-pages"
          - "cleanup-cloudflare-deployments"
          - "destroy-cloudflare-pages-bulk"
          - "destroy-cloudflare-tunnel"
          - "sync-cloudflare-config"
          - "unlock-state"
          - "wipe-state"
          - "kill-workflows"
          - "cleanup-dns"
          - "nuke-cloudfront"
        required: true
      environment:
        description: "Target Environment"
        type: choice
        options: ["dev", "dev-mini", "stage", "prod", "MULTI-SITE"]
        required: false
      stack:
        description: "Terraform Stack (for state/destroy)"
        type: choice
        options:
          [
            "network",
            "data",
            "cdn",
            "acm",
            "tunnel",
            "app",
            "third-party-mongodb",
            "third-party-elastic",
          ]
        default: "app"
        required: false
      branch_tag:
        description: "Feature Tag (if applicable)"
        required: false
        type: string
      confirmation:
        description: "Type 'EXECUTE' or 'DESTROY' (for destructive actions)"
        required: false
        type: string
      # Action-specific inputs
      run_id:
        description: "GitHub Run ID (for kill-workflows)"
        required: false
        type: string
      manage_action:
        description: "Service Action (for manage-environment)"
        type: choice
        options: ["start", "stop", "restart", "scale"]
        default: "stop"
      desired_count:
        description: "Desired Instance Count (for scale)"
        type: string
        default: "0"
      # Cloudflare cleanup inputs
      retention_count:
        description: "Deployments to Keep (for cleanup-deployments)"
        type: string
        default: "5"
      retention_days:
        description: "Delete Deployments Older Than (days)"
        type: string
        default: "30"
      dry_run:
        description: "Dry Run (preview without deleting)"
        type: boolean
        default: true
      bulk_pattern:
        description: "Project Name Pattern (for bulk ops, e.g., 'blaze-*-dev-*')"
        type: string
        required: false
      skip_lambda_destroy:
        description: "Orphan Lambda@Edge before destroy (prevents hang)"
        type: boolean
        required: false
        default: true
      dist_id:
        description: "CloudFront Distribution ID (for nuke-cloudfront)"
        type: string
        required: false

  workflow_call:
    inputs:
      cloud_provider:
        type: string
        default: "aws"
        required: false
      action:
        type: string
        required: true
      environment:
        type: string
        required: false
      stack:
        type: string
        required: false
      branch_tag:
        type: string
        required: false
      confirmation:
        type: string
        required: false
      run_id:
        type: string
        required: false
      manage_action:
        type: string
        default: "stop"
        required: false
      desired_count:
        type: string
        default: "0"
        required: false
      retention_count:
        type: string
        default: "5"
        required: false
      retention_days:
        type: string
        default: "30"
        required: false
      dry_run:
        type: boolean
        default: true
        required: false
      bulk_pattern:
        type: string
        required: false
      skip_lambda_destroy:
        type: boolean
        required: false
        default: true
      dist_id:
        type: string
        required: false
    # TODO: Refactor to use secrets: inherit pattern like 01-provision-infra.yml
    # Currently explicitly defining secrets to ensure workflow_call compatibility
    secrets:
      GH_PAT:
        required: false
      AWS_ROLE_ARN:
        required: false

      CLOUDFLARE_API_TOKEN:
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        required: false
      CLOUDFLARE_ZONE_ID:
        required: false
      MONGODB_ATLAS_PUBLIC_KEY:
        required: false
      MONGODB_ATLAS_PRIVATE_KEY:
        required: false
      MONGODB_ATLAS_PROJECT_ID:
        required: false
      MONGODB_ATLAS_ORG_ID:
        required: false
      EC_API_KEY:
        required: false
      ACM_CERTIFICATE_ARN:
        required: false
      # GCP
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        required: false
      GCP_SERVICE_ACCOUNT:
        required: false
      # Azure
      AZURE_CLIENT_ID:
        required: false
      AZURE_TENANT_ID:
        required: false
      AZURE_SUBSCRIPTION_ID:
        required: false

permissions:
  id-token: write
  contents: read
  actions: write

jobs:
  validate:
    name: Validate Request
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Load Access List
        id: load-access
        run: |
          if [[ -f "vars/blaze-env.json" ]]; then
            ALLOWED=$(jq -r '.common.ALLOWED_INFRA_USERS // empty' vars/blaze-env.json)
            echo "allowed=$ALLOWED" >> "$GITHUB_OUTPUT"
          else
            echo "⚠️ vars/blaze-env.json not found. Skipping access control."
            echo "allowed=" >> "$GITHUB_OUTPUT"
          fi

      - name: Check Access
        if: steps.load-access.outputs.allowed != ''
        uses: thisisblaze/blaze-actions/.github/actions/check-access@dev
        with:
          allowed_users: ${{ steps.load-access.outputs.allowed }}
          actor: ${{ github.actor }}

      - name: Validate Input
        run: |
          ACTION="${{ inputs.action }}"
          CONF="${{ inputs.confirmation }}"

          echo "🔍 Selected Action: $ACTION"

          # Block separators and headers
          if [[ "$ACTION" == "-"* ]]; then
            echo "❌ ERROR: You selected a category header or separator ('$ACTION')."
            echo "   Please select a real action (e.g., 'manage-environment')."
            exit 1
          fi

          # Validation for destructive actions
          if [[ "$ACTION" == "destroy-resources" || "$ACTION" == "wipe-state" || "$ACTION" == "nuke-environment" || "$ACTION" == "nuke-cloudfront" || "$ACTION" == "cleanup-dns" || "$ACTION" == "cleanup-orphaned-buckets" ]]; then
            if [[ "$CONF" != "DESTROY" && "$CONF" != "EXECUTE" ]]; then
              echo "❌ ERROR: Confirmation required for $ACTION. Please type 'DESTROY' or 'EXECUTE'."
              exit 1
            fi
          fi

  debug-context:
    name: 🕵️ Debug Context
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'DEV' }}
    timeout-minutes: 5
    steps:
      - name: Check Secrets Presence
        run: |
          echo "🔍 Checking Secret Availability..."

          if [[ -n "${{ secrets.AWS_ROLE_ARN }}" ]]; then
            echo "✅ AWS_ROLE_ARN is SET (Length: ${#AWS_ROLE_ARN})"
          else
            echo "❌ AWS_ROLE_ARN is MISSING or EMPTY"
          fi

          if [[ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ]]; then
            echo "✅ AWS_ACCESS_KEY_ID is SET"
          else
            echo "ℹ️ AWS_ACCESS_KEY_ID is NOT SET (OIDC might be used)"
          fi

          if [[ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]]; then
             echo "✅ CLOUDFLARE_API_TOKEN is SET"
          else
             echo "❌ CLOUDFLARE_API_TOKEN is MISSING"
          fi

          if [[ -n "${{ secrets.GH_PAT }}" ]]; then
             echo "✅ GH_PAT is SET"
          else
             echo "ℹ️ GH_PAT is MISSING (This might be expected)"
          fi
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

  configuration:
    name: Configuration
    needs: [validate]
    # Run for all actions except kill-workflows
    if: inputs.action != 'kill-workflows'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'DEV' }}
    timeout-minutes: 15
    outputs:
      env_val: ${{ steps.config.outputs.env_val }}
      tf_dir: ${{ steps.config.outputs.tf_dir }}
      bucket: ${{ steps.config.outputs.bucket }}
      state_key: ${{ steps.config.outputs.state_key }}
      lock_table: ${{ steps.config.outputs.lock_table }}
      aws_region: ${{ steps.config.outputs.aws_region }}
      cluster_name: ${{ steps.config.outputs.cluster_name }}
      stage_key: ${{ steps.config.outputs.stage_key }}
      client_key: ${{ steps.config.outputs.client_key }}
      project_key: ${{ steps.config.outputs.project_key }}
      namespace: ${{ steps.config.outputs.namespace }}
      platform: ${{ steps.config.outputs.platform }}
      domain_root: ${{ steps.config.outputs.domain_root }}
      cloud_provider: ${{ steps.config.outputs.cloud_provider }}
      cloud_region: ${{ steps.config.outputs.cloud_region }}
      infra_prefix: ${{ steps.config.outputs.infra_prefix }}
      gcp_project_id: ${{ steps.config.outputs.gcp_project_id }}
      has_network: ${{ steps.check-dirs.outputs.has_network }}
      has_data: ${{ steps.check-dirs.outputs.has_data }}
      has_app: ${{ steps.check-dirs.outputs.has_app }}
      has_cdn: ${{ steps.check-dirs.outputs.has_cdn }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Load AWS Region from Config
        id: load-region
        run: |
          AWS_REGION=$(jq -r '.common.AWS_REGION' vars/blaze-env.json)
          if [[ -z "$AWS_REGION" ]]; then
            echo "❌ ERROR: AWS_REGION not set in vars/blaze-env.json"
            exit 1
          fi
          echo "aws_region=$AWS_REGION" >> "$GITHUB_OUTPUT"
          echo "✅ Using AWS Region: $AWS_REGION (from vars/blaze-env.json)"

      # TODO: Re-enable if calculate-config needs AWS Account ID
      # Temporarily disabled to allow workflow to run without AWS_ROLE_ARN configured
      # The calculate-config action handles missing AWS credentials gracefully
      # - name: Configure AWS Credentials
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     role-to-assume: ${{ secrets.AWS_ROLE_ARN || vars.AWS_ROLE_ARN }}
      #     aws-region: ${{ steps.load-region.outputs.aws_region }}

      - name: Calculate Configuration
        id: config
        uses: thisisblaze/blaze-actions/.github/actions/calculate-config@dev
        with:
          environment: ${{ inputs.environment || 'DEV' }}
          terraform_stack: ${{ inputs.stack || 'app' }}
          branch_name: ${{ inputs.branch_tag }}
          cloud_provider: ${{ inputs.cloud_provider }}
          # Ops Utility implies infra operations, so we must pass true to bypass safety check
          deploy_infra: true
          build_images: "false"
          deploy_services: "false"
          event_name: "workflow_dispatch"

      - name: Check Stack Directories
        id: check-dirs
        run: |
          PREFIX="${{ steps.config.outputs.infra_prefix }}"
          STAGE="${{ steps.config.outputs.stage_key }}"

          echo "🔍 Checking directories in $PREFIX for stage $STAGE..."

          if [[ -d "$PREFIX/${STAGE}-network" ]]; then
            echo "✅ Network dir found"
            echo "has_network=true" >> "$GITHUB_OUTPUT"
          else
            echo "⚠️ Network dir NOT found"
            echo "has_network=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ -d "$PREFIX/${STAGE}-data" ]]; then
            echo "✅ Data dir found"
            echo "has_data=true" >> "$GITHUB_OUTPUT"
          else
            echo "⚠️ Data dir NOT found"
            echo "has_data=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ -d "$PREFIX/${STAGE}-app" ]]; then
            echo "✅ App dir found"
            echo "has_app=true" >> "$GITHUB_OUTPUT"
          else
            echo "⚠️ App dir NOT found"
            echo "has_app=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ -d "$PREFIX/${STAGE}-cdn" ]]; then
            echo "✅ CDN dir found"
            echo "has_cdn=true" >> "$GITHUB_OUTPUT"
          else
            echo "⚠️ CDN dir NOT found"
            echo "has_cdn=false" >> "$GITHUB_OUTPUT"
          fi

  kill-workflows:
    name: 🧟‍♂️ Kill Workflows
    needs: [validate]
    if: inputs.action == 'kill-workflows'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Kill Zombies
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH_FILTER="${{ inputs.branch_tag }}"
          if [[ -n "$BRANCH_FILTER" ]]; then
            echo "🎯 Filtering by branch: $BRANCH_FILTER"
            RUNS=$(gh run list --repo "${{ github.repository }}" --status in_progress --branch "$BRANCH_FILTER" --json databaseId,name --limit 50)
          else
            RUNS=$(gh run list --repo "${{ github.repository }}" --status in_progress --json databaseId,name --limit 50)
          fi
          CURRENT_ID="${{ github.run_id }}"
          TARGET_ID="${{ inputs.run_id }}"

          for row in $(echo "${RUNS}" | jq -r '.[] | @base64'); do
            _jq() { echo ${row} | base64 --decode | jq -r ${1}; }
            id=$(_jq '.databaseId')
            name=$(_jq '.name')
            if [[ "$id" == "$CURRENT_ID" ]]; then continue; fi
            if [[ -n "$TARGET_ID" && "$id" != "$TARGET_ID" ]]; then continue; fi
            echo "🔪 Killing Run $id ($name)..."
            gh api --method POST "/repos/${{ github.repository }}/actions/runs/$id/force-cancel"
          done

  state-operations:
    name: State Ops
    needs: [configuration]
    if: inputs.action == 'unlock-state' || inputs.action == 'wipe-state'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'DEV' }}
    timeout-minutes: 15
    steps:
      - name: Configure AWS Credentials
        if: inputs.cloud_provider == 'aws' || inputs.cloud_provider == '' || inputs.cloud_provider == null
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN || vars.AWS_ROLE_ARN }}
          aws-region: ${{ needs.configuration.outputs.aws_region }}

      - name: Authenticate to GCP
        if: inputs.cloud_provider == 'gcp'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        if: inputs.cloud_provider == 'gcp'
        uses: google-github-actions/setup-gcloud@v2

      - name: Execute Ops (AWS)
        if: inputs.cloud_provider == 'aws' || inputs.cloud_provider == '' || inputs.cloud_provider == null
        run: |
          ACTION="${{ inputs.action }}"
          BUCKET="${{ needs.configuration.outputs.bucket }}"
          KEY="${{ needs.configuration.outputs.state_key }}"
          TABLE="${{ needs.configuration.outputs.lock_table }}"
          REGION="${{ needs.configuration.outputs.aws_region }}"

          if [[ -z "$TABLE" ]]; then
            TABLE="$BUCKET"
          fi

          LOCK_ID="${BUCKET}/${KEY}"

          if [[ "$ACTION" == "unlock-state" ]]; then
            echo "🔓 Unlocking State: $LOCK_ID"
            aws dynamodb delete-item \
              --table-name "$TABLE" \
              --region "$REGION" \
              --key "{\"LockID\": {\"S\": \"$LOCK_ID\"}}"
            aws s3 rm "s3://$BUCKET/$KEY.tflock" --region "$REGION" || true
          elif [[ "$ACTION" == "wipe-state" ]]; then
            echo "☢️ WIPING STATE: $LOCK_ID"
            aws s3 rm "s3://$BUCKET/$KEY" --region "$REGION"
            aws dynamodb delete-item \
              --table-name "$TABLE" \
              --region "$REGION" \
              --key "{\"LockID\": {\"S\": \"$LOCK_ID\"}}"
          fi

      - name: Execute Ops (GCP)
        if: inputs.cloud_provider == 'gcp'
        run: |
          ACTION="${{ inputs.action }}"
          BUCKET="${{ needs.configuration.outputs.bucket }}"
          KEY="${{ needs.configuration.outputs.state_key }}"

          if [[ "$ACTION" == "unlock-state" ]]; then
            echo "🔓 Unlocking GCS State: gs://$BUCKET/$KEY"
            # GCS backend uses a .tflock object
            gsutil rm "gs://$BUCKET/$KEY.tflock" 2>/dev/null || echo "ℹ️ No lock file found"
            echo "✅ State unlocked."
          elif [[ "$ACTION" == "wipe-state" ]]; then
            echo "☢️ WIPING GCS STATE: gs://$BUCKET/$KEY"
            gsutil rm "gs://$BUCKET/$KEY" 2>/dev/null || echo "ℹ️ State file not found"
            gsutil rm "gs://$BUCKET/$KEY.tflock" 2>/dev/null || echo "ℹ️ No lock file found"
            echo "✅ State wiped."
          fi

  manage-environment:
    name: Manage Env
    needs: [configuration]
    if: inputs.action == 'manage-environment' && (inputs.cloud_provider == 'aws' || inputs.cloud_provider == '' || inputs.cloud_provider == null)
    uses: ./.github/workflows/reusable-ecs-service-management.yml
    with:
      cluster_name: ${{ needs.configuration.outputs.cluster_name }}
      action: ${{ inputs.manage_action }}
      service_name: "all"
      desired_count: ${{ inputs.desired_count }}
      aws_region: ${{ needs.configuration.outputs.aws_region }}
      environment: ${{ inputs.environment || 'DEV' }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN || vars.AWS_ROLE_ARN }}

  manage-environment-gcp:
    name: Manage Env (GCP)
    needs: [configuration]
    if: inputs.action == 'manage-environment' && inputs.cloud_provider == 'gcp'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'DEV' }}
    timeout-minutes: 10
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Manage Cloud Run Services
        run: |
          PROJECT="${{ needs.configuration.outputs.gcp_project_id }}"
          REGION="${{ needs.configuration.outputs.cloud_region }}"
          ACTION="${{ inputs.manage_action }}"
          PREFIX="${{ needs.configuration.outputs.namespace }}-${{ needs.configuration.outputs.client_key }}-${{ needs.configuration.outputs.project_key }}-${{ needs.configuration.outputs.stage_key }}"

          echo "⚙️ Managing Cloud Run services: $ACTION"
          echo "   Prefix: $PREFIX"

          SERVICES=$(gcloud run services list \
            --project="$PROJECT" --region="$REGION" \
            --filter="metadata.name~^${PREFIX}" \
            --format="value(metadata.name)" 2>/dev/null || true)

          if [[ -z "$SERVICES" ]]; then
            echo "ℹ️ No Cloud Run services found."
            exit 0
          fi

          for SVC in $SERVICES; do
            if [[ "$ACTION" == "stop" ]]; then
              echo "   🛑 Scaling down: $SVC"
              gcloud run services update "$SVC" \
                --project="$PROJECT" --region="$REGION" \
                --max-instances=0 --quiet || echo "   ⚠️ Failed"
            elif [[ "$ACTION" == "start" || "$ACTION" == "restart" ]]; then
              echo "   ▶️ Starting: $SVC"
              gcloud run services update "$SVC" \
                --project="$PROJECT" --region="$REGION" \
                --max-instances=10 --quiet || echo "   ⚠️ Failed"
            elif [[ "$ACTION" == "status" ]]; then
              echo "   📊 Status: $SVC"
              gcloud run services describe "$SVC" \
                --project="$PROJECT" --region="$REGION" \
                --format="table(status.conditions.type,status.conditions.status)" || true
            fi
          done

  manage-environment-azure:
    name: Manage Env (Azure)
    needs: [configuration]
    if: inputs.action == 'manage-environment' && inputs.cloud_provider == 'azure'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Authenticate to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Manage Container Apps
        run: |
          RESOURCE_GROUP="${{ needs.configuration.outputs.namespace }}-${{ needs.configuration.outputs.client_key }}-${{ needs.configuration.outputs.project_key }}-${{ needs.configuration.outputs.stage_key }}-network"
          ACTION="${{ inputs.manage_action }}"
          PREFIX="${{ needs.configuration.outputs.namespace }}-${{ needs.configuration.outputs.client_key }}-${{ needs.configuration.outputs.project_key }}-${{ needs.configuration.outputs.stage_key }}"

          echo "⚙️ Managing Azure Container Apps: $ACTION"
          echo "   Resource Group: $RESOURCE_GROUP"
          echo "   Prefix: $PREFIX"

          # List Apps
          APPS=$(az containerapp list --resource-group "$RESOURCE_GROUP" --query "[?starts_with(name, '$PREFIX')].name" -o tsv)

          if [[ -z "$APPS" ]]; then
             echo "ℹ️ No Container Apps found."
             exit 0
          fi

          for APP in $APPS; do
            echo "   👉 App: $APP"
            if [[ "$ACTION" == "stop" ]]; then
               echo "   🛑 Stopping..."
               az containerapp stop --name "$APP" --resource-group "$RESOURCE_GROUP" || echo "   ⚠️ Failed"
            elif [[ "$ACTION" == "start" ]]; then
               echo "   ▶️ Starting..."
               az containerapp start --name "$APP" --resource-group "$RESOURCE_GROUP" || echo "   ⚠️ Failed"
            elif [[ "$ACTION" == "restart" ]]; then
               echo "   🔄 Restarting Revision..."
               # Restart the latest revision
               REVISION=$(az containerapp revision list --name "$APP" --resource-group "$RESOURCE_GROUP" --query "[0].name" -o tsv)
               if [[ -n "$REVISION" ]]; then
                  az containerapp revision restart --name "$APP" --resource-group "$RESOURCE_GROUP" --revision "$REVISION" || echo "   ⚠️ Failed"
               else
                  echo "   ⚠️ No revision found to restart"
               fi
            fi
          done

  pre-cleanup:
    name: Pre-Cleanup
    needs: [configuration]
    if: inputs.action == 'destroy-resources' && (inputs.cloud_provider == 'aws' || inputs.cloud_provider == '' || inputs.cloud_provider == null)
    uses: ./.github/workflows/reusable-pre-destroy-cleanup.yml
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN || vars.AWS_ROLE_ARN }}

      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    with:
      cluster_name: ${{ needs.configuration.outputs.cluster_name }}
      aws_region: ${{ needs.configuration.outputs.aws_region }}
      stage_filter: ${{ inputs.branch_tag }}
      environment: ${{ inputs.environment || 'DEV' }}

  destroy-resources:
    name: Destroy
    needs: [configuration, pre-cleanup]
    if: inputs.action == 'destroy-resources'
    uses: ./.github/workflows/reusable-terraform.yml
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}
      # Azure
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN || vars.AWS_ROLE_ARN }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      MONGODB_ATLAS_PUBLIC_KEY: ${{ secrets.MONGODB_ATLAS_PUBLIC_KEY }}
      MONGODB_ATLAS_PRIVATE_KEY: ${{ secrets.MONGODB_ATLAS_PRIVATE_KEY }}
      MONGODB_ATLAS_PROJECT_ID: ${{ secrets.MONGODB_ATLAS_PROJECT_ID }}
      MONGODB_ATLAS_ORG_ID: ${{ secrets.MONGODB_ATLAS_ORG_ID }}
      EC_API_KEY: ${{ secrets.EC_API_KEY }}
      ACM_CERTIFICATE_ARN: ${{ secrets.ACM_CERTIFICATE_ARN }}
    with:
      wif_audience: ${{ vars.WIF_AUDIENCE }}
      cloud_provider: ${{ inputs.cloud_provider || 'aws' }}
      tf_dir: ${{ needs.configuration.outputs.tf_dir }}
      aws_region: ${{ needs.configuration.outputs.aws_region }}
      environment: ${{ inputs.environment || 'DEV' }}
      bucket: ${{ needs.configuration.outputs.bucket }}
      state_key: ${{ needs.configuration.outputs.state_key }}
      lock_table: ${{ needs.configuration.outputs.lock_table }}
      apply: true
      destroy: true
      orphan_lambda: ${{ inputs.skip_lambda_destroy }}
      tf_vars: |
        project_key=${{ needs.configuration.outputs.project_key }}
        client_key=${{ needs.configuration.outputs.client_key }}
        namespace=${{ needs.configuration.outputs.namespace }}
        platform=${{ needs.configuration.outputs.platform }}
        aws_region=${{ needs.configuration.outputs.aws_region }}
        domain_root=${{ needs.configuration.outputs.domain_root }}
        stage=${{ needs.configuration.outputs.stage_key }}
        branch_name=${{ inputs.branch_tag }}

        gcp_project_id=${{ needs.configuration.outputs.gcp_project_id }}
        gcp_region=${{ needs.configuration.outputs.cloud_region }}
        azure_region=${{ needs.configuration.outputs.cloud_region }}
  cleanup-orphaned-lambdas:
    name: 🧹 Cleanup Orphaned Lambdas (Garbage Collection)
    needs: [configuration]
    if: inputs.action == 'cleanup-orphaned-lambdas' && (inputs.cloud_provider == 'aws' || inputs.cloud_provider == '' || inputs.cloud_provider == null)
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'DEV' }}
    timeout-minutes: 15
    steps:
      - name: Validate Confirmation
        run: |
          if [ "${{ inputs.confirmation }}" != "EXECUTE" ] && [ "${{ inputs.confirmation }}" != "DESTROY" ]; then
             echo "⚠️ Confirmation not set to EXECUTE/DESTROY. Running in DRY-RUN mode."
             echo "CONFIRM_MODE=DRY_RUN" >> $GITHUB_ENV
          else
             echo "🚨 EXECUTION MODE CONFIRMED"
             echo "CONFIRM_MODE=EXECUTE" >> $GITHUB_ENV
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN || vars.AWS_ROLE_ARN }}
          # Lambda@Edge is ALWAYS in us-east-1
          aws-region: us-east-1

      - name: Find and Destroy Zombies
        env:
          NAMESPACE: ${{ needs.configuration.outputs.namespace }}
          STAGE_KEY: ${{ needs.configuration.outputs.stage_key }}
        run: |
          # 1. Debug & Setup
          set -o pipefail
          echo "🔎 PARAMETER CHECK:"
          echo "   - NAMESPACE: '$NAMESPACE'"
          echo "   - STAGE_KEY: '$STAGE_KEY'"

          if [[ -z "$NAMESPACE" ]]; then
             echo "❌ CRITICAL ERROR: NAMESPACE is empty. Check configuration."
             exit 1
          fi

          # 2. Pattern Matching
          # Matches: blaze-stage-lambda-edge-resize-image-c533830b
          # Pattern: [namespace]-[stage]-lambda-edge-*
          PATTERN="${NAMESPACE}-${STAGE_KEY}-lambda-edge-.*"
          echo "   - PATTERN:   '$PATTERN'"

          echo "--------------------------------"
          echo "📡 Connectivity Check (us-east-1)..."

          # Fetch ALL function names first to verify access
          ALL_FUNCS=$(aws lambda list-functions --region us-east-1 --query "Functions[].FunctionName" --output text | tr '\t' '\n')
          TOTAL_COUNT=$(echo "$ALL_FUNCS" | grep -v "^$" | wc -l)

          echo "✅ AWS Connectivity OK. Total Lambdas found in region: $TOTAL_COUNT"

          # 3. Filter
          echo "$ALL_FUNCS" | grep -E "$PATTERN" > found_lambdas.txt || true

          if [ ! -s found_lambdas.txt ]; then
             echo "⚠️  No orphaned Lambda functions found matching pattern: $PATTERN"
             echo "   (This means either they are already deleted, or the pattern is wrong)"
             exit 0
          fi

          echo "🧟 Found the following candidates:"
          cat found_lambdas.txt
          echo "--------------------------------"

          while read func; do
            if [ "$CONFIRM_MODE" == "EXECUTE" ]; then
                echo "🗑️ Deleting $func..."
                aws lambda delete-function --function-name "$func" --region us-east-1 || echo "⚠️ Failed to delete $func (might be attached or already gone)"
            else
                echo "ℹ️ [DRY RUN] Would delete $func"
            fi
            FOUND_COUNT=$((FOUND_COUNT+1))
          done < found_lambdas.txt

          if [ "$CONFIRM_MODE" != "EXECUTE" ]; then
             echo ""
             echo "⚠️ This was a DRY RUN. To actually delete these resources, set 'Confirmation' to 'EXECUTE'."
          else
             echo "✅ Garbage Collection Complete."
          fi

  cleanup-orphaned-buckets:
    name: 🧹 Cleanup Orphaned Buckets
    needs: [configuration]
    if: inputs.action == 'cleanup-orphaned-buckets' && (inputs.cloud_provider == 'aws' || inputs.cloud_provider == '' || inputs.cloud_provider == null)
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'DEV' }}
    timeout-minutes: 15
    steps:
      - name: Validate Confirmation
        run: |
          if [ "${{ inputs.confirmation }}" != "EXECUTE" ] && [ "${{ inputs.confirmation }}" != "DESTROY" ]; then
             echo "⚠️ Confirmation not set to EXECUTE/DESTROY. Running in DRY-RUN mode."
             echo "CONFIRM_MODE=DRY_RUN" >> $GITHUB_ENV
          else
             echo "🚨 EXECUTION MODE CONFIRMED"
             echo "CONFIRM_MODE=EXECUTE" >> $GITHUB_ENV
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN || vars.AWS_ROLE_ARN }}
          aws-region: ${{ needs.configuration.outputs.aws_region }}

      - name: Find and Delete Orphaned Buckets
        env:
          PREFIX: ${{ needs.configuration.outputs.namespace }}-${{ needs.configuration.outputs.client_key }}
          ENV_KEY: ${{ inputs.environment == 'dev-mini' && 'dev-mini' || 'dev' }}
        run: |
          echo "🧹 Looking for orphaned buckets matching *${PREFIX}*${ENV_KEY}* (excluding tfstate)..."
          ALL_BUCKETS=$(aws s3api list-buckets --query "Buckets[].Name" --output text)
          
          FOUND_COUNT=0
          for bucket in $ALL_BUCKETS; do
             if [[ "$bucket" == *"${PREFIX}"* ]] && [[ "$bucket" == *"${ENV_KEY}"* ]] && [[ "$bucket" != *"tfstate"* ]]; then
                echo "🗑️ Found orphaned bucket: $bucket"
                if [ "$CONFIRM_MODE" == "EXECUTE" ]; then
                   aws s3 rb "s3://$bucket" --force || echo "⚠️ Failed to delete $bucket"
                else
                   echo "ℹ️ [DRY RUN] Would delete $bucket"
                fi
                FOUND_COUNT=$((FOUND_COUNT+1))
             fi
          done
          
          if [ "$FOUND_COUNT" -eq 0 ]; then
             echo "✅ No orphaned buckets found."
          else
             if [ "$CONFIRM_MODE" != "EXECUTE" ]; then
                echo "⚠️ This was a DRY RUN. To actually delete these $FOUND_COUNT resources, set 'Confirmation' to 'EXECUTE'."
             else
                echo "✅ Successfully cleaned $FOUND_COUNT buckets."
             fi
          fi

      - name: Find and Delete Orphaned Log Groups
        env:
          PREFIX: ${{ needs.configuration.outputs.namespace }}-${{ needs.configuration.outputs.client_key }}
          ENV_KEY: ${{ inputs.environment == 'dev-mini' && 'dev-mini' || 'dev' }}
        run: |
          echo "🧹 Looking for orphaned log groups matching *${PREFIX}*${ENV_KEY}*..."
          ALL_LOGS=$(aws logs describe-log-groups --query "logGroups[].logGroupName" --output text)
          
          for log in $ALL_LOGS; do
             if [[ "$log" == *"${PREFIX}"* ]] && [[ "$log" == *"${ENV_KEY}"* ]]; then
                echo "🗑️ Found orphaned log group: $log"
                if [ "$CONFIRM_MODE" == "EXECUTE" ]; then
                   aws logs delete-log-group --log-group-name "$log" || echo "⚠️ Failed to delete $log"
                else
                   echo "ℹ️ [DRY RUN] Would delete $log"
                fi
             fi
          done

      - name: Find and Delete Orphaned Target Groups
        env:
          PREFIX: ${{ needs.configuration.outputs.namespace }}
          ENV_KEY: ${{ inputs.environment == 'dev-mini' && 'dev-mini' || 'dev' }}
        run: |
          echo "🧹 Looking for orphaned target groups matching *${PREFIX}*${ENV_KEY}*..."
          ALL_TGS=$(aws elbv2 describe-target-groups --query "TargetGroups[].TargetGroupArn" --output text)
          
          for tg_arn in $ALL_TGS; do
             tg_name=$(aws elbv2 describe-target-groups --target-group-arns "$tg_arn" --query "TargetGroups[0].TargetGroupName" --output text)
             if [[ "$tg_name" == *"${PREFIX}"* ]] && [[ "$tg_name" == *"${ENV_KEY}"* ]]; then
                echo "🗑️ Found orphaned target group: $tg_name ($tg_arn)"
                if [ "$CONFIRM_MODE" == "EXECUTE" ]; then
                   aws elbv2 delete-target-group --target-group-arn "$tg_arn" || echo "⚠️ Failed to delete $tg_name"
                else
                   echo "ℹ️ [DRY RUN] Would delete $tg_name"
                fi
             fi
          done

      - name: Find and Delete Orphaned CloudFront Functions
        env:
          PREFIX: ${{ needs.configuration.outputs.namespace }}-${{ needs.configuration.outputs.client_key }}
          ENV_KEY: ${{ inputs.environment == 'dev-mini' && 'dev-mini' || 'dev' }}
        run: |
          echo "🧹 Looking for orphaned CloudFront Functions matching *${PREFIX}*${ENV_KEY}*..."
          ALL_FUNCS=$(aws cloudfront list-functions --query "FunctionList.Items[].Name" --output text || echo "")
          
          for func in $ALL_FUNCS; do
             if [[ "$func" == *"${PREFIX}"* ]] && [[ "$func" == *"${ENV_KEY}"* ]]; then
                echo "🗑️ Found orphaned function: $func"
                if [ "$CONFIRM_MODE" == "EXECUTE" ]; then
                   ETAG=$(aws cloudfront describe-function --name "$func" --query "ETag" --output text)
                   aws cloudfront delete-function --name "$func" --if-match "$ETAG" || echo "⚠️ Failed to delete $func"
                else
                   echo "ℹ️ [DRY RUN] Would delete $func"
                fi
             fi
          done
          
  sync-cloudflare-config:
    name: Sync Cloudflare Config
    needs: [configuration]
    if: inputs.action == 'sync-cloudflare-config'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Parse blaze-env.json
        id: parse
        run: |
          STAGE="${{ needs.configuration.outputs.stage_key }}"

          # Read and parse JSON
          COMMON=$(jq -r '.common' vars/blaze-env.json)
          STAGE_OVERRIDES=$(jq -r ".${STAGE} // {}" vars/blaze-env.json)

          # Extract key values (PROJECT IDENTITY)
          CLIENT_KEY=$(echo "$COMMON" | jq -r '.CLIENT_KEY')
          PROJECT_KEY=$(echo "$COMMON" | jq -r '.PROJECT_KEY')
          NAMESPACE=$(echo "$COMMON" | jq -r '.NAMESPACE')
          SITE_NAME=$(echo "$COMMON" | jq -r '.BLAZE_FRONTEND_SITE_NAME')

          # Extract infrastructure values
          AWS_REGION=$(echo "$COMMON" | jq -r '.AWS_REGION')
          CLOUD_PLATFORM=$(echo "$COMMON" | jq -r '.CLOUD_PLATFORM')
          DOMAIN_ROOT=$(echo "$COMMON" | jq -r '.DOMAIN_ROOT')

          # Extract app config
          NODE_ENV=$(echo "$COMMON" | jq -r '.NODE_ENV')
          DEBUG=$(echo "$COMMON" | jq -r '.DEBUG')

          # Extract stage-specific overrides
          S3_BUCKET=$(echo "$STAGE_OVERRIDES" | jq -r '.BLAZE_FILES_S3_BUCKET // empty')
          S3_PUBLIC_URL=$(echo "$STAGE_OVERRIDES" | jq -r '.BLAZE_FILES_S3_PUBLIC_URL // empty')
          GRAPHQL_PLAYGROUND=$(echo "$STAGE_OVERRIDES" | jq -r '.BLAZE_GRAPHQL_PLAYGROUND_ENABLED // empty')

          # Export to outputs
          echo "client_key=$CLIENT_KEY" >> $GITHUB_OUTPUT
          echo "project_key=$PROJECT_KEY" >> $GITHUB_OUTPUT
          echo "namespace=$NAMESPACE" >> $GITHUB_OUTPUT
          echo "site_name=$SITE_NAME" >> $GITHUB_OUTPUT
          echo "aws_region=$AWS_REGION" >> $GITHUB_OUTPUT
          echo "cloud_platform=$CLOUD_PLATFORM" >> $GITHUB_OUTPUT
          echo "domain_root=$DOMAIN_ROOT" >> $GITHUB_OUTPUT
          echo "node_env=$NODE_ENV" >> $GITHUB_OUTPUT
          echo "debug=$DEBUG" >> $GITHUB_OUTPUT
          echo "s3_bucket=$S3_BUCKET" >> $GITHUB_OUTPUT
          echo "s3_public_url=$S3_PUBLIC_URL" >> $GITHUB_OUTPUT
          echo "graphql_playground=$GRAPHQL_PLAYGROUND" >> $GITHUB_OUTPUT

          echo "✅ Parsed blaze-env.json for $STAGE environment"

      - name: Sync to Cloudflare Pages (Admin)
        if: ${{ needs.configuration.outputs.stage_key != 'dev' }}
        run: |
          # Install Wrangler
          npm install -g wrangler

          # Project name
          PROJECT_NAME="${{ needs.configuration.outputs.namespace }}-${{ steps.parse.outputs.project_key }}-${{ needs.configuration.outputs.stage_key }}-admin"

          echo "🔄 Syncing config to Cloudflare Pages project: $PROJECT_NAME"

          # Sync PROJECT IDENTITY
          echo "${{ steps.parse.outputs.client_key }}" | wrangler pages secret put CLIENT_KEY --project-name="$PROJECT_NAME"
          echo "${{ steps.parse.outputs.project_key }}" | wrangler pages secret put PROJECT_KEY --project-name="$PROJECT_NAME"
          echo "${{ steps.parse.outputs.namespace }}" | wrangler pages secret put NAMESPACE --project-name="$PROJECT_NAME"
          echo "${{ steps.parse.outputs.site_name }}" | wrangler pages secret put BLAZE_FRONTEND_SITE_NAME --project-name="$PROJECT_NAME"

          # Sync Infrastructure
          echo "${{ steps.parse.outputs.aws_region }}" | wrangler pages secret put AWS_REGION --project-name="$PROJECT_NAME"
          echo "${{ steps.parse.outputs.cloud_platform }}" | wrangler pages secret put CLOUD_PLATFORM --project-name="$PROJECT_NAME"
          echo "${{ steps.parse.outputs.domain_root }}" | wrangler pages secret put DOMAIN_ROOT --project-name="$PROJECT_NAME"

          # Sync App Config
          echo "${{ steps.parse.outputs.node_env }}" | wrangler pages secret put NODE_ENV --project-name="$PROJECT_NAME"
          echo "${{ steps.parse.outputs.debug }}" | wrangler pages secret put DEBUG --project-name="$PROJECT_NAME"

          # Sync Stage-specific overrides (if they exist)
          if [ -n "${{ steps.parse.outputs.s3_bucket }}" ]; then
            echo "${{ steps.parse.outputs.s3_bucket }}" | wrangler pages secret put BLAZE_FILES_S3_BUCKET --project-name="$PROJECT_NAME"
          fi

          if [ -n "${{ steps.parse.outputs.s3_public_url }}" ]; then
            echo "${{ steps.parse.outputs.s3_public_url }}" | wrangler pages secret put BLAZE_FILES_S3_PUBLIC_URL --project-name="$PROJECT_NAME"
          fi

          if [ -n "${{ steps.parse.outputs.graphql_playground }}" ]; then
            echo "${{ steps.parse.outputs.graphql_playground }}" | wrangler pages secret put BLAZE_GRAPHQL_PLAYGROUND_ENABLED --project-name="$PROJECT_NAME"
          fi

          echo "✅ Successfully synced application config to Cloudflare Pages"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Skip DEV
        if: ${{ needs.configuration.outputs.stage_key == 'dev' }}
        run: |
          echo "ℹ️  Skipping Cloudflare Pages sync for DEV (Admin is not deployed to Pages in DEV)"

  # ------------------------------------------------------------------
  # ☁️ CLOUDFLARE CLEANUP OPERATIONS
  # ------------------------------------------------------------------

  destroy-cloudflare-pages:
    name: 🗑️ Delete Cloudflare Pages Project
    needs: [configuration]
    if: inputs.action == 'destroy-cloudflare-pages'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Authenticate to Cloudflare
        run: echo "Authentication handled by secrets in step"

      - name: Delete Project
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Define potential project names
          PROJECT_NAME_1="${{ needs.configuration.outputs.namespace }}-${{ needs.configuration.outputs.project_key }}-${{ needs.configuration.outputs.stage_key }}-admin"
          PROJECT_NAME_2="${{ needs.configuration.outputs.namespace }}-${{ needs.configuration.outputs.client_key }}-${{ needs.configuration.outputs.project_key }}-${{ needs.configuration.outputs.stage_key }}-admin"

          PROJECTS=("$PROJECT_NAME_1" "$PROJECT_NAME_2")

          for PROJ in "${PROJECTS[@]}"; do
             if [[ -z "$PROJ" || "$PROJ" == *"-"* ]]; then # Basic sanity check, though not perfect
                 echo "🔍 Checking Cloudflare Pages Project: $PROJ"
                 
                 # Check if exists
                 EXISTS=$(curl -s -X GET "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$PROJ" \
                   -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                   -H "Content-Type: application/json" | jq -r '.success')

                 if [[ "$EXISTS" == "true" ]]; then
                    echo "   🗑️ Deleting: $PROJ"
                    curl -s -X DELETE "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$PROJ" \
                      -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                      -H "Content-Type: application/json"
                    echo "   ✅ Deleted."
                 else
                    echo "   ℹ️ Project $PROJ not found (already deleted?)"
                 fi
             fi
          done

  cleanup-dns:
    name: 🧹 Cleanup DNS
    needs: [configuration]
    if: always() && needs.configuration.result == 'success' && inputs.action == 'cleanup-dns'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 10
    steps:
      - name: Delete Records
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NAMESPACE: ${{ needs.configuration.outputs.namespace }}
          PROJECT: ${{ needs.configuration.outputs.project_key }}
          CLIENT: ${{ needs.configuration.outputs.client_key }}
          STAGE: ${{ needs.configuration.outputs.stage_key }}
        run: |
          if [[ -z "$ZONE_ID" ]]; then
            echo "❌ ZONE_ID secret is missing or empty."
            exit 1
          fi

          check_and_delete() {
            local record_name=$1
            echo "Checking record: $record_name"
            
            # List records matching name
            RESPONSE=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?name=$record_name" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json")

            # Extract IDs
            IDS=$(echo "$RESPONSE" | jq -r '.result[].id')
            
            if [[ -z "$IDS" || "$IDS" == "null" ]]; then
              echo "No DNS records found for $record_name"
            else
              for id in $IDS; do
                echo "Deleting record ID: $id"
                curl -s -X DELETE "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$id" \
                  -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                  -H "Content-Type: application/json"
                echo "Deleted."
              done
            fi
          }

          check_pages_domains() {
            local domain=$1
            echo "Checking Pages domains for: $domain"
            
            if [[ -z "$ACCOUNT_ID" ]]; then
               echo "⚠️ ACCOUNT_ID secret missing. Skipping Pages check."
               return
            fi

            # List projects
            PROJECTS=$(curl -s -X GET "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json")
            
            PROJECT_NAMES=$(echo "$PROJECTS" | jq -r '.result[].name')

            for proj in $PROJECT_NAMES; do
              # Check domains for project
              DOMAINS=$(curl -s -X GET "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$proj/domains" \
                -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                -H "Content-Type: application/json")
              
              MATCH=$(echo "$DOMAINS" | jq -r --arg d "$domain" '.result[] | select(.name == $d) | .id')
              
              if [[ -n "$MATCH" ]]; then
                 echo "Found domain $domain in project $proj. Deleting..."
                 curl -s -X DELETE "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$proj/domains/$domain" \
                   -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                   -H "Content-Type: application/json"
                 echo "Deleted domain from Pages project $proj."
              fi
            done
          }

          check_pages_project() {
            local project_name=$1
            echo "🔍 Checking Pages Project: $project_name"

            EXISTS=$(curl -s -X GET "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$project_name" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" | jq -r '.success')

            if [[ "$EXISTS" == "true" ]]; then
               echo "🗑️ Deleting Pages Project: $project_name"
               curl -s -X DELETE "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$project_name" \
                 -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                 -H "Content-Type: application/json"
               echo "   Deleted."
            else
               echo "✅ Project $project_name not found."
            fi
          }

          check_worker_script() {
            local script_name=$1
            echo "🔍 Checking Worker Script: $script_name"

            # Check if exists (by listing or getting)
            # We can use the list endpoint with filtering or just try to delete if we are sure?
            # Better to check.
            # GET /accounts/{account_id}/workers/scripts/{script_name} is not documented as "check existence" easily, 
            # usually returns script content. simpler to just iterate or try delete.
            # But let's try to be precise.

            # Simple Check:
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X GET "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/workers/scripts/$script_name" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")

            if [[ "$HTTP_CODE" == "200" ]]; then
               echo "🗑️ Deleting Worker Script: $script_name"
               curl -s -X DELETE "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/workers/scripts/$script_name" \
                 -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                 -H "Content-Type: application/json"
               echo "   Deleted."
            elif [[ "$HTTP_CODE" == "404" ]]; then
               echo "✅ Worker Script $script_name not found."
            else
               echo "⚠️ Error checking worker script $script_name (HTTP $HTTP_CODE)"
            fi
          }

          # Construct patterns based on environment/stage
          DOMAIN_ROOT="${{ needs.configuration.outputs.domain_root }}"
          STAGE="${{ needs.configuration.outputs.stage_key }}"

          # Safety check
          if [[ "$STAGE" == "prod" && "${{ inputs.confirmation }}" != "DESTROY" ]]; then
             echo "❌ Safety: Cannot cleanup PROD DNS without confirmation 'DESTROY'"
             exit 1
          fi

          echo "Cleaning up DNS for stage: $STAGE, domain: $DOMAIN_ROOT"

          # Example: api-stage.thisisblaze.uk
          check_and_delete "api-${STAGE}.${DOMAIN_ROOT}"
          check_and_delete "frontend-${STAGE}.${DOMAIN_ROOT}"
          check_and_delete "cdn-${STAGE}.${DOMAIN_ROOT}"
          check_and_delete "admin-${STAGE}.${DOMAIN_ROOT}"
          check_and_delete "kibana-${STAGE}.${DOMAIN_ROOT}"

          # ------------------------------------------------------------------
          # Feature: Worker Route Cleanup (Fix 409 Conflict)
          # ------------------------------------------------------------------
          check_workers_routes() {
             echo "🔍 Checking Worker Routes for pattern: $1"
             PATTERN=$1
             
             # List routes
             ROUTES=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/workers/routes" \
               -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
               -H "Content-Type: application/json")
             
             echo "DEBUG: Raw Routes Response:"
             # echo "$ROUTES" | jq . # Less verbose now

             # Find matching route IDs
             # We look for routes that contain the pattern (e.g. domain name)
             # This is aggressive but necessary for 'tunnel' stack cleanup
             echo "DEBUG: Filtering with jq substring match for '$PATTERN'..."
             IDS=$(echo "$ROUTES" | jq -r --arg pat "$PATTERN" '.result[] | select(.pattern | contains($pat)) | .id')
             
             if [[ -z "$IDS" ]]; then
                echo "✅ No conflicting worker routes found."
             else
                for id in $IDS; do
                  echo "🗑️ Deleting worker route ID: $id"
                  curl -s -X DELETE "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/workers/routes/$id" \
                    -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                    -H "Content-Type: application/json"
                  echo "   Deleted."
                done
             fi
          }

          if [[ "${{ inputs.stack }}" == "tunnel" ]]; then
             echo "🧹 Stack is 'tunnel' - checking for orphaned worker routes..."
             # Pattern: *.{stage}.{domain}/* or similar
             # We'll search for the stage+domain to be safe
             echo "DEBUG: STAGE='$STAGE', DOMAIN_ROOT='$DOMAIN_ROOT'"
             
             if [[ -z "$STAGE" || -z "$DOMAIN_ROOT" ]]; then
                echo "❌ Error: STAGE or DOMAIN_ROOT is empty."
             else
                check_workers_routes "${STAGE}.${DOMAIN_ROOT}"
             fi
          fi

          if [[ "${{ inputs.stack }}" == "app" ]]; then
             echo "🧹 Stack is 'app' - checking for conflicting Pages & Workers..."
             
             # 1. Admin Pages Project
             # Naming: {namespace}-{client}-{project}-{stage}-admin
             PROJECT_NAME="${NAMESPACE}-${CLIENT}-${PROJECT}-${STAGE}-admin"
             check_pages_project "$PROJECT_NAME"

             # 2. Basic Auth Worker
             # Naming: blaze-{project}-{stage}-basic-auth (from screenshot: blaze-thisisblaze-dev-basic-auth)
             # Wait, usually it includes namespace?
             # Let's try constructing it. The screenshot showed: blaze-thisisblaze-dev-basic-auth
             # Namespace=blaze, Project=thisisblaze, Stage=dev.
             # So pattern is: ${NAMESPACE}-${PROJECT}-${STAGE}-basic-auth
             # But let's also try with client-key just in case: ${NAMESPACE}-${CLIENT}-${PROJECT}-${STAGE}-basic-auth
             # Or just check both?
             
             WORKER_1="${NAMESPACE}-${PROJECT}-${STAGE}-basic-auth"
             check_worker_script "$WORKER_1"

             if [[ -n "$CLIENT" && "$CLIENT" != "thisisblaze" ]]; then
                WORKER_2="${NAMESPACE}-${CLIENT}-${PROJECT}-${STAGE}-basic-auth"
                check_worker_script "$WORKER_2"
             fi
          fi

          # Wildcards if necessary (be careful)
          # check_and_delete "*.${STAGE}.${DOMAIN_ROOT}"

          # Pages domains
          check_pages_domains "api-${STAGE}.${DOMAIN_ROOT}"
          check_pages_domains "frontend-${STAGE}.${DOMAIN_ROOT}"
          check_pages_domains "admin-${STAGE}.${DOMAIN_ROOT}"

  nuke-cloudfront:
    name: ☢️ Nuke CloudFront
    needs: [configuration]
    if: inputs.action == 'nuke-cloudfront'
    uses: ./.github/workflows/nuke-cloudfront.yml
    with:
      dist_id: ${{ inputs.dist_id }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN || vars.AWS_ROLE_ARN }}

  cleanup-cloudflare-deployments:
    name: 🧹 Cleanup Old Deployments
    needs: [configuration]
    if: inputs.action == 'cleanup-cloudflare-deployments'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Calculate Project Name
        id: calc
        run: |
          NAMESPACE="${{ needs.configuration.outputs.namespace }}"
          PROJECT="${{ needs.configuration.outputs.project_key }}"
          STAGE="${{ needs.configuration.outputs.stage_key }}"
          CLIENT="${{ needs.configuration.outputs.client_key }}"

          if [ "$STAGE" = "prod" ]; then
            PROJECT_NAME="${NAMESPACE}-${CLIENT}-${PROJECT}-admin"
          else
            PROJECT_NAME="${NAMESPACE}-${CLIENT}-${PROJECT}-${STAGE}-admin"
          fi

          echo "project_name=$PROJECT_NAME" >> $GITHUB_OUTPUT
          echo "📦 Target project: $PROJECT_NAME"

      - name: List and Cleanup Deployments
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT_NAME: ${{ steps.calc.outputs.project_name }}
          RETENTION_COUNT: ${{ inputs.retention_count || '5' }}
          RETENTION_DAYS: ${{ inputs.retention_days || '30' }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          echo "🔍 Listing deployments for: $PROJECT_NAME"

          if [ "$DRY_RUN" = "true" ]; then
            echo "🔍 DRY RUN MODE - No deletions will be performed"
          fi

          # Fetch all deployments
          RESPONSE=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${PROJECT_NAME}/deployments" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json")

          # Check for errors
          SUCCESS=$(echo "$RESPONSE" | jq -r '.success')
          if [ "$SUCCESS" != "true" ]; then
            echo "❌ Failed to fetch deployments"
            echo "$RESPONSE" | jq -r '.errors'
            exit 1
          fi

          # Get current timestamp
          CURRENT_TIME=$(date +%s)
          CUTOFF_TIME=$((CURRENT_TIME - (RETENTION_DAYS * 86400)))

          # Sort by created_on descending
          DEPLOYMENTS=$(echo "$RESPONSE" | jq -r '.result | sort_by(.created_on) | reverse | .[] | "\(.id)|\(.created_on)|\(.environment)"')

          TOTAL_COUNT=$(echo "$DEPLOYMENTS" | wc -l | tr -d ' ')
          echo "📊 Total deployments: $TOTAL_COUNT"
          echo "🎯 Retention: Keep $RETENTION_COUNT latest OR newer than $RETENTION_DAYS days"

          DELETED=0
          KEPT=0
          INDEX=0

          echo "$DEPLOYMENTS" | while IFS='|' read -r DEPLOY_ID CREATED_AT ENV; do
            INDEX=$((INDEX + 1))
            
            # Calculate age
            CREATED_TS=$(date -d "${CREATED_AT%.*}" +%s 2>/dev/null || echo 0)
            AGE_DAYS=$(( (CURRENT_TIME - CREATED_TS) / 86400 ))
            
            # Decide whether to delete
            if [ $INDEX -le $RETENTION_COUNT ] || [ $CREATED_TS -gt $CUTOFF_TIME ]; then
              echo "✅ Keeping: $DEPLOY_ID ($ENV, ${AGE_DAYS}d old)"
              KEPT=$((KEPT + 1))
            else
              if [ "$DRY_RUN" = "true" ]; then
                echo "🔍 [DRY RUN] Would delete: $DEPLOY_ID ($ENV, ${AGE_DAYS}d old)"
              else
                echo "🗑️ Deleting: $DEPLOY_ID ($ENV, ${AGE_DAYS}d old)"
                
                curl -s -X DELETE \
                  "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${PROJECT_NAME}/deployments/${DEPLOY_ID}" \
                  -H "Authorization: Bearer ${CF_API_TOKEN}" > /dev/null
                
                DELETED=$((DELETED + 1))
              fi
            fi
          done

          echo ""
          echo "📊 Summary: Total=$TOTAL_COUNT, Kept=$KEPT, Deleted=$DELETED"

      - name: Summary
        run: |
          DRY_RUN="${{ inputs.dry_run }}"

          if [ "$DRY_RUN" = "true" ]; then
            echo "### 🔍 Deployment Cleanup Preview" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ✅ Deployment Cleanup Complete" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Project** | \`${{ steps.calc.outputs.project_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Retention Count** | \`${{ inputs.retention_count }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Retention Days** | \`${{ inputs.retention_days }}\` |" >> $GITHUB_STEP_SUMMARY

  destroy-cloudflare-pages-bulk:
    name: 🗑️ Bulk Delete Pages Projects
    needs: [configuration]
    if: inputs.action == 'destroy-cloudflare-pages-bulk'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Validate Confirmation
        run: |
          if [ "${{ inputs.confirmation }}" != "BULK_DESTROY" ]; then
            echo "❌ BULK operation requires 'BULK_DESTROY' confirmation"
            exit 1
          fi

      - name: Validate Pattern
        run: |
          PATTERN="${{ inputs.bulk_pattern }}"
          if [ -z "$PATTERN" ]; then
            echo "❌ bulk_pattern required (e.g., 'namespace-*-dev-*')"
            exit 1
          fi
          echo "📋 Pattern: $PATTERN"

      - name: List and Delete Projects
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PATTERN: ${{ inputs.bulk_pattern }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          echo "🔍 Finding projects matching: $PATTERN"

          # List projects
          RESPONSE=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects" \
            -H "Authorization: Bearer ${CF_API_TOKEN}")

          # Convert pattern to regex
          REGEX=$(echo "$PATTERN" | sed 's/\*/.\*/g')
          PROJECTS=$(echo "$RESPONSE" | jq -r ".result[] | select(.name | test(\"^${REGEX}$\")) | .name")

          COUNT=$(echo "$PROJECTS" | wc -l | tr -d ' ')

          if [ -z "$PROJECTS" ]; then
            echo "⚠️ No projects found"
            exit 0
          fi

          if [ $COUNT -gt 10 ]; then
            echo  "❌ Safety limit: $COUNT projects found, max 10 allowed"
            exit 1
          fi

          echo "📊 Found $COUNT projects"

          if [ "$DRY_RUN" = "true" ]; then
            echo "🔍 DRY RUN - Would delete:"
            echo "$PROJECTS"
          else
            echo "$PROJECTS" | while read -r PROJECT; do
              echo "🗑️ Deleting: $PROJECT"
              curl -s -X DELETE \
                "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${PROJECT}" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" > /dev/null
              sleep 1
            done
          fi

      - name: Summary
        run: |
          echo "### ✅ Bulk Delete Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Pattern** | \`${{ inputs.bulk_pattern }}\` |" >> $GITHUB_STEP_SUMMARY
  destroy-cloudflare-tunnel:
    name: 🗑️ Delete Cloudflare Tunnels
    needs: [configuration]
    if: inputs.action == 'destroy-cloudflare-tunnel'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate Confirmation
        run: |
          if [ "${{ inputs.confirmation }}" != "DESTROY" ]; then
            echo "❌ Confirmation required. Please type 'DESTROY' to proceed."
            exit 1
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Calculate Config
        id: config
        uses: thisisblaze/blaze-actions/.github/actions/calculate-config@dev
        with:
          environment: ${{ inputs.environment }}
          terraform_stack: tunnel
          branch_tag: ${{ inputs.branch_tag }}
          deploy_infra: true

      - name: List Cloudflare Tunnels
        id: list
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NAMESPACE: ${{ needs.configuration.outputs.namespace }}
          PROJECT: ${{ needs.configuration.outputs.project_key }}
          STAGE: ${{ steps.config.outputs.stage_key }}
          CLIENT: ${{ needs.configuration.outputs.client_key }}
        run: |
          # Patterns
          P1="${NAMESPACE}-${CLIENT}-${PROJECT}-${STAGE}-tunnel-"
          P2="${NAMESPACE}-${PROJECT}-${STAGE}-tunnel-"

          echo "🔍 Searching for tunnels matching patterns:"
          echo "   1. $P1*"
          echo "   2. $P2*"

          # List all tunnels
          RESPONSE=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/cfd_tunnel" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json")

          # Filter tunnels by name pattern
          TUNNEL_IDS=$(echo "$RESPONSE" | jq -r --arg p1 "$P1" --arg p2 "$P2" \
            ".result[] | select(.name | startswith(\$p1) or startswith(\$p2)) | .id")

          if [ -z "$TUNNEL_IDS" ]; then
            echo "⚠️ No tunnels found matching pattern"
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "found=true" >> $GITHUB_OUTPUT
            echo "$TUNNEL_IDS" > /tmp/tunnel_ids.txt
            echo "📋 Found tunnels:"
            echo "$TUNNEL_IDS"
          fi

      - name: Delete Tunnels
        if: steps.list.outputs.found == 'true'
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          while read TUNNEL_ID; do
            echo "🗑️ Deleting tunnel: $TUNNEL_ID"
            
            RESPONSE=$(curl -X DELETE \
              "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/cfd_tunnel/${TUNNEL_ID}" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -w "\n%{http_code}" \
              -s)
            
            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Deleted tunnel $TUNNEL_ID"
            else
              echo "⚠️ Failed to delete tunnel $TUNNEL_ID (HTTP $HTTP_CODE)"
            fi
          done < /tmp/tunnel_ids.txt

      - name: Summary
        run: |
          echo "### ✅ Cloudflare Tunnels Cleanup" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | \`${{ inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Stage** | \`${{ steps.config.outputs.stage_key }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Pattern** | \`blaze-thisisblaze-${{ steps.config.outputs.stage_key }}-tunnel-*\` |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.list.outputs.found }}" = "true" ]; then
            TUNNEL_COUNT=$(wc -l < /tmp/tunnel_ids.txt)
            echo "| **Tunnels Deleted** | $TUNNEL_COUNT |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| **Result** | No tunnels found |" >> $GITHUB_STEP_SUMMARY
          fi

  # ------------------------------------------------------------------
  # ☢️ NUKE SEQUENCE (Chained Destruction)
  # ------------------------------------------------------------------

  nuke-stop-services:
    name: 🛑 Nuke 1/5 - Stop Services
    needs: [configuration]
    if: inputs.action == 'nuke-environment' && (inputs.cloud_provider == 'aws' || inputs.cloud_provider == '' || inputs.cloud_provider == null)
    uses: ./.github/workflows/reusable-ecs-service-management.yml
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN || vars.AWS_ROLE_ARN }}

    with:
      cluster_name: ${{ needs.configuration.outputs.cluster_name }}
      action: "stop"
      service_name: "all"
      aws_region: ${{ needs.configuration.outputs.aws_region }}
      environment: ${{ inputs.environment || 'DEV' }}

  nuke-pre-cleanup:
    name: 🧹 Nuke 1b/5 - Pre-Cleanup (S3/ECS)
    needs: [configuration, nuke-stop-services]
    if: inputs.action == 'nuke-environment' && (inputs.cloud_provider == 'aws' || inputs.cloud_provider == '' || inputs.cloud_provider == null)
    uses: ./.github/workflows/reusable-pre-destroy-cleanup.yml
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN || vars.AWS_ROLE_ARN }}

    with:
      cluster_name: ${{ needs.configuration.outputs.cluster_name }}
      aws_region: ${{ needs.configuration.outputs.aws_region }}
      stage_filter: ${{ inputs.branch_tag }}
      environment: ${{ inputs.environment || 'DEV' }}
      force_delete: true

  nuke-stop-services-gcp:
    name: 🛑 Nuke 1c/5 - Stop Cloud Run Services
    needs: [configuration]
    if: inputs.action == 'nuke-environment' && inputs.cloud_provider == 'gcp'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'DEV' }}
    timeout-minutes: 10
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Delete Cloud Run Services
        run: |
          PROJECT="${{ needs.configuration.outputs.gcp_project_id }}"
          REGION="${{ needs.configuration.outputs.cloud_region }}"
          PREFIX="${{ needs.configuration.outputs.namespace }}-${{ needs.configuration.outputs.client_key }}-${{ needs.configuration.outputs.project_key }}-${{ needs.configuration.outputs.stage_key }}"

          echo "🗑️ Deleting Cloud Run services matching: ${PREFIX}-*"
          echo "   Project: $PROJECT"
          echo "   Region: $REGION"

          SERVICES=$(gcloud run services list \
            --project="$PROJECT" --region="$REGION" \
            --filter="metadata.name~^${PREFIX}" \
            --format="value(metadata.name)" 2>/dev/null || true)

          if [[ -z "$SERVICES" ]]; then
            echo "ℹ️  No Cloud Run services found matching prefix."
          else
            for SVC in $SERVICES; do
              echo "   🗑️ Deleting: $SVC"
              gcloud run services delete "$SVC" \
                --project="$PROJECT" --region="$REGION" \
                --quiet || echo "   ⚠️ Failed to delete $SVC"
            done
            echo "✅ Cloud Run cleanup complete."
          fi

          # Also clean up Artifact Registry images
          REPO="${{ needs.configuration.outputs.namespace }}-${{ needs.configuration.outputs.project_key }}-web"
          echo ""
          echo "🗑️ Checking Artifact Registry repo: $REPO"
          if gcloud artifacts repositories describe "$REPO" \
            --project="$PROJECT" --location="$REGION" >/dev/null 2>&1; then
            echo "   Deleting repository..."
            gcloud artifacts repositories delete "$REPO" \
              --project="$PROJECT" --location="$REGION" \
              --quiet || echo "   ⚠️ Failed to delete repo"
            echo "✅ Artifact Registry cleanup complete."
          else
            echo "ℹ️  Artifact Registry repo not found — skipping."
          fi

  # ── Azure: Pre-Cleanup (Container Apps) ──
  # Brute-force delete Container Apps and CAEs BEFORE Terraform destroy.
  # Prevents orphaned resources from blocking Resource Group deletion (Nuke 5/5).
  nuke-stop-services-azure:
    name: 🛑 Nuke 1d/5 - Stop Container Apps (Azure)
    needs: [configuration]
    if: inputs.action == 'nuke-environment' && inputs.cloud_provider == 'azure'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'DEV' }}
    timeout-minutes: 15
    steps:
      - name: Authenticate to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Delete Container Apps & Environments
        run: |
          RG="${{ needs.configuration.outputs.namespace }}-${{ needs.configuration.outputs.client_key }}-${{ needs.configuration.outputs.project_key }}-${{ needs.configuration.outputs.stage_key }}-rg"

          echo "🗑️ Azure Pre-Cleanup: Resource Group = $RG"

          # 1. Delete all Container Apps in the RG
          echo "   Listing Container Apps..."
          APPS=$(az containerapp list --resource-group "$RG" --query "[].name" -o tsv 2>/dev/null || true)

          if [[ -z "$APPS" ]]; then
            echo "   ℹ️  No Container Apps found."
          else
            for APP in $APPS; do
              echo "   🗑️ Deleting Container App: $APP"
              az containerapp delete --name "$APP" --resource-group "$RG" --yes 2>/dev/null || echo "   ⚠️ Failed to delete $APP"
            done
            echo "   ✅ Container Apps cleanup complete."
          fi

          # 2. Delete Container App Environments
          echo "   Listing Container App Environments..."
          ENVS=$(az containerapp env list --resource-group "$RG" --query "[].name" -o tsv 2>/dev/null || true)

          if [[ -z "$ENVS" ]]; then
            echo "   ℹ️  No Container App Environments found."
          else
            for ENV in $ENVS; do
              echo "   🗑️ Deleting CAE: $ENV"
              az containerapp env delete --name "$ENV" --resource-group "$RG" --yes 2>/dev/null || echo "   ⚠️ Failed to delete $ENV"
            done
            echo "   ✅ CAE cleanup complete."
          fi

          # 3. Delete Action Groups (Application Insights auto-creates these)
          echo "   Listing Action Groups..."
          AGS=$(az monitor action-group list --resource-group "$RG" --query "[].name" -o tsv 2>/dev/null || true)

          if [[ -z "$AGS" ]]; then
            echo "   ℹ️  No Action Groups found."
          else
            for AG in $AGS; do
              echo "   🗑️ Deleting Action Group: $AG"
              az monitor action-group delete --name "$AG" --resource-group "$RG" 2>/dev/null || echo "   ⚠️ Failed to delete $AG"
            done
            echo "   ✅ Action Groups cleanup complete."
          fi

          echo "✅ Azure pre-cleanup finished."

  nuke-destroy-app:
    name: 🗑️ Nuke 2/5 - App Stack
    needs:
      [
        configuration,
        nuke-pre-cleanup,
        nuke-stop-services-gcp,
        nuke-stop-services-azure,
      ]
    if: |
      always() &&
      inputs.action == 'nuke-environment' &&
      (needs.nuke-pre-cleanup.result == 'success' || needs.nuke-pre-cleanup.result == 'skipped') &&
      (needs.nuke-stop-services-gcp.result == 'success' || needs.nuke-stop-services-gcp.result == 'skipped') &&
      (needs.nuke-stop-services-azure.result == 'success' || needs.nuke-stop-services-azure.result == 'skipped') &&
      !contains(needs.*.result, 'cancelled') &&
      needs.configuration.outputs.has_app == 'true'
    uses: ./.github/workflows/reusable-terraform.yml
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}
      # Azure
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN || vars.AWS_ROLE_ARN }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      MONGODB_ATLAS_PUBLIC_KEY: ${{ secrets.MONGODB_ATLAS_PUBLIC_KEY }}
      MONGODB_ATLAS_PRIVATE_KEY: ${{ secrets.MONGODB_ATLAS_PRIVATE_KEY }}
      MONGODB_ATLAS_PROJECT_ID: ${{ secrets.MONGODB_ATLAS_PROJECT_ID }}
      MONGODB_ATLAS_ORG_ID: ${{ secrets.MONGODB_ATLAS_ORG_ID }}
      EC_API_KEY: ${{ secrets.EC_API_KEY }}
      ACM_CERTIFICATE_ARN: ${{ secrets.ACM_CERTIFICATE_ARN }}
    with:
      wif_audience: ${{ vars.WIF_AUDIENCE }}
      cloud_provider: ${{ inputs.cloud_provider || 'aws' }}
      # Force explicit path for App stack instead of using config output (which relies on input.stack)
      tf_dir: "${{ needs.configuration.outputs.infra_prefix }}/${{ needs.configuration.outputs.stage_key }}-app"
      aws_region: ${{ needs.configuration.outputs.aws_region }}
      environment: ${{ inputs.environment || 'DEV' }}
      # Backend Config (Must match calculate-config logic)
      bucket: ${{ needs.configuration.outputs.bucket }}
      # Key format: infra/{project}/{stage}/{stack}.tfstate
      # We must reconstruct the key for each stack.
      state_key: "infra/${{ needs.configuration.outputs.project_key }}/${{ needs.configuration.outputs.stage_key }}/app.tfstate"
      lock_table: ${{ needs.configuration.outputs.lock_table }}
      apply: true
      destroy: true
      tf_vars: |
        project_key=${{ needs.configuration.outputs.project_key }}
        client_key=${{ needs.configuration.outputs.client_key }}
        namespace=${{ needs.configuration.outputs.namespace }}
        platform=${{ needs.configuration.outputs.platform }}
        aws_region=${{ needs.configuration.outputs.aws_region }}
        domain_root=${{ needs.configuration.outputs.domain_root }}
        stage=${{ needs.configuration.outputs.stage_key }}
        branch_name=${{ inputs.branch_tag }}

        gcp_project_id=${{ needs.configuration.outputs.gcp_project_id }}
        gcp_region=${{ needs.configuration.outputs.cloud_region }}
        azure_region=${{ needs.configuration.outputs.cloud_region }}
      pre_apply_script: |
        echo "🔪 REMOVING ORPHANED CODEDEPLOY STATE (IAM role deleted before deployment group)..."
        # CodeDeploy API refuses to delete deployment groups when their IAM role
        # no longer exists. Remove them from state so destroy can proceed.
        terraform state rm "module.app.module.api_service.aws_codedeploy_deployment_group.this[0]" 2>/dev/null || true
        terraform state rm "module.app.module.api_service.aws_codedeploy_app.this[0]" 2>/dev/null || true
        terraform state rm "module.app.module.frontend_service.aws_codedeploy_deployment_group.this[0]" 2>/dev/null || true
        terraform state rm "module.app.module.frontend_service.aws_codedeploy_app.this[0]" 2>/dev/null || true
        echo "✅ Orphaned CodeDeploy state removed."

  # Gate job: runs after app destroy (success OR failure) so data/network stacks proceed.
  # Needed because the environment-app module has a Terraform count bug that causes plan
  # to fail when resources are already destroyed (count depends on unknown attributes).
  nuke-app-gate:
    name: ✅ Nuke 2g - App Gate (absorb failure)
    needs: [configuration, nuke-destroy-app]
    if: |
      always() &&
      inputs.action == 'nuke-environment' &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    steps:
      - name: Gate
        run: |
          RESULT="${{ needs.nuke-destroy-app.result }}"
          echo "App stack result: $RESULT"
          if [ "$RESULT" = "cancelled" ]; then exit 1; fi
          echo "✅ Proceeding with data/network destroy regardless of app result"

  nuke-destroy-pages:
    name: 🗑️ Nuke 2b/5 - Pages Projects
    needs: [configuration, nuke-app-gate]
    if: inputs.action == 'nuke-environment' && (inputs.cloud_provider == 'aws' || inputs.cloud_provider == '' || inputs.cloud_provider == null)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Delete Pages Projects
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NAMESPACE: ${{ needs.configuration.outputs.namespace }}
          PROJECT: ${{ needs.configuration.outputs.project_key }}
          STAGE: ${{ needs.configuration.outputs.stage_key }}
          CLIENT: ${{ needs.configuration.outputs.client_key }}
        run: |
          if [ "${{ env.STAGE }}" = "prod" ]; then
             PREFIX="${NAMESPACE}-${CLIENT}-${PROJECT}"
          else
             PREFIX="${NAMESPACE}-${CLIENT}-${PROJECT}-${STAGE}"
          fi

          PROJECTS=("${PREFIX}-admin" "${PREFIX}-frontend")

          echo "🗑️ Preparing to delete Pages projects..."

          for PROJ in "${PROJECTS[@]}"; do
             echo "   Target: $PROJ"
             
             # Delete Domains first
             echo "      Fetching domains..."
             DOMAINS=$(curl -s -X GET "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${PROJ}/domains" -H "Authorization: Bearer ${CF_API_TOKEN}" | jq -r '.result[]?.name')
             
             for DOMAIN in $DOMAINS; do
                if [ "$DOMAIN" != "null" ]; then
                   echo "      Deleting Domain: $DOMAIN"
                   curl -s -X DELETE "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${PROJ}/domains/${DOMAIN}" -H "Authorization: Bearer ${CF_API_TOKEN}"
                fi
             done

             echo "      Deleting Project..."
             RESPONSE=$(curl -s -X DELETE \
               "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${PROJ}" \
               -H "Authorization: Bearer ${CF_API_TOKEN}" \
               -H "Content-Type: application/json" \
               -w "\n%{http_code}" )

             HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
             
             if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "404" ]; then
                echo "      ✅ Deleted (or not found)"
             else
                echo "      ⚠️ Failed to delete (HTTP $HTTP_CODE)"
             fi
          done

  # ── AWS: Data Stack Destroy ──
  # AWS has a dedicated data stack (Redis/ElastiCache) that must be destroyed after app
  # but before network (Redis depends on VPC subnets/SGs).
