  #    name: 💾 Nuke 4b/5 - Elastic
  #    needs: [configuration, nuke-destroy-tunnel] # Parallel with mongo
  #    if: inputs.action == 'nuke-environment'
  #    uses: ./.github/workflows/reusable-terraform.yml
  #    with:
  #      tf_dir: ".github/aws/infra/live/third-party/elastic"
  #      aws_region: ${{ needs.configuration.outputs.aws_region }}
  #      environment: ${{ inputs.environment || 'DEV' }}
  #      bucket: ${{ needs.configuration.outputs.bucket }}
  #      state_key: "infra/${{ needs.configuration.outputs.project_key }}/third-party/elastic.tfstate"
  #      lock_table: ${{ needs.configuration.outputs.lock_table }}
  #      apply: true
  #      destroy: true
  #      tf_vars: |
  #        project_key=${{ needs.configuration.outputs.project_key }}
  #        client_key=${{ needs.configuration.outputs.client_key }}
  #        stage=${{ needs.configuration.outputs.stage_key }}
  #    secrets: inherit

  nuke-destroy-network:
    name: 💥 Nuke 5/5 - Network (Host)
    # Wait for Tunnel (and implicit App) instead of Data
    needs: [configuration, nuke-destroy-tunnel]
    if: inputs.action == 'nuke-environment'
    uses: ./.github/workflows/reusable-terraform.yml
    with:
      tf_dir: ".github/aws/infra/live/${{ needs.configuration.outputs.stage_key }}-network"
      aws_region: ${{ needs.configuration.outputs.aws_region }}
      environment: ${{ inputs.environment || 'DEV' }}
      bucket: ${{ needs.configuration.outputs.bucket }}
      state_key: "infra/${{ needs.configuration.outputs.project_key }}/${{ needs.configuration.outputs.stage_key }}/network.tfstate"
      lock_table: ${{ needs.configuration.outputs.lock_table }}
      apply: true
      destroy: true
      tf_vars: |
        project_key=${{ needs.configuration.outputs.project_key }}
        client_key=${{ needs.configuration.outputs.client_key }}
        namespace=${{ needs.configuration.outputs.namespace }}
        platform=${{ needs.configuration.outputs.platform }}
        aws_region=${{ needs.configuration.outputs.aws_region }}
        domain_root=${{ needs.configuration.outputs.domain_root }}
        stage=${{ needs.configuration.outputs.stage_key }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

  summary:
    name: 📝 Ops Summary
    needs:
      [
        configuration,
        kill-workflows,
        state-operations,
        manage-environment,
        destroy-resources,
        sync-cloudflare-config,
        nuke-destroy-network,
      ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate Summary
        run: |
          echo "# 🛠️ Ops Utility Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Helper function
          get_icon() {
            if [[ "$1" == "success" ]]; then echo "✅"; elif [[ "$1" == "skipped" ]]; then echo "⏭️"; elif [[ "$1" == "cancelled" ]]; then echo "🚫"; else echo "❌"; fi
          }

          echo "## 📋 Action Context" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Action** | \`${{ inputs.action }}\` |" >> $GITHUB_STEP_SUMMARY

          # If configuration ran successfully, we have more info
          if [[ "${{ needs.configuration.result }}" == "success" ]]; then
            echo "| **Environment** | \`${{ inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **Cluster** | \`${{ needs.configuration.outputs.cluster_name }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **Region** | \`${{ needs.configuration.outputs.aws_region }}\` |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🚦 Execution Status" >> $GITHUB_STEP_SUMMARY

          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ inputs.action }}" == "kill-workflows" ]]; then
             echo "| **Kill Workflows** | $(get_icon ${{ needs.kill-workflows.result }}) |" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ inputs.action }}" == "unlock-state" || "${{ inputs.action }}" == "wipe-state" ]]; then
             echo "| **State Ops** | $(get_icon ${{ needs.state-operations.result }}) |" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ inputs.action }}" == "manage-environment" ]]; then
             echo "| **Manage Env** | $(get_icon ${{ needs.manage-environment.result }}) |" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ inputs.action }}" == "destroy-resources" ]]; then
             echo "| **Destroy** | $(get_icon ${{ needs.destroy-resources.result }}) |" >> $GITHUB_STEP_SUMMARY
          fi

           if [[ "${{ inputs.action }}" == "sync-cloudflare-config" ]]; then
             echo "| **Sync Cloudflare** | $(get_icon ${{ needs.sync-cloudflare-config.result }}) |" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ inputs.action }}" == "nuke-environment" ]]; then
             echo "| **Stop Services** | $(get_icon ${{ needs.nuke-stop-services.result }}) |" >> $GITHUB_STEP_SUMMARY
             echo "| **Destroy App** | $(get_icon ${{ needs.nuke-destroy-app.result }}) |" >> $GITHUB_STEP_SUMMARY
             echo "| **Destroy Tunnel** | $(get_icon ${{ needs.nuke-destroy-tunnel.result }}) |" >> $GITHUB_STEP_SUMMARY
             echo "| **Destroy Mongo** | $(get_icon ${{ needs.nuke-destroy-data-mongo.result }}) |" >> $GITHUB_STEP_SUMMARY
             echo "| **Destroy Elastic** | $(get_icon ${{ needs.nuke-destroy-data-elastic.result }}) |" >> $GITHUB_STEP_SUMMARY
             echo "| **Destroy Network** | $(get_icon ${{ needs.nuke-destroy-network.result }}) |" >> $GITHUB_STEP_SUMMARY
          fi
