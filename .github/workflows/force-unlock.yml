name: "Force Unlock Terraform State"

on:
    workflow_dispatch:
        inputs:
            cloud_provider:
                description: "Cloud Provider"
                type: choice
                options: ["aws", "gcp"]
                default: "aws"
            environment:
                description: "Target Environment"
                type: choice
                options: ["DEV", "STAGE", "PROD"]
                required: true
            stack:
                description: "Terraform Stack"
                type: choice
                options:
                    - "network"
                    - "acm"
                    - "tunnel"
                    - "app"
                    - "third-party-mongodb"
                    - "third-party-elastic"
                required: true
            branch_tag:
                description: "Feature Tag (if applicable)"
                required: false
                type: string

    workflow_call:
        inputs:
            cloud_provider:
                type: string
                default: "aws"
                required: false
            environment:
                type: string
                required: true
            stack:
                type: string
                required: true
            branch_tag:
                type: string
                required: false
        secrets:
            AWS_ROLE_ARN:
                required: false
            GCP_WORKLOAD_IDENTITY_PROVIDER:
                required: false
            GCP_SERVICE_ACCOUNT:
                required: false

permissions:
    id-token: write
    contents: read

jobs:
    configuration:
        name: Configuration
        runs-on: ubuntu-latest
        environment: ${{ inputs.environment }}
        timeout-minutes: 5
        outputs:
            bucket: ${{ steps.config.outputs.bucket }}
            state_key: ${{ steps.config.outputs.state_key }}
            lock_table: ${{ steps.config.outputs.lock_table }}
            aws_region: ${{ steps.config.outputs.aws_region }}
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

            - name: Calculate Configuration
              id: config
              uses: thisisblaze/blaze-actions/.github/actions/calculate-config@dev
              with:
                  environment: ${{ inputs.environment }}
                  terraform_stack: ${{ inputs.stack }}
                  branch_name: ${{ inputs.branch_tag }}
                  deploy_infra: "true"
                  build_images: "false"
                  deploy_services: "false"
                  event_name: "workflow_dispatch"

    force-unlock:
        name: 🔓 Force Unlock State
        needs: [configuration]
        runs-on: ubuntu-latest
        environment: ${{ inputs.environment }}
        timeout-minutes: 10
        steps:
            - name: Configure AWS Credentials
              if: inputs.cloud_provider != 'gcp'
              uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
              with:
                  role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
                  aws-region: ${{ needs.configuration.outputs.aws_region }}

            - name: Authenticate to GCP
              if: inputs.cloud_provider == 'gcp'
              uses: google-github-actions/auth@v2
              with:
                  workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
                  service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

            - name: Force Unlock Terraform State (AWS)
              if: inputs.cloud_provider != 'gcp'
              run: |
                  BUCKET="${{ needs.configuration.outputs.bucket }}"
                  KEY="${{ needs.configuration.outputs.state_key }}"
                  TABLE="${{ needs.configuration.outputs.lock_table }}"
                  REGION="${{ needs.configuration.outputs.aws_region }}"
                  if [[ -z "$TABLE" ]]; then TABLE="$BUCKET"; fi
                  LOCK_ID="${BUCKET}/${KEY}"
                  echo "🔓 Force unlocking Terraform state lock (AWS)..."
                  echo "   Bucket: $BUCKET"
                  echo "   Key: $KEY"
                  echo "   Lock ID: $LOCK_ID"
                  aws dynamodb delete-item \
                    --table-name "$TABLE" \
                    --region "$REGION" \
                    --key "{\"LockID\": {\"S\": \"$LOCK_ID\"}}" || true
                  aws s3 rm "s3://$BUCKET/$KEY.tflock" --region "$REGION" || true
                  echo "✅ State lock removed successfully"

            - name: Force Unlock Terraform State (GCP)
              if: inputs.cloud_provider == 'gcp'
              run: |
                  BUCKET="${{ needs.configuration.outputs.bucket }}"
                  KEY="${{ needs.configuration.outputs.state_key }}"
                  echo "🔓 Force unlocking Terraform state lock (GCP)..."
                  echo "   Bucket: $BUCKET"
                  echo "   Key: $KEY"
                  # GCS backend uses a .tflock object for locking
                  gcloud storage rm "gs://$BUCKET/$KEY.tflock" 2>/dev/null || true
                  # Also try the lock file pattern Terraform uses
                  gcloud storage rm "gs://$BUCKET/${KEY}.lock" 2>/dev/null || true
                  echo "✅ GCS state lock removed successfully"
