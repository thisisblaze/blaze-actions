name: "99 - Ops (Nuke CloudFront)"
on:
  workflow_dispatch:
    inputs:
      dist_id:
        description: "Distribution ID to DELETE"
        required: true
        default: "EXAMPLE_ZONE_ID"

  workflow_call:
    inputs:
      dist_id:
        description: "Distribution ID to DELETE"
        required: true
        type: string
    secrets:
      AWS_ROLE_ARN:
        required: true

permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  nuke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: stage
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Load Access List
        id: load-access
        run: |
          if [[ -f "vars/blaze-env.json" ]]; then
            ALLOWED=$(jq -r '.common.ALLOWED_INFRA_USERS // empty' vars/blaze-env.json)
            echo "allowed=$ALLOWED" >> "$GITHUB_OUTPUT"
          else
            echo "⚠️ vars/blaze-env.json not found. Skipping access control."
            echo "allowed=" >> "$GITHUB_OUTPUT"
          fi

      - name: Check Access
        if: steps.load-access.outputs.allowed != ''
        uses: thisisblaze/blaze-actions/.github/actions/check-access@dev
        with:
          allowed_users: ${{ steps.load-access.outputs.allowed }}
          actor: ${{ github.actor }}

      - name: Load AWS Region from Config
        id: load-config
        run: |
          AWS_REGION=$(jq -r '.common.AWS_REGION' vars/blaze-env.json)
          if [[ -z "$AWS_REGION" ]]; then
            echo "❌ ERROR: AWS_REGION not set in vars/blaze-env.json"
            exit 1
          fi
          echo "aws_region=$AWS_REGION" >> "$GITHUB_OUTPUT"
          echo "✅ Using AWS Region: $AWS_REGION (from vars/blaze-env.json)"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ steps.load-config.outputs.aws_region }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Disable and Delete
        run: |
          DIST_ID="${{ inputs.dist_id }}"
          echo "Fetching config for $DIST_ID..."
          aws cloudfront get-distribution-config --id $DIST_ID > dist-config.json
          ETAG=$(jq -r '.ETag' dist-config.json)
          ENABLED=$(jq -r '.DistributionConfig.Enabled' dist-config.json)

          if [ "$ENABLED" == "true" ]; then
            echo "Distribution is ENABLED. Disabling..."
            # Update to Enabled=false
            jq '.DistributionConfig.Enabled = false' dist-config.json > disabled-config.json
            # Extract just the config object for the update command
            jq '.DistributionConfig' disabled-config.json > update-payload.json
            
            aws cloudfront update-distribution \
              --id $DIST_ID \
              --distribution-config file://update-payload.json \
              --if-match $ETAG
              
            echo "Waiting for distribution to be deployed (disabled state)... this may take minutes..."
            aws cloudfront wait distribution-deployed --id $DIST_ID
            
            # Refresh ETag after update
            aws cloudfront get-distribution-config --id $DIST_ID > dist-config.json
            ETAG=$(jq -r '.ETag' dist-config.json)
          else
            echo "Distribution is already DISABLED."
          fi

          echo "Deleting distribution $DIST_ID..."
          aws cloudfront delete-distribution --id $DIST_ID --if-match $ETAG
          echo "Successfully Deleted."
