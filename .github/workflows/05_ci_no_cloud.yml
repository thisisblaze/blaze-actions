name: 05 ✅ CI (No Cloud)

on:
  pull_request:
  push:
    branches: [dev, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    name: 🧩 Workflow Lint (actionlint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run actionlint
        run: |
          bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint .github/workflows/05_ci_no_cloud.yml .github/workflows/sync-secrets-from-ssm.yml .github/workflows/02-deploy-app.yml
