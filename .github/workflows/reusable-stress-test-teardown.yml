name: "🌪️ Phase 1: Teardown"

on:
  workflow_call:
    inputs:
      environment:
        description: "Target Environment"
        required: true
        type: string

      target_type:
        description: "What to test"
        required: false
        default: "host"
        type: string

      branch_tag:
        description: "Feature branch tag (required if target_type=feature-branch)"
        required: false
        type: string

      mode:
        description: "Execution Mode"
        required: false
        default: "standard"
        type: string

      include_third_party:
        description: "Include third-party stacks (MongoDB, Elastic, Cloudflare)"
        required: false
        default: false
        type: boolean

      preserve_host:
        description: "Preserve host network"
        required: false
        default: false
        type: boolean
        
      cloud_provider:
        required: false
        type: string
        default: aws
        
      wif_audience:
        description: "OIDC Audience"
        required: false
        type: string
        
      azure_client_id_rev:
        required: false
        type: string
      azure_tenant_id_rev:
        required: false
        type: string
      azure_subscription_id_rev:
        required: false
        type: string
    secrets:
      AWS_ROLE_ARN:
        required: false
      GH_PAT:
        required: false
      NPM_TOKEN:
        required: false
      CLOUDFLARE_API_TOKEN:
        required: false
      CLOUDFLARE_ZONE_ID:
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        required: false
      MONGODB_ATLAS_PUBLIC_KEY:
        required: false
      MONGODB_ATLAS_PRIVATE_KEY:
        required: false
      MONGODB_ATLAS_PROJECT_ID:
        required: false
      MONGODB_ATLAS_ORG_ID:
        required: false
      BLAZE_SENTRY_AUTH_TOKEN:
        required: false
      BLAZE_SENTRY_DSN:
        required: false
      MONGO_INITDB_ROOT_PASSWORD:
        required: false
      BLAZE_AUTH_JWT_PRIVATE_KEY:
        required: false
      BLAZE_AUTH_ADMIN_EMAIL:
        required: false
      BLAZE_AUTH_ADMIN_PASSWORD:
        required: false
      BLAZE_CONNECTION_STRING:
        required: false
      BLAZE_ELASTICSEARCH_USERNAME:
        required: false
      BLAZE_ELASTICSEARCH_PASSWORD:
        required: false
      BLAZE_FILES_S3_ACCESS_KEY:
        required: false
      BLAZE_FILES_S3_SECRET_ACCESS_KEY:
        required: false
      BLAZE_GRAPHQL_CACHE_SETTINGS:
        required: false
      BLAZE_CLIENT_HEADER:
        required: false
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        required: false
      GCP_SERVICE_ACCOUNT:
        required: false
      AZURE_CLIENT_ID:
        required: false
      AZURE_TENANT_ID:
        required: false
      AZURE_SUBSCRIPTION_ID:
        required: false

permissions:
  id-token: write
  contents: read
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # --------------------------------------------------------------------------------
  # 1. SETUP & CONFIG
  # --------------------------------------------------------------------------------
  setup:
    name: "Initialize"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      terraform_stack: ${{ steps.calc.outputs.stack }}
      branch_tag: ${{ steps.calc.outputs.tag }}
    steps:
      - id: calc
        run: |
          if [[ "${{ inputs.target_type }}" == "feature-branch" ]]; then
            echo "stack=app" >> $GITHUB_OUTPUT
            echo "tag=${{ inputs.branch_tag }}" >> $GITHUB_OUTPUT
          else
            echo "stack=network" >> $GITHUB_OUTPUT
            echo "tag=" >> $GITHUB_OUTPUT
          fi

  config:
    name: "⚙️ Config"
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      stage_key: ${{ steps.calc.outputs.stage_key }}
      bucket: ${{ steps.calc.outputs.bucket }}
      lock_table: ${{ steps.calc.outputs.lock_table }}
      state_key: ${{ steps.calc.outputs.state_key }}
      tf_dir: ${{ steps.calc.outputs.tf_dir }}
      cluster_name: ${{ steps.calc.outputs.cluster_name }}
      env_val: ${{ steps.calc.outputs.env_val }}
      aws_region: ${{ steps.calc.outputs.aws_region }}
      client_key: ${{ steps.calc.outputs.client_key }}
      project_key: ${{ steps.calc.outputs.project_key }}
      namespace: ${{ steps.calc.outputs.namespace }}
      platform: ${{ steps.calc.outputs.platform }}
      cloud_provider: ${{ steps.calc.outputs.cloud_provider }}
      cloud_region: ${{ steps.calc.outputs.cloud_region }}
      infra_prefix: ${{ steps.calc.outputs.infra_prefix }}
      gcp_project_id: ${{ steps.calc.outputs.gcp_project_id }}
      domain_root: ${{ steps.calc.outputs.domain_root }}
      allowed_infra_users: ${{ steps.calc.outputs.allowed_infra_users }}
      gcp_docker_repo: ${{ steps.calc.outputs.gcp_docker_repo }}
      azure_acr_name: ${{ steps.calc.outputs.azure_acr_name }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Checkout Actions
        uses: actions/checkout@v6
        with:
          repository: thisisblaze/blaze-actions
          path: .blaze-actions
          ref: dev

      - name: Calculate Configuration
        id: calc
        uses: ./.blaze-actions/.github/actions/calculate-env-config
        with:
          environment: ${{ inputs.environment }}
          terraform_stack: ${{ needs.setup.outputs.terraform_stack }}
          branch_tag: ${{ needs.setup.outputs.branch_tag }}
          cloud_provider: ${{ inputs.cloud_provider }}

  # --------------------------------------------------------------------------------
  # 1.5 PRODUCTION SAFETY CHECK
  # --------------------------------------------------------------------------------
  prod-safety-check:
    if: inputs.environment == 'prod'
    name: "⚠️ Production Safety Check"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: prod-stress-test-approval
      url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Manual Approval Required
        run: |
          echo "🚨 PRODUCTION STRESS TEST"
          echo "Environment: ${{ inputs.environment }}"
          echo "Target: ${{ inputs.target_type }}"
          echo "Mode: ${{ inputs.mode }}"
          echo "Include Third-Party: ${{ inputs.include_third_party }}"
          echo ""
          echo "This will DESTROY and RECREATE production infrastructure."
          echo "Ensure all pre-flight checks are complete before approving."

  # --------------------------------------------------------------------------------
  # 1.6 PRE-FLIGHT CHECKS (Verify What Exists)
  # --------------------------------------------------------------------------------
  check-states:
    name: "🔍 Check Stack States"
    needs: config
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      app_exists: ${{ steps.check-app.outputs.exists }}
      tunnel_exists: ${{ steps.check-tunnel.outputs.exists }}
      network_exists: ${{ steps.check-network.outputs.exists }}
      mongodb_exists: ${{ steps.check-mongodb.outputs.exists }}
      elastic_exists: ${{ steps.check-elastic.outputs.exists }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Checkout Actions
        uses: actions/checkout@v6
        with:
          repository: thisisblaze/blaze-actions
          path: .blaze-actions
          ref: dev
      
      - name: Check App State
        id: check-app
        uses: ./.blaze-actions/.github/actions/check-stack-exists
        with:
          cloud_provider: ${{ inputs.cloud_provider }}
          bucket: ${{ needs.config.outputs.bucket }}
          state_key: "infra/${{ needs.config.outputs.project_key }}/${{ needs.config.outputs.stage_key }}/app.tfstate"
          aws_region: ${{ needs.config.outputs.aws_region }}
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN || vars.AWS_ROLE_ARN }}
          gcp_workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp_service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          wif_audience: ${{ inputs.wif_audience || vars.WIF_AUDIENCE }}

      - name: Check Tunnel State
        id: check-tunnel
        uses: ./.blaze-actions/.github/actions/check-stack-exists
        with:
          cloud_provider: ${{ inputs.cloud_provider }}
          bucket: ${{ needs.config.outputs.bucket }}
          state_key: "infra/${{ needs.config.outputs.project_key }}/third-party/cloudflare.tfstate"
          aws_region: ${{ needs.config.outputs.aws_region }}
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN || vars.AWS_ROLE_ARN }}
          gcp_workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp_service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          wif_audience: ${{ inputs.wif_audience || vars.WIF_AUDIENCE }}

      - name: Check Network State
        if: inputs.target_type == 'host'
        id: check-network
        uses: ./.blaze-actions/.github/actions/check-stack-exists
        with:
          cloud_provider: ${{ inputs.cloud_provider }}
          bucket: ${{ needs.config.outputs.bucket }}
          state_key: "infra/${{ needs.config.outputs.project_key }}/${{ needs.config.outputs.stage_key }}/network.tfstate"
          aws_region: ${{ needs.config.outputs.aws_region }}
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN || vars.AWS_ROLE_ARN }}
          gcp_workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp_service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          wif_audience: ${{ inputs.wif_audience || vars.WIF_AUDIENCE }}

      - name: Check MongoDB State
        if: inputs.include_third_party && inputs.target_type == 'host'
        id: check-mongodb
        uses: ./.blaze-actions/.github/actions/check-stack-exists
        with:
          cloud_provider: ${{ inputs.cloud_provider }}
          bucket: ${{ needs.config.outputs.bucket }}
          state_key: "infra/${{ needs.config.outputs.project_key }}/third-party/mongodb.tfstate"
          aws_region: ${{ needs.config.outputs.aws_region }}
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN || vars.AWS_ROLE_ARN }}
          gcp_workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp_service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          wif_audience: ${{ inputs.wif_audience || vars.WIF_AUDIENCE }}

      - name: Check Elastic State
        if: inputs.include_third_party && inputs.target_type == 'host'
        id: check-elastic
        uses: ./.blaze-actions/.github/actions/check-stack-exists
        with:
          cloud_provider: ${{ inputs.cloud_provider }}
          bucket: ${{ needs.config.outputs.bucket }}
          state_key: "infra/${{ needs.config.outputs.project_key }}/third-party/elastic.tfstate"
          aws_region: ${{ needs.config.outputs.aws_region }}
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN || vars.AWS_ROLE_ARN }}
          gcp_workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp_service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          wif_audience: ${{ inputs.wif_audience || vars.WIF_AUDIENCE }}

  # --------------------------------------------------------------------------------
  # 2. CLEANUP SERVICES (Critical for Cluster Destroy)
  # --------------------------------------------------------------------------------
  cleanup-services:
    if: ${{ always() && inputs.mode != 'quick-test' && needs.config.result == 'success' && (needs.prod-safety-check.result == 'success' || inputs.environment != 'prod') }}
    needs:
      - config
      - prod-safety-check
      - check-states
    uses: ./.github/workflows/reusable-pre-destroy-cleanup.yml
    with:
      cluster_name: ${{ needs.config.outputs.cluster_name }}
      aws_region: ${{ needs.config.outputs.aws_region }}
      force_delete: true
      environment: ${{ inputs.environment }}
      cloud_provider: ${{ inputs.cloud_provider }}
      wif_audience: ${{ inputs.wif_audience || vars.WIF_AUDIENCE }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN || vars.AWS_ROLE_ARN }}

  # --------------------------------------------------------------------------------
  # 3. TEARDOWN (Infrastructure)
  # --------------------------------------------------------------------------------
  destroy-app:
    if: ${{ inputs.mode != 'quick-test' && needs.check-states.outputs.app_exists == 'true' }}
    name: "🧨 Destroy App"

    needs: [config, cleanup-services, check-states]
    uses: ./.github/workflows/reusable-terraform-operations.yml
    with:
      action: "destroy"
      tf_dir: "${{ needs.config.outputs.infra_prefix }}/${{ inputs.environment }}-app"
      bucket: ${{ needs.config.outputs.bucket }}
      state_key: "infra/${{ needs.config.outputs.project_key }}/${{ needs.config.outputs.stage_key }}/app.tfstate"
      stage_key: ${{ needs.config.outputs.stage_key }}
      aws_region: ${{ needs.config.outputs.aws_region }}
      client_key: ${{ needs.config.outputs.client_key }}
      project_key: ${{ needs.config.outputs.project_key }}
      namespace: ${{ needs.config.outputs.namespace }}
      cloud_platform: ${{ inputs.cloud_provider }}
      domain_root: ${{ needs.config.outputs.domain_root }}
      environment: ${{ inputs.environment }}
      azure_client_id_rev: ${{ inputs.azure_client_id_rev }}
      azure_tenant_id_rev: ${{ inputs.azure_tenant_id_rev }}
      azure_subscription_id_rev: ${{ inputs.azure_subscription_id_rev }}
      wif_audience: ${{ inputs.wif_audience || vars.WIF_AUDIENCE }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN || vars.AWS_ROLE_ARN }}
      GH_PAT: ${{ secrets.GH_PAT }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  destroy-third-party-mongodb:
    if: ${{ inputs.include_third_party && inputs.target_type == 'host' && needs.check-states.outputs.mongodb_exists == 'true' }}
    name: "🧨 Destroy MongoDB"
    needs: [config, destroy-app, check-states]
    uses: ./.github/workflows/reusable-terraform-operations.yml
    with:
      action: "destroy"
      tf_dir: "${{ needs.config.outputs.infra_prefix }}/third-party/mongodb"
      bucket: ${{ needs.config.outputs.bucket }}
      state_key: "infra/${{ needs.config.outputs.project_key }}/third-party/mongodb.tfstate"
      stage_key: ${{ needs.config.outputs.stage_key }}
      aws_region: ${{ needs.config.outputs.aws_region }}
      client_key: ${{ needs.config.outputs.client_key }}
      project_key: ${{ needs.config.outputs.project_key }}
      namespace: ${{ needs.config.outputs.namespace }}
      cloud_platform: ${{ inputs.cloud_provider }}
      domain_root: ${{ needs.config.outputs.domain_root }}
      environment: ${{ inputs.environment }}
      azure_client_id_rev: ${{ inputs.azure_client_id_rev }}
      azure_tenant_id_rev: ${{ inputs.azure_tenant_id_rev }}
      azure_subscription_id_rev: ${{ inputs.azure_subscription_id_rev }}
      wif_audience: ${{ inputs.wif_audience || vars.WIF_AUDIENCE }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN || vars.AWS_ROLE_ARN }}

  destroy-third-party-elastic:
    if: ${{ inputs.include_third_party && inputs.target_type == 'host' && needs.check-states.outputs.elastic_exists == 'true' }}
    name: "🧨 Destroy Elastic"
    needs: [config, destroy-app, check-states]
    uses: ./.github/workflows/reusable-terraform-operations.yml
    with:
      action: "destroy"
      tf_dir: "${{ needs.config.outputs.infra_prefix }}/third-party/elastic"
      bucket: ${{ needs.config.outputs.bucket }}
      state_key: "infra/${{ needs.config.outputs.project_key }}/third-party/elastic.tfstate"
      stage_key: ${{ needs.config.outputs.stage_key }}
      aws_region: ${{ needs.config.outputs.aws_region }}
      client_key: ${{ needs.config.outputs.client_key }}
      project_key: ${{ needs.config.outputs.project_key }}
      namespace: ${{ needs.config.outputs.namespace }}
      cloud_platform: ${{ inputs.cloud_provider }}
      domain_root: ${{ needs.config.outputs.domain_root }}
      environment: ${{ inputs.environment }}
      azure_client_id_rev: ${{ inputs.azure_client_id_rev }}
      azure_tenant_id_rev: ${{ inputs.azure_tenant_id_rev }}
      azure_subscription_id_rev: ${{ inputs.azure_subscription_id_rev }}
      wif_audience: ${{ inputs.wif_audience || vars.WIF_AUDIENCE }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN || vars.AWS_ROLE_ARN }}
      GH_PAT: ${{ secrets.GH_PAT }}

  destroy-tunnel:
    if: ${{ inputs.environment == 'dev-mini' && inputs.mode != 'quick-test' && needs.check-states.outputs.tunnel_exists == 'true' }}
    name: "🧨 Destroy Tunnel"

    needs: [config, destroy-app, check-states]
    uses: ./.github/workflows/reusable-terraform-operations.yml
    with:
      action: "destroy"
      tf_dir: "${{ needs.config.outputs.infra_prefix }}/third-party/cloudflare"
      bucket: ${{ needs.config.outputs.bucket }}
      state_key: "infra/${{ needs.config.outputs.project_key }}/third-party/cloudflare.tfstate"
      stage_key: ${{ needs.config.outputs.stage_key }}
      aws_region: ${{ needs.config.outputs.aws_region }}
      client_key: ${{ needs.config.outputs.client_key }}
      project_key: ${{ needs.config.outputs.project_key }}
      namespace: ${{ needs.config.outputs.namespace }}
      cloud_platform: ${{ inputs.cloud_provider }}
      domain_root: ${{ needs.config.outputs.domain_root }}
      environment: ${{ inputs.environment }}
      azure_client_id_rev: ${{ inputs.azure_client_id_rev }}
      azure_tenant_id_rev: ${{ inputs.azure_tenant_id_rev }}
      azure_subscription_id_rev: ${{ inputs.azure_subscription_id_rev }}
      wif_audience: ${{ inputs.wif_audience || vars.WIF_AUDIENCE }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN || vars.AWS_ROLE_ARN }}
      GH_PAT: ${{ secrets.GH_PAT }}

  destroy-network:
    if: ${{ inputs.mode != 'quick-test' && inputs.preserve_host != true && inputs.target_type == 'host' && needs.check-states.outputs.network_exists == 'true' }}
    name: "🧨 Destroy Network"

    needs: [config, destroy-tunnel, check-states]
    uses: ./.github/workflows/reusable-terraform-operations.yml
    with:
      action: "destroy"
      tf_dir: "${{ needs.config.outputs.infra_prefix }}/${{ inputs.environment }}-network"
      bucket: ${{ needs.config.outputs.bucket }}
      state_key: "infra/${{ needs.config.outputs.project_key }}/${{ needs.config.outputs.stage_key }}/network.tfstate"
      stage_key: ${{ needs.config.outputs.stage_key }}
      aws_region: ${{ needs.config.outputs.aws_region }}
      client_key: ${{ needs.config.outputs.client_key }}
      project_key: ${{ needs.config.outputs.project_key }}
      namespace: ${{ needs.config.outputs.namespace }}
      cloud_platform: ${{ inputs.cloud_provider }}
      domain_root: ${{ needs.config.outputs.domain_root }}
      environment: ${{ inputs.environment }}
      azure_client_id_rev: ${{ inputs.azure_client_id_rev }}
      azure_tenant_id_rev: ${{ inputs.azure_tenant_id_rev }}
      azure_subscription_id_rev: ${{ inputs.azure_subscription_id_rev }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN || vars.AWS_ROLE_ARN }}
      GH_PAT: ${{ secrets.GH_PAT }}
