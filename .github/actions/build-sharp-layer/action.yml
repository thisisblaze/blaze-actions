name: "Build Sharp Lambda Layer"
description: "Build Sharp library for Lambda@Edge image resizing"
inputs:
  aws-region:
    description: "AWS region for Lambda Layer (must be us-east-1 for Lambda@Edge)"
    required: false
    default: "us-east-1"
  sharp-version:
    description: "Sharp library version"
    required: false
    default: "^0.33.0"
  layer-name:
    description: "Lambda Layer name"
    required: false
    default: "sharp-image-processing"
  upload-to-s3:
    description: "Whether to upload to S3 for Terraform (true/false)"
    required: false
    default: "true"
  s3-bucket:
    description: "S3 bucket for layer storage"
    required: false
    default: ""
  s3-key:
    description: "S3 key for layer zip"
    required: false
    default: "lambda-layers/sharp-layer.zip"

outputs:
  layer-arn:
    description: "ARN of the published Lambda Layer"
    value: ${{ steps.publish.outputs.layer_arn }}
  s3-uri:
    description: "S3 URI of the uploaded layer"
    value: ${{ steps.upload.outputs.s3_uri }}
  layer-path:
    description: "Local path to the layer zip file"
    value: ${{ steps.build.outputs.layer_path }}

runs:
  using: composite
  steps:
    - name: Check if Sharp layer needed
      id: check
      shell: bash
      run: |
        echo "Building Sharp Lambda Layer for image resize functionality"
        echo "Region: ${{ inputs.aws-region }}"
        echo "Sharp version: ${{ inputs.sharp-version }}"

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Create package.json
      shell: bash
      run: |
        mkdir -p /tmp/sharp-layer
        cd /tmp/sharp-layer

        cat > package.json <<'EOF'
        {
          "name": "sharp-layer",
          "version": "1.0.0",
          "description": "Sharp library for Lambda@Edge image processing",
          "dependencies": {
            "sharp": "${{ inputs.sharp-version }}"
          }
        }
        EOF

        echo "📦 package.json created"
        cat package.json

    - name: Build Sharp for Lambda runtime
      id: build
      shell: bash
      run: |
        cd /tmp/sharp-layer

        echo "🔨 Building Sharp for Amazon Linux 2 (Lambda runtime)..."

        # Install Sharp with platform-specific build
        docker run --rm \
          --entrypoint="" \
          -v $(pwd):/build \
          -w /build \
          public.ecr.aws/lambda/nodejs:20 \
          npm install --platform=linux --arch=x64 --production

        # Create Lambda Layer structure
        mkdir -p nodejs
        mv node_modules nodejs/

        # Package as zip
        zip -r sharp-layer.zip nodejs

        echo "✅ Sharp layer built successfully"
        ls -lh sharp-layer.zip

        # Set output
        echo "layer_path=/tmp/sharp-layer/sharp-layer.zip" >> $GITHUB_OUTPUT

    - name: Upload to S3
      id: upload
      if: inputs.upload-to-s3 == 'true' && inputs.s3-bucket != ''
      shell: bash
      run: |
        S3_URI="s3://${{ inputs.s3-bucket }}/${{ inputs.s3-key }}"

        echo "📤 Uploading to ${S3_URI}..."

        aws s3 cp /tmp/sharp-layer/sharp-layer.zip "${S3_URI}"

        echo "✅ Uploaded to S3"
        echo "s3_uri=${S3_URI}" >> $GITHUB_OUTPUT

    - name: Publish Lambda Layer
      id: publish
      shell: bash
      run: |
        echo "🚀 Publishing Lambda Layer to ${{ inputs.aws-region }}..."

        LAYER_ARN=$(aws lambda publish-layer-version \
          --region ${{ inputs.aws-region }} \
          --layer-name ${{ inputs.layer-name }} \
          --description "Sharp library for image processing (built $(date +%Y-%m-%d))" \
          --zip-file fileb:///tmp/sharp-layer/sharp-layer.zip \
          --compatible-runtimes nodejs18.x nodejs20.x \
          --compatible-architectures x86_64 \
          --query 'LayerVersionArn' \
          --output text)

        echo "✅ Layer published: ${LAYER_ARN}"
        echo "layer_arn=${LAYER_ARN}" >> $GITHUB_OUTPUT

        # Also output to GitHub Summary
        echo "## 📦 Sharp Lambda Layer Published" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**ARN:** \`${LAYER_ARN}\`" >> $GITHUB_STEP_SUMMARY
        echo "**Region:** ${{ inputs.aws-region }}" >> $GITHUB_STEP_SUMMARY
        echo "**Sharp Version:** ${{ inputs.sharp-version }}" >> $GITHUB_STEP_SUMMARY

    - name: Cleanup
      if: always()
      shell: bash
      run: |
        sudo rm -rf /tmp/sharp-layer
        echo "🧹 Cleaned up build artifacts"
