name: "Setup Blaze Environment"
description: "Handles Checkout, Cloud Login, and optional Tool Setup"

inputs:
  cloud-provider:
    description: "Cloud provider to configure (aws/gcp/azure). Default: aws"
    required: false
    default: "aws"
  aws-role-arn:
    description: "AWS Role to Assume (can also be set via env.AWS_ROLE_ARN)"
    required: false
  aws-region:
    description: "AWS Region (can also be set via env.AWS_REGION)"
    required: false
  terraform:
    description: "Set to true to install Terraform"
    required: false
    default: "false"
  ecr:
    description: "Set to true to login to ECR (AWS) / Artifact Registry (GCP) / ACR (Azure)"
    required: false
    default: "false"
  aws-access-key-id:
    description: "AWS Access Key ID"
    required: false
  aws-secret-access-key:
    description: "AWS Secret Access Key"
    required: false
  skip-aws-setup:
    description: "Set to true to skip AWS credential configuration"
    required: false
    default: "false"
  gcp-workload-identity-provider:
    description: "GCP Workload Identity Provider (for GCP auth)"
    required: false
  gcp-service-account:
    description: "GCP Service Account email (for GCP auth)"
    required: false
  gcp-project-id:
    description: "GCP Project ID"
    required: false
  azure-client-id:
    description: "Azure Client ID (for Azure OIDC auth)"
    required: false
  azure-tenant-id:
    description: "Azure Tenant ID"
    required: false
  azure-subscription-id:
    description: "Azure Subscription ID"
    required: false
  gcp-wif-audience:
    description: "GCP WIF Audience (Optional)"
    required: false
    default: ""

outputs:
  registry:
    description: "Container Registry URI (ECR/Artifact Registry/ACR)"
    value: ${{ steps.login-ecr.outputs.registry || steps.gcp-registry.outputs.registry || steps.azure-registry.outputs.registry || '' }}

runs:
  using: "composite"
  steps:
    # 🎯 OPTIMIZED: Removed redundant 'Checkout Code' step.
    # The calling workflow must perform checkout before calling this local action.

    # ══════════════════════════════════════════════════════════
    # AWS Authentication
    # ══════════════════════════════════════════════════════════
    - name: Suppress Node 20 warnings
      shell: bash
      run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> "$GITHUB_ENV"

    - name: Configure AWS Credentials
      if: (inputs.cloud-provider == 'aws' || inputs.cloud-provider == '') && inputs.skip-aws-setup != 'true'
      uses: aws-actions/configure-aws-credentials@v6.0.0
      with:
        role-to-assume: ${{ inputs.aws-role-arn || env.AWS_ROLE_ARN }}
        aws-access-key-id: ${{ inputs.aws-access-key-id }}
        aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
        aws-region: ${{ inputs.aws-region || env.AWS_REGION || 'eu-west-1' }}
        role-session-name: ${{ github.run_id && format('GitHubActions-{0}', github.run_id) || 'LocalActSession' }}

    - name: Ensure AWS CLI is installed
      shell: bash
      if: (inputs.cloud-provider == 'aws' || inputs.cloud-provider == '') && inputs.skip-aws-setup != 'true'
      run: |
        if ! command -v aws &> /dev/null; then
          echo "Installing AWS CLI..."
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          if command -v sudo &> /dev/null; then
            sudo ./aws/install --update
          else
             ./aws/install --update --install-dir /usr/local/aws-cli --bin-dir /usr/local/bin || echo "Could not install AWS CLI with standard paths, proceeding anyway..."
          fi
          rm -rf aws awscliv2.zip
        fi

    # ══════════════════════════════════════════════════════════
    # GCP Authentication (Workload Identity Federation)
    # ══════════════════════════════════════════════════════════
    - name: Authenticate to Google Cloud
      if: inputs.cloud-provider == 'gcp'
      id: gcp-auth
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ inputs.gcp-workload-identity-provider }}
        service_account: ${{ inputs.gcp-service-account }}
        project_id: ${{ inputs.gcp-project-id }}
        audience: ${{ inputs.gcp-wif-audience }}

    - name: Set up Google Cloud SDK
      if: inputs.cloud-provider == 'gcp'
      uses: google-github-actions/setup-gcloud@v2

    # ══════════════════════════════════════════════════════════
    # Azure Authentication (OIDC / Managed Identity)
    # ══════════════════════════════════════════════════════════
    - name: Authenticate to Azure
      if: inputs.cloud-provider == 'azure'
      uses: azure/login@v3.0.0
      with:
        client-id: ${{ inputs.azure-client-id }}
        tenant-id: ${{ inputs.azure-tenant-id }}
        subscription-id: ${{ inputs.azure-subscription-id }}

    # ══════════════════════════════════════════════════════════
    # Terraform Setup (Cloud-agnostic)
    # ══════════════════════════════════════════════════════════
    - name: Cache Terraform Providers
      if: inputs.terraform == 'true'
      uses: actions/cache@v3
      with:
        path: |
          .terraform
          ~/.terraform.d/plugin-cache
        key: terraform-${{ runner.os }}-${{ hashFiles('**/.terraform.lock.hcl') }}
        restore-keys: |
          terraform-${{ runner.os }}-

    - name: Setup Terraform
      if: inputs.terraform == 'true'
      uses: hashicorp/setup-terraform@v3

    # ══════════════════════════════════════════════════════════
    # Container Registry Login (Provider-specific)
    # ══════════════════════════════════════════════════════════
    - name: Login to Amazon ECR
      if: inputs.ecr == 'true' && (inputs.cloud-provider == 'aws' || inputs.cloud-provider == '') && inputs.skip-aws-setup != 'true'
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Login to GCP Artifact Registry
      if: inputs.ecr == 'true' && inputs.cloud-provider == 'gcp'
      id: gcp-registry
      shell: bash
      run: |
        gcloud auth configure-docker ${{ inputs.gcp-project-id && format('{0}-docker.pkg.dev', steps.gcp-auth.outputs.project_id) || 'docker.pkg.dev' }}
        echo "registry=${{ inputs.gcp-project-id }}-docker.pkg.dev" >> $GITHUB_OUTPUT

    - name: Login to Azure Container Registry
      if: inputs.ecr == 'true' && inputs.cloud-provider == 'azure'
      id: azure-registry
      shell: bash
      run: |
        echo "⚠️  Azure ACR login not yet configured. Set up ACR name in blaze-env.json."
        # az acr login --name <acr-name>
        echo "registry=" >> $GITHUB_OUTPUT
