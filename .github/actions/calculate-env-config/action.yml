name: Calculate Environment Configuration
description: "Calculates configuration variables and paths for Terraform runs (Minimal version for Stress Tests)"

inputs:
  environment:
    required: true
    description: "Target environment (e.g., dev, stage, prod)"
  cloud_provider:
    required: false
    default: ""
    description: "Cloud provider override (aws, gcp, azure)"
  terraform_stack:
    required: false
    description: "Stack type: network, app, third-party-cloudflare, third-party-mongodb, third-party-elastic, feature-branch, multi-site-network, multi-site-app, multi-site-cdn"
  branch_tag:
    required: false
    description: "Feature branch tag (for feature-branch stacks)"

outputs:
  stage_key:
    description: "Stage Key"
    value: ${{ steps.config.outputs.stage_key }}
  bucket:
    description: "State Bucket"
    value: ${{ steps.config.outputs.bucket }}
  lock_table:
    description: "Lock Table"
    value: ${{ steps.config.outputs.lock_table }}
  state_key:
    description: "State Key Path"
    value: ${{ steps.config.outputs.state_key }}
  tf_dir:
    description: "Terraform Directory"
    value: ${{ steps.config.outputs.tf_dir }}
  cluster_name:
    description: "Cluster Name"
    value: ${{ steps.config.outputs.cluster_name }}
  env_val:
    description: "Environment Value"
    value: ${{ steps.config.outputs.env_val }}
  aws_region:
    description: "AWS Region"
    value: ${{ steps.config.outputs.aws_region }}
  client_key:
    description: "Client Key"
    value: ${{ steps.config.outputs.client_key }}
  project_key:
    description: "Project Key"
    value: ${{ steps.config.outputs.project_key }}
  namespace:
    description: "Namespace"
    value: ${{ steps.config.outputs.namespace }}
  platform:
    description: "Platform"
    value: ${{ steps.config.outputs.platform }}
  cloud_provider:
    description: "Actual Cloud Provider"
    value: ${{ steps.config.outputs.cloud_provider }}
  cloud_region:
    description: "Cloud Region"
    value: ${{ steps.config.outputs.cloud_region }}
  infra_prefix:
    description: "Infra Prefix"
    value: ${{ steps.config.outputs.infra_prefix }}
  gcp_project_id:
    description: "GCP Project ID"
    value: ${{ steps.config.outputs.gcp_project_id }}
  domain_root:
    description: "Domain Root"
    value: ${{ steps.config.outputs.domain_root }}
  allowed_infra_users:
    description: "Allowed Infra Users"
    value: ${{ steps.config.outputs.allowed_infra_users }}
  gcp_docker_repo:
    description: "GCP Docker Repo"
    value: ${{ steps.config.outputs.gcp_docker_repo }}
  azure_acr_name:
    description: "Azure ACR Name"
    value: ${{ steps.config.outputs.azure_acr_name }}

runs:
  using: "composite"
  steps:
    - name: Load Repo Config
      id: load-config
      shell: bash
      run: |
        # Load CLIENT config (vars/blaze-env.json)
        CLIENT_CONFIG="${{ github.workspace }}/vars/blaze-env.json"
        if ! test -f "$CLIENT_CONFIG"; then
          echo "❌ ERROR: Client config file $CLIENT_CONFIG not found!"
          exit 1
        fi

        # Load PROJECT config (vars/thisisblaze/blaze-env.json)
        PROJECT_CONFIG="${{ github.workspace }}/vars/thisisblaze/blaze-env.json"
        if ! test -f "$PROJECT_CONFIG"; then
          echo "❌ ERROR: Project config file $PROJECT_CONFIG not found!"
          exit 1
        fi

        ENV_INPUT="${{ inputs.environment }}"
        # Normalize to lowercase (DEV -> dev)
        ENV_KEY=$(echo "$ENV_INPUT" | tr '[:upper:]' '[:lower:]')

        echo "📥 Loading Config for [$ENV_KEY]..."
        echo "  - Client config: $CLIENT_CONFIG"
        echo "  - Project config: $PROJECT_CONFIG"

        # 1. Export Common Vars from CLIENT config
        for key in $(jq -r '.common | keys[]' $CLIENT_CONFIG); do
           val=$(jq -r ".common.$key" $CLIENT_CONFIG)
           echo "$key=$val" >> "$GITHUB_ENV"
        done

        # 2. Export Common Vars from PROJECT config (overrides client if duplicate)
        for key in $(jq -r '.common | keys[]' $PROJECT_CONFIG); do
           val=$(jq -r ".common.$key" $PROJECT_CONFIG)
           echo "$key=$val" >> "$GITHUB_ENV"
        done

        # 3. Export Environment Specific Vars from PROJECT config (dev/stage/prod)
        if jq -e ".$ENV_KEY" $PROJECT_CONFIG > /dev/null 2>&1; then
            for key in $(jq -r ".$ENV_KEY | keys[]" $PROJECT_CONFIG); do
               val=$(jq -r ".$ENV_KEY.$key" $PROJECT_CONFIG)
               echo "$key=$val" >> "$GITHUB_ENV"
            done
        fi

    - name: Calculate Configuration
      id: config
      shell: bash
      run: |
        # Normalize environment to lowercase
        ENV_VAL="${{ inputs.environment }}"
        STAGE_KEY=$(echo "$ENV_VAL" | tr '[:upper:]' '[:lower:]')
        BRANCH_TAG="${{ inputs.branch_tag }}"

        # For feature branches, include branch_tag in stage_key
        # This ensures separate services/resources for each feature branch
        if [[ -n "$BRANCH_TAG" ]]; then
          STAGE_KEY="${STAGE_KEY}-${BRANCH_TAG}"
          echo "🌿 Feature Branch Mode: stage_key=$STAGE_KEY"
        fi

        # Calculate bucket name
        # Note: CLOUD_PLATFORM and other vars are now loaded from scripts/env-config.json
        PLATFORM="${CLOUD_PLATFORM:-ecs}"
        NAMESPACE="${NAMESPACE:-blaze}"

        # ── MULTI-CLOUD: Compute INFRA_PREFIX from CLOUD_PROVIDER ──
        CONFIG_CLOUD_PROVIDER="${CLOUD_PROVIDER:-aws}"
        INPUT_CLOUD_PROVIDER="${{ inputs.cloud_provider }}"

        if [[ -n "$INPUT_CLOUD_PROVIDER" && "$INPUT_CLOUD_PROVIDER" != "" ]]; then
          CLOUD_PROVIDER="$INPUT_CLOUD_PROVIDER"
        else
          CLOUD_PROVIDER="$CONFIG_CLOUD_PROVIDER"
        fi

        GCP_STATE_BUCKET="${GCP_STATE_BUCKET:-}"
        GCP_PROJECT_ID="${GCP_PROJECT_ID:-}"
        case "$CLOUD_PROVIDER" in
          gcp)
            CLOUD_REGION="${GCP_REGION:-europe-west1}"
            INFRA_PREFIX=".github/gcp/infra/live"
            ;;
          azure)
            CLOUD_REGION="${AZURE_REGION:-westeurope}"
            INFRA_PREFIX=".github/azure/infra/live"
            ;;
          *)
            CLOUD_PROVIDER="aws"
            CLOUD_REGION="${AWS_REGION:-eu-west-1}"
            INFRA_PREFIX=".github/aws/infra/live"
            ;;
        esac
        echo "☁️  Cloud Provider: $CLOUD_PROVIDER | Region: $CLOUD_REGION | Infra: $INFRA_PREFIX"

        # Ensure vars are available
        if [[ -z "$CLIENT_KEY" ]] || [[ -z "$PROJECT_KEY" ]]; then
           echo "❌ ERROR: CLIENT_KEY or PROJECT_KEY missing from loaded config."
           exit 1
        fi

        # ── MULTI-CLOUD: Route state bucket by provider ──
        case "$CLOUD_PROVIDER" in
          gcp)
            BUCKET="${GCP_STATE_BUCKET}"
            LOCK_TABLE=""  # GCS uses built-in locking
            ;;
          azure)
            # Azure Backend Format for reusable-terraform: resource_group/storage_account/container
            # Must match Terraform module naming: ${namespace}-${client_key}-tfstate-rg / ${namespace}${client_key}tfstate
            BUCKET="${NAMESPACE}-${CLIENT_KEY}-tfstate-rg/${NAMESPACE}${CLIENT_KEY}tfstate/tfstate"
            LOCK_TABLE="" # Azure Blob supports leasing (locking) natively
            ;;
          *)
            BUCKET="${CLIENT_KEY}-${STAGE_KEY}-${NAMESPACE}-tfstate"
            LOCK_TABLE="${BUCKET}-lock"
            ;;
        esac

        # Determine Terraform directory and state key based on stack type
        STACK="${{ inputs.terraform_stack }}"
        BRANCH_TAG="${{ inputs.branch_tag }}"

        TF_DIR=""
        STATE_KEY=""
        CLUSTER_NAME=""

        case "$STACK" in
          "third-party-cloudflare")
            TF_DIR="${INFRA_PREFIX}/third-party/cloudflare"
            STATE_KEY="infra/${PROJECT_KEY}/third-party/cloudflare.tfstate"
            ;;
          "third-party-mongodb")
            TF_DIR="${INFRA_PREFIX}/third-party/mongodb"
            STATE_KEY="infra/${PROJECT_KEY}/third-party/mongodb-${STAGE_KEY}.tfstate"
            ;;
          "third-party-elastic")
            TF_DIR="${INFRA_PREFIX}/third-party/elastic"
            STATE_KEY="infra/${PROJECT_KEY}/third-party/elastic-${STAGE_KEY}.tfstate"
            ;;
          "network")
            # SAFETY: Prevent targeting 'network' with a specific branch tag
            # Feature branches share the Host Network. Targeting 'network' with a tag
            # would resolve to the Host Network State (dev/network.tfstate), creating a risk
            # of accidental destruction or state corruption of the shared environment.
            if [[ -n "$BRANCH_TAG" ]]; then
                echo "❌ SAFETY BLOCK: You cannot run the 'network' stack for a Feature Branch."
                echo "   Feature Branches share the Host Network infrastructure."
                echo "   Action: Run 'app' stack instead (which includes the Tunnel)."
                echo "   If you intended to modify the Host Network, clear the 'Branch Name' input."
                exit 1
            fi


            if [[ "$STAGE_KEY" == "prod" || "$STAGE_KEY" == "stage" ]]; then
              TF_DIR="${INFRA_PREFIX}/${STAGE_KEY}-network"
              STATE_KEY="infra/${PROJECT_KEY}/${STAGE_KEY}/network.tfstate"
            else
              # Dev and Dev-Mini now uses split stack (like stage/prod)
              TF_DIR="${INFRA_PREFIX}/${STAGE_KEY}-network"
              STATE_KEY="infra/${PROJECT_KEY}/${STAGE_KEY}/network.tfstate"
            fi
            ;;
          "app" | "application-layer")
            if [[ "$STAGE_KEY" == "prod" || "$STAGE_KEY" == "stage" ]]; then
              TF_DIR="${INFRA_PREFIX}/${STAGE_KEY}-app"
              STATE_KEY="infra/${PROJECT_KEY}/${STAGE_KEY}/app.tfstate"
            else
              # Dev and Dev-Mini now uses split stack (like stage/prod)
              TF_DIR="${INFRA_PREFIX}/${STAGE_KEY}-app"
              if [[ -n "$BRANCH_TAG" ]]; then
                # Feature branches have their own app state
                STATE_KEY="infra/${PROJECT_KEY}/features/${BRANCH_TAG}.tfstate"
              else
                # Host app state
                STATE_KEY="infra/${PROJECT_KEY}/${STAGE_KEY}/app.tfstate"
              fi
            fi
            ;;
          "feature-branch")
            # Feature branches use stage-specific app directory but separate state
            TF_DIR="${INFRA_PREFIX}/${STAGE_KEY}-app"
            if [[ -z "$BRANCH_TAG" ]]; then
                echo "❌ ERROR: Branch Tag is REQUIRED when targeting 'feature-branch' stack."
                echo "   To target the Host Environment, use 'host-environment' or 'application-layer'."
                exit 1
            fi
            
            STATE_KEY="infra/${PROJECT_KEY}/features/${BRANCH_TAG}.tfstate"
            CLUSTER_NAME="${NAMESPACE}-${CLIENT_KEY}-${PROJECT_KEY}-${STAGE_KEY}-${BRANCH_TAG}-cluster"
            ;;
          "host-environment")
            if [[ "$STAGE_KEY" == "prod" || "$STAGE_KEY" == "stage" ]]; then
               # For split stacks, 'Host' implies the Network layer (VPC/Cluster)
               TF_DIR="${INFRA_PREFIX}/${STAGE_KEY}-network"
               STATE_KEY="infra/${PROJECT_KEY}/${STAGE_KEY}/network.tfstate"
            else
               # Dev and Dev-Mini now uses split stack - 'Host' means network layer
               TF_DIR="${INFRA_PREFIX}/${STAGE_KEY}-network"
               STATE_KEY="infra/${PROJECT_KEY}/${STAGE_KEY}/network.tfstate"
            fi
            ;;
          "multi-site-network")
            # Shared network layer: VPC 10.3.0.0/16, ALB, EC2 ARM64 ASG, ECS cluster
            # Not environment-scoped — single stack covers the whole multi-site setup.
            # State lives under multi-site/ prefix, separate from per-env stacks.
            TF_DIR="${INFRA_PREFIX}/multi-site-network"
            STATE_KEY="infra/${PROJECT_KEY}/multi-site/network.tfstate"
            ;;
          "multi-site-app")
            # Multi-site ECS services, target groups, ALB listener rules (per-site for_each)
            # Reads multi-site-network remote state for cluster/ALB details.
            TF_DIR="${INFRA_PREFIX}/multi-site-app"
            STATE_KEY="infra/${PROJECT_KEY}/multi-site/app.tfstate"
            ;;
          "multi-site-cdn")
            # CloudFront + Lambda@Edge Sharp image resize (1 distribution, all sites)
            # Reads multi-site-network + multi-site-app remote state.
            # ACM cert created in us-east-1 via provider alias.
            TF_DIR="${INFRA_PREFIX}/multi-site-cdn"
            STATE_KEY="infra/${PROJECT_KEY}/multi-site/cdn.tfstate"
            ;;
          *)
            # Default: assume dev network (split stack)
            if [[ "$STAGE_KEY" == "prod" || "$STAGE_KEY" == "stage" ]]; then
              TF_DIR="${INFRA_PREFIX}/${STAGE_KEY}-network"
              STATE_KEY="infra/${PROJECT_KEY}/${STAGE_KEY}/network.tfstate"
            else
              # Dev now uses split stack
              TF_DIR="${INFRA_PREFIX}/dev-network"
              STATE_KEY="infra/${PROJECT_KEY}/dev/network.tfstate"
            fi
            ;;
        esac

        # Calculate cluster name if not set
        if [[ -z "$CLUSTER_NAME" ]]; then
          if [[ "$STAGE_KEY" == "prod" || "$STAGE_KEY" == "stage" ]]; then
            CLUSTER_NAME="${NAMESPACE}-${CLIENT_KEY}-${PROJECT_KEY}-${STAGE_KEY}-cluster"
          else
            if [[ -n "$BRANCH_TAG" ]]; then
               CLUSTER_NAME="${NAMESPACE}-${CLIENT_KEY}-${PROJECT_KEY}-${STAGE_KEY}-${BRANCH_TAG}-cluster"
            else
               # DEV HOST (Standard 3.0 Naming)
               CLUSTER_NAME="${NAMESPACE}-${CLIENT_KEY}-${PROJECT_KEY}-${STAGE_KEY}-cluster"
            fi
          fi
        fi

        echo "stage_key=$STAGE_KEY" >> "$GITHUB_OUTPUT"
        echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"
        echo "lock_table=$LOCK_TABLE" >> "$GITHUB_OUTPUT"
        echo "state_key=$STATE_KEY" >> "$GITHUB_OUTPUT"
        echo "tf_dir=$TF_DIR" >> "$GITHUB_OUTPUT"
        echo "cluster_name=$CLUSTER_NAME" >> "$GITHUB_OUTPUT"
        echo "env_val=$ENV_VAL" >> "$GITHUB_OUTPUT"

        # Validate region is set for the active provider
        case "$CLOUD_PROVIDER" in
          gcp)
            if [[ -z "$GCP_REGION" ]]; then
              echo "❌ ERROR: GCP_REGION is not set in env-config.json"
              exit 1
            fi
            ;;
          azure)
            if [[ -z "$AZURE_REGION" ]]; then
              echo "❌ ERROR: AZURE_REGION is not set in env-config.json"
              exit 1
            fi
            ;;
          *)
            if [[ -z "$AWS_REGION" ]]; then
              echo "❌ ERROR: AWS_REGION is not set in env-config.json"
              exit 1
            fi
            ;;
        esac

        echo "aws_region=$AWS_REGION" >> "$GITHUB_OUTPUT"
        echo "client_key=$CLIENT_KEY" >> "$GITHUB_OUTPUT"
        echo "project_key=$PROJECT_KEY" >> "$GITHUB_OUTPUT"
        echo "namespace=$NAMESPACE" >> "$GITHUB_OUTPUT"
        echo "platform=$PLATFORM" >> "$GITHUB_OUTPUT"
        echo "cloud_provider=$CLOUD_PROVIDER" >> "$GITHUB_OUTPUT"
        echo "cloud_region=$CLOUD_REGION" >> "$GITHUB_OUTPUT"
        echo "infra_prefix=$INFRA_PREFIX" >> "$GITHUB_OUTPUT"
        echo "gcp_project_id=$GCP_PROJECT_ID" >> "$GITHUB_OUTPUT"
        echo "domain_root=$DOMAIN_ROOT" >> "$GITHUB_OUTPUT"
        echo "allowed_infra_users=$ALLOWED_INFRA_USERS" >> "$GITHUB_OUTPUT"

        # ── GCP Docker Repository Name ──
        # The multi-site network module hardcodes project_key="multi-site" for resource naming.
        # All other envs follow: {namespace}-{client_key}-{project_key}-{stage_key}-docker
        if [[ "$STAGE_KEY" == "multi-site" && "$CLOUD_PROVIDER" == "gcp" ]]; then
          GCP_DOCKER_REPO="${NAMESPACE}-${CLIENT_KEY}-multi-site-multi-site-docker"
        else
          GCP_DOCKER_REPO="${NAMESPACE}-${CLIENT_KEY}-${PROJECT_KEY}-${STAGE_KEY}-docker"
        fi
        echo "gcp_docker_repo=$GCP_DOCKER_REPO" >> "$GITHUB_OUTPUT"
        echo "🐳 GCP Docker Repo: $GCP_DOCKER_REPO"

        # ── Azure Container Registry Name ──
        if [[ "$CLOUD_PROVIDER" == "azure" ]]; then
          RAW_ACR="${NAMESPACE}-${CLIENT_KEY}-${PROJECT_KEY}-${STAGE_KEY}"
          AZURE_ACR_NAME=$(echo "$RAW_ACR" | tr -d '-' | cut -c 1-24)
        else
          AZURE_ACR_NAME=""
        fi
        echo "azure_acr_name=$AZURE_ACR_NAME" >> $GITHUB_OUTPUT
        echo "🐳 Azure ACR Name: $AZURE_ACR_NAME"
